openapi: 3.0.0
info:
  title: Scan API
  version: 0.0.1
tags:
  - name: scan
servers:
  - url: https://example.com/api/scan
paths:
  /readyz:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1readyz"
  /livez:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1livez"
  /status:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1status"
  /version:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1version"
  /v0/svc-party-id:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getSvcPartyId"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvcPartyIdResponse"
  /v0/closed-rounds:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getClosedRounds"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetClosedRoundsResponse"
  /v0/open-and-issuing-mining-rounds:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getOpenAndIssuingMiningRounds"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/GetOpenAndIssuingMiningRoundsRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetOpenAndIssuingMiningRoundsResponse"
  /v0/coin-rules:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getCoinRules"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/GetCoinRulesRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetCoinRulesResponse"
  /v0/cns-rules:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getCnsRules"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/GetCnsRulesRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetCnsRulesResponse"
  /v0/featured-apps:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listFeaturedAppRights"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListFeaturedAppRightsResponse"
  /v0/featured-apps/{provider_party_id}:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "lookupFeaturedAppRight"
      parameters:
        - name: "provider_party_id"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LookupFeaturedAppRightResponse"
  /v0/total-coin-balance:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTotalCoinBalance"
      parameters:
        - in: query
          name: asOfEndOfRound
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTotalCoinBalanceResponse"
  /v0/coin-config-for-round:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getCoinConfigForRound"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetCoinConfigForRoundResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /v0/round-of-latest-data:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getRoundOfLatestData"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRoundOfLatestDataResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /v0/rewards-collected:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getRewardsCollected"
      parameters:
        - in: query
          name: round
          required: false
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRewardsCollectedResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /v0/top-providers-by-app-rewards:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTopProvidersByAppRewards"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTopProvidersByAppRewardsResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /v0/top-validators-by-validator-rewards:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTopValidatorsByValidatorRewards"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTopValidatorsByValidatorRewardsResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /v0/top-validators-by-purchased-traffic:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTopValidatorsByPurchasedTraffic"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTopValidatorsByPurchasedTrafficResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /v0/bootstrap/import-crates:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listImportCrates"
      parameters:
        - in: query
          name: receiver_party_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListImportCratesResponse"
  /v0/svc-sequencers:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listSvcSequencers"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListSvcSequencersResponse"
  /v0/activities:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listActivity"
      description: |
        Lists activities in descending order, paged, optionally starting after a provided event id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ListActivityRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActivityResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /v0/transactions:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listTransactionHistory"
      description: |
        Lists transactions, by default in ascending order, paged, from ledger begin or optionally starting after a provided event id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TransactionHistoryRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionHistoryResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /v0/cns-entries:
    get:
      tags: [ scan ]
      x-jvm-package: scan
      operationId: "listCnsEntries"
      parameters:
        - name: "name_prefix"
          in: "query"
          schema:
            type: string
        - name: "page_size"
          in: "query"
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListEntriesResponse"
  /v0/cns-entries/by-party/{party}:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "lookupCnsEntryByParty"
      parameters:
        - name: "party"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LookupEntryByPartyResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /v0/cns-entries/by-name/{name}:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "lookupCnsEntryByName"
      parameters:
        - name: "name"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LookupEntryByNameResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
components:
  schemas:
    GetSvcPartyIdResponse:
      type: object
      required: ["svc_party_id"]
      properties:
        svc_party_id:
          type: string
    GetClosedRoundsResponse:
      type: object
      required: ["rounds"]
      properties:
        rounds:
          type: array
          items:
            "$ref": "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"
    GetOpenAndIssuingMiningRoundsRequest:
      type: object
      required:
        [
          "cached_open_mining_round_contract_ids",
          "cached_issuing_round_contract_ids",
        ]
      properties:
        cached_open_mining_round_contract_ids:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ContractId"
        cached_issuing_round_contract_ids:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ContractId"
    GetOpenAndIssuingMiningRoundsResponse:
      type: object
      required:
        [
          "open_mining_rounds",
          "issuing_mining_rounds",
          "time_to_live_in_microseconds",
        ]
      properties:
        time_to_live_in_microseconds:
          type: integer
        open_mining_rounds:
          $ref: "../../../../common/src/main/openapi/common-internal.yaml#/components/schemas/MaybeCachedContractWithStateMap"
        issuing_mining_rounds:
          $ref: "../../../../common/src/main/openapi/common-internal.yaml#/components/schemas/MaybeCachedContractWithStateMap"
    GetCoinRulesRequest:
      type: object
      properties:
        cached_coin_rules_contract_id:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ContractId"
        cached_coin_rules_domain_id:
          type: string
    GetCoinRulesResponse:
      type: object
      properties:
        coin_rules_update:
          $ref: "../../../../common/src/main/openapi/common-internal.yaml#/components/schemas/MaybeCachedContractWithState"
      required: ["coin_rules_update"]
    GetCnsRulesRequest:
      type: object
      properties:
        cached_cns_rules_contract_id:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ContractId"
        cached_cns_rules_domain_id:
          type: string
    GetCnsRulesResponse:
      type: object
      properties:
        cns_rules_update:
          $ref: "../../../../common/src/main/openapi/common-internal.yaml#/components/schemas/MaybeCachedContractWithState"
      required: ["cns_rules_update"]
    ListFeaturedAppRightsResponse:
      type: object
      required: ["featured_apps"]
      properties:
        featured_apps:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"
    LookupFeaturedAppRightResponse:
      type: object
      properties:
        featured_app_right:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"
    GetTotalCoinBalanceResponse:
      type: object
      required: ["total_balance"]
      properties:
        total_balance:
          type: string
    GetCoinConfigForRoundResponse:
      type: object
      required:
        ["coin_create_fee", "holding_fee", "lock_holder_fee", "transfer_fee"]
      properties:
        coin_create_fee:
          type: string
        holding_fee:
          type: string
        lock_holder_fee:
          type: string
        transfer_fee:
          $ref: "#/components/schemas/SteppedRate"
    SteppedRate:
      type: object
      required: ["initial", "steps"]
      properties:
        initial:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/RateStep"
    RateStep:
      type: object
      required: ["amount", "rate"]
      properties:
        amount:
          type: string
        rate:
          type: string
    GetRoundOfLatestDataResponse:
      type: object
      required: ["round", "effectiveAt"]
      properties:
        round:
          type: integer
          format: int64
        effectiveAt:
          type: string
          format: date-time
    GetRewardsCollectedResponse:
      type: object
      required: ["amount"]
      properties:
        amount:
          type: string
    GetValidatorTrafficBalanceResponse:
      type: object
      required: ["remainingBalance", "totalPurchased"]
      properties:
        remainingBalance:
          type: number
          format: double
        totalPurchased:
          type: number
          format: double
    CheckAndUpdateValidatorTrafficBalanceResponse:
      type: object
      required: ["approved"]
      properties:
        approved:
          type: boolean
    GetTopProvidersByAppRewardsResponse:
      type: object
      required: ["providersAndRewards"]
      properties:
        providersAndRewards:
          type: array
          items:
            $ref: "#/components/schemas/PartyAndRewards"
    GetTopValidatorsByValidatorRewardsResponse:
      type: object
      required: ["validatorsAndRewards"]
      properties:
        validatorsAndRewards:
          type: array
          items:
            $ref: "#/components/schemas/PartyAndRewards"
    PartyAndRewards:
      type: object
      required: ["provider", "rewards"]
      properties:
        provider:
          type: string
        rewards:
          type: string
    GetTopValidatorsByPurchasedTrafficResponse:
      type: object
      required: ["validatorsByPurchasedTraffic"]
      properties:
        validatorsByPurchasedTraffic:
          type: array
          items:
            $ref: "#/components/schemas/ValidatorPurchasedTraffic"
    ValidatorPurchasedTraffic:
      type: object
      required: ["validator", "numPurchases", "totalTrafficPurchased", "totalCcSpent", "lastPurchasedInRound"]
      properties:
        validator:
          type: string
        numPurchases:
          type: integer
          format: int64
        totalTrafficPurchased:
          type: integer
          format: int64
        totalCcSpent:
          type: string
        lastPurchasedInRound:
          type: integer
          format: int64
    ListImportCratesResponse:
      type: object
      required: ["crates"]
      properties:
        crates:
          type: array
          items:
            # TODO(#6073): consider using a more precise type; i.e., no 'MaybeCached'
            $ref: "../../../../common/src/main/openapi/common-internal.yaml#/components/schemas/MaybeCachedContractWithState"
    ListSvcSequencersResponse:
      type: object
      required: ["domainSequencers"]
      properties:
        domainSequencers:
          type: array
          items:
            $ref: "#/components/schemas/DomainSequencers"
    DomainSequencers:
      type: object
      required: [ "domainId", "sequencers" ]
      properties:
        domainId:
          type: string
        sequencers:
          type: array
          items:
            $ref: "#/components/schemas/SvcSequencer"
    SvcSequencer:
      type: object
      required: ["id", "url", "svName", availableAfter]
      properties:
        id:
          type: string
        url:
          type: string
        svName:
          type: string
        availableAfter:
          type: string
          format: date-time
    TransactionHistoryRequest:
      type: object
      required:
        - page_size
      properties:
        page_end_event_id:
          type: string
          description: |
            Note that all transactions carry some monotonically-increasing event_id.
            Omit this page_end_event_id to start reading the first page, from the beginning or the end of the ledger, depending on the sort_order column.
            A subsequent request can fill the page_end_event_id with the last event_id of the TransactionHistoryResponse to continue reading in the same sort_order.
            The transaction with event_id == page_end_event_id will be skipped in the next response, making it possible to continuously read pages in the same sort_order.
        sort_order:
          description: |
            Sort order for the transactions. For ascending order, from beginning to the end of the ledger, use "asc".
            For descending order, from end to beginning of the ledger, use "desc".
            "asc" is used if the sort_order is omitted.
          type: string
          enum:
            - "asc"
            - "desc"
        page_size:
          description: |
            The maximum number of transactions returned for this request.
          type: integer
          format: int64
    TransactionHistoryResponse:
      type: object
      required:
        - transactions
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionHistoryResponseItem"
    TransactionHistoryResponseItem:
      type: object
      required:
        - transaction_type
        - event_id
        - date
        - domain_id
        - coin_price
        - round
      properties:
        transaction_type:
          description: |
            Describes the type of activity that occurred.
            Determines if the data for the transaction should be read
            from the `transfer`, `mint`, `tap` or `sv_reward_collected` property.
          type: string
          enum:
            - "transfer"
            - "sv_reward_collected"
            - "mint"
            - "devnet_tap"
        event_id:
          description: |
            The event id.
          type: string
        offset:
          description: |
            The ledger offset of the event.
          type: string
        date:
          description: |
            The effective date of the event.
          type: string
          format: date-time
        domain_id:
          description: |
            The id of the domain through which this transaction was sequenced.
          type: string
        round:
          description: |
            The round for which this transaction was registered.
          type: integer
          format: int64
        coin_price:
          description: |
            The coin price for the round at which this transfer was executed.
          type: string
        transfer:
          description: |
            A (batch) transfer from sender to receivers.
          $ref: "#/components/schemas/Transfer"
        mint:
          description: |
            The SVC mints coin for the cases where the collective rules allow for that.
          $ref: "#/components/schemas/CoinAmount"
        tap:
          description: |
            A tap creates a Coin, only used for development purposes, and enabled only on DevNet.
          $ref: "#/components/schemas/CoinAmount"
        sv_reward_collected:
          description: |
            An SV collected an SvReward.
          $ref: "#/components/schemas/CoinAmount"
    ListActivityRequest:
      type: object
      required:
        - page_size
      properties:
        begin_after_id:
          type: string
          description: |
             Minimal event_id for returned activities.
             Note that all activities carry some monotonically-increasing event_id. begin_after_id sets the minimum value for event_id's for the query.
        page_size:
          description: |
            The maximum number of activity items returned for this request.
          type: integer
          format: int64
    ListActivityResponse:
      type: object
      required:
        - activities
      properties:
        activities:
          type: array
          items:
            $ref: "#/components/schemas/ListActivityResponseItem"
    ListActivityResponseItem:
      type: object
      required:
        - activity_type
        - event_id
        - date
        - domain_id
        - round
        - coin_price
      properties:
        activity_type:
          description: |
            Describes the type of activity that occurred.
            Determines if the data for the activity should be read
            from the `transfer`, `mint`, `tap` or `sv_reward_collected` property.
          type: string
          enum:
            - "transfer"
            - "sv_reward_collected"
            - "mint"
            - "devnet_tap"
        event_id:
          description: |
            The event id.
          type: string
        offset:
          description: |
            The ledger offset of the event.
          type: string
        date:
          description: |
            The effective date of the event.
          type: string
          format: date-time
        domain_id:
          description: |
            The id of the domain through which this transaction was sequenced.
          type: string
        round:
          description: |
            The round for which this transaction was registered.
          type: integer
          format: int64
        coin_price:
          description: |
            The coin price for the round at which this transfer was executed.
          type: string
        transfer:
          description: |
            A (batch) transfer from sender to receivers.
          $ref: "#/components/schemas/Transfer"
        mint:
          description: |
            The SVC mints coin for the cases where the collective rules allow for that.
          $ref: "#/components/schemas/CoinAmount"
        tap:
          description: |
            A tap creates a Coin, only used for development purposes, and enabled only on DevNet.
          $ref: "#/components/schemas/CoinAmount"
        sv_reward_collected:
          description: |
            An SV collected an SvReward.
          $ref: "#/components/schemas/CoinAmount"
    Transfer:
      description: |
        A transfer between one sender and possibly many receivers, provided by an application provider.
      type: object
      required:
        - provider
        - sender
        - receivers
      properties:
        provider:
          description: |
            The application provider.
          type: string
        sender:
          description: |
            The sender amounts and fees.
          $ref: "#/components/schemas/SenderAmount"
        receivers:
          description: |
            The amounts and fees per receiver.
          type: array
          items:
            $ref: "#/components/schemas/ReceiverAmount"
    CoinAmount:
      type: object
      required:
        - coin_owner
        - coin_amount
      properties:
        coin_owner:
          description: |
            The party that owns the coin.
          type: string
        coin_amount:
          description: |
            The coin amount.
          type: string
    SenderAmount:
      type: object
      required:
        - party
        - sender_change_fee
        - sender_change_amount
        - sender_fee
        - holding_fees
      properties:
        party:
          description: |
            The sender who has transferred coin.
          type: string
        input_coin_amount:
          description: |
            Total amount of coin input into this transfer, before deducting holding fees.
          type: string
        input_app_reward_amount:
          description: |
            Total amount of app rewards input into this transfer.
          type: string
        input_validator_reward_amount:
          description: |
            Total amount of validator rewards input into this transfer.
          type: string
        sender_change_fee:
          description: |
            Fee charged for returning change to the sender,
            which is the smaller of the left-over balance after paying for all outputs
            or one coin create fee.
          type: string
        sender_change_amount:
          description: |
            The final amount of coin returned to the sender after paying for all outputs and fees.
          type: string
        sender_fee:
          description: |
            Total fees paid by the sender, based on receiver's receiver_fee_ratio on outputs
          type: string
        holding_fees:
          description: |
            Holding fees paid by the sender on their input coins.
          type: string
    ReceiverAmount:
      type: object
      required:
