            The receiver who will own the created output coin.
          type: string
        amount:
          description: |
            The amount of coin to receive, before deducting receiver's part of the fees.
          type: string
        receiver_fee:
          description: |
            Total fees paid by the receiver, based on receiver_fee_ratio on outputs
          type: string
