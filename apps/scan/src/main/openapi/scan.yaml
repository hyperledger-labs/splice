openapi: 3.0.0
info:
  title: Scan API
  version: 0.0.1
tags:
  - name: scan
paths:
  /status:
    $ref: "../../../../common/src/main/openapi/common.yaml#/paths/~1status"
  /version:
    $ref: "../../../../common/src/main/openapi/common.yaml#/paths/~1version"
  /api/v0/svc-party-id:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getSvcPartyId"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvcPartyIdResponse"
  /api/v0/closed-rounds:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getClosedRounds"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetClosedRoundsResponse"
  /api/v0/open-and-issuing-mining-rounds:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getOpenAndIssuingMiningRounds"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/GetOpenAndIssuingMiningRoundsRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetOpenAndIssuingMiningRoundsResponse"
  /api/v0/coin-rules:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getCoinRules"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/GetCoinRulesRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetCoinRulesResponse"
  /api/v0/featured-apps:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listFeaturedAppRights"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListFeaturedAppRightsResponse"
  /api/v0/featured-apps/{provider_party_id}:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "lookupFeaturedAppRight"
      parameters:
        - name: "provider_party_id"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LookupFeaturedAppRightResponse"
  /api/v0/total-coin-balance:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTotalCoinBalance"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTotalCoinBalanceResponse"
  /api/v0/coin-config-for-round:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getCoinConfigForRound"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetCoinConfigForRoundResponse"
        "404":
          description: not_found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v0/get-round-of-latest-data:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getRoundOfLatestData"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRoundOfLatestDataResponse"
        "404":
          description: not_found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v0/top-providers-by-app-rewards:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTopProvidersByAppRewards"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTopProvidersByAppRewardsResponse"
        "404":
          description: not_found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v0/top-validators-by-validator-rewards:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTopValidatorsByValidatorRewards"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTopValidatorsByValidatorRewardsResponse"
        "404":
          description: not_found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    GetSvcPartyIdResponse:
      type: object
      required: ["svc_party_id"]
      properties:
        svc_party_id:
          type: string
    GetClosedRoundsResponse:
      type: object
      required: ["rounds"]
      properties:
        rounds:
          type: array
          items:
            "$ref": "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    GetOpenAndIssuingMiningRoundsRequest:
      type: object
      required:
        [
          "cached_open_mining_round_contract_ids",
          "cached_issuing_round_contract_ids",
        ]
      properties:
        cached_open_mining_round_contract_ids:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/ContractId"
        cached_issuing_round_contract_ids:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/ContractId"
    GetOpenAndIssuingMiningRoundsResponse:
      type: object
      required:
        [
          "open_mining_rounds",
          "issuing_mining_rounds",
          "time_to_live_in_microseconds",
        ]
      properties:
        time_to_live_in_microseconds:
          type: integer
        open_mining_rounds:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/MaybeCachedContractMap"
        issuing_mining_rounds:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/MaybeCachedContractMap"
    GetCoinRulesRequest:
      type: object
      properties:
        cached_coin_rules_contract_id:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/ContractId"
    GetCoinRulesResponse:
      type: object
      properties:
        coin_rules_update:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/MaybeCachedContract"
      required: ["coin_rules_update"]
    ListFeaturedAppRightsResponse:
      type: object
      required: ["featured_apps"]
      properties:
        featured_apps:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    LookupFeaturedAppRightResponse:
      type: object
      properties:
        featured_app_right:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    GetTotalCoinBalanceResponse:
      type: object
      required: ["total_unlocked_balance", "total_locked_balance"]
      properties:
        total_unlocked_balance:
          type: string
        total_locked_balance:
          type: string
    GetCoinConfigForRoundResponse:
      type: object
      required:
        ["coin_create_fee", "holding_fee", "lock_holder_fee", "transfer_fee"]
      properties:
        coin_create_fee:
          type: string
        holding_fee:
          type: string
        lock_holder_fee:
          type: string
        transfer_fee:
          $ref: "#/components/schemas/SteppedRate"
    SteppedRate:
      type: object
      required: ["initial", "steps"]
      properties:
        initial:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/RateStep"
    RateStep:
      type: object
      required: ["amount", "rate"]
      properties:
        amount:
          type: string
        rate:
          type: string
    GetRoundOfLatestDataResponse:
      type: object
      required: ["round"]
      properties:
        round:
          type: integer
          format: int64
    GetTopProvidersByAppRewardsResponse:
      type: object
      required: ["providersAndRewards"]
      properties:
        providersAndRewards:
          type: array
          items:
            $ref: "#/components/schemas/PartyAndRewards"
    GetTopValidatorsByValidatorRewardsResponse:
      type: object
      required: ["validatorsAndRewards"]
      properties:
        validatorsAndRewards:
          type: array
          items:
            $ref: "#/components/schemas/PartyAndRewards"
    PartyAndRewards:
      type: object
      required: ["provider", "rewards"]
      properties:
        provider:
          type: string
        rewards:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
