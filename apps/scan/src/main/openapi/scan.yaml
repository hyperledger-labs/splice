openapi: 3.0.0
info:
  title: Scan API
  version: 0.0.1
tags:
  - name: scan
paths:
  /svc-party-id:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getSvcPartyId"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvcPartyIdResponse"
  /closed-rounds:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getClosedRounds"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetClosedRoundsResponse"
  /transfer-context:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTransferContext"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTransferContextResponse"
  /latest-open-and-issuing-mining-rounds:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getLatestOpenAndIssuingMiningRounds"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetLatestOpenAndIssuingMiningRoundsResponse"
  /coin-rules:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getCoinRules"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetCoinRulesResponse"
  /featured-apps:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listFeaturedAppRights"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListFeaturedAppRightsResponse"
  /featured-apps/{provider_party_id}:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "lookupFeaturedAppRight"
      parameters:
        - name: "provider_party_id"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LookupFeaturedAppRightResponse"
  /connected-domains:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listConnectedDomains"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListConnectedDomainsResponse"
components:
  schemas:
    GetSvcPartyIdResponse:
      type: object
      required: ["svc_party_id"]
      properties:
        svc_party_id:
          type: string
    GetClosedRoundsResponse:
      type: object
      required: ["rounds"]
      properties:
        rounds:
          type: array
          items:
            "$ref": "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    GetTransferContextResponse:
      type: object
      properties:
        coin_rules:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        latest_open_mining_round:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        open_mining_rounds:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
      required: ["latest_open_mining_round", "open_mining_rounds"]
    GetLatestOpenAndIssuingMiningRoundsResponse:
      type: object
      required: ["latest_open_mining_round", "issuing_mining_rounds"]
      properties:
        latest_open_mining_round:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        issuing_mining_rounds:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    GetCoinRulesResponse:
      type: object
      properties:
        coin_rules:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    ListFeaturedAppRightsResponse:
      type: object
      required: ["featured_apps"]
      properties:
        featured_apps:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    LookupFeaturedAppRightResponse:
      type: object
      properties:
        featured_app_right:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    ListConnectedDomainsResponse:
      type: object
      required: ["connected_domains"]
      properties:
        connected_domains:
          "$ref": "../../../../common/src/main/openapi/common.yaml#/components/schemas/ConnectedDomains"
