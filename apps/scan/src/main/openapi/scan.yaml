openapi: 3.0.0
info:
  title: Scan API
  version: 0.0.1
tags:
  - name: scan
paths:
  /readyz:
    $ref: "../../../../common/src/main/openapi/common.yaml#/paths/~1readyz"
  /livez:
    $ref: "../../../../common/src/main/openapi/common.yaml#/paths/~1livez"
  /status:
    $ref: "../../../../common/src/main/openapi/common.yaml#/paths/~1status"
  /version:
    $ref: "../../../../common/src/main/openapi/common.yaml#/paths/~1version"
  /svc-party-id:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getSvcPartyId"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvcPartyIdResponse"
  /closed-rounds:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getClosedRounds"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetClosedRoundsResponse"
  /open-and-issuing-mining-rounds:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getOpenAndIssuingMiningRounds"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/GetOpenAndIssuingMiningRoundsRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetOpenAndIssuingMiningRoundsResponse"
  /coin-rules:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getCoinRules"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/GetCoinRulesRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetCoinRulesResponse"
  /api/v1test/coin-rules:
    post:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getCoinRulesV1Test"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/GetCoinRulesRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetCoinRulesResponse"
  /featured-apps:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listFeaturedAppRights"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListFeaturedAppRightsResponse"
  /featured-apps/{provider_party_id}:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "lookupFeaturedAppRight"
      parameters:
        - name: "provider_party_id"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LookupFeaturedAppRightResponse"
  /total-coin-balance:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTotalCoinBalance"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTotalCoinBalanceResponse"
  /coin-config-for-round:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getCoinConfigForRound"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetCoinConfigForRoundResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
  /get-round-of-latest-data:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getRoundOfLatestData"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRoundOfLatestDataResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
  /get-rewards-collected:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getRewardsCollected"
      parameters:
        - in: query
          name: round
          required: false
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRewardsCollectedResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
  /top-providers-by-app-rewards:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTopProvidersByAppRewards"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTopProvidersByAppRewardsResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
  /top-validators-by-validator-rewards:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTopValidatorsByValidatorRewards"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTopValidatorsByValidatorRewardsResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
  /top-validators-by-purchased-traffic:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getTopValidatorsByPurchasedTraffic"
      parameters:
        - in: query
          name: round
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: limit
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetTopValidatorsByPurchasedTrafficResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
  /get-validator-traffic-balance:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "getValidatorTrafficBalance"
      parameters:
        - in: query
          name: validatorParty
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetValidatorTrafficBalanceResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
  /check-and-update-validator-traffic-balance:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "checkAndUpdateValidatorTrafficBalance"
      parameters:
        - in: query
          name: validatorParty
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CheckAndUpdateValidatorTrafficBalanceResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
  /bootstrap/import-crates:
    get:
      tags: [scan]
      x-jvm-package: scan
      operationId: "listImportCrates"
      parameters:
        - in: query
          name: party
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListImportCratesResponse"

components:
  schemas:
    GetSvcPartyIdResponse:
      type: object
      required: ["svc_party_id"]
      properties:
        svc_party_id:
          type: string
    GetClosedRoundsResponse:
      type: object
      required: ["rounds"]
      properties:
        rounds:
          type: array
          items:
            "$ref": "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    GetOpenAndIssuingMiningRoundsRequest:
      type: object
      required:
        [
          "cached_open_mining_round_contract_ids",
          "cached_issuing_round_contract_ids",
        ]
      properties:
        cached_open_mining_round_contract_ids:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/ContractId"
        cached_issuing_round_contract_ids:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/ContractId"
    GetOpenAndIssuingMiningRoundsResponse:
      type: object
      required:
        [
          "open_mining_rounds",
          "issuing_mining_rounds",
          "time_to_live_in_microseconds",
        ]
      properties:
        time_to_live_in_microseconds:
          type: integer
        open_mining_rounds:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/MaybeCachedContractWithStateMap"
        issuing_mining_rounds:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/MaybeCachedContractWithStateMap"
    GetCoinRulesRequest:
      type: object
      properties:
        cached_coin_rules_contract_id:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/ContractId"
        cached_coin_rules_domain_id:
          type: string
    GetCoinRulesResponse:
      type: object
      properties:
        coin_rules_update:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/MaybeCachedContractWithState"
      required: ["coin_rules_update"]
    ListFeaturedAppRightsResponse:
      type: object
      required: ["featured_apps"]
      properties:
        featured_apps:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    LookupFeaturedAppRightResponse:
      type: object
      properties:
        featured_app_right:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    GetTotalCoinBalanceResponse:
      type: object
      required: ["total_unlocked_balance", "total_locked_balance"]
      properties:
        total_unlocked_balance:
          type: string
        total_locked_balance:
          type: string
    GetCoinConfigForRoundResponse:
      type: object
      required:
        ["coin_create_fee", "holding_fee", "lock_holder_fee", "transfer_fee"]
      properties:
        coin_create_fee:
          type: string
        holding_fee:
          type: string
        lock_holder_fee:
          type: string
        transfer_fee:
          $ref: "#/components/schemas/SteppedRate"
    SteppedRate:
      type: object
      required: ["initial", "steps"]
      properties:
        initial:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/RateStep"
    RateStep:
      type: object
      required: ["amount", "rate"]
      properties:
        amount:
          type: string
        rate:
          type: string
    GetRoundOfLatestDataResponse:
      type: object
      required: ["round", "effectiveAt"]
      properties:
        round:
          type: integer
          format: int64
        effectiveAt:
          type: string
          format: date-time
    GetRewardsCollectedResponse:
      type: object
      required: ["amount"]
      properties:
        amount:
          type: string
    GetValidatorTrafficBalanceResponse:
      type: object
      required: ["remainingBalance", "totalPurchased"]
      properties:
        remainingBalance:
          type: number
          format: double
        totalPurchased:
          type: number
          format: double
    CheckAndUpdateValidatorTrafficBalanceResponse:
      type: object
      required: ["approved"]
      properties:
        approved:
          type: boolean
    GetTopProvidersByAppRewardsResponse:
      type: object
      required: ["providersAndRewards"]
      properties:
        providersAndRewards:
          type: array
          items:
            $ref: "#/components/schemas/PartyAndRewards"
    GetTopValidatorsByValidatorRewardsResponse:
      type: object
      required: ["validatorsAndRewards"]
      properties:
        validatorsAndRewards:
          type: array
          items:
            $ref: "#/components/schemas/PartyAndRewards"
    PartyAndRewards:
      type: object
      required: ["provider", "rewards"]
      properties:
        provider:
          type: string
        rewards:
          type: string
    GetTopValidatorsByPurchasedTrafficResponse:
      type: object
      required: ["validatorsByPurchasedTraffic"]
      properties:
        validatorsByPurchasedTraffic:
          type: array
          items:
            $ref: "#/components/schemas/ValidatorPurchasedTraffic"
    ValidatorPurchasedTraffic:
      type: object
      required: ["validator", "numPurchases", "totalTrafficPurchased", "totalCcSpent", "lastPurchasedInRound"]
      properties:
        validator:
          type: string
        numPurchases:
          type: integer
          format: int64
        totalTrafficPurchased:
          type: integer
          format: int64
        totalCcSpent:
          type: string
        lastPurchasedInRound:
          type: integer
          format: int64
    ListImportCratesResponse:
      type: object
      required: ["crates"]
      properties:
        crates:
          type: array
          items:
            # TODO(#6073): consider using a more precise type; i.e., no 'MaybeCached'
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/MaybeCachedContractWithState"
