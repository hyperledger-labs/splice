openapi: 3.0.0
info:
  title: SV API
  version: 0.0.1
tags:
  - name: sv
servers:
  - url: https://example.com/api/sv
paths:
  /readyz:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1readyz"
  /livez:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1livez"
  /v0/admin/validator/onboarding/ongoing:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "listOngoingValidatorOnboardings"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListOngoingValidatorOnboardingsResponse"
  /v0/admin/validator/onboarding/prepare:
    post:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "prepareValidatorOnboarding"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PrepareValidatorOnboardingRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PrepareValidatorOnboardingResponse"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /v0/admin/validator/licenses:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "listValidatorLicenses"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListValidatorLicensesResponse"
  /v0/admin/domain/cometbft/status:
    get:
      tags: [sv]
      x-jvm-package: sv
      operationId: "getCometBftNodeStatus"
      responses:
        "200":
          description: "Response returned by the CometBFT node, or the error if the call failed"
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CometBftNodeStatusOrErrorResponse"
        "404":
          description: "CometBFT is not configured for this app."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /v0/admin/domain/cometbft/json-rpc:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "cometBftJsonRpcRequest"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CometBftJsonRpcRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CometBftJsonRpcOrErrorResponse"
        "404":
          description: "CometBFT is not configured for this app."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
  /v0/admin/domain/cometbft/debug:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "getCometBftNodeDebugDump"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CometBftNodeDumpOrErrorResponse"
        "404":
          description: "CometBFT is not configured for this app."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /v0/admin/domain/sequencer/status:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "getSequencerNodeStatus"
      responses:
        "200":
          description: "Status of sequencer node"
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/NodeStatus"
        "404":
          description: "Sequencer is not configured for this app."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
  /v0/admin/domain/mediator/status:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "getMediatorNodeStatus"
      responses:
        "200":
          description: "Status of mediator node"
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/NodeStatus"
        "404":
          description: "Mediator is not configured for this app."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
  /v0/admin/domain/pause:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "pauseGlobalDomain"
      responses:
        "200":
          description: ok
  /v0/admin/domain/migration-dump:
    get:
      tags: [ sv ]
      x-jvm-package: sv_admin
      operationId: "getDomainMigrationDump"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetDomainMigrationDumpResponse"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
    post:
      tags: [ sv ]
      x-jvm-package: sv_admin
      operationId: "triggerDomainMigrationDump"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TriggerDomainMigrationDumpRequest"
      responses:
        "200":
          description: ok
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /v0/admin/domain/identities-dump:
    get:
      tags: [ sv ]
      x-jvm-package: sv_admin
      operationId: "getDomainNodeIdentitiesDump"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetDomainNodeIdentitiesDumpResponse"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /v0/admin/sv/identity/approve:
    post:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "approveSvIdentity"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ApproveSvIdentityRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /v0/admin/sv/voterequests:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "listSvcRulesVoteRequests"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListSvcRulesVoteRequestsResponse"
  /v0/admin/sv/voteresults:
    post:
      tags: [ sv ]
      x-jvm-package: sv_admin
      operationId: "listSvcRulesVoteResults"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ListVoteResultsRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListSvcRulesVoteResultsResponse"
  /v0/admin/sv/voterequests/{vote_request_contract_id}:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "lookupSvcRulesVoteRequest"
      parameters:
        - name: "vote_request_contract_id"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "404":
          description: "VoteRequest contract not found."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LookupSvcRulesVoteRequestResponse"
  /v0/admin/sv/electionrequests/create:
    post:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "createElectionRequest"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateElectionRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /v0/admin/sv/electionrequests/get:
    get:
      tags: [ sv ]
      x-jvm-package: sv_admin
      operationId: "getElectionRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetElectionRequestResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /v0/admin/sv/votes:
    post:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "castVote"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CastVoteRequest"
      responses:
        "201":
          description: Created
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
    put:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "updateVote"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateVoteRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "404":
          description: "VoteRequest contract not found."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
  /v0/admin/sv/votes-by-request-ids:
    post:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "BatchListVotesByVoteRequests"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/BatchListVotesByVoteRequestsRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListVotesResponse"
  /v0/admin/sv/voterequest/create:
    post:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "createVoteRequest"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateVoteRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /v0/admin/sv/coin-price/votes:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "ListCoinPriceVotes"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListCoinPriceVotesResponse"
  /v0/admin/sv/open-mining-rounds:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "ListOpenMiningRounds"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListOpenMiningRoundsResponse"
  /v0/admin/sv/coin-price/vote:
    put:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "UpdateCoinPriceVote"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateCoinPriceVoteRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /v0/svc/trigger-acs-store-dump:
    post:
      tags: [ sv ]
      x-jvm-package: sv_admin
      operationId: "TriggerAcsDump"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TriggerAcsDumpResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /v0/svc/get-acs-store-dump:
    get:
      tags: [ sv ]
      x-jvm-package: sv_admin
      operationId: "GetAcsStoreDump"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetAcsStoreDumpResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /v0/admin/authorization:
    get:
      tags: [sv]
      x-jvm-package: sv_admin
      operationId: "isAuthorized"
      responses:
        "200":
          description: ok
        "403":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/403"
  /v0/onboard/validator:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "onboardValidator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardValidatorRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "401":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/401"
  /v0/onboard/sv/start:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "startSvOnboarding"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/StartSvOnboardingRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "401":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/401"
  /v0/onboard/sv/status/{candidate_party_id_or_name}:
    get:
      tags: [sv]
      x-jvm-package: sv
      operationId: "getSvOnboardingStatus"
      parameters:
        - name: "candidate_party_id_or_name"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvOnboardingStatusResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /v0/onboard/sv/party-migration/authorize:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "onboardSvPartyMigrationAuthorize"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardSvPartyMigrationAuthorizeRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OnboardSvPartyMigrationAuthorizeResponse"
        "400":
          description: system state not yet valid
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OnboardSvPartyMigrationAuthorizeErrorResponse"
        "401":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/401"
  /v0/onboard/sv/sequencer:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "onboardSvSequencer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardSvSequencerRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OnboardSvSequencerResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /v0/onboard/sv/mediator:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "onboardSvMediator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardSvMediatorRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /v0/devnet/onboard/validator/prepare:
    post:
      tags: [sv]
      x-jvm-package: sv
      description: "faucet for validator candidates self-service"
      operationId: "devNetOnboardValidatorPrepare"
      responses:
        "200":
          description: ok
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
        "501":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/501"
  /v0/svc:
    get:
      tags: [sv]
      x-jvm-package: sv
      operationId: "getSvcInfo"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvcInfoResponse"
components:
  schemas:
    ListOngoingValidatorOnboardingsResponse:
      type: object
      required:
        - ongoing_validator_onboardings
      properties:
        ongoing_validator_onboardings:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    ListValidatorLicensesResponse:
      type: object
      required:
        - validator_licenses
      properties:
        validator_licenses:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    PrepareValidatorOnboardingRequest:
      type: object
      required:
        - expires_in # duration in seconds
      properties:
        expires_in:
          type: integer
          minimum: 1

    PrepareValidatorOnboardingResponse:
      type: object
      required:
        - secret
      properties:
        secret:
          type: string

    OnboardValidatorRequest:
      type: object
      required:
        - party_id
        - secret
      properties:
        party_id:
          type: string
        secret:
          type: string

    CometBftNodeStatusOrErrorResponse:
      oneOf:
        - $ref: "#/components/schemas/CometBftNodeStatusResponse"
        - $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"

    CometBftNodeStatusResponse:
      type: object
      required:
        - id
        - catching_up
        - voting_power
      properties:
        id:
          type: string
          description: "The node-id of the CometBFT node"
        catching_up:
          type: boolean
          description: "Is the node still catching up to the other nodes in the network"
        voting_power:
          type: number
          description: "The voting power assigned to the CometBFT node"

    CometBftNodeDumpOrErrorResponse:
      oneOf:
        - $ref: "#/components/schemas/CometBftNodeDumpResponse"
        - $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"

    CometBftNodeDumpResponse:
      type: object
      required:
        - status
        - network_info
        - abci_info
        - validators
      properties:
        status:
          type: object
        network_info:
          type: object
        abci_info:
          type: object
        validators:
          type: object

    CometBftJsonRpcRequestId:
      oneOf:
        - type: string
        - type: integer
          format: int64

    CometBftJsonRpcRequest:
      type: object
      required:
        - id
        - method
      properties:
        id:
          $ref: "#/components/schemas/CometBftJsonRpcRequestId"
        method:
          type: string
          # status, block - used in configure-state-sync.sh
          # commit, validators, consensus_params - used by the CometBFT Light client for state sync
          enum:
            - status
            - block
            - commit
            - validators
            - consensus_params
        params:
          type: object
          additionalProperties: true

    CometBftJsonRpcOrErrorResponse:
      oneOf:
        - $ref: "#/components/schemas/CometBftJsonRpcResponse"
        - $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"

    CometBftJsonRpcResponse:
      type: object
      required:
        - jsonrpc
        - id
        - result
      properties:
        jsonrpc:
          type: string
        id:
          $ref: "#/components/schemas/CometBftJsonRpcRequestId"
        result:
          type: object

    ApproveSvIdentityRequest:
      type: object
      required:
        - candidateName
        - candidateKey
      properties:
        candidateName:
          type: string
        candidateKey:
          type: string

    ListVoteResultsRequest:
      type: object
      required:
        - limit
      properties:
        actionName:
          type: string
        executed:
          type: boolean
        requester:
          type: string
        effectiveFrom:
          type: string
        effectiveTo:
          type: string
        limit:
          type: integer

    CreateElectionRequest:
      type: object
      required:
        - requester
        - ranking
      properties:
        requester:
          type: string
        ranking:
          type: array
          items:
            type: string

    CreateVoteRequest:
      type: object
      required:
        - requester
        - action
        - url
        - description
        - expiration
      properties:
        requester:
          type: string
        action:
          type: object
        url:
          type: string
        description:
          type: string
        expiration:
          type: object

    ListVotesResponse:
      type: object
      required:
        - svc_rules_votes
      properties:
        svc_rules_votes:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    ListSvcRulesVoteRequestsResponse:
      type: object
      required:
        - svc_rules_vote_requests
      properties:
        svc_rules_vote_requests:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    ListSvcRulesVoteResultsResponse:
      type: object
      required:
        - svc_rules_vote_results
      properties:
        svc_rules_vote_results:
          type: array
          items:
            type: object

    LookupSvcRulesVoteRequestResponse:
      type: object
      required:
        - svc_rules_vote_request
      properties:
        svc_rules_vote_request:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    CastVoteRequest:
      type: object
      required:
        - vote_request_contract_id
        - is_accepted
        - reason_url
        - reason_description
      properties:
        vote_request_contract_id:
          type: string
        is_accepted:
          type: boolean
        reason_url:
          type: string
        reason_description:
          type: string

    UpdateVoteRequest:
      type: object
      required:
        - vote_contract_id
        - is_accepted
        - reason_url
        - reason_description
      properties:
        vote_contract_id:
          type: string
        is_accepted:
          type: boolean
        reason_url:
