openapi: 3.0.0
info:
  title: SV API
  version: 0.0.1
tags:
  - name: sv
paths:
  /readyz:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1readyz"
  /livez:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1livez"
  /admin/validator/onboarding/ongoing:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "listOngoingValidatorOnboardings"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListOngoingValidatorOnboardingsResponse"
  /admin/validator/onboarding/prepare:
    post:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "prepareValidatorOnboarding"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PrepareValidatorOnboardingRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PrepareValidatorOnboardingResponse"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /admin/validator/licenses:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "listValidatorLicenses"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListValidatorLicensesResponse"
  /admin/domain/cometbft/status:
    get:
      tags: [sv]
      x-jvm-package: sv
      operationId: "getCometBftNodeStatus"
      responses:
        "200":
          description: "Response returned by the CometBFT node, or the error if the call failed"
          content:
            application/json:
              schema:
                # Either `response` or `error` will be populated. To be improved once oneOf is supported
                "$ref": "#/components/schemas/CometBftStatusOrError"
        "404":
          description: "CometBFT is not configured for this app."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /admin/domain/cometbft/debug:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "getCometBftNodeDebugDump"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CometBftNodeDumpOrErrorResponse"
        "404":
          description: "CometBFT is not configured for this app."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /admin/domain/sequencer/status:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "getSequencerNodeStatus"
      responses:
        "200":
          description: "Status of sequencer node"
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/NodeStatus"
        "404":
          description: "Sequencer is not configured for this app."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
  /admin/domain/mediator/status:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "getMediatorNodeStatus"
      responses:
        "200":
          description: "Status of mediator node"
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/NodeStatus"
        "404":
          description: "Mediator is not configured for this app."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
  /admin/sv/identity/approve:
    post:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "approveSvIdentity"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ApproveSvIdentityRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /admin/sv/voterequests:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "listSvcRulesVoteRequests"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListSvcRulesVoteRequestsResponse"
  /admin/sv/voterequests/{vote_request_contract_id}:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "lookupSvcRulesVoteRequest"
      parameters:
        - name: "vote_request_contract_id"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "404":
          description: "VoteRequest contract not found."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LookupSvcRulesVoteRequestResponse"
  /admin/sv/votes:
    post:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "castVote"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CastVoteRequest"
      responses:
        "201":
          description: Created
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
    put:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "updateVote"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateVoteRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "404":
          description: "VoteRequest contract not found."
          content:
            application/json:
              schema:
                $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
  /admin/sv/votes-by-request-ids:
    post:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "BatchListVotesByVoteRequests"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/BatchListVotesByVoteRequestsRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListVotesResponse"
  /admin/sv/voterequest/create:
    post:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "createVoteRequest"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateVoteRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /admin/sv/coin-price/votes:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "ListCoinPriceVotes"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListCoinPriceVotesResponse"
  /admin/sv/open-mining-rounds:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "ListOpenMiningRounds"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListOpenMiningRoundsResponse"
  /admin/sv/coin-price/vote:
    put:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "UpdateCoinPriceVote"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UpdateCoinPriceVoteRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /svc/trigger-acs-store-dump:
    post:
      tags: [ sv ]
      x-jvm-package: svAdmin
      operationId: "TriggerAcsDump"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TriggerAcsDumpResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /svc/get-acs-store-dump:
    get:
      tags: [ sv ]
      x-jvm-package: svAdmin
      operationId: "GetAcsStoreDump"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetAcsStoreDumpResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /admin/authorization:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "isAuthorized"
      responses:
        "200":
          description: ok
        "403":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/403"
  /onboard/validator:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "onboardValidator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardValidatorRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "401":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/401"
  /onboard/sv/start:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "startSvOnboarding"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/StartSvOnboardingRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "401":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/401"
  /onboard/sv/status/{candidate_party_id_or_name}:
    get:
      tags: [sv]
      x-jvm-package: sv
      operationId: "getSvOnboardingStatus"
      parameters:
        - name: "candidate_party_id_or_name"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvOnboardingStatusResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
  /onboard/sv/party-migration/authorize:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "onboardSvPartyMigrationAuthorize"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardSvPartyMigrationAuthorizeRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OnboardSvPartyMigrationAuthorizeResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
        "401":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/401"
  /onboard/sv/sequencer:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "onboardSvSequencer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardSvSequencerRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OnboardSvSequencerResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /onboard/sv/mediator:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "onboardSvMediator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardSvMediatorRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"
  /devnet/onboard/validator/prepare:
    post:
      tags: [sv]
      x-jvm-package: sv
      description: "faucet for validator candidates self-service"
      operationId: "devNetOnboardValidatorPrepare"
      responses:
        "200":
          description: ok
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/500"
        "501":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/501"
  /svc:
    get:
      tags: [sv]
      x-jvm-package: sv
      operationId: "getSvcInfo"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvcInfoResponse"
components:
  schemas:
    ListOngoingValidatorOnboardingsResponse:
      type: object
      required:
        - ongoing_validator_onboardings
      properties:
        ongoing_validator_onboardings:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    ListValidatorLicensesResponse:
      type: object
      required:
        - validator_licenses
      properties:
        validator_licenses:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    PrepareValidatorOnboardingRequest:
      type: object
      required:
        - expires_in # duration in seconds
      properties:
        expires_in:
          type: integer
          minimum: 1

    PrepareValidatorOnboardingResponse:
      type: object
      required:
        - secret
      properties:
        secret:
          type: string

    OnboardValidatorRequest:
      type: object
      required:
        - party_id
        - secret
      properties:
        party_id:
          type: string
        secret:
          type: string

    # TODO(#2755) make prettier with support of oneOf
    CometBftStatusOrError:
      type: object
      properties:
        error:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
        response:
          $ref: "#/components/schemas/CometBftNodeStatusResponse"

    CometBftNodeStatusResponse:
      type: object
      required:
        - id
        - catching_up
        - voting_power
      properties:
        id:
          type: string
          description: "The node-id of the CometBFT node"
        catching_up:
          type: boolean
          description: "Is the node still catching up to the other nodes in the network"
        voting_power:
          type: number
          description: "The voting power assigned to the CometBFT node"

    # TODO(#2755) make prettier with support of oneOf
    CometBftNodeDumpOrErrorResponse:
      type: object
      properties:
        error:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/ErrorResponse"
        response:
          $ref: "#/components/schemas/CometBftNodeDumpResponse"

    CometBftNodeDumpResponse:
      type: object
      required:
        - status
        - network_info
        - abci_info
        - validators
      properties:
        status:
          type: object
        network_info:
          type: object
        abci_info:
          type: object
        validators:
          type: object

    ApproveSvIdentityRequest:
      type: object
      required:
        - candidateName
        - candidateKey
      properties:
        candidateName:
          type: string
        candidateKey:
          type: string

    CreateVoteRequest:
      type: object
      required:
        - requester
        - action
        - url
        - description
      properties:
        requester:
          type: string
        action:
          type: object
        url:
          type: string
        description:
          type: string

    ListVotesResponse:
      type: object
      required:
        - svc_rules_votes
      properties:
        svc_rules_votes:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    ListSvcRulesVoteRequestsResponse:
      type: object
      required:
        - svc_rules_vote_requests
      properties:
        svc_rules_vote_requests:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    LookupSvcRulesVoteRequestResponse:
      type: object
      required:
        - svc_rules_vote_request
      properties:
        svc_rules_vote_request:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    CastVoteRequest:
      type: object
      required:
        - vote_request_contract_id
        - is_accepted
        - reason_url
        - reason_description
      properties:
        vote_request_contract_id:
          type: string
        is_accepted:
          type: boolean
        reason_url:
          type: string
        reason_description:
          type: string

    UpdateVoteRequest:
      type: object
      required:
        - vote_contract_id
        - is_accepted
        - reason_url
        - reason_description
      properties:
        vote_contract_id:
          type: string
        is_accepted:
          type: boolean
        reason_url:
          type: string
        reason_description:
          type: string

    ListCoinPriceVotesResponse:
      type: object
      required:
        - coin_price_votes
      properties:
        coin_price_votes:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    ListOpenMiningRoundsResponse:
      type: object
      required:
        - open_mining_rounds
      properties:
        open_mining_rounds:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    UpdateCoinPriceVoteRequest:
      type: object
      required:
        - coin_price
      properties:
        coin_price:
          type: string

    BatchListVotesByVoteRequestsRequest:
      type: object
      required:
        - vote_request_contract_ids
      properties:
        vote_request_contract_ids:
          type: array
          items:
            type: string

    StartSvOnboardingRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    GetSvOnboardingStatusResponse:
      type: object
      required:
        - state
      properties:
        # Note: our codegen does not support oneOf; if it did, the state would be an enum with the following values:
        # - 'unknown', with no fields
        # - 'requested', with fields: name, contract_id (of `SvOnboardingRequested`), confirmed_by, required_num_confirmations
        # - 'confirmed', with fields: name, contract_id (of `SvOnboardingConfirmed`)
        # - 'completed', with fields: name, contract_id (of `SvcRules`)
        # TODO(#2755) Make an issue to refactor this with a proper `oneOf`.
        state:
          type: string
        name:
          type: string
        contract_id:
          type: string
        confirmed_by:
          type: array
          items:
            type: string
        required_num_confirmations:
          type: integer
          format: int32
          minimum: 1

    OnboardSvPartyMigrationAuthorizeRequest:
      type: object
      required:
        - participant_id
        - candidate_party_id
      properties:
        participant_id:
          type: string
        candidate_party_id:
          type: string

    OnboardSvPartyMigrationAuthorizeResponse:
      type: object
      required:
        - acs_snapshot
      properties:
        acs_snapshot:
          type: string

    OnboardSvSequencerRequest:
      type: object
      required:
        - sequencer_id
      properties:
        sequencer_id:
          type: string

    OnboardSvSequencerResponse:
      type: object
      required:
        - sequencer_snapshot
      properties:
        sequencer_snapshot:
          "$ref": "#/components/schemas/SequencerSnapshot"

    OnboardSvMediatorRequest:
      type: object
      required:
        - mediator_id
      properties:
        mediator_id:
          type: string

    SequencerSnapshot:
      type: object
      required:
        - topology_snapshot
        - sequencer_snapshot
      properties:
        topology_snapshot:
          type: string
        sequencer_snapshot:
          type: string

    GetSvcInfoResponse:
      type: object
      required:
        - sv_user
        - sv_party_id
        - svc_party_id
        - voting_threshold
        - latest_mining_round
        - coin_rules
        - svc_rules
      properties:
        # User representing the SV
        sv_user:
          type: string
        # Party representing the SV
        sv_party_id:
          type: string
        # Party representing the whole SVC
        svc_party_id:
          type: string
        # Threshold required to pass vote requests
        voting_threshold:
          type: integer
        # Contract ID of the OpenMiningRound contract of the latest Mining Round
        latest_mining_round:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"
        # Contract ID of the CoinRules contract associated with the SVC
        coin_rules:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"
        # Contract IDs of the SvcRules contract associated with the SVC
        svc_rules:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"

    TriggerAcsDumpResponse:
      type: object
      required:
        - filename
        - num_events
        - offset
      properties:
        filename:
          type: string
        num_events:
          type: number
        offset:
          type: string

    GetAcsStoreDumpResponse:
      type: object
      required:
        - offset
        - contracts
      properties:
        offset:
          type: string
        contracts:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/schemas/Contract"
        version:
          type: string
