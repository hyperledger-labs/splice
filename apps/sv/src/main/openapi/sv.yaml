openapi: 3.0.0
info:
  title: SV API
  version: 0.0.1
tags:
  - name: sv
paths:
  /admin/validator/onboarding/ongoing:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "listOngoingValidatorOnboardings"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListOngoingValidatorOnboardingsResponse"
  /admin/validator/onboarding/prepare:
    post:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "prepareValidatorOnboarding"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PrepareValidatorOnboardingRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PrepareValidatorOnboardingResponse"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /admin/validator/licenses:
    get:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "listValidatorLicenses"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListValidatorLicensesResponse"
  /admin/sv/identity/approve:
    post:
      tags: [sv]
      x-jvm-package: svAdmin
      operationId: "approveSvIdentity"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ApproveSvIdentityRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
  /admin/authorization:
    get:
      tags: [ sv ]
      x-jvm-package: svAdmin
      operationId: "isAuthorized"
      responses:
        "200":
          description: ok
        "403":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/403"
  /onboard/validator:
    post:
      tags: [ sv ]
      x-jvm-package: sv
      operationId: "onboardValidator"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardValidatorRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "401":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/401"
  /onboard/sv/start:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "startSvOnboarding"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/StartSvOnboardingRequest"
      responses:
        "200":
          description: ok
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "401":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/401"
  /onboard/sv/status/{candidate_party_id_or_name}:
    get:
      tags: [sv]
      x-jvm-package: sv
      operationId: "getSvOnboardingStatus"
      parameters:
        - name: "candidate_party_id_or_name"
          in: "path"
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvOnboardingStatusResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /onboard/sv/party-migration/authorize:
    post:
      tags: [sv]
      x-jvm-package: sv
      operationId: "onboardSvPartyMigrationAuthorize"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardSvPartyMigrationAuthorizeRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OnboardSvPartyMigrationAuthorizeResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        # TODO (#3429) use this
        "401":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/401"
  /devnet/onboard/validator/prepare:
    post:
      tags: [sv]
      x-jvm-package: sv
      description: "faucet for validator candidates self-service"
      operationId: "devNetOnboardValidatorPrepare"
      responses:
        "200":
          description: ok
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
        "501":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/501"
  #TODO(#4354): Part of potential fixes: consider splitting this endpoint (previously named debug) in two (e.g. svc and sv)
  /svc:
    get:
      tags: [sv]
      x-jvm-package: sv
      operationId: "getSvcInfo"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetSvcInfoResponse"
components:
  schemas:
    ListOngoingValidatorOnboardingsResponse:
      type: object
      required:
        - ongoing_validator_onboardings
      properties:
        ongoing_validator_onboardings:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListValidatorLicensesResponse:
      type: object
      required:
        - validator_licenses
      properties:
        validator_licenses:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    PrepareValidatorOnboardingRequest:
      type: object
      required:
        - expires_in # duration in seconds
      properties:
        expires_in:
          type: integer
          minimum: 1

    PrepareValidatorOnboardingResponse:
      type: object
      required:
        - secret
      properties:
        secret:
          type: string

    OnboardValidatorRequest:
      type: object
      required:
        - party_id
        - secret
      properties:
        party_id:
          type: string
        secret:
          type: string

    ApproveSvIdentityRequest:
      type: object
      required:
        - candidateName
        - candidateKey
      properties:
        candidateName:
          type: string
        candidateKey:
          type: string

    StartSvOnboardingRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    GetSvOnboardingStatusResponse:
      type: object
      required:
        - state
      properties:
        # Note: our codegen does not support oneOf; if it did, the state would be an enum with the following values:
        # - 'unknown', with no fields
        # - 'requested', with fields: name, contract_id (of `SvOnboardingRequested`), confirmed_by, required_num_confirmations
        # - 'confirmed', with fields: name, contract_id (of `SvOnboardingConfirmed`)
        # - 'completed', with fields: name, contract_id (of `SvcRules`)
        # TODO(#2755) Make an issue to refactor this with a proper `oneOf`.
        state:
          type: string
        name:
          type: string
        contract_id:
          type: string
        confirmed_by:
          type: array
          items:
            type: string
        required_num_confirmations:
          type: integer
          format: int32
          minimum: 1

    OnboardSvPartyMigrationAuthorizeRequest:
      type: object
      required:
        - participant_id
      properties:
        participant_id:
          type: string

    OnboardSvPartyMigrationAuthorizeResponse:
      type: object
      required:
        - acs_snapshot
      properties:
        acs_snapshot:
          type: string

    GetSvcInfoResponse:
      type: object
      required:
        - sv_user
        - sv_party_id
        - svc_party_id
        - coin_rules_contract_id
        - svc_rules
      properties:
        # User representing the SV
        sv_user:
          type: string
        # Party representing the SV
        sv_party_id:
          type: string
        # Party representing the whole SVC
        svc_party_id:
          type: string
        # Contract ID of the CoinRules contract associated with the SVC
        coin_rules_contract_id:
          type: string
        # Contract IDs of the SvcRules contract associated with the SVC
        svc_rules:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

