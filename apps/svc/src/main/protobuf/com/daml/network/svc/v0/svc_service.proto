syntax = "proto3";
package com.daml.network.svc.v0;

import "google/protobuf/empty.proto";

service SvcService {
  // Returns some debug info about the running app
  rpc GetDebugInfo (google.protobuf.Empty) returns (GetDebugInfoResponse);


  // TODO(M1-53): Replace these manual triggers by automation as part of rewards issuance milestone

  // Open a new mining round for all currently registered validators.
  rpc OpenRound (OpenRoundRequest) returns (OpenRoundResponse);

  // Mark the given mining round as summarizing for all validators.
  rpc StartSummarizingRound (StartSummarizingRoundRequest) returns (StartSummarizingRoundResponse);

  // Start issuing for the given mining round for all validators.
  rpc StartIssuingRound (StartIssuingRoundRequest) returns (StartIssuingRoundResponse);

  // Close the given mining round for all validators.
  rpc CloseRound (CloseRoundRequest) returns (CloseRoundResponse);

  // Archive the given mining round for all validators.
  rpc ArchiveRound (ArchiveRoundRequest) returns (google.protobuf.Empty);
}

// Contains information useful for debugging a running SVC app.
// Absolutely no forward or backward compatibility guarantees.
message GetDebugInfoResponse {
  // User representing the SVC
  string svc_user = 1;

  // Party representing the SVC
  string svc_party_id = 2;

  // Package containing the canton coin code
  string coin_package_id = 3;

  // Contract IDs of all active CoinRules contracts created by this app
  repeated string coin_rules_contract_ids = 4;
}

message GetValidatorConfigResponse {
  // Party identifier of the SVC party
  string svc_party_id = 1;
}

message InitializeResponse {
  // Identifier of the party representing the SVC.
  string svc_party_id = 1;
}

message OpenRoundRequest {
  int64 round = 1;
  string coin_price = 2;
}

message OpenRoundResponse {
  string open_mining_round_contract_id = 1;
}


message StartSummarizingRoundRequest {
  int64 round = 1;
}

message StartSummarizingRoundResponse {
  string summarizing_mining_round_contract_id = 1;
}

message StartIssuingRoundRequest {
  int64 round = 1;
}

message StartIssuingRoundResponse {
  string total_burn_quantity = 1; // Total burn quantity used to start issuing.
  string issuing_mining_round_contract_id = 2;
}

message CloseRoundRequest {
  int64 round = 1;
}

message CloseRoundResponse {
  string closed_mining_round_contract_id = 1;
}

message ArchiveRoundRequest {
  int64 round = 1;
}
