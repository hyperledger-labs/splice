syntax = "proto3";
package com.daml.network.svc.v0;

import "google/protobuf/empty.proto";

service SvcService {
  // Returns some debug info about the running app
  rpc GetDebugInfo (google.protobuf.Empty) returns (GetDebugInfoResponse);
}

// Contains information useful for debugging a running SVC app.
// Absolutely no forward or backward compatibility guarantees.
message GetDebugInfoResponse {
  // User representing the SVC
  string svc_user = 1;

  // Party representing the SVC
  string svc_party_id = 2;

  // Package containing the canton coin code
  string coin_package_id = 3;

  // Contract IDs of all active CoinRules contracts created by this app
  repeated string coin_rules_contract_ids = 4;
}
