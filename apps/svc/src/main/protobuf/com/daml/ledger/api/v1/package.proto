syntax = "proto3";
import "scalapb/scalapb.proto";
package com.daml.ledger.api.v1;

/**
  This file is required to use the Ledger API Protobuf types from com.daml.ledger.api.v1 inside the
  Protobuf definitions of this sbt subproject. This is necessary because the Daml repo uses different scalapb compile options.
 */

option (scalapb.options) = {
  scope: PACKAGE
  flat_package: false
  preserve_unknown_fields: false
};
