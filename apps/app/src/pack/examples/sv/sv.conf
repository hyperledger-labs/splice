_sv_participant_remote {
  admin-api.port = 5002
  ledger-api.client-config.port = 5001
  ledger-api.auth-config.type = "none"
}

_svc_remote {
  admin-api.port = 5005
  admin-api.address = ${NETWORK_APPS_ADDRESS}
}

canton {
  sv-apps {
    sv {
      storage.type = memory
      admin-api.port = 5014
      remote-participant = ${_sv_participant_remote}
      ledger-api-user = "sv_user"
      auth {
        algorithm = "hs-256-unsafe"
        audience = "https://canton.network.global"
        secret = "test"
      }
      remote-svc = ${_svc_remote}
      domains {
        global = "global"
      }
    }
  }
}
canton.features.enable-testing-commands = yes
