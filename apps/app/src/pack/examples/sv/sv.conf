_sv_participant_remote {
  admin-api.port = 5002
  ledger-api.client-config.port = 5001
  ledger-api.auth-config.type = "none"
}

_scan_client {
  admin-api.url = ${NETWORK_APPS_ADDRESS_PROTOCOL}"://"${NETWORK_APPS_ADDRESS}":5012"
}

canton {
  validator-apps {
    svValidator {
      storage.type = memory
      admin-api.port = 5003
      participant-client = ${_sv_participant_remote}
      ledger-api-user = "sv_validator_user"
      validator-wallet-user = "sv_wallet_user"
      scan-client = ${_scan_client}
      auth {
        algorithm = "hs-256-unsafe"
        audience = "https://canton.network.global"
        secret = "test"
      }
      app-instances {
      }
      domains {
        global {
          alias = "global"
          url = "http://"${NETWORK_APPS_ADDRESS}":5008"
        }
      }
    }
  }
  sv-apps {
    sv {
      storage.type = memory
      admin-api.port = 5014
      participant-client = ${_sv_participant_remote}
      ledger-api-user = "sv_user"
      validator-ledger-api-user = "sv_validator_user"
      auth {
        algorithm = "hs-256-unsafe"
        audience = "https://canton.network.global"
        secret = "test"
      }
      domains {
        global {
          alias = "global"
          url = "http://"${NETWORK_APPS_ADDRESS}":5008"
        }
      }
      x-nodes { }
    }
  }
}
canton.features.enable-testing-commands = yes
