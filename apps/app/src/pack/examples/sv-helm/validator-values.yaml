participantAddress: "participant"
svSponsorAddress: "https://sv.sv-1.svc.TARGET_CLUSTER.network.canton.global/api/v0/sv"
scanPort: "5012"
scanAddress: "https://TARGET_CLUSTER.network.canton.global"
# Replace SV_WALLET_USER_ID with the user id in your IAM that you want to use to log into
# the wallet as the SV party. Note that this should be the full user id, e.g., ``auth0|43b68e1e4978b000cefba352``
# not only the suffix ``43b68e1e4978b000cefba352``:
validatorWalletUser: "SV_WALLET_USER_ID"
clusterUrl: "TARGET_CLUSTER.network.canton.global"
globalDomainUrl: "http://TARGET_CLUSTER.network.canton.global:5008"
foundingSvApiUrl: "https://sv.sv-1.svc.TARGET_CLUSTER.network.canton.global/api/v0/sv"
auth:
  # If you want to configure audience, replace OIDC_AUTHORITY_VALIDATOR_AUDIENCE with audience for Validator app backend
  # Otherwise, remove this line
  audience: "OIDC_AUTHORITY_VALIDATOR_AUDIENCE"
  # replace OIDC_AUTHORITY_URL with your provider's OIDC URL
  jwksUrl: "https://OIDC_AUTHORITY_URL/.well-known/jwks.json"
  # If you want to configure audience, replace OIDC_AUTHORITY_LEDGER_API_AUDIENCE with audience ledger API
  # Otherwise, remove this line
  ledgerApiAudience: "OIDC_AUTHORITY_LEDGER_API_AUDIENCE"
