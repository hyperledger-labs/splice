joinWithKeyOnboarding:
  sponsorApiUrl: "https://sv.sv-1.svc.TARGET_CLUSTER.network.canton.global/api/v0/sv"
# Replace YOUR_SV_NAME with the name you provided for your SV identity
onboardingName: YOUR_SV_NAME
globalDomainUrl: "http://sequencer.sv-1.svc.TARGET_CLUSTER.network.canton.global:5008"
clusterUrl: "TARGET_CLUSTER.network.canton.global"
auth:
  # The default value of audience is ``https://canton.network.global``.
  # If you want to configure a custom audience for SV app backend, uncomment this line and replace OIDC_AUTHORITY_SV_AUDIENCE with the audience of your choice.
  # audience: "OIDC_AUTHORITY_SV_AUDIENCE"
  # replace OIDC_AUTHORITY_URL with your provider's OIDC URL
  jwksUrl: "https://OIDC_AUTHORITY_URL/.well-known/jwks.json"
cometBFT:
  enabled: true
  connectionUri: "http://cometbft-cometbft-rpc:26657"
# PARTICIPANT_BOOTSTRAP_START
# Uncomment the two lines below if you are bootstrapping from an existing participant
# identities dump.
# participantIdentitiesDumpImport:
#  secretName: participant-identities-dump
# PARTICIPANT_BOOTSTRAP_END
