canton {
  parameters {
    non-standard-config = yes
    dev-version-support = yes
    # Bumping because our topology state can get very large due to
    # a large number of participants.
    timeouts.processing.verify-active = 40.seconds
  }

  # Bumping because our topology state can get very large due to
  # a large number of participants.
  monitoring.delay-logging-threshold = 40.seconds

  participants-x {
    validatorParticipant {
      storage.type = memory
      admin-api.port = 5002
      ledger-api {
        port = 5001
        explicit-disclosure-unsafe = true
        // Note: the validator user name must match the one defined in validator.conf or validator-secure.conf
        user-management-service.additional-admin-user-id = "validator_user"
        user-management-service.additional-admin-user-id = ${?VALIDATOR_USER_NAME}
      }
      http-ledger-api-experimental {
        server {
          port = 7575
          address = 0.0.0.0
        }
        allow-insecure-tokens = true
      }
      parameters {
        dev-version-support = yes
        initial-protocol-version = dev
      }
      init.parameters.unique-contract-keys = false
    }
  }
}
canton.features.enable-preview-commands = yes
canton.features.enable-testing-commands = yes
