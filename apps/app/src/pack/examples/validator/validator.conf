_validator_remote {
  admin-api.port = 5002
  ledger-api.port = 5001
}

_scan_remote {
  admin-api.port = 5013
  admin-api.address = dev.network.canton.global
}

canton {
  validator-apps {
    validatorApp {
      storage.type = memory
      admin-api.port = 5003
      remote-participant = ${_validator_remote}
      remote-scan = ${_scan_remote}
    }
  }

  wallet-apps {
    wallet {
      storage.type = memory
      admin-api.port = 5004
      remote-participant = ${_validator_remote}
      daml-user = "wallet"
      remote-scan = ${_scan_remote}
    }
  }
}
