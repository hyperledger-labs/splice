_validator_participant_remote {
  admin-api.port = 5002
  ledger-api.port = 5001
}

_scan_remote {
  admin-api.port = 5012
  admin-api.address = dev.network.canton.global
}

canton {
  validator-apps {
    validatorApp {
      storage.type = memory
      admin-api.port = 5003
      remote-participant = ${_validator_participant_remote}
      remote-scan = ${_scan_remote}
    }
  }

  wallet-apps {
    aliceWallet {
      storage.type = memory
      admin-api.port = 5004
      remote-participant = ${_validator_participant_remote}
      remote-scan = ${_scan_remote}
    }
    bobWallet {
      storage.type = memory
      admin-api.port = 5104
      remote-participant = ${_validator_participant_remote}
      remote-scan = ${_scan_remote}
    }
  }

  remote-wallet-apps {
    aliceRemoteWallet {
      daml-user = "alice_wallet"
      admin-api.port = ${canton.wallet-apps.aliceWallet.admin-api.port}
    }

    bobRemoteWallet {
      daml-user = "bob_wallet"
      admin-api.port = ${canton.wallet-apps.bobWallet.admin-api.port}
    }
  }
}
