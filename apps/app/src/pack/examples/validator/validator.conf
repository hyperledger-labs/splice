_validator_participant_remote {
  admin-api.port = 5002
  ledger-api.client-config.port = 5001
  ledger-api.auth-config.type = "none"
}

_scan_remote {
  admin-api.port = 5012
  admin-api.address = dev.network.canton.global
  admin-api.address = ${?NETWORK_APPS_ADDRESS}
}

canton {
  validator-apps {
    validatorApp {
      storage.type = memory
      admin-api.port = 5003
      remote-participant = ${_validator_participant_remote}
      daml-user = "validator_user"
      remote-scan = ${_scan_remote}
      wallet-service-user = ${canton.wallet-app-backends.walletApp.service-user}
      app-instances {
      }
    }
  }

  wallet-app-backends {
    walletApp {
      storage.type = memory
      admin-api.port = 5004
      service-user = "wallet_service_user"
      remote-participant = ${_validator_participant_remote}
      remote-scan = ${_scan_remote}
      validator.admin-api = ${canton.validator-apps.validatorApp.admin-api}
      auth {
        algorithm = "hs-256-unsafe"
        secret = "test"
      }
    }
  }

  wallet-app-clients {
    aliceWallet {
      daml-user = "alice"
      admin-api.port = ${canton.wallet-app-backends.walletApp.admin-api.port}
    }

    bobWallet {
      daml-user = "bob"
      admin-api.port = ${canton.wallet-app-backends.walletApp.admin-api.port}
    }
  }
}
