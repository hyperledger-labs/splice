_validator_participant_remote {
  admin-api.port = 5002
  ledger-api.client-config.port = 5001
  ledger-api.auth-config.type = "none"
}

_scan_client {
  admin-api.url = ${NETWORK_APPS_ADDRESS_PROTOCOL}"://scan.sv-1."${NETWORK_APPS_ADDRESS}""
}

_scan_client_validator {
  type = "trust-single"
  url = ${_scan_client.admin-api.url}
}

canton {
  validator-apps {
    validatorApp {
      storage {
        type = postgres
        config {
          dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
          properties = {
            serverName = "localhost"
            serverName = ${?CANTON_DB_HOST}
            databaseName = "cn_apps"
            portNumber = "5432"
            portNumber = ${?CANTON_DB_PORT}
            user = "canton"
            user = ${?CANTON_DB_USER}
            password = "supersafe"
            password = ${?CANTON_DB_PASSWORD}
          }
        }
        parameters {
          # The following is an educated guess of a sane default for the number of DB connections.
          # https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing
          max-connections = 64
        }
      }
      admin-api.port = 5003
      participant-client = ${_validator_participant_remote}
      ledger-api-user = "validator_user"
      ledger-api-user = ${?VALIDATOR_USER_NAME}
      validator-wallet-user = "validator_user"
      validator-wallet-user = ${?VALIDATOR_USER_NAME}
      scan-client = ${_scan_client_validator}
      auth {
        algorithm = "hs-256-unsafe"
        audience = "https://canton.network.global"
        secret = "test"
      }
      app-instances {
      }
      domains {
        global {
          alias = "global"
          url = ${?GLOBAL_DOMAIN_URL}
          buy-extra-traffic {
            target-throughput: 100000
            min-topup-interval: 1m
          }
        }
      }
    }
  }

  wallet-app-clients {
    aliceWallet {
      ledger-api-user = "alice"
      admin-api {
        url = "http://127.0.0.1:5003"
      }
    }

    bobWallet {
      ledger-api-user = "bob"
      admin-api {
        url = "http://127.0.0.1:5003"
      }
    }
  }
}
canton.features.enable-testing-commands = yes
