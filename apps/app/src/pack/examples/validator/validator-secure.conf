_validator_participant_remote {
  admin-api.port = 5002
  ledger-api.client-config.port = 5001
}

_scan_client {
  type = "trust-single"
  url = ${NETWORK_APPS_ADDRESS_PROTOCOL}"://scan.sv-1.svc."${NETWORK_APPS_ADDRESS}""
}

canton {
  validator-apps {
    validatorApp {
      storage.type = memory
      admin-api.port = 5003
      participant-client = ${_validator_participant_remote}
      participant-client.ledger-api.auth-config = {
        type = "client-credentials"
        well-known-config-url = ${NETWORK_AUTH_WELLKNOWN_URL}
        client-id = ${NETWORK_AUTH_VALIDATOR_CLIENT_ID}
        client-secret = ${NETWORK_AUTH_VALIDATOR_CLIENT_SECRET}
        audience = "https://ledger_api.example.com"
      }
      ledger-api-user = ${NETWORK_AUTH_VALIDATOR_USER_NAME}
      # validator-wallet-user = ${NETWORK_AUTH_VALIDATOR_WALLET_USER_NAME}
      scan-client = ${_scan_client}
      app-instances {
      }
      auth {
        algorithm = "rs-256"
        audience = "https://cn_api.example.com"
        jwks-url = ${NETWORK_AUTH_JWKS_URL}
      }
      domains {
        global {
          alias = "global"
          url = "https://sequencer.sv-1.svc."${NETWORK_APPS_ADDRESS}""
          url = ${?GLOBAL_DOMAIN_URL}
        }
      }
    }
  }

  # Wallet app clients do not support real auth, need to interact via web UI
  wallet-app-clients {}
}
canton.features.enable-testing-commands = yes
