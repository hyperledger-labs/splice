_validator_participant_remote {
  admin-api.port = 5002
  ledger-api.client-config.port = 5001
}

_scan_remote {
  admin-api.port = 5012
  admin-api.address = dev.network.canton.global
  admin-api.address = ${NETWORK_APPS_ADDRESS}
}

canton {
  validator-apps {
    validatorApp {
      storage.type = memory
      admin-api.port = 5003
      remote-participant = ${_validator_participant_remote}
      remote-participant.ledger-api.auth-config = {
        type = "client-credentials"
        well-known-config-url = ${?NETWORK_AUTH_WELLKNOWN_URL}
        client-id = ${?NETWORK_AUTH_VALIDATOR_CLIENT_ID}
        client-secret = ${?NETWORK_AUTH_VALIDATOR_CLIENT_SECRET}
        # TODO(#1837) use actual audience of the target participant
        audience = "https://canton.network.global"
      }
      ledger-api-user = ${?NETWORK_AUTH_VALIDATOR_USER_NAME}
      remote-scan = ${_scan_remote}
      wallet-service-user = ${?NETWORK_AUTH_WALLET_USER_NAME}
      app-instances {
      }
      auth {
        algorithm = "rs-256"
        # TODO(#2052) use a unique audience
        audience = "https://canton.network.global"
        jwks-url = ${?NETWORK_AUTH_JWKS_URL}
      }
    }
  }

  wallet-app-backends {
    walletApp {
      storage.type = memory
      admin-api.port = 5004
      service-user = ${?NETWORK_AUTH_WALLET_USER_NAME}
      remote-participant = ${_validator_participant_remote}
      remote-participant.ledger-api.auth-config = {
        type = "client-credentials"
        well-known-config-url = ${?NETWORK_AUTH_WELLKNOWN_URL}
        client-id = ${?NETWORK_AUTH_WALLET_CLIENT_ID}
        client-secret = ${?NETWORK_AUTH_WALLET_CLIENT_SECRET}
        # TODO(#1837) use actual audience of the target participant
        audience = "https://canton.network.global"
      }
      remote-scan = ${_scan_remote}
      validator.admin-api = ${canton.validator-apps.validatorApp.admin-api}
      auth {
        algorithm = "rs-256"
        # TODO(#2052) use a unique audience
        audience = "https://canton.network.global"
        jwks-url = ${?NETWORK_AUTH_JWKS_URL}
      }
      validator-auth {
        type = "client-credentials"
        well-known-config-url = ${?NETWORK_AUTH_WELLKNOWN_URL}
        client-id = ${?NETWORK_AUTH_WALLET_CLIENT_ID}
        client-secret = ${?NETWORK_AUTH_WALLET_CLIENT_SECRET}
        # TODO(#2052) use a unique audience
        audience = "https://canton.network.global"
      }
    }
  }

  # Wallet app clients do not support real auth, need to interact via web UI
  wallet-app-clients {}
}
canton.features.enable-testing-commands = yes
