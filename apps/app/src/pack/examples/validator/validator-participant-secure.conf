canton {
  participants {
    validatorParticipant {
      storage.type = memory
      admin-api.port = 5002
      ledger-api.port = 5001
      ledger-api.auth-services = [{
        type = jwt-rs-256-jwks
        url = ${?NETWORK_AUTH_JWKS_URL}
      }]
      ledger-api.explicit-disclosure-unsafe = true
      parameters {
        unsafe-enable-daml-lf-dev-version = yes
        will-corrupt-your-system-dev-version-support = yes
      }
      init.parameters.unique-contract-keys = false
    }
  }
}
canton.features.enable-testing-commands = yes
