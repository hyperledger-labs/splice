_svc_participant_remote {
  admin-api.port = 5002
  ledger-api.port = 5001
}

canton {
  participants {
    svcParticipant {
      storage.type = memory
      admin-api.port = 5002
      ledger-api.port = 5001
      parameters.minimum-protocol-version =  2.0.0 # TODO(M1-90 Backlog) remove once we have our own transaction domain
    }
  }

  svc-app {
    storage.type = memory
    admin-api.port = 5005
    remote-participant = ${_svc_participant_remote}
  }
}
canton.participants.svcParticipant.parameters.unsafe-enable-daml-lf-dev-version = true
canton.features.enable-testing-commands = yes
