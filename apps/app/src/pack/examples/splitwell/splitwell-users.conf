_validator_participant_remote {
  admin-api.port = 5002
  ledger-api.client-config.port = 5001
  ledger-api.auth-config.type = "none"
}

_scan_client {
  admin-api.url = ${NETWORK_APPS_ADDRESS_PROTOCOL}"://scan.sv-1.svc."${NETWORK_APPS_ADDRESS}"/api/v0/scan"
}

canton {
  splitwell-app-clients {
    aliceSplitwell {
      admin-api.address = 127.0.0.1
      admin-api.port = 5113
      participant-client = ${_validator_participant_remote}
      scan-client = ${_scan_client}
      ledger-api-user = "alice"
    }
    bobSplitwell {
      admin-api.address = 127.0.0.1
      admin-api.port = 5113
      participant-client = ${_validator_participant_remote}
      scan-client = ${_scan_client}
      ledger-api-user = "bob"
    }
  }
  features.enable-testing-commands = yes
}
