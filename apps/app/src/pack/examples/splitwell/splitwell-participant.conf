canton {
  parameters.non-standard-config = yes
  participants {
    splitwellParticipant {
      storage.type = memory
      admin-api.port = 5102
      ledger-api.port = 5101
      ledger-api.explicit-disclosure-unsafe = true
      parameters {
        dev-version-support = yes
      }
      init.parameters.unique-contract-keys = false
    }
  }
}
canton.features.enable-testing-commands = yes
