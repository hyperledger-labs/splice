_validator_participant_remote {
  admin-api.port = 5102
  ledger-api.client-config.port = 5101
  ledger-api.auth-config.type = "none"
}

_scan_remote {
  admin-api.port = 5012
  admin-api.address = ${NETWORK_APPS_ADDRESS_PROTOCOL}"://"${NETWORK_APPS_ADDRESS}
}

canton {
  validator-apps {
    splitwellValidatorApp {
      storage.type = memory
      admin-api.port = 5103
      remote-participant = ${_validator_participant_remote}
      ledger-api-user = "validator_user"
      remote-scan = ${_scan_remote}
# BEGIN_SPLITWELL_CONFIG
      auth {
        algorithm = "hs-256-unsafe"
        audience = "https://canton.network.global"
        secret = "test"
      }
      app-instances {
        splitwell {
          service-user = "splitwell-service-user"
          dars = ["dars/splitwell-0.1.0.dar"]
        }
      }
# END_SPLITWELL_CONFIG
      domains {
        global = "global"
      }
    }
  }
}
