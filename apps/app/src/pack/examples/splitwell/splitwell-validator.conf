_validator_participant_remote {
  admin-api.port = 5102
  ledger-api.client-config.port = 5101
  ledger-api.auth-config.type = "none"
}

_scan_client {
  admin-api.url = ${NETWORK_APPS_ADDRESS_PROTOCOL}"://scan.sv-1.svc."${NETWORK_APPS_ADDRESS}"/api/v0/scan"
}

canton {
  validator-apps {
    splitwellValidatorApp {
      storage.type = memory
      admin-api.port = 5103
      participant-client = ${_validator_participant_remote}
      ledger-api-user = "validator_user"
      ledger-api-user = ${?VALIDATOR_USER_NAME}
      scan-client = ${_scan_client}
# BEGIN_SPLITWELL_CONFIG
      auth {
        algorithm = "hs-256-unsafe"
        audience = "https://canton.network.global"
        secret = "test"
      }
      app-instances {
        splitwell {
          service-user = "splitwell-service-user"
          dars = ["dars/splitwell-0.1.0.dar"]
        }
      }
# END_SPLITWELL_CONFIG
      domains {
        global {
          alias = "global"
          url = "https://sequencer.sv-1.svc."${NETWORK_APPS_ADDRESS}""
          url = ${?GLOBAL_DOMAIN_URL}
        }
      }
    }
  }
}
