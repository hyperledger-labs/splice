_validator_participant_remote {
  admin-api.port = 5102
  ledger-api.client-config.port = 5101
  ledger-api.auth-config.type = "none"
}

_scan_client {
  admin-api.url = ${NETWORK_APPS_ADDRESS_PROTOCOL}"://scan.sv-1.svc."${NETWORK_APPS_ADDRESS}""
}

canton {
  splitwell-apps {
    splitwellBackend {
      admin-api.address = 0.0.0.0
      admin-api.port = 5113
      provider-user = "splitwell-service-user"
      participant-client = ${_validator_participant_remote}
      scan-client = ${_scan_client}
      domains {
        splitwell {
          preferred {
            alias = "global"
          }
          preferred {
            alias = ${?SPLITWELL_APP_DOMAIN}
          }
          others = []
        }
      }
    }
  }
}
