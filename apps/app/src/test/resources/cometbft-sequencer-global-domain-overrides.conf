include required("include/storage-postgres.conf")

_sequencer_cometbft_template {
    type = "CometBFT"
    config {
      cometbft-node-host = 127.0.0.1
      cometbft-node-port = 26657
    }
}
canton.sequencers-x.globalSequencerSv1.sequencer = ${_sequencer_cometbft_template}
canton.sequencers-x.globalSequencerSv2.sequencer = ${_sequencer_cometbft_template}
canton.sequencers-x.globalSequencerSv3.sequencer = ${_sequencer_cometbft_template}
canton.sequencers-x.globalSequencerSv4.sequencer = ${_sequencer_cometbft_template}
