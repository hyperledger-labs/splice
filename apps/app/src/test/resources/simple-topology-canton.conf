include required("include/storage-postgres.conf")
include required("include/ledger-api-auth-test.conf")

_participant_template {
  ledger-api.auth-services = ${_shared.auth-services}
  ledger-api.explicit-disclosure-unsafe = true
  storage = ${_shared.storage}
  parameters {
    dev-version-support = yes
  }
  init.parameters.unique-contract-keys = false
}

# Hosts the currently centralized functions plus the SV Apps of SV1-SV4
_svcParticipant_remote {
  admin-api.port = 5002
  ledger-api.port = 5001
}

_aliceParticipant_remote {
  admin-api.port = 5202
  ledger-api.port = 5201
}

_bobParticipant_remote {
  admin-api.port = 5302
  ledger-api.port = 5301
}

_splitwellParticipant_remote {
  admin-api.port = 5402
  ledger-api.port = 5401
}

# Participant for an SV5 that gets onboarded after the first four founded the consortium
# Meant to host the SV App of SV5
_sv5Participant_remote {
  admin-api.port = 5502
  ledger-api.port = 5501
}


canton {

  parameters.non-standard-config = yes
  participants {
    # Ordered by node number
    svcParticipant = ${_participant_template} ${_svcParticipant_remote}
    svcParticipant.storage.config.properties.databaseName = "participant_svc"
    aliceParticipant = ${_participant_template} ${_aliceParticipant_remote}
    aliceParticipant.storage.config.properties.databaseName = "participant_alice"
    bobParticipant = ${_participant_template} ${_bobParticipant_remote}
    bobParticipant.storage.config.properties.databaseName = "participant_bob"
    splitwellParticipant = ${_participant_template} ${_splitwellParticipant_remote}
    splitwellParticipant.storage.config.properties.databaseName = "participant_splitwell"
    sv5Participant = ${_participant_template} ${_sv5Participant_remote}
    sv5Participant.storage.config.properties.databaseName = "participant_sv5"
  }

  domains {
    global {
      init.auto-init = true
      storage = ${_shared.storage}
      storage.config.properties.databaseName = "domain_global"
      public-api.port = 5008
      admin-api.port = 5009
      init.domain-parameters {
        unique-contract-keys = false
        protocol-version = dev
      }
    }
    splitwell {
      init.auto-init = true
      storage = ${_shared.storage}
      storage.config.properties.databaseName = "domain_splitwell"
      public-api.port = 5108
      admin-api.port = 5109
      init.domain-parameters {
        unique-contract-keys = false
        protocol-version = dev
      }
    }
    splitwellUpgrade {
      init.auto-init = true
      storage = ${_shared.storage}
      storage.config.properties.databaseName = "domain_splitwell_upgrade"
      public-api.port = 5208
      admin-api.port = 5209
      init.domain-parameters {
        unique-contract-keys = false
        protocol-version = dev
      }
    }
  }
  features.enable-preview-commands = yes # required for topology change operations, exporting and importing ACS
  features.enable-testing-commands = yes
}

# Tune this config to adjust log verbosity.
canton.monitoring.logging {
    # event-details = true
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
