_participant_template {
    storage.type = memory
    parameters.unsafe-enable-daml-lf-dev-version = true
}

_svcParticipant_remote {
  admin-api.address = "0.0.0.0"
  ledger-api.address = "0.0.0.0"
  admin-api.port = 5002
  ledger-api.port = 5001
}

_directoryParticipant_remote {
  admin-api.address = "0.0.0.0"
  ledger-api.address = "0.0.0.0"
  admin-api.port = 5102
  ledger-api.port = 5101
}

_splitwiseParticipant_remote {
  admin-api.address = "0.0.0.0"
  ledger-api.address = "0.0.0.0"
  admin-api.port = 5402
  ledger-api.port = 5401
}

_aliceParticipant_remote {
  admin-api.address = "0.0.0.0"
  ledger-api.address = "0.0.0.0"
  admin-api.port = 5202
  ledger-api.port = 5201
}

_bobParticipant_remote {
  admin-api.address = "0.0.0.0"
  ledger-api.address = "0.0.0.0"
  admin-api.port = 5302
  ledger-api.port = 5301
}

canton {

  participants {
    aliceParticipant = ${_participant_template} ${_aliceParticipant_remote}
    svcParticipant = ${_participant_template} ${_svcParticipant_remote}
    bobParticipant = ${_participant_template} ${_bobParticipant_remote}
    directoryParticipant = ${_participant_template} ${_directoryParticipant_remote}
    splitwiseParticipant = ${_participant_template} ${_splitwiseParticipant_remote}
  }

  domains {
    da {
      init.auto-init = true
      storage.type = memory
      public-api.port = 5008
      admin-api.port = 5009
    }
  }
  features.enable-testing-commands = yes
}

# Tune this config to adjust log verbosity.
canton.monitoring.logging {
    # event-details = true
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
