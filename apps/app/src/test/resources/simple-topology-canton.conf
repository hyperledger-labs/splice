include required("include/storage-postgres.conf")
include required("include/ledger-api-auth-test.conf")

_participant_template {
  ledger-api.auth-services = ${_shared.auth-services}
  ledger-api.explicit-disclosure-unsafe = true
  storage = ${_shared.storage}
  parameters {
    dev-version-support = yes
    # TODO(#3696) Remove this again once this is fixed in Canton
    # to make sure that the picked up time for the snapshot is the most recent one
    # Otherwise transfers can fail because the party is not yet hosted on a given domain.
    transfer-time-proof-freshness-proportion = 0
  }
  init.parameters.unique-contract-keys = false
}

# Hosts the currently centralized functions plus the SV Apps of SV1
_svcParticipant_client {
  admin-api.port = 5002
  ledger-api.port = 5001
}

_aliceParticipant_client {
  admin-api.port = 5202
  ledger-api.port = 5201
}

_bobParticipant_client {
  admin-api.port = 5302
  ledger-api.port = 5301
}

_splitwellParticipant_client {
  admin-api.port = 5402
  ledger-api.port = 5401
}

# Participants for SV2 to SV4
_sv2Participant_client {
  admin-api.port = 5602
  ledger-api.port = 5601
}

_sv3Participant_client {
  admin-api.port = 5702
  ledger-api.port = 5701
}

_sv4Participant_client {
  admin-api.port = 5802
  ledger-api.port = 5801
}

canton {
  parameters {
    non-standard-config = yes
    dev-version-support = yes
  }
  participants {
    # Ordered by node number
    # TODO(#3885)rename svcParticipant to sv1Participant when svcApp is removed
    svcParticipant = ${_participant_template} ${_svcParticipant_client}
    svcParticipant.storage.config.properties.databaseName = "participant_svc"
    aliceParticipant = ${_participant_template} ${_aliceParticipant_client}
    aliceParticipant.storage.config.properties.databaseName = "participant_alice"
    bobParticipant = ${_participant_template} ${_bobParticipant_client}
    bobParticipant.storage.config.properties.databaseName = "participant_bob"
    splitwellParticipant = ${_participant_template} ${_splitwellParticipant_client}
    splitwellParticipant.storage.config.properties.databaseName = "participant_splitwell"
    sv2Participant = ${_participant_template} ${_sv2Participant_client}
    sv2Participant.storage.config.properties.databaseName = "participant_sv2"
    sv3Participant = ${_participant_template} ${_sv3Participant_client}
    sv3Participant.storage.config.properties.databaseName = "participant_sv3"
    sv4Participant = ${_participant_template} ${_sv4Participant_client}
    sv4Participant.storage.config.properties.databaseName = "participant_sv4"
  }

  domains {
    global {
      init.auto-init = true
      storage = ${_shared.storage}
      storage.config.properties.databaseName = "domain_global"
      public-api.port = 5008
      admin-api.port = 5009
      init.domain-parameters {
        unique-contract-keys = false
        protocol-version = dev
      }
    }
    splitwell {
      init.auto-init = true
      storage = ${_shared.storage}
      storage.config.properties.databaseName = "domain_splitwell"
      public-api.port = 5108
      admin-api.port = 5109
      init.domain-parameters {
        unique-contract-keys = false
        protocol-version = dev
      }
    }
    splitwellUpgrade {
      init.auto-init = true
      storage = ${_shared.storage}
      storage.config.properties.databaseName = "domain_splitwell_upgrade"
      public-api.port = 5208
      admin-api.port = 5209
      init.domain-parameters {
        unique-contract-keys = false
        protocol-version = dev
      }
    }
  }
  features.enable-preview-commands = yes # required for topology change operations, exporting and importing ACS
  features.enable-testing-commands = yes
}

# Tune this config to adjust log verbosity.
canton.monitoring.logging {
  # event-details = true
  api {
    message-payloads = true
    max-method-length = 1000
    max-message-lines = 10000
    max-string-length = 10000
    max-metadata-size = 10000
  }
}
