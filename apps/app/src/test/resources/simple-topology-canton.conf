canton {
  parameters {
    non-standard-config = yes
    dev-version-support = yes
  }
  participants-x {
    sv1Participant = ${_participant_template} ${_sv1Participant_client}
    sv1Participant.storage.config.properties.databaseName = "participant_sv1"
    sv2Participant = ${_participant_template} ${_sv2Participant_client}
    sv2Participant.storage.config.properties.databaseName = "participant_sv2"
    sv3Participant = ${_participant_template} ${_sv3Participant_client}
    sv3Participant.storage.config.properties.databaseName = "participant_sv3"
    sv4Participant = ${_participant_template} ${_sv4Participant_client}
    sv4Participant.storage.config.properties.databaseName = "participant_sv4"
    aliceParticipant = ${_participant_template} ${_aliceParticipant_client}
    aliceParticipant.storage.config.properties.databaseName = "participant_alice"
    bobParticipant = ${_participant_template} ${_bobParticipant_client}
    bobParticipant.storage.config.properties.databaseName = "participant_bob"
    splitwellParticipant = ${_participant_template} ${_splitwellParticipant_client}
    splitwellParticipant.storage.config.properties.databaseName = "participant_splitwell"
  }
  sequencers-x {
    globalSequencerSv1 = ${_sequencer_reference_template} ${_sv1Sequencer_client}
    globalSequencerSv1.storage.config.properties.databaseName = "sequencer_sv1"
    globalSequencerSv1.sequencer.config.storage.config.properties.databaseName = "sequencer_driver"
    globalSequencerSv2 = ${_sequencer_reference_template} ${_sv2Sequencer_client}
    globalSequencerSv2.storage.config.properties.databaseName = "sequencer_sv2"
    globalSequencerSv2.sequencer.config.storage.config.properties.databaseName = "sequencer_driver"
    globalSequencerSv3 = ${_sequencer_reference_template} ${_sv3Sequencer_client}
    globalSequencerSv3.storage.config.properties.databaseName = "sequencer_sv3"
    globalSequencerSv3.sequencer.config.storage.config.properties.databaseName = "sequencer_driver"
    globalSequencerSv4 = ${_sequencer_reference_template} ${_sv4Sequencer_client}
    globalSequencerSv4.storage.config.properties.databaseName = "sequencer_sv4"
    globalSequencerSv4.sequencer.config.storage.config.properties.databaseName = "sequencer_driver"
    splitwellSequencer = ${_sequencer_reference_template} ${_splitwellSequencer_client}
    splitwellSequencer.storage.config.properties.databaseName = "sequencer_splitwell"
    splitwellSequencer.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_splitwell"
    splitwellUpgradeSequencer = ${_sequencer_reference_template} ${_splitwellUpgradeSequencer_client}
    splitwellUpgradeSequencer.storage.config.properties.databaseName = "sequencer_splitwell_upgrade"
    splitwellUpgradeSequencer.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_splitwell_upgrade"
  }
  mediators-x {
    globalMediatorSv1 = ${_mediator_template} ${_sv1Mediator_client}
    globalMediatorSv1.storage.config.properties.databaseName = "mediator_sv1"
    globalMediatorSv2 = ${_mediator_template} ${_sv2Mediator_client}
    globalMediatorSv2.storage.config.properties.databaseName = "mediator_sv2"
    globalMediatorSv3 = ${_mediator_template} ${_sv3Mediator_client}
    globalMediatorSv3.storage.config.properties.databaseName = "mediator_sv3"
    globalMediatorSv4 = ${_mediator_template} ${_sv4Mediator_client}
    globalMediatorSv4.storage.config.properties.databaseName = "mediator_sv4"
    splitwellMediator = ${_mediator_template} ${_splitwellMediator_client}
    splitwellMediator.storage.config.properties.databaseName = "mediator_splitwell"
    splitwellUpgradeMediator = ${_mediator_template} ${_splitwellUpgradeMediator_client}
    splitwellUpgradeMediator.storage.config.properties.databaseName = "mediator_splitwell_upgrade"
  }
}

canton.monitoring {
  metrics {
    report-execution-context-metrics = yes
    report-jvm-metrics = yes
    reporters = [{
      type = prometheus
      address = "0.0.0.0"
      port = 5000
    }]
  }
}
