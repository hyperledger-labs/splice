canton {
  features {
    enable-testing-commands = yes
  }
  parameters {
    manual-start = no
  }

  participants {
    validator_participant {
      crypto.provider = tink
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 9202
      }

      init {
        ledger-api {
          max-deduplication-duration = 30s
        }
      }

      ledger-api {
        address = "0.0.0.0"
        port = 9201
        user-management-service.additional-admin-user-id = "alice_validator_user"
      }

      parameters {
        initial-protocol-version = 30
        use-new-traffic-control = true
        enable-contract-upgrading = true
        # Bump ACS pruning interval to make sure ACS snapshots are available for longer
        journal-garbage-collection-delay = 24h
        # TODO(#10878) Enable once it's not broken
        disable-upgrade-validation = true
      }
    }
  }
}
canton.features.enable-preview-commands = yes
canton.parameters.non-standard-config = yes
