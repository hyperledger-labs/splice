include required("include/canton-basic.conf")
include required("include/sequencers.conf")
include required("include/mediators.conf")
include required("include/participants.conf")

canton {
  parameters {
    non-standard-config = yes
    dev-version-support = yes
  }

  participants {
    sv1ParticipantUpgrade = ${_participant_template} {
      admin-api.port = 27002
      ledger-api {
        port = 27001
        user-management-service.additional-admin-user-id = ${SV1_ADMIN_USER}
      }
      init {
        auto-init = false
      }
    }
    sv1ParticipantUpgrade.storage.config.properties.databaseName = "participant_sv1_upgrade"
    sv2ParticipantUpgrade = ${_participant_template} {
      admin-api.port = 27602
      ledger-api {
        port = 27601
        user-management-service.additional-admin-user-id = ${SV2_ADMIN_USER}
      }
      init {
        auto-init = false
      }
    }
    sv2ParticipantUpgrade.storage.config.properties.databaseName = "participant_sv2_upgrade"
    sv3ParticipantUpgrade = ${_participant_template} {
      admin-api.port = 27702
      ledger-api {
        port = 27701
        user-management-service.additional-admin-user-id = ${SV3_ADMIN_USER}
      }
      init {
        auto-init = false
      }
    }
    sv3ParticipantUpgrade.storage.config.properties.databaseName = "participant_sv3_upgrade"
    sv4ParticipantUpgrade = ${_participant_template} {
      admin-api.port = 27802
      ledger-api {
        port = 27801
        user-management-service.additional-admin-user-id = ${SV4_ADMIN_USER}
      }
      init {
        auto-init = false
      }
    }
    sv4ParticipantUpgrade.storage.config.properties.databaseName = "participant_sv4_upgrade"
  }
  sequencers {
    globalUpgradeSequencer_1 = ${_sequencer_reference_template} {
      public-api.port = 27008
      admin-api.port = 27009
      storage.config.properties.databaseName = "sequencer_global_upgrade_1"
      sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_upgrade"
      init {
        auto-init = false
      }
    }
    globalUpgradeSequencer_2 = ${_sequencer_reference_template} {
      public-api.port = 27608
      admin-api.port = 27609
      storage.config.properties.databaseName = "sequencer_global_upgrade_2"
      sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_upgrade"
      init {
        auto-init = false
      }
    }
    globalUpgradeSequencer_3 = ${_sequencer_reference_template} {
      public-api.port = 27708
      admin-api.port = 27709
      storage.config.properties.databaseName = "sequencer_global_upgrade_3"
      sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_upgrade"
      init {
        auto-init = false
      }
    }
    globalUpgradeSequencer_4 = ${_sequencer_reference_template} {
      public-api.port = 27808
      admin-api.port = 27809
      storage.config.properties.databaseName = "sequencer_global_upgrade_4"
      sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_upgrade"
      init {
        auto-init = false
      }
    }
  }
  mediators {
    globalUpgradeMediator_1 = ${_mediator_template} {
      admin-api.port = 27007
      storage.config.properties.databaseName = "mediator_global_upgrade_1"
      init {
        auto-init = false
      }
    }
    globalUpgradeMediator_2 = ${_mediator_template} {
      admin-api.port = 27607
      storage.config.properties.databaseName = "mediator_global_upgrade_2"
      init {
        auto-init = false
      }
    }
    globalUpgradeMediator_3 = ${_mediator_template} {
      admin-api.port = 27707
      storage.config.properties.databaseName = "mediator_global_upgrade_3"
      init {
        auto-init = false
      }
    }
    globalUpgradeMediator_4 = ${_mediator_template} {
      admin-api.port = 27807
      storage.config.properties.databaseName = "mediator_global_upgrade_4"
      init {
        auto-init = false
      }
    }
  }
}
