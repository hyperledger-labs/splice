include required("include/canton-basic.conf")
include required("include/sequencers.conf")
include required("include/mediators.conf")
include required("include/participants.conf")

canton {
  parameters {
    non-standard-config = yes
    dev-version-support = yes
  }

  participants {
    sv1ParticipantReonboard = ${_participant_template} {
      admin-api.port = 28002
      ledger-api {
        port = 28001
        user-management-service.additional-admin-user-id = ${SV1_ADMIN_USER}
      }
    }
    sv1ParticipantReonboard.storage.config.properties.databaseName = "participant_sv1_reonboard"
    sv2ParticipantReonboard = ${_participant_template} {
      admin-api.port = 28602
      ledger-api {
        port = 28601
        user-management-service.additional-admin-user-id = ${SV2_ADMIN_USER}
      }
    }
    sv2ParticipantReonboard.storage.config.properties.databaseName = "participant_sv2_reonboard"
    sv3ParticipantReonboard = ${_participant_template} {
      admin-api.port = 28702
      ledger-api {
        port = 28701
        user-management-service.additional-admin-user-id = ${SV3_ADMIN_USER}
      }
    }
    sv3ParticipantReonboard.storage.config.properties.databaseName = "participant_sv3_reonboard"
  }
  sequencers {
    globalReonboardSequencer_1 = ${_sequencer_reference_template} {
      public-api.port = 28008
      admin-api.port = 28009
      storage.config.properties.databaseName = "sequencer_global_reonboard_1"
      sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_reonboard"
    }
    globalReonboardSequencer_2 = ${_sequencer_reference_template} {
      public-api.port = 28608
      admin-api.port = 28609
      storage.config.properties.databaseName = "sequencer_global_reonboard_2"
      sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_reonboard"
    }
    globalReonboardSequencer_3 = ${_sequencer_reference_template} {
      public-api.port = 28708
      admin-api.port = 28709
      storage.config.properties.databaseName = "sequencer_global_reonboard_3"
      sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_reonboard"
    }
  }
  mediators {
    globalReonboardMediator_1 = ${_mediator_template} {
      admin-api.port = 28007
      storage.config.properties.databaseName = "mediator_global_reonboard_1"
    }
    globalReonboardMediator_2 = ${_mediator_template} {
      admin-api.port = 28607
      storage.config.properties.databaseName = "mediator_global_reonboard_2"
    }
    globalReonboardMediator_3 = ${_mediator_template} {
      admin-api.port = 28707
      storage.config.properties.databaseName = "mediator_global_reonboard_3"
    }
  }
}
