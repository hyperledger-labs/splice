# For our second canton instance for time-based tests.
# We override all parts of the main config that need to change.

include required("include/canton-basic.conf")
include required("include/sequencers.conf")
include required("include/mediators.conf")
include required("include/participants.conf")

_sv1ParticipantOffboarding_client {
  admin-api.port = 29002
  ledger-api.port = 29001
}

_sv2ParticipantOffboarding_client {
  admin-api.port = 29602
  ledger-api.port = 29601
}

_sv3ParticipantOffboarding_client {
  admin-api.port = 29702
  ledger-api.port = 29701
}

_sv4ParticipantOffboarding_client {
  admin-api.port = 29802
  ledger-api.port = 29801
}

_sv1SequencerOffboarding_client {
  public-api.port = 29008
  admin-api.port = 29009
}

_sv2SequencerOffboarding_client {
  public-api.port = 29608
  admin-api.port = 29609
}

_sv3SequencerOffboarding_client {
  public-api.port = 29708
  admin-api.port = 29709
}

_sv4SequencerOffboarding_client {
  public-api.port = 29808
  admin-api.port = 29809
}

_sv1MediatorOffboarding_client {
  admin-api.port = 29007
}

_sv2MediatorOffboarding_client {
  admin-api.port = 29607
}

_sv3MediatorOffboarding_client {
  admin-api.port = 29707
}

_sv4MediatorOffboarding_client {
  admin-api.port = 29807
}

canton {

  participants {
    sv1ParticipantOffboarding = ${_participant_template} ${_sv1ParticipantOffboarding_client}
    sv1ParticipantOffboarding.storage.config.properties.databaseName = "participant_sv1_mediator_offboarding"
    sv1ParticipantOffboarding.ledger-api.user-management-service.additional-admin-user-id = ${SV1_ADMIN_USER}
    sv2ParticipantOffboarding = ${_participant_template} ${_sv2ParticipantOffboarding_client}
    sv2ParticipantOffboarding.storage.config.properties.databaseName = "participant_sv2_mediator_offboarding"
    sv2ParticipantOffboarding.ledger-api.user-management-service.additional-admin-user-id = ${SV2_ADMIN_USER}
    sv3ParticipantOffboarding = ${_participant_template} ${_sv3ParticipantOffboarding_client}
    sv3ParticipantOffboarding.storage.config.properties.databaseName = "participant_sv3_mediator_offboarding"
    sv3ParticipantOffboarding.ledger-api.user-management-service.additional-admin-user-id = ${SV3_ADMIN_USER}
    sv4ParticipantOffboarding = ${_participant_template} ${_sv4ParticipantOffboarding_client}
    sv4ParticipantOffboarding.storage.config.properties.databaseName = "participant_sv4_mediator_offboarding"
    sv4ParticipantOffboarding.ledger-api.user-management-service.additional-admin-user-id = ${SV4_ADMIN_USER}
  }
  sequencers {
    globalSequencerSv1Offboarding = ${_sequencer_reference_template} ${_sv1SequencerOffboarding_client}
    globalSequencerSv1Offboarding.storage.config.properties.databaseName = "sequencer_sv1_mediator_offboarding"
    globalSequencerSv1Offboarding.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_mediator_offboarding"
    globalSequencerSv2Offboarding = ${_sequencer_reference_template} ${_sv2SequencerOffboarding_client}
    globalSequencerSv2Offboarding.storage.config.properties.databaseName = "sequencer_sv2_mediator_offboarding"
    globalSequencerSv2Offboarding.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_mediator_offboarding"
    globalSequencerSv3Offboarding = ${_sequencer_reference_template} ${_sv3SequencerOffboarding_client}
    globalSequencerSv3Offboarding.storage.config.properties.databaseName = "sequencer_sv3_mediator_offboarding"
    globalSequencerSv3Offboarding.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_mediator_offboarding"
    globalSequencerSv4Offboarding = ${_sequencer_reference_template} ${_sv4SequencerOffboarding_client}
    globalSequencerSv4Offboarding.storage.config.properties.databaseName = "sequencer_sv4_mediator_offboarding"
    globalSequencerSv4Offboarding.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_mediator_offboarding"
  }
  mediators {
    globalMediatorSv1Offboarding = ${_mediator_template} ${_sv1MediatorOffboarding_client}
    globalMediatorSv1Offboarding.storage.config.properties.databaseName = "mediator_sv1_mediator_offboarding"
    globalMediatorSv2Offboarding = ${_mediator_template} ${_sv2MediatorOffboarding_client}
    globalMediatorSv2Offboarding.storage.config.properties.databaseName = "mediator_sv2_mediator_offboarding"
    globalMediatorSv3Offboarding = ${_mediator_template} ${_sv3MediatorOffboarding_client}
    globalMediatorSv3Offboarding.storage.config.properties.databaseName = "mediator_sv3_mediator_offboarding"
    globalMediatorSv4Offboarding = ${_mediator_template} ${_sv4MediatorOffboarding_client}
    globalMediatorSv4Offboarding.storage.config.properties.databaseName = "mediator_sv4_mediator_offboarding"
  }
}
canton.monitoring {
  metrics {
    reporters = [{
      type = prometheus
      address = "0.0.0.0"
      port = 29000
    }]
  }
}
