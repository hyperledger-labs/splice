# For our second canton instance for time-based tests.
# We override all parts of the main config that need to change.

include required("simple-topology-canton.conf")

_sv1Participant_client {
  admin-api.port = 29002
  ledger-api.port = 29001
}

_sv2Participant_client {
  admin-api.port = 29602
  ledger-api.port = 29601
}

_sv3Participant_client {
  admin-api.port = 29702
  ledger-api.port = 29701
}

_sv4Participant_client {
  admin-api.port = 29802
  ledger-api.port = 29801
}

_aliceParticipant_client {
  admin-api.port = 29202
  ledger-api.port = 29201
  # Unused so just disable it
  http-ledger-api-experimental = null
}

_bobParticipant_client {
  admin-api.port = 29302
  ledger-api.port = 29301
  # Unused so just disable it
  http-ledger-api-experimental = null
}

_splitwellParticipant_client {
  admin-api.port = 29402
  ledger-api.port = 29401
  # Unused so just disable it
  http-ledger-api-experimental = null
}

_sv1Sequencer_client {
  public-api.port = 29008
  admin-api.port = 29009
}

_sv2Sequencer_client {
  public-api.port = 29608
  admin-api.port = 29609
}

_sv3Sequencer_client {
  public-api.port = 29708
  admin-api.port = 29709
}

_sv4Sequencer_client {
  public-api.port = 29808
  admin-api.port = 29809
}

# 29908, 29909 are reserved for globalUpgrade

_splitwellSequencer_client {
  public-api.port = 29108
  admin-api.port = 29109
}

_splitwellUpgradeSequencer_client {
  public-api.port = 29208
  admin-api.port = 29209
}

_sv1Mediator_client {
  admin-api.port = 29007
}

_sv2Mediator_client {
  admin-api.port = 29607
}

_sv3Mediator_client {
  admin-api.port = 29707
}

_sv4Mediator_client {
  admin-api.port = 29807
}

# 29907 is reserved for globalUpgrade

_splitwellMediator_client {
  admin-api.port = 29107
}

_splitwellUpgradeMediator_client {
  admin-api.port = 29207
}

canton {

  participants-x {
    sv1Participant = ${_participant_template} ${_sv1Participant_client}
    sv1Participant.storage.config.properties.databaseName = "participant_sv1_mediator_offboarding"
    sv1Participant.ledger-api.user-management-service.additional-admin-user-id = ${SV1_ADMIN_USER}
    sv2Participant = ${_participant_template} ${_sv2Participant_client}
    sv2Participant.storage.config.properties.databaseName = "participant_sv2_mediator_offboarding"
    sv2Participant.ledger-api.user-management-service.additional-admin-user-id = ${SV2_ADMIN_USER}
    sv3Participant = ${_participant_template} ${_sv3Participant_client}
    sv3Participant.storage.config.properties.databaseName = "participant_sv3_mediator_offboarding"
    sv3Participant.ledger-api.user-management-service.additional-admin-user-id = ${SV3_ADMIN_USER}
    sv4Participant = ${_participant_template} ${_sv4Participant_client}
    sv4Participant.storage.config.properties.databaseName = "participant_sv4_mediator_offboarding"
    sv4Participant.ledger-api.user-management-service.additional-admin-user-id = ${SV4_ADMIN_USER}
    aliceParticipant = ${_participant_template} ${_aliceParticipant_client}
    aliceParticipant.storage.config.properties.databaseName = "participant_alice_mediator_offboarding"
    aliceParticipant.ledger-api.user-management-service.additional-admin-user-id = ${ALICE_ADMIN_USER}
    bobParticipant = ${_participant_template} ${_bobParticipant_client}
    bobParticipant.storage.config.properties.databaseName = "participant_bob_mediator_offboarding"
    bobParticipant.ledger-api.user-management-service.additional-admin-user-id = ${BOB_ADMIN_USER}
    splitwellParticipant = ${_participant_template} ${_splitwellParticipant_client}
    splitwellParticipant.storage.config.properties.databaseName = "participant_splitwell_mediator_offboarding"
    splitwellParticipant.ledger-api.user-management-service.additional-admin-user-id = ${SPLITWELL_ADMIN_USER}
  }
  sequencers-x {
    globalSequencerSv1 = ${_sequencer_reference_template} ${_sv1Sequencer_client}
    globalSequencerSv1.storage.config.properties.databaseName = "sequencer_sv1_mediator_offboarding"
    globalSequencerSv1.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_mediator_offboarding"
    globalSequencerSv2 = ${_sequencer_reference_template} ${_sv2Sequencer_client}
    globalSequencerSv2.storage.config.properties.databaseName = "sequencer_sv2_mediator_offboarding"
    globalSequencerSv2.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_mediator_offboarding"
    globalSequencerSv3 = ${_sequencer_reference_template} ${_sv3Sequencer_client}
    globalSequencerSv3.storage.config.properties.databaseName = "sequencer_sv3_mediator_offboarding"
    globalSequencerSv3.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_mediator_offboarding"
    globalSequencerSv4 = ${_sequencer_reference_template} ${_sv4Sequencer_client}
    globalSequencerSv4.storage.config.properties.databaseName = "sequencer_sv4_mediator_offboarding"
    globalSequencerSv4.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_mediator_offboarding"
    splitwellSequencer = ${_sequencer_reference_template} ${_splitwellSequencer_client}
    splitwellSequencer.storage.config.properties.databaseName = "sequencer_splitwell_mediator_offboarding"
    splitwellSequencer.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_splitwell_mediator_offboarding"
    splitwellUpgradeSequencer = ${_sequencer_reference_template} ${_splitwellUpgradeSequencer_client}
    splitwellUpgradeSequencer.storage.config.properties.databaseName = "sequencer_splitwell_upgrade_mediator_offboarding"
    splitwellUpgradeSequencer.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_splitwell_upgrade_mediator_offboarding"
  }
  mediators-x {
    globalMediatorSv1 = ${_mediator_template} ${_sv1Mediator_client}
    globalMediatorSv1.storage.config.properties.databaseName = "mediator_sv1_mediator_offboarding"
    globalMediatorSv2 = ${_mediator_template} ${_sv2Mediator_client}
    globalMediatorSv2.storage.config.properties.databaseName = "mediator_sv2_mediator_offboarding"
    globalMediatorSv3 = ${_mediator_template} ${_sv3Mediator_client}
    globalMediatorSv3.storage.config.properties.databaseName = "mediator_sv3_mediator_offboarding"
    globalMediatorSv4 = ${_mediator_template} ${_sv4Mediator_client}
    globalMediatorSv4.storage.config.properties.databaseName = "mediator_sv4_mediator_offboarding"
    splitwellMediator = ${_mediator_template} ${_splitwellMediator_client}
    splitwellMediator.storage.config.properties.databaseName = "mediator_splitwell_mediator_offboarding"
    splitwellUpgradeMediator = ${_mediator_template} ${_splitwellUpgradeMediator_client}
    splitwellUpgradeMediator.storage.config.properties.databaseName = "mediator_splitwell_upgrade_mediator_offboarding"
  }
}
canton.monitoring {
  metrics {
    reporters = [{
      type = prometheus
      address = "0.0.0.0"
      port = 29000
    }]
  }
}
