# For our second canton instance for time-based tests.
# We override all parts of the main config that need to change.
include required("simple-topology-canton.conf")

_participant_template.testing-time.type = monotonic-time

_svcParticipant_remote {
  admin-api.port = 15002
  ledger-api.port = 15001
}

_directoryParticipant_remote {
  admin-api.port = 15102
  ledger-api.port = 15101
}

_splitwiseParticipant_remote {
  admin-api.port = 15402
  ledger-api.port = 15401
}

_aliceParticipant_remote {
  admin-api.port = 15202
  ledger-api.port = 15201
}

_bobParticipant_remote {
  admin-api.port = 15302
  ledger-api.port = 15301
}

canton.participants = {
  aliceParticipant = ${_participant_template} ${_aliceParticipant_remote}
  aliceParticipant.storage.config.properties.databaseName = "participant_alice_simtime"
  svcParticipant = ${_participant_template} ${_svcParticipant_remote}
  svcParticipant.storage.config.properties.databaseName = "participant_svc_simtime"
  bobParticipant = ${_participant_template} ${_bobParticipant_remote}
  bobParticipant.storage.config.properties.databaseName = "participant_bob_simtime"
  directoryParticipant = ${_participant_template} ${_directoryParticipant_remote}
  directoryParticipant.storage.config.properties.databaseName = "participant_directory_simtime"
  splitwiseParticipant = ${_participant_template} ${_splitwiseParticipant_remote}
  splitwiseParticipant.storage.config.properties.databaseName = "participant_splitwise_simtime"
}

canton.domains.global.storage.config.properties.databaseName = "domain_global_simtime"
canton.domains.global.public-api.port = 15008
canton.domains.global.admin-api.port = 15009

canton.parameters.clock.type = sim-clock
