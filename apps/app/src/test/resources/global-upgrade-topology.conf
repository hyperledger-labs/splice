include "simple-topology.conf"

canton {
  sv-apps {
    sv1Local {
      include required("include/svs/_sv")

      participant-client = {
        admin-api.port = 27102
        ledger-api.client-config.port = 27101
      }
      admin-api.port = 27114
      ledger-api-user = "sv1"
      validator-ledger-api-user = "sv1_validator_user"
      sv-party-hint = "canton-foundation-1"

      local-domain-node {
        sequencer = {
          admin-api.port = 27109
          internal-api.address = "localhost"
          internal-api.port = 27108
          external-public-api-url = "http://localhost:27108"
        }
        mediator.admin-api.port = 27107
      }
      domains {
        global {
          alias = "global"
          url = "http://localhost:27108"
        }
      }

      approved-sv-identities = [
        {include required("include/svs/_sv2-id")}
        {include required("include/svs/_sv3-id")},
        {include required("include/svs/_sv4-id")}
      ]

      onboarding = {
        type = "domain-migration"
        name = "Canton-Foundation-1"
        dump-file-path = ""
      }
    }
    sv2Local {
      include required("include/svs/_sv")

      participant-client = {
        admin-api.port = 27202
        ledger-api.client-config.port = 27201
      }
      admin-api.port = 27214
      ledger-api-user = "sv2"
      validator-ledger-api-user = "sv2_validator_user"
      sv-party-hint = "canton-foundation-2"

      local-domain-node {
        sequencer = {
          admin-api.port = 27209
          internal-api.address = "localhost"
          internal-api.port = 27208
          external-public-api-url = "http://localhost:27208"
        }
        mediator.admin-api.port = 27207
      }
      domains {
        global {
          alias = "global"
          url = "http://localhost:27208"
        }
      }

      approved-sv-identities = [
        {include required("include/svs/_sv3-id")},
        {include required("include/svs/_sv4-id")}
      ]

      onboarding = {
        type = "domain-migration"
        name = "Canton-Foundation-2"
        dump-file-path = ""
      }
    }
    sv3Local {
      include required("include/svs/_sv")

      participant-client = {
        admin-api.port = 27302
        ledger-api.client-config.port = 27301
      }
      admin-api.port = 27314
      ledger-api-user = "sv3"
      validator-ledger-api-user = "sv3_validator_user"
      sv-party-hint = "canton-foundation-3"

      local-domain-node {
        sequencer = {
          admin-api.port = 27309
          internal-api.address = "localhost"
          internal-api.port = 27308
          external-public-api-url = "http://localhost:27308"
        }
        mediator.admin-api.port = 27307
      }
      domains {
        global {
          alias = "global"
          url = "http://localhost:27308"
        }
      }

      approved-sv-identities = [
        {include required("include/svs/_sv2-id")},
        {include required("include/svs/_sv4-id")}
      ]

      onboarding = {
        type = "domain-migration"
        name = "Canton-Foundation-3"
        dump-file-path = ""
      }
    }
    sv4Local {
      include required("include/svs/_sv")

      participant-client = {
        admin-api.port = 27402
        ledger-api.client-config.port = 27401
      }
      admin-api.port = 27414
      ledger-api-user = "sv4"
      validator-ledger-api-user = "sv4_validator_user"
      sv-party-hint = "canton-foundation-4"

      local-domain-node {
        sequencer = {
          admin-api.port = 27409
          internal-api.address = "localhost"
          internal-api.port = 27408
          external-public-api-url = "http://localhost:27408"
        }
        mediator.admin-api.port = 27407
      }
      domains {
        global {
          alias = "global"
          url = "http://localhost:27408"
        }
      }

      approved-sv-identities = [
        {include required("include/svs/_sv2-id")},
        {include required("include/svs/_sv3-id")}
      ]

      onboarding = {
        type = "domain-migration"
        name = "Canton-Foundation-4"
        dump-file-path = ""
      }
    }
  }
  scan-apps {
    sv1ScanLocal {
      include required("include/scans/_scan")

      participant-client = {
        admin-api.port = 27102
        ledger-api.client-config.port = 27101
      }
      sequencer-admin-client.port = 27109
      admin-api.port = 27112
      sv-user = "sv1"
    }
  }
  validator-apps {
    sv1ValidatorLocal {
      storage.type = memory
      admin-api.port = 27103
      participant-client = {
        admin-api.port = 27102
        ledger-api.client-config.port = 27101
        ledger-api.auth-config.type = "none"
      }
      scan-client {
        type = "trust-single"
        url = "http://127.0.0.1:27112"
      }
      ledger-api-user = "sv1_validator_user"
      validator-wallet-user = "sv1_validator_wallet_user"
      auth {
        algorithm = "hs-256-unsafe"
        audience = "https://canton.network.global"
        secret = "test"
      }
      app-instances {
      }
      domains {
        global {
          alias = "global"
          url = "http://localhost:27109"
        }
      }
    }
  }
  wallet-app-clients {
    sv1WalletLocal {
      ledger-api-user = ${canton.validator-apps.sv1ValidatorLocal.validator-wallet-user}
      admin-api {
        url = "http://127.0.0.1:27103"
      }
    }
  }
}
