include "simple-topology.conf"

canton {
  sv-apps {
    sv1Local {
      include required("include/svs/_sv")

      participant-client = {
        admin-api.port = 27102
        ledger-api.client-config.port = 27101
      }
      admin-api.port = 27114
      ledger-api-user = "sv1"
      validator-ledger-api-user = "sv1_validator_user"
      sv-party-hint = "canton-foundation-1"

      local-domain-node {
        sequencer = {
          admin-api.port = 27109
          internal-api.address = "localhost"
          internal-api.port = 27108
          external-public-api-url = "http://localhost:27108"
        }
        mediator.admin-api.port = 27107
      }
      domains {
        global {
          alias = "global"
          url = "http://localhost:27108"
        }
      }

      approved-sv-identities = [
        {include required("include/svs/_sv2-id")}
        {include required("include/svs/_sv3-id")},
        {include required("include/svs/_sv4-id")}
      ]

      onboarding = null
    }
  }
}
