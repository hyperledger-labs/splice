# LocalRunbookIntegrationTest reuses the config files from our cluster
# to spin up a local network. However, we need to override a few config variables
# to make that work which are defined here.
canton {
  # Set to null first to disable config merging
  svc-app.remote-participant.ledger-api.auth-config = null
  scan-app.remote-participant.ledger-api.auth-config = null
}
canton {
  scan-app.svc-user = "svc"
  svc-app.daml-user = "svc"
  svc-app.remote-participant.ledger-api.auth-config.type = "none"
  scan-app.remote-participant.ledger-api.auth-config.type = "none"
  participants.svc_participant.ledger-api.auth-services = []
}
