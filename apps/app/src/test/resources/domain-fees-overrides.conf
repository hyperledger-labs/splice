_traffic_control {
  base-rate = 3333
  max-burst-duration = "10m"
}

canton {
  sequencers-x {
    globalSequencerSv1.traffic-control = ${_traffic_control}
    globalSequencerSv2.traffic-control = ${_traffic_control}
    globalSequencerSv3.traffic-control = ${_traffic_control}
    globalSequencerSv4.traffic-control = ${_traffic_control}
  }
}
