canton {
  parameters {
    manual-start = no
    non-standard-config = yes
    dev-version-support = yes
  }

  sequencers-x {
    svc_sequencer {
      storage.type = memory

      public-api {
        address = "0.0.0.0"
        port = 9008
      }

      admin-api {
        address = "0.0.0.0"
        port = 9009
      }

      sequencer {
        config {
          storage.type = memory
        }
        type = reference
      }
      parameters.initial-protocol-version = dev
    }
  }

  mediators-x {
    svc_mediator {
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 9007
      }

      parameters.initial-protocol-version = dev
    }
  }
}
