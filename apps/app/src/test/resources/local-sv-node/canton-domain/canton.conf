canton {
  parameters {
    manual-start = no
    non-standard-config = yes
    dev-version-support = yes
  }

  sequencers {
    svc_sequencer {
      crypto.provider = tink
      storage.type = memory

      public-api {
        address = "0.0.0.0"
        port = 9108
      }

      admin-api {
        address = "0.0.0.0"
        port = 9109
      }

      sequencer {
        config {
          storage.type = memory
        }
        type = reference
      }
      parameters.initial-protocol-version = dev
    }
  }

  mediators {
    svc_mediator {
      crypto.provider = tink
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 9107
      }

      parameters.initial-protocol-version = dev
    }
  }
}
