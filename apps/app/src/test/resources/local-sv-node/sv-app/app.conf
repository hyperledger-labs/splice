_sv {
  storage.type = memory
  participant-client = {
    admin-api.port = 9102
    ledger-api.client-config.port = 9101
    ledger-api.auth-config.type = "none"
  }
  auth {
    algorithm = "hs-256-unsafe"
    audience = "https://canton.network.global"
    secret = "test"
  }
  domains {
    global {
      alias = "global"
      url = "http://localhost:9108"
    }
  }
}

canton {
  sv-apps {
    sv1Local = ${_sv} {

      admin-api.port = 5114,
      ledger-api-user = "sv1",
      sv-party-hint = "canton-foundation-1"
      validator-ledger-api-user = "sv1_validator_user"

      onboarding = {
        type = "found-collective"
        name = "sv1"
        is-dev-net = true
      }
      local-domain-node {
        sequencer {
          admin-api.port = 9109
          internal-api.port = 9108
          external-public-api-url = "http://localhost:9108"
          sequencer-availability-delay = "60 seconds"
        }
        mediator.admin-api.port = 9107
      }
      scan {
        public-url = "http://localhost:5012"
      }
    }
  }
}
