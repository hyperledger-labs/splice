_sv {
  storage.type = memory
  participant-client = {
    admin-api.port = 9002
    ledger-api.client-config.port = 9001
    ledger-api.auth-config.type = "none"
  }
  auth {
    algorithm = "hs-256-unsafe"
    audience = "https://canton.network.global"
    secret = "test"
  }
  svc-client.admin-api.port = 5005
  domains {
    global {
      alias = "global"
    }
  }
  is-dev-net = true
}

canton {
  sv-apps {
    sv1 = ${_sv} {
      ledger-api-user = "sv1",
      validator-ledger-api-user = "validator_user"
      admin-api.port = 5014,
      onboarding = {
        type = "found-collective"
        name = "sv1"
      }
      x-nodes {
      }
    }
  }
}
