_sv {
  storage.type = memory
  remote-participant = {
    admin-api.port = 9002
    ledger-api.client-config.port = 9001
    ledger-api.auth-config.type = "none"
  }
  remote-svc.admin-api.port = 5005
  domains {
    global = "global"
  }
  is-dev-net = true
}

canton {
  sv-apps {
    sv1 = ${_sv} {
      ledger-api-user = "sv1",
      admin-api.port = 5014,
      onboarding = {
        type = "found-collective"
        name = "sv1"
      }
    }
    sv2 = ${_sv} { ledger-api-user = "sv2", admin-api.port = 5114 }
    sv3 = ${_sv} { ledger-api-user = "sv3", admin-api.port = 5214 }
    sv4 = ${_sv} { ledger-api-user = "sv4", admin-api.port = 5314 }
  }
}
