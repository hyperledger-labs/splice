_sv {
  storage.type = memory
  participant-client = {
    admin-api.port = 9002
    ledger-api.client-config.port = 9001
    ledger-api.auth-config.type = "none"
  }
  auth {
    algorithm = "hs-256-unsafe"
    audience = "https://canton.network.global"
    secret = "test"
  }
  domains {
    global {
      alias = "global"
      url = "http://localhost:5008"
    }
  }
  is-dev-net = true
  founding-sv-client.admin-api.url = "http://localhost:5014"
}

canton {
  sv-apps {
    sv1 = ${_sv} {
      ledger-api-user = "sv1",
      validator-ledger-api-user = "validator_user"
      admin-api.port = 5014,
      onboarding = {
        type = "found-collective"
        name = "sv1"
      }
      local-domain-node {
        sequencer {
          admin-api.port = 9009
          public-api.port = 9008
        }
        mediator.admin-api.port = 9007
      }
    }
  }
}
