_scan_participant_client {
  admin-api = {
    address = "0.0.0.0"
    port = 9002
  }

  ledger-api.client-config = {
    address = "0.0.0.0"
    port = 9001
  }
  ledger-api.auth-config.type = "none"
}

canton {
  scan-apps {
    scan-app {
      storage.type = memory
      admin-api = {
        address = "0.0.0.0"
        port = 5012
      }
      participant-client = ${_scan_participant_client}
      sv-user = "sv1"
      domains {
        global {
          alias = "global"
        }
      }
    }
  }
}
canton.features.enable-testing-commands = yes
