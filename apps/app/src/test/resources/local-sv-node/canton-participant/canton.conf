canton {
  features {
    enable-testing-commands = yes
  }
  parameters {
    manual-start = no
  }

  participants-x {
    sv_participant {
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 9002
      }

      init {
        ledger-api {
          max-deduplication-duration = 30s
        }
      }

      ledger-api {
        address = "0.0.0.0"
        port = 9001
        # TODO(M3-55) Consider lowering this once we switched to postgres
        rate-limit.max-api-services-queue-size = 40000
      }

      parameters {
        dev-version-support = yes
        initial-protocol-version = dev
      }
      init.parameters.unique-contract-keys = false
    }
  }
}

canton.parameters.non-standard-config = yes
