canton {
  features {
    enable-testing-commands = yes
  }
  parameters {
    manual-start = no
  }

  participants {
    svc_participant {
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 9002
      }

      ledger-api {
        address = "0.0.0.0"
        port = 9001
        max-deduplication-duration = 30s
        # TODO(M3-55) Consider lowering this once we switched to postgres
        rate-limit.max-api-services-queue-size = 40000
      }
    }
  }
}

canton.parameters.non-standard-config = yes
canton.participants.svc_participant.parameters {
  dev-version-support = yes
}

canton.participants.svc_participant.init.parameters.unique-contract-keys = false
