_svc_participant_remote {
  admin-api = {
    address = "0.0.0.0"
    port = 9002
  }

  ledger-api.client-config = {
    address = "0.0.0.0"
    port = 9001
  }
  ledger-api.auth-config.type = "none"
}

canton {
  svc-app {
    storage.type = memory
    admin-api = {
      address = "0.0.0.0"
      port = 5005
    }
    remote-participant = ${_svc_participant_remote}
    ledger-api-user = "svc"
    domains {
      global = "global"
    }
  }
}
canton.features.enable-testing-commands = yes
