include required("include/canton-basic.conf")
include required("include/sequencers.conf")
include required("include/mediators.conf")
include required("include/participants.conf")

canton {
  parameters {
    non-standard-config = yes
    dev-version-support = yes
  }

  participants {
    sv4Reonboard = ${_participant_template} {
      admin-api.port = 28802
      ledger-api {
        port = 28801
        user-management-service.additional-admin-user-id = ${ADMIN_USER}
      }
      storage = {
        config.properties.databaseName = "participant_sv4_reonboard"
      }
    }
  }

  sequencers {
    globalReonboardSequencer_4 = ${_sequencer_reference_template} {
      public-api.port = 28808
      admin-api.port = 28809
      storage.config.properties.databaseName = "sequencer_global_reonboard_4"
      sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_reonboard"
    }
  }
  mediators {
    globalReonboardMediator_4 = ${_mediator_template} {
      admin-api.port = 28807
      storage.config.properties.databaseName = "mediator_global_reonboard_4"
    }
  }
}
