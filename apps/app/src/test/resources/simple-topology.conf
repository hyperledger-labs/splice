_participant_template {
    storage.type = memory
    parameters.unsafe-enable-daml-lf-dev-version = true
}

_svcParticipant_remote {
  admin-api.port = 5002
  ledger-api.port = 5001
}

_directoryParticipant_remote {
  admin-api.port = 5102
  ledger-api.port = 5101
}

_aliceParticipant_remote {
  admin-api.port = 5202
  ledger-api.port = 5201
}

_bobParticipant_remote {
  admin-api.port = 5302
  ledger-api.port = 5301
}

_scan_remote {
  admin-api.port = 5012
}

_svc_user = "svc_shared_service_user"


canton {

  svc-app {
    storage.type = memory
    admin-api.port = 5005
    remote-participant = ${_svcParticipant_remote}
    daml-user = ${_svc_user}
  }

  scan-app {
    storage.type = memory
    admin-api.port = ${_scan_remote.admin-api.port}
    remote-participant = ${_svcParticipant_remote}
    svc-user = ${_svc_user}
  }


  validator-apps {
    directoryValidator {
      storage.type = memory
      admin-api.port = 5133
      remote-participant = ${_directoryParticipant_remote}
      remote-scan = ${_scan_remote}
      daml-user = "directory_validator_user"
    }
    aliceValidator {
      storage.type = memory
      admin-api.port = 5203
      remote-participant = ${_aliceParticipant_remote}
      remote-scan = ${_scan_remote}
      daml-user = "alice_validator_user"
    }
    bobValidator {
      storage.type = memory
      admin-api.port = 5303
      remote-participant = ${_bobParticipant_remote}
      remote-scan = ${_scan_remote}
      daml-user = "bob_validator_user"
    }
  }

  wallet-apps {
    aliceWallet {
      storage.type = memory
      admin-api.port = 5204
      remote-participant = ${_aliceParticipant_remote}
      remote-scan = ${_scan_remote}
      daml-user = "alice_wallet_user"
    }
    bobWallet {
      storage.type = memory
      admin-api.port = 5304
      remote-participant = ${_bobParticipant_remote}
      remote-scan = ${_scan_remote}
      daml-user = "bob_wallet_user"
    }
  }

  remote-wallet-apps {
    aliceRemoteWallet {
      admin-api.port = ${canton.wallet-apps.aliceWallet.admin-api.port}
    }
    bobRemoteWallet {
      admin-api.port = ${canton.wallet-apps.bobWallet.admin-api.port}
    }
  }

  directory-provider-apps {
    directoryProvider {
      storage.type = memory
      admin-api.port = 5110
      remote-participant = ${_directoryParticipant_remote}
      remote-scan = ${_scan_remote}
      daml-user = ${canton.validator-apps.directoryValidator.daml-user}
    }
  }

  directory-user-apps {
    directoryUser {
      storage.type = memory
      admin-api.port = 5111
      daml-user = ${canton.wallet-apps.aliceWallet.daml-user}
      remote-participant = ${_aliceParticipant_remote}
      remote-directory-provider = {
        admin-api.port = ${canton.directory-provider-apps.directoryProvider.admin-api.port}
        remote-participant = ${_directoryParticipant_remote}
      }
    }
  }

  features.enable-testing-commands = yes
}

# Tune this config to adjust log verbosity.
canton.monitoring.logging {
    # event-details = true
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
