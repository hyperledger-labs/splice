canton {
  include required("include/svc-app")
  include required("include/svc-app-client")

  sv-apps {
    include required("include/svs/sv1")
    include required("include/svs/sv2")
    include required("include/svs/sv3")
    include required("include/svs/sv4")
  }

  include required("include/scan-app")

  validator-apps {
    include required("include/validators/directory-validator")
    include required("include/validators/alice-validator")
    include required("include/validators/bob-validator")
    include required("include/validators/splitwise-validator")
  }

  wallet-app-backends {
    include required("include/wallets/alice-wallet")
    include required("include/wallets/bob-wallet")
    include required("include/wallets/splitwise-provider-wallet")
  }

  wallet-app-clients {
    aliceWallet {
      daml-user = "alice_wallet_user"
      admin-api.port = ${canton.wallet-app-backends.aliceWalletBackend.admin-api.port}
    }
    aliceValidatorWallet {
      daml-user = ${canton.validator-apps.aliceValidator.daml-user}
      admin-api.port = ${canton.wallet-app-backends.aliceWalletBackend.admin-api.port}
    }
    bobWallet {
      daml-user = "bob_wallet_user"
      admin-api.port = ${canton.wallet-app-backends.bobWalletBackend.admin-api.port}
    }
    charlieWallet {
      daml-user = "charlie_wallet_user"
      admin-api.port = ${canton.wallet-app-backends.aliceWalletBackend.admin-api.port}
    }
    splitwiseProviderWallet {
      daml-user = ${canton.splitwise-apps.providerSplitwiseBackend.provider-user}
      admin-api.port = ${canton.wallet-app-backends.splitwiseWalletBackend.admin-api.port}
    }
  }

  include required("include/directory-app")

  remote-directory-apps {
    include required("include/remote-directory-apps/alice-directory")
    include required("include/remote-directory-apps/bob-directory")
    include required("include/remote-directory-apps/charlie-directory")
  }

  splitwise-apps {
    include required("include/splitwise-apps/provider-splitwise-backend")
  }

  splitwise-app-clients {
    aliceSplitwise {
      admin-api.port = ${canton.splitwise-apps.providerSplitwiseBackend.admin-api.port}
      ledger-api = ${canton.validator-apps.aliceValidator.remote-participant.ledger-api}
      remote-scan.admin-api = ${canton.scan-app.admin-api}
      daml-user = ${canton.wallet-app-clients.aliceWallet.daml-user}
    }
    bobSplitwise {
      admin-api.port = ${canton.splitwise-apps.providerSplitwiseBackend.admin-api.port}
      ledger-api = ${canton.validator-apps.bobValidator.remote-participant.ledger-api}
      remote-scan.admin-api = ${canton.scan-app.admin-api}
      daml-user = ${canton.wallet-app-clients.bobWallet.daml-user}
    }
    charlieSplitwise {
      admin-api.port = ${canton.splitwise-apps.providerSplitwiseBackend.admin-api.port}
      # Charlie shares validator with Alice
      ledger-api = ${canton.validator-apps.aliceValidator.remote-participant.ledger-api}
      remote-scan.admin-api = ${canton.scan-app.admin-api}
      daml-user = ${canton.wallet-app-clients.charlieWallet.daml-user}
    }
  }

  features = {
    enable-testing-commands = yes
    enable-preview-commands = yes
  }
}

# Tune this config to adjust log verbosity.
canton.monitoring.logging {
    # event-details = true
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
