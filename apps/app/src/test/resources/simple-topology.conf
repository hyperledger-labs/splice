canton {
  include required("include/svc-app")
  include required("include/svc-app-client")

  sv-apps {
    sv1 { include required("include/svs/sv1") }
    sv2 { include required("include/svs/sv2") }
    sv3 { include required("include/svs/sv3") }
    sv4 { include required("include/svs/sv4") }
  }

  include required("include/scan-app")

  validator-apps {
    directoryValidator { include required("include/validators/directory-validator") }
    aliceValidator { include required("include/validators/alice-validator") }
    bobValidator { include required("include/validators/bob-validator") }
    splitwiseValidator { include required("include/validators/splitwise-validator") }
  }

  wallet-app-backends {
    aliceWalletBackend { include required("include/wallets/alice-wallet") }
    bobWalletBackend { include required("include/wallets/bob-wallet") }
    splitwiseWalletBackend { include required("include/wallets/splitwise-provider-wallet") }
  }

  wallet-app-clients {
    aliceWallet {
      ledger-api-user = "alice_wallet_user"
      admin-api.port = ${canton.wallet-app-backends.aliceWalletBackend.admin-api.port}
    }
    aliceValidatorWallet {
      ledger-api-user = ${canton.validator-apps.aliceValidator.validator-wallet-user}
      admin-api.port = ${canton.wallet-app-backends.aliceWalletBackend.admin-api.port}
    }
    bobWallet {
      ledger-api-user = "bob_wallet_user"
      admin-api.port = ${canton.wallet-app-backends.bobWalletBackend.admin-api.port}
    }
    bobValidatorWallet {
      ledger-api-user = ${canton.validator-apps.bobValidator.validator-wallet-user}
      admin-api.port = ${canton.wallet-app-backends.bobWalletBackend.admin-api.port}
    }
    charlieWallet {
      ledger-api-user = "charlie_wallet_user"
      admin-api.port = ${canton.wallet-app-backends.aliceWalletBackend.admin-api.port}
    }
    splitwiseProviderWallet {
      ledger-api-user = ${canton.validator-apps.splitwiseValidator.app-instances.splitwise.wallet-user}
      admin-api.port = ${canton.wallet-app-backends.splitwiseWalletBackend.admin-api.port}
    }
  }

  include required("include/directory-app")

  remote-directory-apps {
    aliceDirectory { include required("include/remote-directory-apps/alice-directory") }
    bobDirectory { include required("include/remote-directory-apps/bob-directory") }
    charlieDirectory { include required("include/remote-directory-apps/charlie-directory") }
  }

  splitwise-apps {
    include required("include/splitwise-apps/provider-splitwise-backend")
  }

  splitwise-app-clients {
    aliceSplitwise {
      admin-api.port = ${canton.splitwise-apps.providerSplitwiseBackend.admin-api.port}
      ledger-api = ${canton.validator-apps.aliceValidator.remote-participant.ledger-api}
      remote-scan.admin-api = ${canton.scan-app.admin-api}
      remote-scan.admin-api.url = "http://127.0.0.1:7012"
      ledger-api-user = ${canton.wallet-app-clients.aliceWallet.ledger-api-user}
    }
    bobSplitwise {
      admin-api.port = ${canton.splitwise-apps.providerSplitwiseBackend.admin-api.port}
      ledger-api = ${canton.validator-apps.bobValidator.remote-participant.ledger-api}
      remote-scan.admin-api = ${canton.scan-app.admin-api}
      remote-scan.admin-api.url = "http://127.0.0.1:7012"
      ledger-api-user = ${canton.wallet-app-clients.bobWallet.ledger-api-user}
    }
    charlieSplitwise {
      admin-api.port = ${canton.splitwise-apps.providerSplitwiseBackend.admin-api.port}
      # Charlie shares validator with Alice
      ledger-api = ${canton.validator-apps.aliceValidator.remote-participant.ledger-api}
      remote-scan.admin-api = ${canton.scan-app.admin-api}
      remote-scan.admin-api.url = "http://127.0.0.1:7012"
      ledger-api-user = ${canton.wallet-app-clients.charlieWallet.ledger-api-user}
    }
  }

  features = {
    enable-testing-commands = yes
    enable-preview-commands = yes
  }
}

# Tune this config to adjust log verbosity.
canton.monitoring.logging {
    # event-details = true
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
