canton {
  participants {
    participant1 {
      storage.type = memory
      admin-api.port = 5012
      ledger-api.port = 5011
    }
    participant2 {
      storage.type = memory
      admin-api.port = 5022
      ledger-api.port = 5021
    }
  }

  svc-app {
    storage.type = memory
    admin-api.port = 5025
    remote-participant {
      admin-api.port = 5022
      ledger-api.port = 5021
    }
  }

  validator-apps {
    validator1 {
      storage.type = memory
      admin-api.port = 5013
      remote-participant {
        admin-api.port = 5012
        ledger-api.port = 5011
      }
    }
  }
  domains {
    da {
      init.auto-init = true
      storage.type = memory
      public-api.port = 5018
      admin-api.port = 5019
    }
  }
  features.enable-testing-commands = yes
}

canton.participants.participant1.parameters.unsafe-enable-daml-lf-dev-version = true
canton.participants.participant2.parameters.unsafe-enable-daml-lf-dev-version = true
