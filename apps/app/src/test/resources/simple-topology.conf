canton {
  include required("include/svc-app")
  include required("include/remote-svc-app")

  include required("include/scan-app")

  validator-apps {
    include required("include/validators/directory-validator")
    include required("include/validators/alice-validator")
    include required("include/validators/bob-validator")
    include required("include/validators/splitwise-validator")
  }

  wallet-apps {
    include required("include/wallets/alice-wallet")
    include required("include/wallets/bob-wallet")
  }

  remote-wallet-apps {
    aliceRemoteWallet {
      daml-user = "alice_wallet_user"
      admin-api.port = ${canton.wallet-apps.aliceWallet.admin-api.port}
    }
    bobRemoteWallet {
      daml-user = "bob_wallet_user"
      admin-api.port = ${canton.wallet-apps.bobWallet.admin-api.port}
    }
    charlieRemoteWallet {
      daml-user = "charlie_wallet_user"
      admin-api.port = ${canton.wallet-apps.aliceWallet.admin-api.port}
    }
  }

  directory-provider-apps {
    include required("include/directory-provider-apps/directory-provider")
  }

  directory-user-apps {
    include required("include/directory-user-apps/alice-directory-user")
    include required("include/directory-user-apps/bob-directory-user")
  }

  splitwise-apps {
    include required("include/splitwise-apps/alice-splitwise-backend")
    include required("include/splitwise-apps/bob-splitwise-backend")
    include required("include/splitwise-apps/provider-splitwise-backend")
  }

  remote-splitwise-apps {
    aliceSplitwise {
      admin-api.port = ${canton.splitwise-apps.aliceSplitwiseBackend.admin-api.port}
      ledger-api = ${canton.validator-apps.aliceValidator.remote-participant.ledger-api}
      remote-scan = ${canton.splitwise-apps.aliceSplitwiseBackend.remote-scan}
      daml-user = ${canton.splitwise-apps.aliceSplitwiseBackend.daml-user}
    }
    bobSplitwise {
      admin-api.port = ${canton.splitwise-apps.bobSplitwiseBackend.admin-api.port}
      ledger-api = ${canton.validator-apps.bobValidator.remote-participant.ledger-api}
      remote-scan = ${canton.splitwise-apps.bobSplitwiseBackend.remote-scan}
      daml-user = ${canton.splitwise-apps.bobSplitwiseBackend.daml-user}
    }
    providerSplitwise {
      admin-api.port = ${canton.splitwise-apps.providerSplitwiseBackend.admin-api.port}
      ledger-api = ${canton.validator-apps.splitwiseValidator.remote-participant.ledger-api}
      remote-scan = ${canton.splitwise-apps.providerSplitwiseBackend.remote-scan}
      daml-user = ${canton.splitwise-apps.providerSplitwiseBackend.daml-user}
    }
  }

  features.enable-testing-commands = yes
}

# Tune this config to adjust log verbosity.
canton.monitoring.logging {
    # event-details = true
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
