_participant1_remote {
  admin-api.port = 5002
  ledger-api.port = 5001
}

_participant2_remote {
  admin-api.port = 5102
  ledger-api.port = 5101
}

_directory_remote {
  admin-api.port = 5202
  ledger-api.port = 5201
}

canton {

  participants {
    participant1 {
      storage.type = memory
      admin-api.port = 5002
      ledger-api.port = 5001
    }
    participant2 {
      storage.type = memory
      admin-api.port = 5102
      ledger-api.port = 5101
    }
    directory {
      storage.type = memory
      admin-api.port = 5202
      ledger-api.port = 5201
    }
  }

  svc-app {
    storage.type = memory
    admin-api.port = 5005
    remote-participant = ${_participant2_remote}
    daml-user = "svc"
  }

  validator-apps {
    validator1 {
      storage.type = memory
      admin-api.port = 5003
      remote-participant = ${_participant1_remote}
      daml-user = "validator1"
    }
    directoryValidator {
      storage.type = memory
      admin-api.port = 5033
      remote-participant = ${_directory_remote}
      daml-user = "provider"
    }
  }

  wallet-apps {
    wallet1 {
      storage.type = memory
      admin-api.port = 5004
      remote-participant = ${_participant1_remote}
      daml-user = "god"
    }
  }

  directory-provider-apps {
    directoryprovider {
      storage.type = memory
      admin-api.port = 5010
      remote-participant = ${_directory_remote}
      daml-user = "provider"
    }
  }

  directory-user-apps {
    directoryuser {
      storage.type = memory
      admin-api.port = 5011
      daml-user = "god" # Same user as wallet
      remote-participant = ${_participant1_remote}
      remote-directory-provider = {
        admin-api.port = 5010
        remote-participant = ${_directory_remote}
      }
    }
  }

  domains {
    da {
      init.auto-init = true
      storage.type = memory
      public-api.port = 5008
      admin-api.port = 5009
    }
  }
  features.enable-testing-commands = yes
}

canton.participants.participant1.parameters.unsafe-enable-daml-lf-dev-version = true
canton.participants.participant2.parameters.unsafe-enable-daml-lf-dev-version = true
canton.participants.directory.parameters.unsafe-enable-daml-lf-dev-version = true


# Tune this config to adjust log verbosity.
canton.monitoring.logging {
    # event-details = true
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
