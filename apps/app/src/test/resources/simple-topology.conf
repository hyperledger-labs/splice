canton {
  sv-apps {
    sv1 { include required("include/svs/sv1") }
    sv2 { include required("include/svs/sv2") }
    sv3 { include required("include/svs/sv3") }
    sv4 { include required("include/svs/sv4") }
  }

  validator-apps {
    aliceValidator { include required("include/validators/alice-validator") }
    bobValidator { include required("include/validators/bob-validator") }
    splitwellValidator { include required("include/validators/splitwell-validator") }
    sv1Validator { include required("include/validators/sv1-validator") }
    sv2Validator { include required("include/validators/sv2-validator") }
    sv3Validator { include required("include/validators/sv3-validator") }
    sv4Validator { include required("include/validators/sv4-validator") }
  }

  scan-apps {
    sv1Scan { include required("include/scans/sv1-scan") }
    sv2Scan { include required("include/scans/sv2-scan") }
  }

  validator-app-clients {
    aliceValidatorClient {
      admin-api {
        url = "http://127.0.0.1:5203"
      }
    }
  }

  wallet-app-clients {
    aliceWallet {
      ledger-api-user = "alice_wallet_user"
      admin-api {
        url = "http://127.0.0.1:5203"
      }
    }
    aliceValidatorWallet {
      ledger-api-user = ${canton.validator-apps.aliceValidator.validator-wallet-user}
      admin-api {
        url = "http://127.0.0.1:5203"
      }
    }
    bobWallet {
      ledger-api-user = "bob_wallet_user"
      admin-api {
        url = "http://127.0.0.1:5303"
      }
    }
    bobValidatorWallet {
      ledger-api-user = ${canton.validator-apps.bobValidator.validator-wallet-user}
      admin-api {
        url = "http://127.0.0.1:5303"
      }
    }
    charlieWallet {
      ledger-api-user = "charlie_wallet_user"
      admin-api {
        url = "http://127.0.0.1:5203"
      }
    }
    splitwellProviderWallet {
      ledger-api-user = ${canton.validator-apps.splitwellValidator.app-instances.splitwell.wallet-user}
      admin-api {
        url = "http://127.0.0.1:5403"
      }
    }
    sv1Wallet {
      ledger-api-user = ${canton.validator-apps.sv1Validator.validator-wallet-user}
      admin-api {
        url = "http://127.0.0.1:5003"
      }
    }
  }

  app-manager-app-clients {
    aliceAppManager {
      ledger-api-user = ${canton.wallet-app-clients.aliceWallet.ledger-api-user}
      admin-api {
        url = "http://127.0.0.1:5203"
      }
    }
  }

  include required("include/directory-app")

  directory-app-clients {
    aliceDirectory { include required("include/directory-app-clients/alice-directory") }
    bobDirectory { include required("include/directory-app-clients/bob-directory") }
    charlieDirectory { include required("include/directory-app-clients/charlie-directory") }
  }

  directory-app-external-clients {
    aliceDirectory {
      ledger-api-user = ${canton.wallet-app-clients.aliceWallet.ledger-api-user}
      admin-api {
        url = "http://127.0.0.1:5203"
      }
    }
  }

  splitwell-apps {
    include required("include/splitwell-apps/provider-splitwell-backend")
  }

  splitwell-app-clients {
    aliceSplitwell {
      include required("include/scan-client")
      admin-api.url = "http://127.0.0.1:"${canton.splitwell-apps.providerSplitwellBackend.admin-api.port}
      participant-client = ${canton.validator-apps.aliceValidator.participant-client}
      ledger-api-user = ${canton.wallet-app-clients.aliceWallet.ledger-api-user}
    }
    bobSplitwell {
      include required("include/scan-client")
      admin-api.url = "http://127.0.0.1:"${canton.splitwell-apps.providerSplitwellBackend.admin-api.port}
      participant-client = ${canton.validator-apps.bobValidator.participant-client}
      ledger-api-user = ${canton.wallet-app-clients.bobWallet.ledger-api-user}
    }
    charlieSplitwell {
      include required("include/scan-client")
      admin-api.url = "http://127.0.0.1:"${canton.splitwell-apps.providerSplitwellBackend.admin-api.port}
      # Charlie shares validator with Alice
      participant-client = ${canton.validator-apps.aliceValidator.participant-client}
      ledger-api-user = ${canton.wallet-app-clients.charlieWallet.ledger-api-user}
    }
  }

  features = {
    enable-testing-commands = yes
    enable-preview-commands = yes
  }
}

# Tune this config to adjust log verbosity.
canton.monitoring {
  logging {
    # event-details = true
    api {
      message-payloads = true
      max-method-length = 1000
      max-message-lines = 10000
      max-string-length = 10000
      max-metadata-size = 10000
    }
  }
  metrics {
    report-execution-context-metrics = yes
    report-jvm-metrics = yes
    reporters = [{
      type = prometheus
      address = "0.0.0.0"
      port = 25000
    }]
  }
}
