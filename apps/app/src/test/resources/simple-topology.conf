_participant1_remote {
  admin-api.port = 5012
  ledger-api.port = 5011
}

_participant2_remote {
  admin-api.port = 5022
  ledger-api.port = 5021
}

_directory_remote {
  admin-api.port = 5032
  ledger-api.port = 5031
}

canton {

  participants {
    participant1 {
      storage.type = memory
      admin-api.port = 5012
      ledger-api.port = 5011
    }
    participant2 {
      storage.type = memory
      admin-api.port = 5022
      ledger-api.port = 5021
    }
    directory {
      storage.type = memory
      admin-api.port = 5032
      ledger-api.port = 5031
    }
  }

  svc-app {
    storage.type = memory
    admin-api.port = 5015
    remote-participant = ${_participant2_remote}
  }

  validator-apps {
    validator1 {
      storage.type = memory
      admin-api.port = 5013
      remote-participant = ${_participant1_remote}
    }
  }

  wallet-apps {
    wallet1 {
      storage.type = memory
      admin-api.port = 5014
      remote-participant = ${_participant1_remote}
      daml-user = "god"
    }
  }

  directory-provider-apps {
    directoryprovider {
      storage.type = memory
      admin-api.port = 5033
      remote-participant = ${_directory_remote}
      daml-user = "provider"
    }
  }

  domains {
    da {
      init.auto-init = true
      storage.type = memory
      public-api.port = 5018
      admin-api.port = 5019
    }
  }
  features.enable-testing-commands = yes
}

canton.participants.participant1.parameters.unsafe-enable-daml-lf-dev-version = true
canton.participants.participant2.parameters.unsafe-enable-daml-lf-dev-version = true
canton.participants.directory.parameters.unsafe-enable-daml-lf-dev-version = true
