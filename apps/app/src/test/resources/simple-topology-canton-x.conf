include required("include/storage-postgres.conf")
include required("include/ledger-api-auth-test.conf")

_participant_template {
  ledger-api.auth-services = ${_shared.auth-services}
  ledger-api.explicit-disclosure-unsafe = true
  storage = ${_shared.storage}
  parameters {
    dev-version-support = yes
    initial-protocol-version = dev
  }
  init.parameters.unique-contract-keys = false
}

_sequencer_template {
  parameters.initial-protocol-version = dev
  sequencer {
    config {
      storage = ${_shared.storage}
    }
    type = reference
  }
  storage = ${_shared.storage}
}

_mediator_template {
  parameters.initial-protocol-version = dev
  storage = ${_shared.storage}
}

_sv1Participant_client {
  admin-api.port = 5002
  ledger-api.port = 5001
}

_sv2Participant_client {
  admin-api.port = 5602
  ledger-api.port = 5601
}

_sv3Participant_client {
  admin-api.port = 5702
  ledger-api.port = 5701
}

_sv4Participant_client {
  admin-api.port = 5802
  ledger-api.port = 5801
}

_aliceParticipant_client {
  admin-api.port = 5202
  ledger-api.port = 5201
}


_sv1Sequencer_client {
  public-api.port = 5008
  admin-api.port = 5009
}

_sv1Sequencer_client {
  public-api.port = 5008
  admin-api.port = 5009
}

_sv1Mediator_client {
  admin-api.port = 5010
}

canton {
  parameters {
    non-standard-config = yes
    dev-version-support = yes
  }
  participants-x {
    sv1Participant = ${_participant_template} ${_sv1Participant_client}
    sv1Participant.storage.config.properties.databaseName = "participant_sv1_x"
    sv2Participant = ${_participant_template} ${_sv2Participant_client}
    sv2Participant.storage.config.properties.databaseName = "participant_sv2_x"
    sv3Participant = ${_participant_template} ${_sv3Participant_client}
    sv3Participant.storage.config.properties.databaseName = "participant_sv3_x"
    sv4Participant = ${_participant_template} ${_sv4Participant_client}
    sv4Participant.storage.config.properties.databaseName = "participant_sv4_x"
    aliceParticipant = ${_participant_template} ${_aliceParticipant_client}
    aliceParticipant.storage.config.properties.databaseName = "participant_alice_x"
  }
  sequencers-x {
    globalSeqSv1 = ${_sequencer_template} ${_sv1Sequencer_client}
    globalSeqSv1.storage.config.properties.databaseName = "domain_sv1_x"
    globalSeqSv1.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_sv1_x"
  }
  mediators-x {
    globalMedSv1 = ${_mediator_template} ${_sv1Mediator_client}
    globalMedSv1.storage.config.properties.databaseName = "domain_sv1_x"
  }
  features.enable-preview-commands = yes
  features.enable-testing-commands = yes
}

canton.monitoring.logging {
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
