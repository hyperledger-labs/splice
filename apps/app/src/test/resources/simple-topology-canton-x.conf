include required("include/storage-postgres.conf")
include required("include/ledger-api-auth-test.conf")

_participant_template {
  ledger-api.auth-services = ${_shared.auth-services}
  ledger-api.explicit-disclosure-unsafe = true
  storage = ${_shared.storage}
  parameters {
    dev-version-support = yes
    initial-protocol-version = dev
  }
  init.parameters.unique-contract-keys = false
}

_sequencer_template {
  parameters.initial-protocol-version = dev
  sequencer {
    config {
      storage = ${_shared.storage}
    }
    type = reference
  }
  storage = ${_shared.storage}
}

_mediator_template {
  parameters.initial-protocol-version = dev
  storage = ${_shared.storage}
}

_sv1Participant_client {
  admin-api.port = 5002
  ledger-api.port = 5001
}

_sv2Participant_client {
  admin-api.port = 5602
  ledger-api.port = 5601
}

_sv3Participant_client {
  admin-api.port = 5702
  ledger-api.port = 5701
}

_sv4Participant_client {
  admin-api.port = 5802
  ledger-api.port = 5801
}

_aliceParticipant_client {
  admin-api.port = 5202
  ledger-api.port = 5201
}

_bobParticipant_client {
  admin-api.port = 5302
  ledger-api.port = 5301
}

_splitwellParticipant_client {
  admin-api.port = 5402
  ledger-api.port = 5401
}

_sv1Sequencer_client {
  public-api.port = 5008
  admin-api.port = 5009
}

_sv2Sequencer_client {
  public-api.port = 5608
  admin-api.port = 5609
}

_sv3Sequencer_client {
  public-api.port = 5708
  admin-api.port = 5709
}

_sv4Sequencer_client {
  public-api.port = 5808
  admin-api.port = 5809
}

_splitwellSequencer_client {
  public-api.port = 5108
  admin-api.port = 5109
}

_splitwellUpgradeSequencer_client {
  public-api.port = 5208
  admin-api.port = 5209
}

_sv1Mediator_client {
  admin-api.port = 5007
}

_sv2Mediator_client {
  admin-api.port = 5607
}

_sv3Mediator_client {
  admin-api.port = 5707
}

_sv4Mediator_client {
  admin-api.port = 5807
}

_splitwellMediator_client {
  admin-api.port = 5107
}

_splitwellUpgradeMediator_client {
  admin-api.port = 5207
}

canton {
  parameters {
    non-standard-config = yes
    dev-version-support = yes
  }
  participants-x {
    sv1Participant = ${_participant_template} ${_sv1Participant_client}
    sv1Participant.storage.config.properties.databaseName = "participant_sv1_x"
    sv2Participant = ${_participant_template} ${_sv2Participant_client}
    sv2Participant.storage.config.properties.databaseName = "participant_sv2_x"
    sv3Participant = ${_participant_template} ${_sv3Participant_client}
    sv3Participant.storage.config.properties.databaseName = "participant_sv3_x"
    sv4Participant = ${_participant_template} ${_sv4Participant_client}
    sv4Participant.storage.config.properties.databaseName = "participant_sv4_x"
    aliceParticipant = ${_participant_template} ${_aliceParticipant_client}
    aliceParticipant.storage.config.properties.databaseName = "participant_alice_x"
    bobParticipant = ${_participant_template} ${_bobParticipant_client}
    bobParticipant.storage.config.properties.databaseName = "participant_bob_x"
    splitwellParticipant = ${_participant_template} ${_splitwellParticipant_client}
    splitwellParticipant.storage.config.properties.databaseName = "participant_splitwell_x"
  }
  sequencers-x {
    globalSequencerSv1 = ${_sequencer_template} ${_sv1Sequencer_client}
    globalSequencerSv1.storage.config.properties.databaseName = "sequencer_sv1_x"
    globalSequencerSv1.sequencer.config.storage.config.properties.databaseName = "sequencer_driver"
    globalSequencerSv2 = ${_sequencer_template} ${_sv2Sequencer_client}
    globalSequencerSv2.storage.config.properties.databaseName = "sequencer_sv2_x"
    globalSequencerSv2.sequencer.config.storage.config.properties.databaseName = "sequencer_driver"
    globalSequencerSv3 = ${_sequencer_template} ${_sv3Sequencer_client}
    globalSequencerSv3.storage.config.properties.databaseName = "sequencer_sv3_x"
    globalSequencerSv3.sequencer.config.storage.config.properties.databaseName = "sequencer_driver"
    globalSequencerSv4 = ${_sequencer_template} ${_sv4Sequencer_client}
    globalSequencerSv4.storage.config.properties.databaseName = "sequencer_sv4_x"
    globalSequencerSv4.sequencer.config.storage.config.properties.databaseName = "sequencer_driver"
    splitwellSequencer = ${_sequencer_template} ${_splitwellSequencer_client}
    splitwellSequencer.storage.config.properties.databaseName = "sequencer_splitwell_x"
    splitwellSequencer.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_splitwell"
    splitwellUpgradeSequencer = ${_sequencer_template} ${_splitwellUpgradeSequencer_client}
    splitwellUpgradeSequencer.storage.config.properties.databaseName = "sequencer_splitwell_upgrade_x"
    splitwellUpgradeSequencer.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_splitwell_upgrade"
  }
  mediators-x {
    globalMediatorSv1 = ${_mediator_template} ${_sv1Mediator_client}
    globalMediatorSv1.storage.config.properties.databaseName = "mediator_sv1_x"
    globalMediatorSv2 = ${_mediator_template} ${_sv2Mediator_client}
    globalMediatorSv2.storage.config.properties.databaseName = "mediator_sv2_x"
    globalMediatorSv3 = ${_mediator_template} ${_sv3Mediator_client}
    globalMediatorSv3.storage.config.properties.databaseName = "mediator_sv3_x"
    globalMediatorSv4 = ${_mediator_template} ${_sv4Mediator_client}
    globalMediatorSv4.storage.config.properties.databaseName = "mediator_sv4_x"
    splitwellMediator = ${_mediator_template} ${_splitwellMediator_client}
    splitwellMediator.storage.config.properties.databaseName = "mediator_splitwell_x"
    splitwellUpgradeMediator = ${_mediator_template} ${_splitwellUpgradeMediator_client}
    splitwellUpgradeMediator.storage.config.properties.databaseName = "mediator_splitwell_upgrade_x"
  }
  features.enable-preview-commands = yes
  features.enable-testing-commands = yes
}

canton.monitoring.logging {
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
