# TODO(#5140) Derive this using a config transform
_x_node {
  use-x-nodes = true
}
canton {
  include required("include/svc-app")
  svc-app.use-x-nodes = true

  sv-apps {
    sv1 { include required("include/svs/sv1") }
    sv1.x-nodes.sequencer.admin-api.port = 5009
    sv1.x-nodes.sequencer.public-api.port = 5008
    sv1.x-nodes.mediator.admin-api.port = 5010
    sv2 { include required("include/svs/sv2") }
    sv2.x-nodes.sequencer.admin-api.port = 5609
    sv2.x-nodes.sequencer.public-api.port = 5608
    sv2.x-nodes.mediator.admin-api.port = 5610
    sv3 { include required("include/svs/sv3") }
    sv3.x-nodes.sequencer.admin-api.port = 5709
    sv3.x-nodes.sequencer.public-api.port = 5708
    sv3.x-nodes.mediator.admin-api.port = 5710
    sv4 { include required("include/svs/sv4") }
    sv4.x-nodes.sequencer.admin-api.port = 5809
    sv4.x-nodes.sequencer.public-api.port = 5808
    sv4.x-nodes.mediator.admin-api.port = 5810
  }

  include required("include/scan-app")

  validator-apps {
    aliceValidator { include required("include/validators/alice-validator") }
    aliceValidator.use-x-nodes = true
    bobValidator { include required("include/validators/bob-validator") }
    bobValidator.use-x-nodes = true
    sv1Validator { include required("include/validators/sv1-validator") }
    sv1Validator.use-x-nodes = true
    sv2Validator { include required("include/validators/sv2-validator") }
    sv2Validator.use-x-nodes = true
    sv3Validator { include required("include/validators/sv3-validator") }
    sv3Validator.use-x-nodes = true
    sv4Validator { include required("include/validators/sv4-validator") }
    sv4Validator.use-x-nodes = true
  }

  wallet-app-clients {
    aliceWallet {
      ledger-api-user = "alice_wallet_user"
      admin-api {
        url = "http://127.0.0.1:5203"
      }
    }
    bobWallet {
      ledger-api-user = "bob_wallet_user"
      admin-api {
        url = "http://127.0.0.1:5303"
      }
    }
    charlieWallet {
      ledger-api-user = "charlie_wallet_user"
      admin-api {
        url = "http://127.0.0.1:5203"
      }
    }
  }

  include required("include/directory-app")

  directory-app-clients {
    aliceDirectory { include required("include/directory-app-clients/alice-directory") }
    bobDirectory { include required("include/directory-app-clients/bob-directory") }
    charlieDirectory { include required("include/directory-app-clients/charlie-directory") }
  }

  features = {
    enable-testing-commands = yes
    enable-preview-commands = yes
  }
}

# Tune this config to adjust log verbosity.
canton.monitoring.logging {
    # event-details = true
    api {
        message-payloads = true
        max-method-length = 1000
        max-message-lines = 10000
        max-string-length = 10000
        max-metadata-size = 10000
    }
}
