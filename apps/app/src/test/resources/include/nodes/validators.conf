include required("../canton-basic.conf")

canton {
  validator-apps {
    aliceValidator { include required("../validators/alice-validator") }
    bobValidator { include required("../validators/bob-validator") }
    splitwellValidator { include required("../validators/splitwell-validator") }
  }

  validator-app-clients {
    aliceValidatorClient {
      admin-api {
        url = "http://127.0.0.1:"${canton.validator-apps.aliceValidator.admin-api.port}
      }
    }
    bobValidatorClient {
      admin-api {
        url = "http://127.0.0.1:"${canton.validator-apps.bobValidator.admin-api.port}
      }
    }
  }

  wallet-app-clients {
    aliceWallet {
      ledger-api-user = "alice_wallet_user"
      admin-api {
        url = "http://127.0.0.1:5503"
      }
    }
    aliceValidatorWallet {
      ledger-api-user = ${canton.validator-apps.aliceValidator.validator-wallet-user}
      admin-api {
        url = "http://127.0.0.1:5503"
      }
    }
    bobWallet {
      ledger-api-user = "bob_wallet_user"
      admin-api {
        url = "http://127.0.0.1:5603"
      }
    }
    bobValidatorWallet {
      ledger-api-user = ${canton.validator-apps.bobValidator.validator-wallet-user}
      admin-api {
        url = "http://127.0.0.1:5603"
      }
    }
    charlieWallet {
      ledger-api-user = "charlie_wallet_user"
      admin-api {
        url = "http://127.0.0.1:5503"
      }
    }
    splitwellProviderWallet {
      ledger-api-user = ${canton.validator-apps.splitwellValidator.app-instances.splitwell.wallet-user}
      admin-api {
        url = "http://127.0.0.1:5703"
      }
    }
  }

  app-manager-app-clients {
    aliceAppManager {
      ledger-api-user = ${canton.wallet-app-clients.aliceWallet.ledger-api-user}
      admin-api {
        url = "http://127.0.0.1:5503"
      }
    }
  }

  cns-app-external-clients {
    aliceCns {
      ledger-api-user = ${canton.wallet-app-clients.aliceWallet.ledger-api-user}
      admin-api {
        url = "http://127.0.0.1:5503"
      }
    }
    bobCns {
      ledger-api-user = ${canton.wallet-app-clients.bobWallet.ledger-api-user}
      admin-api {
        url = "http://127.0.0.1:5603"
      }
    }
    charlieCns {
      ledger-api-user = ${canton.wallet-app-clients.charlieWallet.ledger-api-user}
      admin-api {
        url = "http://127.0.0.1:5503"
      }
    }
  }

  splitwell-apps {
    include required("../splitwell-apps/provider-splitwell-backend")
  }

  splitwell-app-clients {
    aliceSplitwell {
      include required("../scan-client")
      admin-api.url = "http://127.0.0.1:"${canton.splitwell-apps.providerSplitwellBackend.admin-api.port}
      participant-client = ${canton.validator-apps.aliceValidator.participant-client}
      ledger-api-user = ${canton.wallet-app-clients.aliceWallet.ledger-api-user}
    }
    bobSplitwell {
      include required("../scan-client")
      admin-api.url = "http://127.0.0.1:"${canton.splitwell-apps.providerSplitwellBackend.admin-api.port}
      participant-client = ${canton.validator-apps.bobValidator.participant-client}
      ledger-api-user = ${canton.wallet-app-clients.bobWallet.ledger-api-user}
    }
    charlieSplitwell {
      include required("../scan-client")
      admin-api.url = "http://127.0.0.1:"${canton.splitwell-apps.providerSplitwellBackend.admin-api.port}
      # Charlie shares validator with Alice
      participant-client = ${canton.validator-apps.aliceValidator.participant-client}
      ledger-api-user = ${canton.wallet-app-clients.charlieWallet.ledger-api-user}
    }
  }

  scan-app-clients {
    sv1ScanClient {
      admin-api.url = "http://127.0.0.1:"${?canton.scan-apps.sv1Scan.admin-api.port}
      admin-api.url = ${?SV1_SCAN_URL}
    }
  }
}

