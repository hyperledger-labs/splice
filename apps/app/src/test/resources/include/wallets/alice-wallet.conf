{
  include required("_wallet")

  admin-api.port = 5204
  service-user = "alice_wallet_service"

  remote-participant = ${canton.validator-apps.aliceValidator.remote-participant}

  validator.admin-api {
    port = 5203
    url = "http://127.0.0.1:6203"
  }

  validator-auth {
    audience = ${canton.validator-apps.aliceValidator.auth.audience}
    user = ${canton.wallet-app-backends.aliceWalletBackend.service-user}
    secret = ${canton.validator-apps.aliceValidator.auth.secret}
  }
}
