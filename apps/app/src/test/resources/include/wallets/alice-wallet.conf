aliceWalletBackend {
  storage.type = memory
  admin-api.port = 5204
  service-user = "alice_wallet_service"
  # Set to 0.0.0.0 so we can reach it from the envoy docker container
  admin-api.address = 0.0.0.0

  remote-participant = ${canton.validator-apps.aliceValidator.remote-participant}
  remote-scan.admin-api = ${canton.scan-app.admin-api}

  validator.admin-api {
    port = 5203
    url = "http://127.0.0.1:6203"
  }

  validator-auth {
    type = "self-signed"
    audience = ${canton.validator-apps.aliceValidator.auth.audience}
    user = ${canton.wallet-app-backends.aliceWalletBackend.service-user}
    secret = ${canton.validator-apps.aliceValidator.auth.secret}
  }
  auth {
    algorithm = "hs-256-unsafe"
    audience = "https://canton.network.global"
    secret = "test"
  }
  domains {
    global = "global"
  }
}
