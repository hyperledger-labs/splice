bobWalletBackend {
  storage.type = memory
  admin-api.port = 5304
  service-user = "bob_wallet_service"
  # Set to 0.0.0.0 so we can reach it from the envoy docker container
  admin-api.address = 0.0.0.0
  remote-participant = ${canton.validator-apps.bobValidator.remote-participant}
  remote-scan.admin-api = ${canton.scan-app.admin-api}

  validator.admin-api {
    port = 5303
    url = "http://127.0.0.1:6303"
  }

  validator-auth {
    type = "self-signed"
    audience = ${canton.validator-apps.bobValidator.auth.audience}
    user = ${canton.wallet-app-backends.bobWalletBackend.service-user}
    secret = ${canton.validator-apps.bobValidator.auth.secret}
  }
  auth {
    algorithm = "hs-256-unsafe"
    audience = "https://canton.network.global"
    secret = "test"
  }
  domains {
    global = "global"
  }
}
