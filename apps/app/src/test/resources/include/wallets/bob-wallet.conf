{
  include required("_wallet")

  admin-api.port = 5304
  service-user = "bob_wallet_service"
  remote-participant = ${canton.validator-apps.bobValidator.remote-participant}

  validator.admin-api {
    port = 5303
    url = "http://127.0.0.1:6303"
  }

  validator-auth {
    audience = ${canton.validator-apps.bobValidator.auth.audience}
    user = ${canton.wallet-app-backends.bobWalletBackend.service-user}
    secret = ${canton.validator-apps.bobValidator.auth.secret}
  }
}
