{
  include required("_wallet")

  admin-api.port = 5404
  service-user = "splitwell_wallet_service"
  remote-participant = ${canton.validator-apps.splitwellValidator.remote-participant}

  validator.admin-api = {
    port = ${canton.validator-apps.splitwellValidator.admin-api.port}
    url = "http://127.0.0.1:5403"
  }
  validator-auth {
    type = "self-signed"
    audience = ${canton.validator-apps.splitwellValidator.auth.audience}
    user = ${canton.wallet-app-backends.splitwellWalletBackend.service-user}
    secret = ${canton.validator-apps.splitwellValidator.auth.secret}
  }
}
