{
  include required("_wallet")

  admin-api.port = 5004
  service-user = "sv1_wallet_service"

  remote-participant = ${canton.validator-apps.sv1Validator.remote-participant}

  validator.admin-api {
    port = 5003
    url = "http://127.0.0.1:5003"
  }

  validator-auth {
    audience = ${canton.validator-apps.sv1Validator.auth.audience}
    user = ${canton.wallet-app-backends.sv1WalletBackend.service-user}
    secret = ${canton.validator-apps.sv1Validator.auth.secret}
  }
}
