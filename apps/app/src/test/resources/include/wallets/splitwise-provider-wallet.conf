{
  include required("_wallet")

  admin-api.port = 5404
  service-user = "splitwise_wallet_service"
  remote-participant = ${canton.validator-apps.splitwiseValidator.remote-participant}

  validator.admin-api = {
    port = ${canton.validator-apps.splitwiseValidator.admin-api.port}
    url = "http://127.0.0.1:6403"
  }
  validator-auth {
    type = "self-signed"
    audience = ${canton.validator-apps.splitwiseValidator.auth.audience}
    user = ${canton.wallet-app-backends.splitwiseWalletBackend.service-user}
    secret = ${canton.validator-apps.splitwiseValidator.auth.secret}
  }
}
