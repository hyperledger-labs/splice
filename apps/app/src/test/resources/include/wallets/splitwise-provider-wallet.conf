splitwiseWalletBackend {
  storage.type = memory
  admin-api.port = 5404
  service-user = "splitwise_wallet_service"
  # Set to 0.0.0.0 so we can reach it from the envoy docker container
  admin-api.address = 0.0.0.0
  remote-participant = ${canton.validator-apps.splitwiseValidator.remote-participant}
  remote-scan.admin-api = ${canton.scan-app.admin-api}
  validator.admin-api = ${canton.validator-apps.splitwiseValidator.admin-api}
  validator-auth {
    type = "self-signed"
    audience = ${canton.validator-apps.splitwiseValidator.auth.audience}
    user = ${canton.wallet-app-backends.splitwiseWalletBackend.service-user}
    secret = ${canton.validator-apps.splitwiseValidator.auth.secret}
  }
  auth {
    algorithm = "hs-256-unsafe"
    audience = "https://canton.network.global"
    secret = "test"
  }
}
