splitwiseValidator {
  storage.type = memory
  admin-api.port = 5403
  remote-participant = {
    admin-api.port = 5402
    ledger-api.client-config.port = 5401
    ledger-api.auth-config.type = "none"
  }
  remote-scan.admin-api = ${canton.scan-app.admin-api}
  daml-user = "splitwise_validator_user"
  wallet-service-user = "splitwise_wallet_service"
  app-instances {
    splitwise {
      service-user = ${canton.splitwise-apps.providerSplitwiseBackend.provider-user}
      dars = ["apps/splitwise/daml/.daml/dist/splitwise-0.1.0.dar"]
    }
  }
}
