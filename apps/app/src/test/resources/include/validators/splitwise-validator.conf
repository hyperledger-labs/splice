{
  include required("_validator")

  admin-api.port = 5403
  remote-participant = {
    admin-api.port = 5402
    ledger-api.client-config.port = 5401
  }
  ledger-api-user = "splitwise_validator_user"
  validator-wallet-user = "splitwise_validator_user"
  wallet-service-user = "splitwise_wallet_service"
  app-instances {
    splitwise {
      service-user = ${canton.splitwise-apps.providerSplitwiseBackend.provider-user}
      wallet-user = "splitwise_wallet_user"
      dars = ["daml/splitwise/.daml/dist/splitwise-0.1.0.dar"]
    }
  }
}
