{
  include required("_validator")

  admin-api.port = 5403
  remote-participant = {
    admin-api.port = 5402
    ledger-api.client-config.port = 5401
  }
  ledger-api-user = "splitwell_validator_user"
  validator-wallet-user = "splitwell_validator_user"
  wallet-service-user = "splitwell_wallet_service"
  app-instances {
    splitwell {
      service-user = ${canton.splitwell-apps.providerSplitwellBackend.provider-user}
      wallet-user = "splitwell_wallet_user"
      dars = ["daml/splitwell/.daml/dist/splitwell-0.1.0.dar"]
    }
  }

  onboarding = {
    remote-sv.admin-api.port = ${canton.sv-apps.sv2.admin-api.port}
    # 6114 is the port of SV2 bumped by 1000
    # TODO(#2019) use the original port here, via HOCON substitution
    remote-sv.admin-api.url = "http://127.0.0.1:6114"
    secret = "splitwellsecret"
  }
}
