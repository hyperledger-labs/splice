{
  include required("_validator")

  admin-api.port = 5403
  remote-participant = {
    admin-api.port = 5402
    ledger-api.client-config.port = 5401
  }
  ledger-api-user = "splitwell_validator_user"
  validator-wallet-user = "splitwell_validator_user"
  app-instances {
    splitwell {
      service-user = ${canton.splitwell-apps.providerSplitwellBackend.provider-user}
      wallet-user = "splitwell_wallet_user"
      dars = ["daml/splitwell/.daml/dist/splitwell-0.1.0.dar"]
    }
  }

  onboarding = {
    remote-sv.admin-api {
      port = ${canton.sv-apps.sv2.admin-api.port}
      address = "http://127.0.0.1"
    }
    secret = "splitwellsecret"
  }
}
