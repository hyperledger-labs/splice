directoryValidator {
  storage.type = memory
  admin-api.port = 5103
  remote-participant = {
    admin-api.port = 5102
    ledger-api.port = 5101
  }
  remote-scan.admin-api = ${canton.scan-app.admin-api}
  daml-user = "directory_validator_user"
  wallet-service-user = "directory_wallet_service"
  app-instances {
    directory {
      service-user = ${canton.directory-app.daml-user}
      dars = ["apps/directory/daml/.daml/dist/directory-service-0.1.0.dar"]
    }
  }
}
