{
  include required("_validator")

  admin-api.port = 5103
  remote-participant = {
    admin-api.port = 5102
    ledger-api.client-config.port = 5101
  }
  ledger-api-user = "directory_validator_user"
  validator-wallet-user = "directory_validator_user"
  wallet-service-user = "directory_wallet_service"
  app-instances {
    directory {
      service-user = ${canton.directory-app.ledger-api-user}
      wallet-user = ${canton.directory-app.ledger-api-user}
      dars = ["daml/directory-service/.daml/dist/directory-service-0.1.0.dar"]
    }
  }

  onboarding = {
    remote-sv.admin-api.port = ${canton.sv-apps.sv1.admin-api.port}
    # 6014 is the port of SV1 bumped by 1000
    # TODO(#2019) use the original port here, via HOCON substitution
    remote-sv.admin-api.url = "http://127.0.0.1:6014"
    secret = "directorysecret"
  }
}
