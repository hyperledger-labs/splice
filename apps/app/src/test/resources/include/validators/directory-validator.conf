directoryValidator {
  storage.type = memory
  admin-api.port = 5103
  remote-participant = {
    admin-api.port = 5102
    ledger-api.client-config.port = 5101
    ledger-api.auth-config.type = "none"
  }
  remote-scan.admin-api = ${canton.scan-app.admin-api}
  daml-user = "directory_validator_user"
  wallet-service-user = "directory_wallet_service"
  auth {
    algorithm = "hs-256-unsafe"
    audience = "https://canton.network.global"
    secret = "test"
  }
  app-instances {
    directory {
      service-user = ${canton.directory-app.daml-user}
      dars = ["daml/directory-service/.daml/dist/directory-service-0.1.0.dar"]
    }
  }
}
