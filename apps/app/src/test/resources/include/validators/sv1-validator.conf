{
  include required("_validator")

  admin-api.port = 5003
  remote-participant = {
    admin-api.port = 5002
    ledger-api.client-config.port = 5001
  }
  ledger-api-user = "sv1_validator_user"
  validator-wallet-user = "sv1_validator_wallet_user"
  wallet-service-user = "sv1_wallet_service"

  onboarding = {
    remote-sv.admin-api.port = ${canton.sv-apps.sv1.admin-api.port}
    # 6014 is the port of SV1 bumped by 1000
    # TODO(#2019) use the original port here, via HOCON substitution
    remote-sv.admin-api.url = "http://127.0.0.1:6014"
    secret = "sv1secret"
  }
}
