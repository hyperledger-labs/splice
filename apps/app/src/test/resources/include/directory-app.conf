directory-app {
  include required("remote-scan")
  storage.type = memory
  admin-api.port = 5110
  admin-api.address = 0.0.0.0
  remote-participant = {
    admin-api.port = 5002
    ledger-api.client-config.port = 5001
    ledger-api.auth-config.type = "none"
  }
  ledger-api-user = "directory_provider"
  domains {
    global = "global"
  }
}
