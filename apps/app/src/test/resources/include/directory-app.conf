directory-app {
  include required("scan-client")
  storage {
    type = postgres
    config {
      dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
      properties = {
        serverName = "localhost"
        serverName = ${?POSTGRES_HOST}
        portNumber = "5432"
        portNumber = ${?POSTGRES_PORT}
        databaseName = "cn_apps"
        user = "canton"
        user = ${?POSTGRES_USER}
        password = "supersafe"
        password = ${?POSTGRES_PASSWORD}
      }
    }
  }
  admin-api.port = 5110
  admin-api.address = 0.0.0.0
  participant-client = {
    admin-api.port = 5002
    ledger-api.client-config.port = 5001
    ledger-api.auth-config.type = "none"
  }
  sv-user = "sv1"
  domains {
    global {
      alias = "global"
    }
  }
}
