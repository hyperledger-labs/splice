canton {
  sv-apps {
    sv2 { include required("svs/sv2") }
    sv3 { include required("svs/sv3") }
    sv4 { include required("svs/sv4") }
  }

  validator-apps {
    sv2Validator { include required("validators/sv2-validator") }
    sv3Validator { include required("validators/sv3-validator") }
    sv4Validator { include required("validators/sv4-validator") }
  }

  scan-apps {
    sv2Scan { include required("scans/sv2-scan") }
  }

  wallet-app-clients {
      sv2Wallet {
        ledger-api-user = ${canton.validator-apps.sv2Validator.validator-wallet-user}
        admin-api {
          url = "http://127.0.0.1:5203"
        }
      }
      sv3Wallet {
        ledger-api-user = ${canton.validator-apps.sv3Validator.validator-wallet-user}
        admin-api {
          url = "http://127.0.0.1:5303"
        }
      }
      sv4Wallet {
        ledger-api-user = ${canton.validator-apps.sv4Validator.validator-wallet-user}
        admin-api {
          url = "http://127.0.0.1:5403"
        }
      }
  }
}
