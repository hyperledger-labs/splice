providerSplitwellBackend {
  include required("../scan-client")
  storage.type = memory
  admin-api.address = 0.0.0.0
  admin-api.port = 5113
  participant-client = ${canton.validator-apps.splitwellValidator.participant-client}
  provider-user = "splitwell_provider"
  domains {
    global {
      alias = "global"
    }
    splitwell = {
      preferred {
        alias = "splitwell"
      }
      others = []
    }
  }
}
