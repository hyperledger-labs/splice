{
  storage.type = memory
  participant-client = {
    admin-api.port = 5002
    ledger-api.client-config.port = 5001
    ledger-api.auth-config.type = "none" # we override this via config transform
  }
  auth {
    algorithm = "hs-256-unsafe"
    audience = "https://canton.network.global"
    secret = "test"
  }
  domains {
    global {
      alias = "global"
      url = "http://localhost:5008"
    }
  }
  automation {
    # coin expiry and unclaimed reward expiry are not problematic in our tests environments as participants do not go offline.
    # TODO(M3-63) Currently, auto-expiration of unclaimed rewards and coin expiry is disabled by default
    enable-expire-coin = true
    enable-unclaimed-reward-expiration = true

    # TODO(#7649) revise and/or remove
    enable-leader-replacement-trigger = true

    # CometBFT reconciliation is disabled by default as it would destabilize the CometBFT network by reflecting the
    # SVCRules state in the topology of the CometBFT network, therefore nodes would be added and remove as validators quite often,
    # leading to a very slow CometBFT network
    enable-cometbft-reconciliation = false
  }
}
