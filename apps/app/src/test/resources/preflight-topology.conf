canton {
    sv-app-clients {
        sv1.admin-api {
            url = "https://sv.sv-1.svc."${NETWORK_APPS_ADDRESS}"/api/v0/sv"
        }

        sv2.admin-api {
            url = "https://sv.sv-2.svc."${NETWORK_APPS_ADDRESS}"/api/v0/sv"
        }

        sv3.admin-api {
            url = "https://sv.sv-3.svc."${NETWORK_APPS_ADDRESS}"/api/v0/sv"
        }

        sv4.admin-api {
            url = "https://sv.sv-4.svc."${NETWORK_APPS_ADDRESS}"/api/v0/sv"
        }
    }

    validator-app-clients {
        validator1 {
            admin-api {
                url = "https://wallet.validator1."${NETWORK_APPS_ADDRESS}"/api/v0/validator"
            }
        }

        sv1Validator {
            admin-api {
                url = "https://wallet.sv-1.svc."${NETWORK_APPS_ADDRESS}"/api/v0/validator"
            }
        }

        splitwellValidator {
            admin-api {
                url = "https://wallet.splitwell."${NETWORK_APPS_ADDRESS}"/api/v0/validator"
            }
        }

        svValidator {
            admin-api {
                url = "https://wallet.sv.svc."${NETWORK_APPS_ADDRESS}"/api/v0/validator"
            }
        }
    }

    scan-app-clients {
        sv1Scan {
            admin-api.url = "https://scan.sv-1.svc."${NETWORK_APPS_ADDRESS}"/api/v0/scan"
        }
    }

    directory-app-clients {
        sv1Directory {
            ledger-api-user = "unused",
            admin-api.url = "https://directory.sv-1.svc."${NETWORK_APPS_ADDRESS}"/api/v0/directory"
            ledger-api {
                client-config.port = 0,
                auth-config {
                    type = "none"
                }
            }
        }
    }

    splitwell-app-clients {
        splitwell {
            scan-client.admin-api.url = "https://scan.sv-1.svc."${NETWORK_APPS_ADDRESS}"/api/v0/scan"
            admin-api {
                port = 5213
                address = ${NETWORK_APPS_ADDRESS}
            }

            # unused configuration
            participant-client {
                admin-api.port = 0
                ledger-api {
                    client-config.port = 0
                    auth-config {
                        type = "none"
                    }
                }
            }
            ledger-api-user = "unused"
        }

    }

}
