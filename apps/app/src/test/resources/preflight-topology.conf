_sv {
    admin-api {
        port = 0 # not bothering with the health endpoint ATM, we'll switch that to http as well
    }
}

canton {
    sv-app-clients {
        sv1 = ${_sv}
        sv2 = ${_sv}
        sv3 = ${_sv}
        sv4 = ${_sv}
        sv1.admin-api.url = "https://sv-app.sv-1.svc."${NETWORK_APPS_ADDRESS}":5014"
        sv2.admin-api.url = "https://sv-app.sv-2.svc."${NETWORK_APPS_ADDRESS}":5114"
        sv3.admin-api.url = "https://sv-app.sv-3.svc."${NETWORK_APPS_ADDRESS}":5214"
        sv4.admin-api.url = "https://sv-app.sv-4.svc."${NETWORK_APPS_ADDRESS}":5314"
    }
    validator-app-clients {
        validator1 {
            admin-api {
                port = 0 # not bothering with the health endpoint ATM, we'll switch that to http as well
                url = "https://wallet.validator1."${NETWORK_APPS_ADDRESS}"/api/v0/validator"
            }
        }
    }
}
