# Extra global-upgrade domain.
include required("include/canton-basic.conf")
include required("include/sequencers.conf")
include required("include/mediators.conf")

_globalUpgradeSequencer_client {
  public-api.port = 15908
  admin-api.port = 15909
}

_globalUpgradeMediator_client {
  admin-api.port = 15907
}

canton {
  parameters {
    non-standard-config = yes
    dev-version-support = yes
  }
  sequencers-x {
    globalUpgradeSequencer = ${_sequencer_reference_template} ${_globalUpgradeSequencer_client}
    globalUpgradeSequencer.storage.config.properties.databaseName = "sequencer_global_upgrade_1_simtime"
    globalUpgradeSequencer.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_upgrade_simtime"
  }
  mediators-x {
    globalUpgradeMediator = ${_mediator_template} ${_globalUpgradeMediator_client}
    globalUpgradeMediator.storage.config.properties.databaseName = "mediator_global_upgrade_1_simtime"
  }
}
