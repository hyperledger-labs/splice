# Extra global-upgrade domain.
include "global-upgrade-domain-node.conf"

_globalUpgradeSequencer_client {
  public-api.port = 15908
  admin-api.port = 15909
}

_globalUpgradeMediator_client {
  admin-api.port = 15907
}

canton {
  sequencers-x {
    globalUpgradeSequencer.storage.config.properties.databaseName = "sequencer_global_upgrade_simtime"
    globalUpgradeSequencer.sequencer.config.storage.config.properties.databaseName = "sequencer_driver_global_upgrade_simtime"
  }
  mediators-x {
    globalUpgradeMediator.storage.config.properties.databaseName = "mediator_global_upgrade_simtime"
  }
}
