openapi: 3.0.0
info:
  title: Validator API
  version: 0.0.1
tags:
  - name: validator
paths:
  /readyz:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1readyz"
  /livez:
    $ref: "../../../../common/src/main/openapi/common-external.yaml#/paths/~1livez"
  /validator-user:
    get:
      tags: [validatorPublic]
      x-jvm-package: validatorPublic
      operationId: "getValidatorUserInfo"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetValidatorUserInfoResponse"
  /register:
    post:
      tags: [validator]
      x-jvm-package: validator
      operationId: "register"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RegistrationRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/RegistrationResponse"

  /admin/users:
    post:
      tags: [validator]
      x-jvm-package: validatorAdmin
      operationId: "onboardUser"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardUserRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OnboardUserResponse"

    get:
      tags: [validator]
      x-jvm-package: validatorAdmin
      operationId: "listUsers"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListUsersResponse"

  /admin/users/offboard:
    post:
      tags: [validator]
      x-jvm-package: validatorAdmin
      operationId: "offboardUser"
      parameters:
        - in: query
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"

  /admin/participant/identities:
    get:
      tags: [validator]
      x-jvm-package: validatorAdmin
      operationId: "dumpParticipantIdentities"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "../../../../common/src/main/openapi/common-internal.yaml#/components/schemas/ParticipantIdentitiesDump"

  /app-manager/apps/installed/{provider}/authorize:
    post:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "authorizeApp"
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                user_id:
                  type: string
              required:
                - user_id
      responses:
        200:
          description: ok"

  /app-manager/apps/installed/{provider}/check-authorizization:
    post:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "checkAppAuthorized"
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                redirect_uri:
                  type: string
                state:
                  type: string
                user_id:
                  type: string
              required:
                - redirect_uri
                - state
                - user_id
      responses:
        200:
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CheckAppAuthorizedResponse"
        403:
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/403"

  /app-manager/oauth2/.well-known/openid-configuration:
    get:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "oauth2OpenIDConfiguration"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OpenIDConfigurationResponse"
  /app-manager/oauth2/.well-known/jwks.json:
    get:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "oauth2Jwks"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/JwksResponse"
  /app-manager/oauth2/token:
    post:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "oauth2Token"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                code:
                  type: string
                redirect_uri:
                  type: string
                client_id:
                  type: string
              required:
                - grant_type
                - code
                - redirect_uri
                - client_id
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TokenResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"

  /app-manager/apps/installed:
    get:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "listInstalledApps"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListInstalledAppsResponse"
  /app-manager/apps/install:
    post:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "installApp"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/InstallAppRequest"
      responses:
        "201":
          description: ok
        "409":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/409"

  /app-manager/apps/registered:
    get:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "listRegisteredApps"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListRegisteredAppsResponse"
  /app-manager/apps/registered/{provider}/configuration/latest/configuration.json:
    get:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "getLatestAppConfiguration"
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AppConfiguration"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /app-manager/apps/registered/{provider}/release/{version}/release.json:
    get:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "getAppRelease"
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AppRelease"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /app-manager/dars/{dar_hash}:
    get:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "getDarFile"
      parameters:
        - name: dar_hash
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DarFile"
        "404":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/404"
  /app-manager/apps/register:
    post:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "registerApp"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - provider_user_id
                - name
                - ui_url
                - domains
                - release
              properties:
                # TODO(#6839) Read this from the token once we have auth.
                provider_user_id:
                  type: string
                name:
                  type: string
                ui_url:
                  type: string
                # Guardrail generates garbage when
                # trying to use an object here so we pass a JSON encoded string.
                domains:
                  type: string
                release:
                  type: string
                  format: binary
      responses:
        "201":
          description: ok
        "409":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/409"
        "400":
          $ref: "../../../../common/src/main/openapi/common-external.yaml#/components/responses/400"

  # We proxy the JSON API here to set CORS headers.
  # TODO(#6839) Consider exposing these as /app-manager/v1 instead.This would make it a bit
  # harder to build the proxy because we need to do a URL rewrite.
  /v1/user:
    post:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "jsonApiUser"
      parameters:
        - in: header
          name: authorization
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
  /v1/query:
    post:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "jsonApiQuery"
      parameters:
        - in: header
          name: authorization
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
  /v1/create:
    post:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "jsonApiCreate"
      parameters:
        - in: header
          name: authorization
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
  /v1/exercise:
    post:
      tags: [appManager]
      x-jvm-package: appManager
      operationId: "jsonApiExercise"
      parameters:
        - in: header
          name: authorization
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    OnboardUserRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    OnboardUserResponse:
      type: object
      required:
        - party_id
      properties:
        party_id:
          type: string

    RegistrationRequest:
      type: object
      nullable: true

    RegistrationResponse:
      type: object
      required:
        - party_id
      properties:
        party_id:
          type: string

    GetValidatorUserInfoResponse:
      type: object
      required:
        - party_id
        - user_name
        - featured
      properties:
        party_id:
          type: string
        user_name:
          type: string
        featured:
          type: boolean

    ListUsersResponse:
      type: object
      required:
        - usernames
      properties:
        usernames:
          type: array
          items:
            type: string

    CheckAppAuthorizedResponse:
      type: object
      required:
        - redirect_uri
      properties:
        redirect_uri:
          type: string

    OpenIDConfigurationResponse:
      type: object
      required:
        - issuer
        - authorization_endpoint
        - token_endpoint
        - jwks_uri
      properties:
        issuer:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        jwks_uri:
          type: string

    JwksResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            "$ref": "#/components/schemas/Jwk"
      required:
        - keys

    Jwk:
      type: object
      properties:
        kid:
          type: string
        kty:
          type: string
        alg:
          type: string
        use:
          type: string
        n:
          type: string
        e:
          type: string
      required:
        - kid
        - kty
        - alg
        - use
        - n
        - e

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        # TODO(#6839): consider adding expires_in, refresh_token, scope
      required:
        - access_token
        - token_type

    ListInstalledAppsResponse:
      type: object
      required:
        - apps
      properties:
        apps:
          type: array
          items:
            "$ref": "#/components/schemas/InstalledApp"

    ListRegisteredAppsResponse:
      type: object
      required:
        - apps
      properties:
        apps:
          type: array
          items:
            "$ref": "#/components/schemas/RegisteredApp"

    InstalledApp:
      type: object
      required:
        - provider
        - name
        - url
      properties:
        provider:
          type: string
        name:
          type: string
        url:
          type: string

    RegisteredApp:
      type: object
      required:
        - provider
        - name
        - app_url
      properties:
        provider:
          type: string
        name:
          type: string
        app_url:
          type: string

    AppConfiguration:
      type: object
      required:
        - version
        - name
        - ui_url
        - domains
        - release_configurations
      properties:
        version:
          type: integer
          format: int64
        name:
          type: string
        ui_url:
          type: string
        release_configurations:
          description: "Multiple release configurations are used to support rolling upgrades."
          type: array
          items:
            $ref: "#/components/schemas/ReleaseConfiguration"

    ReleaseConfiguration:
      type: object
      required:
        - domains
        - release_version
        - required_for
      properties:
        domains:
          type: array
          items:
            $ref: "#/components/schemas/Domain"
        release_version:
          type: string
        required_for:
          $ref: "#/components/schemas/Timespan"

    Timespan:
      type: object
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time

    AppRelease:
      type: object
      required:
        - version
        - dar_hashes
      properties:
        version:
          type: string
        dar_hashes:
          type: array
          items:
            type: string

    # The file used in the bundle on upload
    # TODO(#6839) Consider using AppRelease instead and compute
    # hashes as part of bundling. Note that this is non-trivial
    # since it's not just a sha256sum of the DAR file itself. It includes
    # the purpose which isn't easy to replicate in bash.
    AppReleaseUpload:
      type: object
      required:
        - version
      properties:
        version:
          type: string

    Domain:
      type: object
      required:
        - alias
        - url
      properties:
        alias:
          type: string
        url:
          type: string

    DarFile:
      type: object
      required:
        - base64_dar
      properties:
        # base64 because guardrail doesn't support generating binary files on the client side
        base64_dar:
          type: string

    InstallAppRequest:
      type: object
      required:
        - app_url
      properties:
        app_url:
          type: string
