openapi: 3.0.0
info:
  title: Validator API
  version: 0.0.1
tags:
  - name: validator
paths:
  /readyz:
    $ref: "../../../../common/src/main/openapi/common.yaml#/paths/~1readyz"
  /livez:
    $ref: "../../../../common/src/main/openapi/common.yaml#/paths/~1livez"
  /validator-user:
    get:
      tags: [validator]
      x-jvm-package: validator
      operationId: "getValidatorUserInfo"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GetValidatorUserInfoResponse"
  /register:
    post:
      tags: [validator]
      x-jvm-package: validator
      operationId: "register"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/RegistrationRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/RegistrationResponse"

  /admin/users:
    post:
      tags: [validator]
      x-jvm-package: validatorAdmin
      operationId: "onboardUser"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/OnboardUserRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/OnboardUserResponse"

    get:
      tags: [validator]
      x-jvm-package: validatorAdmin
      operationId: "listUsers"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ListUsersResponse"

  /admin/users/offboard:
    post:
      tags: [validator]
      x-jvm-package: validatorAdmin
      operationId: "offboardUser"
      parameters:
        - in: query
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"

  /admin/participant/identities:
    get:
      tags: [validator]
      x-jvm-package: validatorAdmin
      operationId: "dumpParticipantIdentities"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "../../../../common/src/main/openapi/common.yaml#/components/schemas/ParticipantIdentitiesDump"

components:
  schemas:
    OnboardUserRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    OnboardUserResponse:
      type: object
      required:
        - party_id
      properties:
        party_id:
          type: string

    RegistrationRequest:
      type: object
      nullable: true

    RegistrationResponse:
      type: object
      required:
        - party_id
      properties:
        party_id:
          type: string

    GetValidatorUserInfoResponse:
      type: object
      required:
        - party_id
        - user_name
      properties:
        party_id:
          type: string
        user_name:
          type: string

    ListUsersResponse:
      type: object
      required:
        - usernames
      properties:
        usernames:
          type: array
          items:
            type: string
