openapi: 3.0.0
info:
  title: Wallet API
  version: 0.0.1
tags:
  - name: external
  - name: wallet
paths:
  /wallet/user-status:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "userStatus"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStatusResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/coins:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "list"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/tap:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "tap"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TapRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TapResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "429":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/429"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
        "503":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/503"

  /wallet/self-grant-feature-app-right:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "selfGrantFeatureAppRight"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/SelfGrantFeaturedAppRightRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SelfGrantFeaturedAppRightResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/balance:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "getBalance"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBalanceResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/app-payment-requests:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listAppPaymentRequests"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppPaymentRequestsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/app-payment-requests/{contract_id}:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "getAppPaymentRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPaymentRequest"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/app-payment-requests/{contract_id}/accept:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "acceptAppPaymentRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptAppPaymentRequestResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "429":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/429"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
        "503":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/503"
  /wallet/app-payment-requests/{contract_id}/reject:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "rejectAppPaymentRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/accepted-app-payments:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listAcceptedAppPayments"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAcceptedAppPaymentsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/subscription-requests:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listSubscriptionRequests"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubscriptionRequestsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/subscription-initial-payments:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listSubscriptionInitialPayments"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubscriptionInitialPaymentsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/subscriptions:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listSubscriptions"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubscriptionsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/subscription-requests/{contract_id}/accept:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "acceptSubscriptionRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptSubscriptionRequestResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "429":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/429"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
        "503":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/503"
  /wallet/subscription-requests/{contract_id}/reject:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "rejectSubscriptionRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/subscription-requests/{contract_id}:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "getSubscriptionRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionRequest"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
    delete:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "cancelSubscriptionRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/transfer-offers:
    post:
      tags: [wallet, external]
      x-jvm-package: wallet
      operationId: "createTransferOffer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateTransferOfferRequest"
      responses:
        "200":
          description: The transfer offer has been created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTransferOfferResponse"
        "400":
          description: |
            Invalid request, check the error response for details.
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          description: |
            The submitter’s wallet could not be found.
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "409":
          description:
            A transfer offer with the same tracking id has been created. Check the
            status endpoint for the current status.
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/409"
        "429":
          description:
            A transfer offer with the same tracking id is currently being processed,
            which may or may not succeed. Retry submitting the request with exponential
            back-off.
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/429"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
    get:
      tags: [wallet, external]
      x-jvm-package: wallet
      operationId: "listTransferOffers"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTransferOffersResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/transfer-offers/{tracking_id}/status:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "getTransferOfferStatus"
      parameters:
        - in: path
          name: tracking_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: An offer with this tracking id is known. Check the response for its status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTransferOfferStatusResponse"
        "404":
          description: |
            No offer with this tracking id is known.
            Perhaps it has not yet been submitted or processed; or it has been submitted
            in the past before the current beginning of the wallet transaction log.
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
  /wallet/transfer-offers/{contract_id}/reject:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "rejectTransferOffer"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/transfer-offers/{contract_id}/accept:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "acceptTransferOffer"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptTransferOfferResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/transfer-offers/{contract_id}/withdraw:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "withdrawTransferOffer"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/accepted-transfer-offers:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listAcceptedTransferOffers"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAcceptedTransferOffersResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/app-reward-coupons:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listAppRewardCoupons"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppRewardCouponsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/validator-reward-coupons:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listValidatorRewardCoupons"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListValidatorRewardCouponsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/cancel-featured-app-rights:
    delete:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "cancelFeaturedAppRights"
      responses:
        "200":
          description: ok
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /wallet/transactions:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listTransactions"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ListTransactionsRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTransactionsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
components:
  schemas:
    UserStatusResponse:
      type: object
      required:
        - party_id
        - user_onboarded
        - user_wallet_installed
        - has_featured_app_right
      properties:
        party_id:
          type: string
        user_onboarded:
          type: boolean
        user_wallet_installed:
          type: boolean
        has_featured_app_right:
          type: boolean

    ListResponse:
      type: object
      required:
        - coins
        - locked_coins
      properties:
        coins:
          type: array
          items:
            $ref: "#/components/schemas/CoinPosition"
        locked_coins:
          type: array
          items:
            $ref: "#/components/schemas/CoinPosition"

    CoinPosition:
      type: object
      required:
        - contract
        - round
        - accrued_holding_fee
        - effective_amount
      properties:
        contract:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        round:
          type: integer
          format: int64
        accrued_holding_fee:
          type: string
        effective_amount:
          type: string

    TapRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: string

    TapResponse:
      type: object
      required:
        - contract_id
      properties:
        contract_id:
          type: string

    SelfGrantFeaturedAppRightRequest:
      type: object
      nullable: true

    SelfGrantFeaturedAppRightResponse:
      type: object
      required:
        - contract_id
      properties:
        contract_id:
          type: string

    GetBalanceResponse:
      type: object
      required:
        - round
        - effective_unlocked_qty
        - effective_locked_qty
        - total_holding_fees
      properties:
        round:
          type: integer
          format: int64
        effective_unlocked_qty:
          type: string
        effective_locked_qty:
          type: string
        total_holding_fees:
          type: string

    AppPaymentRequest:
      type: object
      required:
        - appPaymentRequest
        - deliveryOffer
      properties:
        appPaymentRequest:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        deliveryOffer:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListAppPaymentRequestsResponse:
      type: object
      required:
        - payment_requests
      properties:
        payment_requests:
          type: array
          items:
            $ref: "#/components/schemas/AppPaymentRequest"

    AcceptAppPaymentRequestRequest:
      type: object
      required:
        - request_contract_id
      properties:
        request_contract_id:
          type: string

    AcceptAppPaymentRequestResponse:
      type: object
      required:
        - accepted_payment_contract_id
      properties:
        accepted_payment_contract_id:
          type: string

    RejectAppPaymentRequestRequest:
      type: object
      required:
        - request_contract_id
      properties:
        request_contract_id:
          type: string

    ListAcceptedAppPaymentsResponse:
      type: object
      required:
        - accepted_app_payments
      properties:
        accepted_app_payments:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListSubscriptionRequestsResponse:
      type: object
      required:
        - subscription_requests
      properties:
        subscription_requests:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionRequest"

    ListSubscriptionInitialPaymentsResponse:
      type: object
      required:
        - initial_payments
      properties:
        initial_payments:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    SubscriptionRequest:
      type: object
      required:
        - subscriptionRequest
        - context
      properties:
        subscriptionRequest:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        context:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    Subscription:
      type: object
      required:
        - subscription
        - state
        - context
      properties:
        subscription:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        state:
          $ref: "#/components/schemas/SubscriptionState"
        context:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    SubscriptionState:
      type: object
      properties:
        idle:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        payment:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListSubscriptionsResponse:
      type: object
      required:
        - subscriptions
      properties:
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"

    AcceptSubscriptionRequestResponse:
      type: object
      required:
        - initial_payment_contract_id
      properties:
        initial_payment_contract_id:
          type: string

    CreateTransferOfferRequest:
      type: object
      required:
        - receiver_party_id
        - amount
        - description
        - expires_at
        - tracking_id
      properties:
        receiver_party_id:
          type: string
        amount:
          type: string
        description:
          type: string
        expires_at:
          description: |
            Expiry time of the transfer offer as unix timestamp in microseconds. After this time, the offer can no longer be accepted
            and automation in the wallet will eventually expire the tranfer offer.
            Note that this time is compared against the ledger effective time of the Daml transaction accepting or expiring an offer, and can skew from the wall clock
            time measured on the caller's machine. See https://docs.daml.com/concepts/time.html
            for how ledger effective time is bound to the record time of a transaction on a domain.
          type: integer
          format: int64
        tracking_id:
          description: |
            tracking id to support exactly once submission. Once submitted, all succeessive calls with the same tracking id
            will get rejected with a 409 or 429 status code unless the command fails and the offer did not get created.
            Clients should create a fresh tracking id when they try to create a new transfer offer. If that command submission fails
            with a retryable error or the application crashed and got restarted, successive command submissions must reuse the same
            tracking id to ensure they don't create the same offer multiple times.
          type: string

    GetTransferOfferStatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          description: |
            The status of the transfer offer.
            created:
              The offer has been created and is waiting for the receiver to accept it.
              contract_id points to the contract_id of the offer and transaction_id to the transaction that created it.
            accepted:
              The offer has been accepted by the receiver and is waiting for the wallet automation
              to complete it by delivering the offered CC.
              contract_id points to the contract id of the accepted offer and transaction_id to the transaction that accepted it
            completed:
              The transfer has been completed and the CC amount has been transferred to the receiver.
              contract_id points to the contract id of the created coin and transaction_id to the transaction of the transfer.
            failed:
              The transfer has failed permanently and no CC has been transferred. Refer to
              failure_reason for details. A new transfer offer can be created with a different tracking_id.
          type: string
          enum:
            - created
            - accepted
            - completed
            - failed
        transaction_id:
          type: string
          description: |
            Set for created, accepted and completed but not for failed. Refer to the description of status
            for the transaction this references.
        contract_id:
          type: string
          description: |
            Set for created, accepted and completed but not for failed. Refer to the description of status
            for the contract id this references.
        failure_kind:
          type: string
          description: |
            The reason for the failure of the transfer offer.
            expired:
              The transfer offer or the accepted transfer offer expired before it could be completed.
            rejected:
              The receiver rejected the transfer offer or withdraw their accepted offer.
            withdrawn:
              The sender withdraw their offer, e.g., due to insufficient funds or operational reasons.
          enum:
            - expired
            - rejected
            - withdrawn
        withdrawn_reason:
          type: string
          description: |
            Human readable description of the reason for the sender withdrawing their offer.

