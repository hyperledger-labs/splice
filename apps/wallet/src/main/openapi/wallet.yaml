openapi: 3.0.0
info:
  title: Wallet API
  version: 0.0.1
tags:
  - name: wallet
paths:
  /user-status:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "userStatus"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStatusResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /coins:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "list"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /tap:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "tap"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TapRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TapResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "429":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/429"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
        "503":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/503"

  /self-grant-feature-app-right:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "selfGrantFeatureAppRight"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/SelfGrantFeaturedAppRightRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SelfGrantFeaturedAppRightResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /balance:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "getBalance"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBalanceResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /app-payment-requests:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listAppPaymentRequests"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppPaymentRequestsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /app-payment-requests/{contract_id}:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "getAppPaymentRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPaymentRequest"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /app-payment-requests/{contract_id}/accept:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "acceptAppPaymentRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptAppPaymentRequestResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "429":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/429"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
        "503":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/503"
  /app-payment-requests/{contract_id}/reject:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "rejectAppPaymentRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /accepted-app-payments:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listAcceptedAppPayments"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAcceptedAppPaymentsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /subscription-requests:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listSubscriptionRequests"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubscriptionRequestsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /subscription-initial-payments:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listSubscriptionInitialPayments"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubscriptionInitialPaymentsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /subscriptions:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listSubscriptions"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubscriptionsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /subscription-requests/{contract_id}/accept:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "acceptSubscriptionRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptSubscriptionRequestResponse"
        "400":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/400"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "429":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/429"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
        "503":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/503"
  /subscription-requests/{contract_id}/reject:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "rejectSubscriptionRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /subscription-requests/{contract_id}:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "getSubscriptionRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionRequest"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
    delete:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "cancelSubscriptionRequest"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /transfer-offers:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "createTransferOffer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateTransferOfferRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTransferOfferResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "409":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/409"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listTransferOffers"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTransferOffersResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /transfer-offers/{contract_id}/reject:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "rejectTransferOffer"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /transfer-offers/{contract_id}/accept:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "acceptTransferOffer"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptTransferOfferResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /transfer-offers/{contract_id}/withdraw:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "withdrawTransferOffer"
      parameters:
        - in: path
          name: contract_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /accepted-transfer-offers:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listAcceptedTransferOffers"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAcceptedTransferOffersResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /app-reward-coupons:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listAppRewardCoupons"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppRewardCouponsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /validator-reward-coupons:
    get:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listValidatorRewardCoupons"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListValidatorRewardCouponsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /cancel-featured-app-rights:
    delete:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "cancelFeaturedAppRights"
      responses:
        "200":
          description: ok
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
  /transactions:
    post:
      tags: [wallet]
      x-jvm-package: wallet
      operationId: "listTransactions"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ListTransactionsRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTransactionsResponse"
        "404":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/404"
        "500":
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/responses/500"
components:
  schemas:
    UserStatusResponse:
      type: object
      required:
        - party_id
        - user_onboarded
        - has_featured_app_right
      properties:
        party_id:
          type: string
        user_onboarded:
          type: boolean
        has_featured_app_right:
          type: boolean

    ListResponse:
      type: object
      required:
        - coins
        - locked_coins
      properties:
        coins:
          type: array
          items:
            $ref: "#/components/schemas/CoinPosition"
        locked_coins:
          type: array
          items:
            $ref: "#/components/schemas/CoinPosition"

    CoinPosition:
      type: object
      required:
        - contract
        - round
        - accrued_holding_fee
        - effective_amount
      properties:
        contract:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        round:
          type: integer
          format: int64
        accrued_holding_fee:
          type: string
        effective_amount:
          type: string

    TapRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: string

    TapResponse:
      type: object
      required:
        - contract_id
      properties:
        contract_id:
          type: string

    SelfGrantFeaturedAppRightRequest:
      type: object
      nullable: true

    SelfGrantFeaturedAppRightResponse:
      type: object
      required:
        - contract_id
      properties:
        contract_id:
          type: string

    GetBalanceResponse:
      type: object
      required:
        - round
        - effective_unlocked_qty
        - effective_locked_qty
        - total_holding_fees
      properties:
        round:
          type: integer
          format: int64
        effective_unlocked_qty:
          type: string
        effective_locked_qty:
          type: string
        total_holding_fees:
          type: string

    AppPaymentRequest:
      type: object
      required:
        - appPaymentRequest
        - deliveryOffer
      properties:
        appPaymentRequest:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        deliveryOffer:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListAppPaymentRequestsResponse:
      type: object
      required:
        - payment_requests
      properties:
        payment_requests:
          type: array
          items:
            $ref: "#/components/schemas/AppPaymentRequest"

    AcceptAppPaymentRequestRequest:
      type: object
      required:
        - request_contract_id
      properties:
        request_contract_id:
          type: string

    AcceptAppPaymentRequestResponse:
      type: object
      required:
        - accepted_payment_contract_id
      properties:
        accepted_payment_contract_id:
          type: string

    RejectAppPaymentRequestRequest:
      type: object
      required:
        - request_contract_id
      properties:
        request_contract_id:
          type: string

    ListAcceptedAppPaymentsResponse:
      type: object
      required:
        - accepted_app_payments
      properties:
        accepted_app_payments:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListSubscriptionRequestsResponse:
      type: object
      required:
        - subscription_requests
      properties:
        subscription_requests:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionRequest"

    ListSubscriptionInitialPaymentsResponse:
      type: object
      required:
        - initial_payments
      properties:
        initial_payments:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    SubscriptionRequest:
      type: object
      required:
        - subscriptionRequest
        - context
      properties:
        subscriptionRequest:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        context:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    Subscription:
      type: object
      required:
        - subscription
        - state
        - context
      properties:
        subscription:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        state:
          $ref: "#/components/schemas/SubscriptionState"
        context:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
    SubscriptionState:
      type: object
      properties:
        idle:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"
        payment:
          $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListSubscriptionsResponse:
      type: object
      required:
        - subscriptions
      properties:
        subscriptions:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"

    AcceptSubscriptionRequestResponse:
      type: object
      required:
        - initial_payment_contract_id
      properties:
        initial_payment_contract_id:
          type: string

    CreateTransferOfferRequest:
      type: object
      required:
        - receiver_party_id
        - amount
        - description
        - expires_at
        - idempotency_key
      properties:
        receiver_party_id:
          type: string
        amount:
          type: string
        description:
          type: string
        expires_at:
          type: integer
          format: int64
        idempotency_key:
          type: string

    CreateTransferOfferResponse:
      type: object
      required:
        - offer_contract_id
      properties:
        offer_contract_id:
          type: string

    ListTransferOffersResponse:
      type: object
      required:
        - offers
      properties:
        offers:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    AcceptTransferOfferResponse:
      type: object
      required:
        - accepted_offer_contract_id
      properties:
        accepted_offer_contract_id:
          type: string

    ListAcceptedTransferOffersResponse:
      type: object
      required:
        - accepted_offers
      properties:
        accepted_offers:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListAppRewardCouponsResponse:
      type: object
      required:
        - app_reward_coupons
      properties:
        app_reward_coupons:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListValidatorRewardCouponsResponse:
      type: object
      required:
        - validator_reward_coupons
      properties:
        validator_reward_coupons:
          type: array
          items:
            $ref: "../../../../common/src/main/openapi/common.yaml#/components/schemas/Contract"

    ListTransactionsRequest:
      type: object
      required:
        - page_size
      properties:
        begin_after_id:
          type: string
        page_size:
          type: integer
          format: int64

    PartyAndAmount:
      type: object
      required:
        - party
        - amount
      properties:
        party:
          type: string
        amount:
          type: string

    ListTransactionsResponseItem:
      type: object
      required:
        - transaction_type
        - event_id
        - offset
        - date
      properties:
        # Note: our codegen does not support oneOf. The property transaction_type should be a discriminator for a sum type.
        # Supported transaction types:
        # - 'transfer', with fields: provider, sender, receivers, holding_fees, coin_price
        # - 'balance_change', with fields: receivers, coin_price
        transaction_type:
          type: string
        event_id:
          type: string
        offset:
          type: string
        date:
          type: string
          format: date-time
        provider:
          type: string
        sender:
          $ref: "#/components/schemas/PartyAndAmount"
        receivers:
          type: array
          items:
            $ref: "#/components/schemas/PartyAndAmount"
        holding_fees:
          type: string
        coin_price:
          type: string

    ListTransactionsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ListTransactionsResponseItem"
