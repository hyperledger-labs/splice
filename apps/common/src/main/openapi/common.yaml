openapi: 3.0.0
info:
  title: Common schemas for CN API definitions
  version: 0.0.1
paths:
  /status:
    get:
      tags: [common]
      x-jvm-package: commonAdmin
      operationId: "getHealthStatus"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/NodeStatus"
  /version:
    get:
      tags: [common]
      x-jvm-package: commonAdmin
      operationId: "getVersion"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Version"
components:
  responses:
    "400":
      description: "bad request"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "401":
      description: "unauthorized"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "403":
      description: "forbidden"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "404":
      description: "not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "409":
      description: "conflict"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "429":
      description: "too many requests"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "500":
      description: "internal server error"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "501":
      description: "not implemented"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    "503":
      description: "service unavailable"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ContractMetadata:
      type: object
      required: ["createdAt", "driverMetadata", "contractKeyHash"]
      properties:
        createdAt:
          type: string # micros since EPOCH
          # Javascript has no support for sub milisecond dates (nor do third-party libs) so
          # we send micros rather than a human readable string that would need to be parsed.
          # Represented as a string since openapi-generator does not handle `format: int64`
        contractKeyHash:
          type: string # base-16 encoded.
        driverMetadata:
          type: string # base-16 encoded.

    Contract:
      type: object
      properties:
        template_id:
          type: string
        contract_id:
          type: string
        payload:
          type: object
        metadata:
          $ref: "#/components/schemas/ContractMetadata"
        create_arguments_blob:
          type: string # base-16 encoded.
      required:
        [
          "template_id",
          "contract_id",
          "payload",
          "metadata",
          "create_arguments_blob",
        ]
    ContractId:
      type: string
    # Represents a contract that is maybe already cached by the client. If the client sends along a contract-id that
    # matches the contract the server would respond with, the server responds with an empty contract property to indicate
    # that the client's cache is correct.
    MaybeCachedContract:
      type: object
      properties:
        contract:
          $ref: "#/components/schemas/Contract"
    # As with MaybeCachedContract, but additionally with a "state", which is either
    # a domain indicating the contract is on that domain or nothing for an in-flight
    # contract.  With an unmatching contract-id, this response will include both a
    # contract-id and a state.  However, the domain will always reflect the contract's
    # current state, even if the contract-id matches; either the domain echoed back if
    # it has not changed, or missing if it is in-flight.
    MaybeCachedContractWithState:
      type: object
      properties:
        contract:
          $ref: "#/components/schemas/Contract"
        domain_id:
          type: string
    # A map from 'active-contract-id' -> 'MaybeCachedContract'.
    # At the moment this type is used to let clients know which mining rounds they already have cached,
    # which mining rounds they should add to their cache and which they should remove from their cache
    # (those mining rounds who aren't included in the map at all).
    MaybeCachedContractMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/MaybeCachedContract"
    # Status definition for health endpoint
    Status:
      type: object
      required:
        - "id"
        - "uptime"
        - "ports"
        - "active"
      properties:
        id:
          type: string
        uptime:
          type: string
        ports:
          type: object
          additionalProperties:
            type: integer
            format: int32
        extra:
          type: string
          format: binary
        active:
          type: boolean
    # NotInitialized definition for health endpoint
    NotInitialized:
      type: object
      required: ["active"]
      properties:
        active:
          type: boolean
    NodeStatus:
      type: object
      properties:
        not_initialized:
          $ref: "#/components/schemas/NotInitialized"
        success:
          $ref: "#/components/schemas/Status"
    Version:
      type: object
      required: ["version", "commit_ts"]
      properties:
        version:
          type: string
        commit_ts:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
