# SV local state that only has the SV as a stakeholder
sdk-version: 2.9.0-snapshot.20231221.12524.0.vc998203f
name: sv-local
source: daml
version: 0.1.0
dependencies:
  - daml-prim
  - daml-stdlib
  - daml3-script
data-dependencies:
build-options:
  - --ghc-option=-Wunused-binds
  - --ghc-option=-Wunused-matches
