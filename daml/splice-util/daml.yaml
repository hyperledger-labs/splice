sdk-version: 3.4.11
name: splice-util
source: daml
version: 0.1.5
dependencies:
  - daml-prim
  - daml-stdlib
data-dependencies: []
build-options:
  - --ghc-option=-Wunused-binds
  - --ghc-option=-Wunused-matches
codegen:
