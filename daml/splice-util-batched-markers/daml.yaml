sdk-version: 3.4.11
name: splice-util-batched-markers
source: daml
version: 1.0.2
dependencies:
  - daml-prim
  - daml-stdlib
data-dependencies:
  - ../dars/splice-api-featured-app-v1-1.0.0.dar
  - ../dars/splice-api-featured-app-v2-1.0.0.dar
build-options:
  - --ghc-option=-Wunused-binds
  - --ghc-option=-Wunused-matches
  - --target=2.1
codegen:
  java:
    package-prefix: org.lfdecentralizedtrust.splice.codegen.java
    decoderClass: org.lfdecentralizedtrust.splice.codegen.java.DecoderBatchedMarkers
    output-directory: target/daml-codegen-java
