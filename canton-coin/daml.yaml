# NOTE : There are SBT jobs that will compile this project into a dar under
# the usual .daml/dist output directory and run code-gen to create scala case
# classes. You should either use `daml build` or `sbt ~compile`, but NOT both
# at the same time (see #179 for more context).

sdk-version: 2.4.0-snapshot.20220801.10312.0.d2c7be9d
name: canton-coin
source: daml
version: 0.1.0
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies: []
start-navigator: false
sandbox-options:
  - -c=canton.conf
build-options:
  - --target=1.dev
codegen:
  js:
    output-directory: wallet/daml.js
    npm-scope: daml.js
