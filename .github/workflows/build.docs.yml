name: Docs
on: workflow_call

jobs:
  docs:
    runs-on: self-hosted-k8s-x-small
    container:
      # TODO(#15988): use a release once 0.3.12 is out
      image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-ci:0.3.12-snapshot.20250213.8303.0.v242e36d9

    steps:

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_READ }}
          submodules: recursive

      - name: Setup
        id: setup
        uses: ./.github/actions/tests/common_test_setup
        with:
          test_name: static_tests
          save_nix_cache: true
          artifactory_user: ${{ vars.ARTIFACTORY_USER }}
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Build docs
        uses: ./.github/actions/sbt/execute_sbt_command
        with:
          artifactory_user: ${{ vars.ARTIFACTORY_USER }}
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}
          cmd: "docs/bundle"

      - name: Push documentation
        uses: ./.github/actions/nix/run_bash_command_in_nix
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ISSUES }}
        with:
          additional_nix_args: "--keep GITHUB_TOKEN"
          cmd: |
            REPO_DIR="$(mktemp -d)"
            export GIT_SSH_COMMAND="/usr/bin/ssh"
            git config --global user.email "splice-maintainers@digitalasset.com"
            git config --global user.name "DA Automation"
            git clone https://canton-network-da:$GITHUB_TOKEN@github.com/digital-asset/decentralized-canton-sync.git "$REPO_DIR" -b docs
            # Given that we just wanna overwrite anything an rm + cp seems more straightforward than an rsync.
            rm -rf "$REPO_DIR/docs"
            cp -r "docs/html/html" "$REPO_DIR/docs"
            # Required to make GH service the _static directory properly.
            touch "$REPO_DIR/docs/.nojekyll"
            cd "$REPO_DIR"
            git add .
            git commit -m 'Update documentation'
            git push origin docs

      - name: Post-SBT job
        uses: ./.github/actions/sbt/post_sbt
        with:
          cache_version: 1
          setup_sbt_cache_hits: ${{ steps.setup.outputs.sbt_cache_hits }}

      - name: Report Failures on Slack & Github
        if: failure() && github.event_name == 'push'
        shell: bash
        env:
          SLACK_ACCESS_TOKEN: ${{ secrets.SLACK_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_ISSUES }}
        run: ./.circleci/notification-scripts/failure_notification.py
