name: Ensure cluster/pulumi package-lock.json is correct
on:
  pull_request:
    paths:
      - cluster/pulumi/**

jobs:
  package-lock-json:
    runs-on: ubuntu-24.04
    steps:
        - name: Check out repository code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        - shell: bash
          run: |
            cd cluster/pulumi
            npm install
            if ! git diff --quiet || [ -n "$(git ls-files --others --exclude-standard)" ]; then
              # shellcheck disable=SC2129
              echo ":red_circle: Build produced changes:" >> "$GITHUB_STEP_SUMMARY"
              git status --short >> "$GITHUB_STEP_SUMMARY"
              # shellcheck disable=SC2016
              echo 'Please run `cd $(git rev-parse --show-toplevel)/cluster/pulumi && npm install` and commit the changes in `package-lock.json`' >> "$GITHUB_STEP_SUMMARY"
              exit 1
            else
              echo "package-lock.json is correct :green_circle:" >> "$GITHUB_STEP_SUMMARY"
            fi


