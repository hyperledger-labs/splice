name: Static Tests
on: workflow_call

jobs:
  static_tests:
    runs-on: self-hosted-k8s-x-small
    timeout-minutes: 35
    container:
      # TODO(#15988): use a release once 0.3.12 is out
      image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-ci:0.3.12-snapshot.20250213.8303.0.v242e36d9

    steps:

      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup
        id: setup
        uses: ./.github/actions/tests/common_test_setup
        with:
          test_name: static_tests
          save_nix_cache: true
          artifactory_user: ${{ vars.ARTIFACTORY_USER }}
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Check that CCI config is up2date
        uses: ./.github/actions/nix/run_bash_command_in_nix
        with:
          cmd: .circleci/build-config.sh --check

      - name: Check trailing whitespace
        uses: ./.github/actions/nix/run_bash_command_in_nix
        with:
          cmd: ./scripts/check-trailing-whitespace.sh

      - name: Run Daml warts check
        uses: ./.github/actions/nix/run_bash_command_in_nix
        with:
          cmd: ./scripts/check-daml-warts.sh

      - name: Run Daml return types check
        uses: ./.github/actions/nix/run_bash_command_in_nix
        with:
          cmd: ./scripts/check-daml-return-types.sh

      - name: Checking TODOs
        uses: ./.github/actions/nix/run_bash_command_in_nix
        with:
          cmd: |
            echo "PR number: $CIRCLE_PULL_REQUEST"
            ./scripts/check-todos.sh
          additional_nix_args: "--keep GITHUB_USER --keep GITHUB_TOKEN --keep CIRCLE_BRANCH --keep CIRCLE_PULL_REQUEST"
        env:
          # TODO(#15988): For now, the script assumes CCI env vars, so we map GHA ones to CCI ones here
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CIRCLE_BRANCH: ${{ github.ref }}
          CIRCLE_PULL_REQUEST: ${{ github.event.pull_request.number }}

      - name: Store TODOs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: todos
          path: todo-out/todos

      - name: Lint GHA
        uses: ./.github/actions/nix/run_bash_command_in_nix
        with:
          cmd: actionlint

      - name: SBT-based static checks
        uses: ./.github/actions/sbt/execute_sbt_command
        with:
          artifactory_user: ${{ vars.ARTIFACTORY_USER }}
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}
          cmd: "Test/compile lint printTests"

      - name: Verify no changes in SBT test files
        uses: ./.github/actions/nix/run_bash_command_in_nix
        with:
          cmd: git add . && git diff --staged --exit-code test*.log

      - name: Post-SBT job
        uses: ./.github/actions/sbt/post_sbt
        with:
          cache_version: 1
          setup_sbt_cache_hits: ${{ steps.setup.outputs.sbt_cache_hits }}

      - name: Report Failures on Slack & Github
        if: failure() && github.event_name == 'push'
        shell: bash
        env:
          SLACK_ACCESS_TOKEN: ${{ secrets.SLACK_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_ISSUES }}
        run: ./.circleci/notification-scripts/failure_notification.py
