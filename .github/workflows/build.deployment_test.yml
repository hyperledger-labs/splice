name: Deployment Test
on: workflow_call

jobs:
  deployment_test:
    runs-on: self-hosted-k8s-x-small

    container:
      image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-ci:0.3.6-snapshot.20250113.8012.0.v6b097acb

    steps:

      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_READ }}
          submodules: recursive

      - name: Publish test name metric
        uses: miguelteixeiraa/action-run-in-background@v1
        with:
          script: ./.github/actions/scripts/publish_gha_metrics.py --test_suite static_tests

      - name: Setup
        shell: bash
        run: ./.github/actions/scripts/common_setup.sh

      - name: Set up Nix
        uses: ./.github/actions/nix/setup_self_hosted_nix
        with:
          artifactory_user: ${{ vars.ARTIFACTORY_USER }}
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}
          cache_version: 0

      - name: Deployment test
        uses: ./.github/actions/nix/run_bash_command_in_nix
        with:
          cmd_retry_count: 5 # Retry in case of dependency download errors
          cmd: make cluster/pulumi/test
