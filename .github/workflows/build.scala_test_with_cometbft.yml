name: Scala Test with CometBFT
on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        required: true
      parallelism:
        type: number
        required: true
      test_names_file:
        type: string
        required: true
      test_name:
        type: string
        required: true

jobs:

  split_tests:
    runs-on: self-hosted-docker-tiny
    name: Split the tests into parallel runs
    outputs:
      indices: ${{ steps.prep.outputs.indices }}
      test_names: ${{ steps.prep.outputs.test_names }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          # Checkout the PR head commit to get the commit message
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Split tests
        id: prep
        uses: ./.github/actions/tests/pre_scala_test
        with:
          parallelism: ${{ inputs.parallelism }}
          test_names_file: ${{ inputs.test_names_file }}


  scala_test:
    runs-on: ${{ inputs.runs_on }}
    name: ${{ inputs.test_name }} (${{ matrix.runner-index }})
    timeout-minutes: 35
    needs:
      - split_tests
    if: ${{ needs.split_tests.outputs.indices != '[]' }}
    strategy:
      matrix:
        runner-index: ${{ fromjson(needs.split_tests.outputs.indices) }}
      fail-fast: false
    container:
      # TODO(#15988): use a release once 0.3.12 is out
      image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-ci:0.3.12-snapshot.20250213.8303.0.v242e36d9

    services:
      postgres:
        image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-postgres:0.3.4
        env:
          POSTGRES_PASSWORD: postgres

      cometbft1:
        image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-cometbft:0.3.4
        env:
          sv_idx: 1
        options: --name cometbft1

      cometbft2:
        image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-cometbft:0.3.4
        env:
          sv_idx: 2
        options: --name cometbft2

      cometbft2Local:
        image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-cometbft:0.3.4
        env:
          sv_idx: 2Local
        options: --name cometbft2local

      cometbft3:
        image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-cometbft:0.3.4
        env:
          sv_idx: 3
        options: --name cometbft3

      cometbft4:
        image: digitalasset-canton-network-docker.jfrog.io/digitalasset/splice-test-cometbft:0.3.4
        env:
          sv_idx: 4
        options: --name cometbft4

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Run Tests
        uses: ./.github/actions/tests/scala_test
        with:
          start_canton_options: -F -w
          artifactory_user: ${{ vars.ARTIFACTORY_USER }}
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}
          test_suite_name: ${{ inputs.test_name }}
          test_names: ${{ needs.split_tests.outputs.test_names }}
          runner_index: ${{ matrix.runner-index }}
          with_gcp_creds: "false"
          is_frontend_test: "false"
          slack_access_token: ${{ secrets.SLACK_ACCESS_TOKEN }}
          github_token: ${{ secrets.GH_ISSUES }}
          additional_nix_args: "--keep COMETBFT_DOCKER_IP"
