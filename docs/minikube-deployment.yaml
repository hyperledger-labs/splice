apiVersion: apps/v1

kind: Deployment
metadata:
  name: docs-deployment
  labels:
    app: docs

spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      containers:
      - name: docs
        image: us-central1-docker.pkg.dev/cn-devnet-353712/cn-devnet-images/docs:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1

kind: Service
metadata:
  name: docs-service

spec:
  type: NodePort
  selector:
      app: docs
  ports:
    - port: 80
