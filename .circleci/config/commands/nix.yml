commands:
  run_setup_nix:
    description: Set up Nix without cache
    parameters:
      include_binary_cache:
        type: boolean
        default: false
    steps:
      - run:
          name: Setup Nix
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          command: |
            set -exuo pipefail
            echo 'source ~/.nix-profile/etc/profile.d/nix.sh' >> "$BASH_ENV"
            if [ -f ~/.config/nix/nix.conf ]; then
              exit 0
            else
              # Disabling sandbox because:
              # 1. It doesn't work on CircleCI (sethostname is not allowed)
              # 2. We don't plan to build anything, so the risk is fairly low
              mkdir -p ~/.config/nix
              if [ << parameters.include_binary_cache >> ]; then
                cat \<<EOF > ~/.config/nix/nix.conf
                sandbox = false
                netrc-file = /home/circleci/.config/nix/netrc
                extra-experimental-features = nix-command flakes
                substituters = file:///cache/nix/binary_cache?trusted=1 https://cache.nixos.org/
                trusted-substituters = file:///cache/nix/binary_cache?trusted=1
                trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
                cores = 4
                max-jobs = 16
            EOF
              else
                cat \<<EOF > ~/.config/nix/nix.conf
                sandbox = false
                netrc-file = /home/circleci/.config/nix/netrc
                extra-experimental-features = nix-command flakes
                cores = 4
                max-jobs = 16
            EOF
              fi
              sh <(curl -fsSL --retry 8 https://releases.nixos.org/nix/nix-2.13.3/install) --no-daemon
              cat \<<EOF > ~/.config/nix/netrc
              machine digitalasset.jfrog.io
              login $ARTIFACTORY_USER
              password $ARTIFACTORY_PASSWORD
            EOF
              . /home/circleci/.nix-profile/etc/profile.d/nix.sh
              echo "Building nix env"
              nix develop path:nix -v --profile "$HOME/.nix-shell" --command echo "Done loading packages"
              echo "Garbage collecting to reduce cache size"
              nix-store --gc
            fi
  setup_nix:
    description: Set up Nix
    steps:
      - run:
          name: Make Nix cache key
          command: |
            set -euo pipefail
            git ls-files nix/ | grep -v '[.]md$' | LC_ALL=C sort | xargs sha256sum -b > /tmp/nix-cache-key
            uname -m >> /tmp/nix-cache-key # Add architecture to the cache key
            sudo mkdir /nix
            sudo chown $USER /nix
      - restore_cache:
          name: Restore Nix cache
          keys:
            - nix-{{ checksum "/tmp/nix-cache-key" }}
      - run_setup_nix
      - save_cache:
          key: nix-{{ checksum "/tmp/nix-cache-key" }}
          paths:
            - /nix
            - /home/circleci/.nix-profile
            - /home/circleci/.nix-channels
            - /home/circleci/.nix-defexpr
            - /home/circleci/.config/nix
  setup_nix_self_hosted:
    description: Set up Nix self hosted
    parameters:
      save:
        type: boolean
        default: false
      clone_command:
        type: string
        # order by name, mixed to try to reduce conflicts when running in multiple jobs at the same time
        default: "rclone --no-update-dir-modtime --no-update-modtime --size-only --multi-thread-streams=32 --transfers=32 --ignore-existing --links --create-empty-src-dirs --fast-list --metadata --order-by name,mixed --retries 10 copy"
    steps:
      - run:
          name: Restore nix
          command: |
            set -euxo pipefail
            git ls-files nix/ | grep -v '[.]md$' | LC_ALL=C sort | xargs sha256sum -b > /tmp/nix-cache-key
            uname -m >> /tmp/nix-cache-key # Add architecture to the cache key
            echo "ci_cache_version: << pipeline.parameters.cache-version >>" >> /tmp/nix-cache-key # Add cache version to the cache key
            sudo mkdir -p /nix/store
            sudo chown -R $USER:$USER /nix
            cache_key=($(md5sum "/tmp/nix-cache-key"))
            if [ -f "/cache/nix/$cache_key/cached" ]; then
              echo "Restoring nix cache"
              # we use rsync here because it's simply faster to install
              # Retry because we've seen Ubuntu be down sometimes.
              n=0
              until [ $n -gt 50 ]; do
                sudo apt update -o APT::Update::Error-Mode=any && break
                n=$((n+1))
                sleep 10
              done
              n=0
              until [ $n -gt 50 ]; do
                sudo apt install rsync && break
                n=$((n+1))
                sleep 10
              done
              rsync -avi /cache/nix/$cache_key/.nix-* $HOME/
              rsync -avi "/cache/nix/$cache_key/nix" $HOME/.config/
              rsync -avi "/cache/nix/$cache_key/nix_store/var/" /nix/var
              sudo mount --bind /cache/nix/$cache_key/nix_store/store /nix/store
            else
              sudo mkdir -p "/cache/nix/$cache_key"
              sudo chown $USER:$USER "/cache/nix/$cache_key"
            fi
      - run_setup_nix:
          include_binary_cache: true
      # required as the first nix invocation (why? not sure tbh, we should look into that)
      - run_bash_command_in_nix:
          cmd: |
            echo "Validated nix"
      - when:
          condition: << parameters.save >>
          steps:
            - run:
                name: Save Nix
                # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
                no_output_timeout: "20m"
                # We don't run this in nix because we need to run rclone as sudo to preserve all the permissions for the store
                command: |
                  set -euxo pipefail
                  cache_key=($(md5sum "/tmp/nix-cache-key"))
                  if [ ! -f "/cache/nix/$cache_key/cached" ]; then
                    echo "Saving nix"

                    sudo -v ; curl https://rclone.org/install.sh | sudo bash

                    nix copy --all --to 'file:///cache/nix/binary_cache?trusted=1' -v

                    << parameters.clone_command >> "$HOME/" "/cache/nix/$cache_key/" --include ".nix-*/**" --include ".nix-*"
                    << parameters.clone_command >> $HOME/.config/nix "/cache/nix/$cache_key/nix"

                    mkdir -p "/cache/nix/$cache_key/nix_store/store"
                    mkdir -p "/cache/nix/$cache_key/nix_store/var"

                    #requires sudo to preserve read only during clone
                    sudo << parameters.clone_command >> /nix/store/ /cache/nix/$cache_key/nix_store/store
                    << parameters.clone_command >> /nix/var/ "/cache/nix/$cache_key/nix_store/var"

                    echo "done" > "/cache/nix/$cache_key/cached"
                  fi

  run_bash_command_in_nix:
    parameters:
      cmd:
        type: string
      cmd_name:
        type: string
        default: Executing bash command << parameters.cmd >> in the nix shell
      cmd_retry_count:
        description: Number of times to retry the command
        type: integer
        default: 0
      cmd_retry_wait:
        description: Number of seconds to wait between retries
        type: integer
        default: 5
      cmd_retry_condition:
        description: Condition for retrying the command (up to the maximum number of retries)
        type: string
        default: "true"
      cmd_before_retry:
        description: Extra command to run before retrying the command
        type: string
        default: ""
      gce_authenticate:
        type: boolean
        default: false
      <<: *cluster-parameter
      additional_nix_args:
        type: string
        default: ""
      no_output_timeout:
        type: string
        default: "10m"
      when:
        type: enum
        enum: [ "on_success", "always", "on_fail" ]
        default: "on_success"
      background:
        type: boolean
        default: false
      working_dir:
        type: string
        default: ""
    steps:
      - get_cluster:
          cluster: << parameters.cluster >>
          when: << parameters.when >>
      - run:
          name: << parameters.cmd_name >>
          when: << parameters.when >>
          no_output_timeout: << parameters.no_output_timeout >>
          background: << parameters.background >>
          command: |
            set -euo pipefail
            echo "sourcing nix profile"
            . /home/circleci/.nix-profile/etc/profile.d/nix.sh
            ADDITIONAL_NIX_ARGS="<< parameters.additional_nix_args >>"

            if [ -n "<< parameters.working_dir >>" ]; then
              echo "Changing into working directory << parameters.working_dir >>"
              cd "<< parameters.working_dir >>"
            fi

            # Attempt to build the nix env with retries to work around transient download failures
            echo "building nix env"
            MAX_RETRY_NIX_ENV=5
            NIX_ENV_TRY_COUNT=0
            until [ $NIX_ENV_TRY_COUNT -ge $MAX_RETRY_NIX_ENV ]
            do
              if [ $NIX_ENV_TRY_COUNT -gt 0 ]; then
                SLEEP_DURATION=$((NIX_ENV_TRY_COUNT*2))
                echo "Failed to build and enter the nix environment, retrying in $SLEEP_DURATION seconds..."
                sleep $SLEEP_DURATION
              fi
              nix develop \
                path:nix \
                --ignore-environment \
                --keep USER \
                --keep HOME \
                --keep TERM \
                --keep CI \
                --keep RUN_SPLITTED_TESTS_CMD \
                --keep COURSIER_CACHE \
                --keep SBT_OPTS \
                --command echo "Confirmed that we can build and enter the nix environment!" \
                && break
              NIX_ENV_TRY_COUNT=$((NIX_ENV_TRY_COUNT+1))
            done

            if [ $NIX_ENV_TRY_COUNT -ge $MAX_RETRY_NIX_ENV ]; then
              echo "Failed to build and enter the nix environment after $MAX_RETRY_NIX_ENV attempts"
              exit 1
            fi

            # kill all processes in the process group (this includes children of children) upon being interrupted
            # (see e.g. "Propagate the signal to multiple children" in https://linuxconfig.org/how-to-propagate-a-signal-to-child-processes-from-a-bash-script)
            trap 'echo "Caught signal, killing all pgroup processes"; trap " " SIGTERM; kill 0; wait' SIGINT SIGTERM

            # We write the whole nix command to a separate file, so that we can run nix <command> &, and wait for it,
            # so that we can properly trap signals and kill all processes in the process group.

            # append random string to the cmd.sh file to avoid parallel steps writing and executing the same cmd.sh files
            CMD_FILE=$(mktemp cmd-XXXXXX.sh)
            echo "temporary CMD_FILE: $CMD_FILE"
            cat \<<'EOF' > $CMD_FILE

              set -euo pipefail

              . .envrc.vars
              if [[ "$TARGET_CLUSTER" != none ]]; then
                . $SPLICE_ROOT/cluster/deployment/$TARGET_CLUSTER/.envrc.vars
                . $SPLICE_ROOT/build-tools/lib/cluster.envrc.vars
                echo "Using cluster hostname suffix: ${GCP_CLUSTER_HOSTNAME}"
              fi

              if [[ << parameters.gce_authenticate >> == true ]]; then
                if [[ "$TARGET_CLUSTER" == none ]]; then
                  echo "TARGET_CLUSTER must be set"
                  exit 1
                fi
                # Authenticate to the correct GCP project for the cluster
                echo "Authenticating to cluster \"$TARGET_CLUSTER\" in project \"${CLOUDSDK_CORE_PROJECT}\""
                case ${CLOUDSDK_CORE_PROJECT} in
                  da-cn-scratchnet)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_SCRATCHNET_KEY}"
                    ;;

                  da-cn-scratchnet2)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_SCRATCHNET2_KEY}"
                    ;;

                  da-cn-ci)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_CI_KEY}"
                    ;;

                  da-cn-ci-2)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_CI_2_KEY}"
                    ;;

                  da-cn-devnet)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_DEVNET_KEY}"
                    ;;

                  da-cn-mainnet)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_MAINNET_KEY}"
                    ;;

                  *)
                    echo "Cannot authenticate to GCP project without key: ${CLOUDSDK_CORE_PROJECT}"
                    exit 1
                    ;;
                esac

                # GOOGLE_CREDENTIALS variable is used by pulumi
                export GOOGLE_CREDENTIALS=${CN_ACTIVE_ENVIRONMENT_KEY}

                # GOOGLE_APPLICATION_CREDENTIALS variable is used by gcloud typescript client, it should include the filename of the key
                export GOOGLE_APPLICATION_CREDENTIALS=$(mktemp gcp-creds-XXXXXX.json)
                echo ${CN_ACTIVE_ENVIRONMENT_KEY} > ${GOOGLE_APPLICATION_CREDENTIALS}

                # TODO(#7702) Extract retry logic for CI tasks into command/script
                # gcloud auth with a limited number of retries
                MAX_AUTH_RETRIES=5
                AUTH_TRY_COUNT=0
                AUTH_RETRY_WAIT=30
                until [ $AUTH_TRY_COUNT -gt $MAX_AUTH_RETRIES ]
                do
                    echo "Trying gcloud auth. Attempt #$[AUTH_TRY_COUNT+1]"

                    # Try to authenticate and break retry loop in case of success
                    echo ${CN_ACTIVE_ENVIRONMENT_KEY} | gcloud auth activate-service-account --key-file=- && break

                    AUTH_TRY_COUNT=$[$AUTH_TRY_COUNT+1]
                    sleep $AUTH_RETRY_WAIT
                done

                if [ $AUTH_TRY_COUNT -gt $MAX_AUTH_RETRIES ]; then
                    echo "Exceeded maximum retries ($AUTH_TRY_COUNT / $MAX_AUTH_RETRIES), no more attempts: gcloud auth activate-service-account" >&2
                    exit 1
                fi

              fi

              MAX_RETRY=<< parameters.cmd_retry_count >>
              n=0
              until [ $n -gt $MAX_RETRY ]
              do
                  if [ $n -gt 0 ]; then
                    sleep << parameters.cmd_retry_wait >>
                    << parameters.cmd_before_retry >>
                  fi
                  cmd_wrapper() {
                    # We write the cmd to a separate file. That way `set -e` statements in the cmd will take effect
                    # despite us using this in a tested context below where they would usually be disabled.
                    # See https://gist.github.com/cocreature/9c345b75b7dad05ed32865b21c1b0460 for a minimal example
                    # of what happens if we just call parameters.cmd directly.
                    # We enforce set -euo pipefail by including it in all the commands. Even if the command has already set it, then it will have no effect
                    # but this way we ensure all the commands will fail on error and no lead to confusing behaviour
                    # append random string to the cmd.sh file to avoid parallel steps writing and executing the same cmd.sh files
                    CMD_FILE_2=$(mktemp cmd-XXXXXX.sh)
                    echo "temporary CMD_FILE_2: $CMD_FILE_2"
                    cat \<<'EOF2' > $CMD_FILE_2
                    set -euo pipefail
                    echo "Running command"
                    << parameters.cmd >>
            EOF2
                    RESULT=$?

                    if [ $RESULT -ne 0 ]; then
                      echo "Failed to write command to CMD_FILE_2 $CMD_FILE_2"
                      exit $RESULT
                    fi
                    echo "Wrote command to CMD_FILE $CMD_FILE_2"
                    bash $CMD_FILE_2
                  }
                  cmd_wrapper && break
                  if [ << parameters.cmd_retry_condition >> != true ]; then
                    echo "Retry condition not met, not retrying" >&2
                    exit 1
                  fi
                  n=$[$n+1]
              done

              if [ $n -gt $MAX_RETRY ]; then
                echo "Exceeded maximum retries ($n / $MAX_RETRY), no more attempts << parameters.cmd_name >>" >&2
                exit 1
              fi
            EOF

            RESULT=$?

            if [ $RESULT -ne 0 ]; then
              echo "Failed to write command to CMD_FILE $CMD_FILE"
              exit $RESULT
            fi
            echo "Wrote command to CMD_FILE $CMD_FILE"

            echo "Running actual command"
            # Run the command for real within the nix environment
            nix develop \
              path:nix \
              --ignore-environment \
              --keep USER \
              --keep HOME \
              --keep TERM \
              --keep CI \
              --keep COURSIER_CACHE \
              --keep SBT_OPTS \
              --keep RUN_SPLITTED_TESTS_CMD \
              --keep GCP_DA_CN_DEVNET_KEY \
              --keep GCP_DA_CN_CI_KEY \
              --keep GCP_DA_CN_CI_2_KEY \
              --keep GCP_DA_CN_SCRATCHNET_KEY \
              --keep GCP_DA_CN_SCRATCHNET2_KEY \
              --keep GCP_DA_CN_MAINNET_KEY \
              --keep CIRCLE_BRANCH \
              --keep TARGET_CLUSTER \
              $ADDITIONAL_NIX_ARGS \
              --command bash $CMD_FILE &
            PID=$!

            wait $PID
