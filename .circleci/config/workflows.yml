main-branch-only: &main-branch-only
  filters:
    branches:
      only:
         - main

main-branch-never: &main-branch-never
  filters:
    branches:
      ignore:
         - main

workflows:
  version: 2

  publish_public_artifacts:
    when:
      equal: [ publish-public-artifacts, << pipeline.parameters.run-job >> ]
    jobs:
      - docker_images_push:
          <<: *notify-fail
          context:
            - artifactory
            - datadog
            - slack-context
      - publish_public_release:
          context:
            - artifactory
            - datadog
          requires:
            - docker_images_push

  build:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
    - cancel_previous_pipelines:
        <<: *notify-fail
        context:
          - slack-context
        workflow_names: "build"
        branch_filter: "$CIRCLE_BRANCH"
        # cannot use a simple CCI branch filter for the job since this job is a dependency for all the other jobs in this workflow
        # and cannot be skipped
        branch_ignores: "^(main|deployment/.*)$"
        max_pipeline_age_secs: 0  # no pipeline age limit
    # Linting and formatting
    - static_tests:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    # Daml
    - daml_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    # Scala
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test wall clock time"
        test_names_file: "test-full-class-names.log"
        start_canton_options: "-w -f -m"
        resource_class: "xlarge"
        parallelism: 8
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test sim time"
        test_names_file: "test-full-class-names-sim-time.log"
        start_canton_options: "-s"
        resource_class: "xlarge"
        parallelism: 5
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test frontend wall clock time"
        test_names_file: "test-full-class-names-frontend.log"
        start_canton_options: "-w"
        pre_sbt_cmd: "./start-frontends.sh -d -s"
        post_sbt_cmd: "./stop-frontends.sh"
        resource_class: "2xlarge"
        parallelism: 4
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test frontend sim time"
        test_names_file: "test-full-class-names-frontend-sim-time.log"
        start_canton_options: "-s"
        pre_sbt_cmd: "./start-frontends.sh -d -s"
        post_sbt_cmd: "./stop-frontends.sh"
        resource_class: "xlarge"
        parallelism: 1
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test frontend app manager"
        test_names_file: "test-full-class-names-frontend-app-manager.log"
        start_canton_options: "-w"
        pre_sbt_cmd: "./start-frontends.sh -d -s -m"
        post_sbt_cmd: "./stop-frontends.sh"
        resource_class: "xlarge"
        parallelism: 1
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test global upgrade sim time"
        test_names_file: "test-full-class-names-global-upgrade-sim-time.log"
        start_canton_options: "-s -g"
        resource_class: "xlarge"
        parallelism: 1
        requires:
          - cancel_previous_pipelines
    - ui_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    - bundle:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    # Ops
    - update_pipeline_schedule:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - slack-context
        requires:
          - cancel_previous_pipelines
    - deployment_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    - docker_images_build:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines

  deploy_cimain:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
    - docker_images_push:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
    - wait_for_previous_pipeline:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - slack-context
        workflow_names: "deploy_cimain"
    - deploy_cluster:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cimain"
        send_deployment_notification: false
        update_deployment_branch: false  # No need to create a deployment branch for cimain
        requires:
           - docker_images_push
           - wait_for_previous_pipeline
    - deploy_sv_runbook:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cimain"
        send_deployment_notification: false
        requires:
          - deploy_cluster
    - deploy_validator_runbook:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cimain"
        requires:
          - deploy_cluster
    - preflight_check:
        cluster: "cimain"
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        requires:
          - wait_for_previous_pipeline
    - preflight_sv_check:
        <<: *main-branch-only
        cluster: "cimain"
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        requires:
          - wait_for_previous_pipeline
    - preflight_validator_check:
        <<: *main-branch-only
        cluster: "cimain"
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        requires:
          - wait_for_previous_pipeline

  deploy_cidaily_and_cidaily_testnet:
    when:
      equal: [ deploy-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
    - docker_images_push:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
    - wait_for_previous_pipeline:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - slack-context
        workflow_names: "deploy_cidaily_and_cidaily_testnet cidaily_health_check cidaily_testnet_health_check redeploy_sv_runbook_cidaily"
    - deploy_cluster:
        name: deploy_cluster_cidaily
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cidaily"
        requires:
           - docker_images_push
           - wait_for_previous_pipeline
    - deploy_cluster:
        name: deploy_cluster_cidaily_testnet
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cidaily-testnet"
        restore_cluster: true
        requires:
          - docker_images_push
          - wait_for_previous_pipeline
    - preflight_check:
        name: preflight_check_devnet
        cluster: "cidaily"
        channel_notify: C06DEUJ2LBT # TODO(#9130) -- return to original channel after
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        wait_for_sv: false
        # Order: deploy_cluster->preflight_check->publish_public_release->deploy_sv_runbook->preflight_sv_check
        requires:
          - docker_images_push
          - deploy_cluster_cidaily
    - preflight_check:
        name: preflight_check_testnet
        cluster: "cidaily-testnet"
        <<: *non_devnet_preflight_params
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        # require deploy_cluster and deploy_sv_runbook for stability and reliability
        requires:
          - docker_images_push
          - deploy_cluster_cidaily_testnet
    - publish_public_release:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
        requires:
          - preflight_check_devnet
          - preflight_check_testnet
    - deploy_sv_runbook:
        name: deploy_sv_runbook_devnet
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cidaily"
        use_published_artifacts: true
        requires:
          - deploy_cluster_cidaily
          - publish_public_release
    - deploy_sv_runbook:
        name: deploy_sv_runbook_testnet
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cidaily-testnet"
        restore_cluster: true
        requires:
          - deploy_cluster_cidaily_testnet
    - deploy_validator_runbook:
        name: deploy_validator_runbook_devnet
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cidaily"
        use_published_artifacts: true
        requires:
          - deploy_cluster_cidaily
          - publish_public_release
    - deploy_validator_runbook:
        name: deploy_validator_runbook_testnet
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cidaily-testnet"
        use_published_artifacts: true
        requires:
          - deploy_cluster_cidaily_testnet
          - publish_public_release
    - preflight_sv_check:
        name: preflight_sv_check_devnet
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        cluster: "cidaily"
        channel_notify: C06DEUJ2LBT # TODO(#9130) -- return to original channel after
        requires:
          - deploy_sv_runbook_devnet
    - preflight_sv_check:
        name: preflight_sv_check_testnet
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        cluster: "cidaily-testnet"
        requires:
          - deploy_sv_runbook_testnet
    - preflight_validator_check:
        name: preflight_validator_check_devnet
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        cluster: "cidaily"
        channel_notify: C06DEUJ2LBT # TODO(#9130) -- return to original channel after
        requires:
          - deploy_validator_runbook_devnet

  deploy_cilr:
    when:
      equal: [ deploy-cilr, << pipeline.parameters.run-job >> ]
    jobs:
    - docker_images_push:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
    - wait_for_previous_pipeline:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - slack-context
        workflow_names: "deploy_cilr cilr_health_check redeploy_sv_runbook_cilr"
    - deploy_cluster:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cilr"
        requires:
           - docker_images_push
           - wait_for_previous_pipeline
    - deploy_sv_runbook:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cilr"
        requires:
          - deploy_cluster
    - deploy_validator_runbook:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cilr"
        requires:
          - deploy_cluster
    - preflight_check:
        cluster: "cilr"
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        # require deploy_cluster and deploy_sv_runbook for stability and reliability
        requires:
          - docker_images_push
          - deploy_cluster
          - deploy_sv_runbook
    - publish_public_release:
        <<: *main-branch-only
        requires:
          - preflight_check
        context:
          - artifactory
          - datadog
    - preflight_sv_check:
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        cluster: "cilr"
        requires:
          - deploy_sv_runbook
    - preflight_validator_check:
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        cluster: "cilr"
        requires:
          - deploy_validator_runbook

  deploy_devnet:
    when:
      equal: [ deploy-devnet, << pipeline.parameters.run-job >> ]
    jobs:
    - wait_for_previous_pipeline:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - slack-context
        workflow_names: "deploy_devnet devnet_health_check"
    - deploy_cluster:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "devnet"
        deploy_version: "devnet-next"
        use_published_artifacts: true
        requires:
           - wait_for_previous_pipeline
    - deploy_sv_runbook:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "devnet"
        deploy_version: "devnet-next"
        use_published_artifacts: true
        requires:
          - deploy_cluster
    - deploy_validator_runbook:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "devnet"
        deploy_version: "devnet-next"
        use_published_artifacts: true
        requires:
          - deploy_cluster
    - preflight_check:
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        cluster: "devnet"
        cluster_version: "devnet-next"
        # require deploy_cluster and deploy_sv_runbook for stability and reliability
        requires:
          - deploy_cluster
          - deploy_sv_runbook
    - preflight_sv_check:
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        cluster: "devnet"
        cluster_version: "devnet-next"
        requires:
          - deploy_sv_runbook
          - preflight_check
    - preflight_validator_check:
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        cluster: "devnet"
        cluster_version: "devnet-next"
        requires:
          - deploy_validator_runbook


  deploy_testnet:
    when:
      equal: [ deploy-testnet, << pipeline.parameters.run-job >> ]
    jobs:
    - wait_for_previous_pipeline:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        workflow_names: "deploy_testnet testnet_health_check"
    - deploy_cluster:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "testnet"
        deploy_version: "testnet-next"
        restore_cluster: true
        use_published_artifacts: true
        requires:
           - wait_for_previous_pipeline
    - preflight_check:
        <<: *main-branch-only
        <<: *non_devnet_preflight_params
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        cluster: "testnet"
        cluster_version: "testnet-next"
        requires:
          - deploy_cluster

  testnet_health_check:
    when:
      equal: [ healthcheck-testnet, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/testnet
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_testnet"
      - preflight_check:
          <<: *non_devnet_preflight_params
          filters:
            branches:
              only:
                - deployment/testnet
          cluster: "testnet"
          wait_for_cluster_version: false
          context:
            - artifactory
            - canton-network-vpn
            - datadog
            - slack-context
          requires:
            - cancel_if_previous_pipeline

  devnet_health_check:
    when:
      equal: [ healthcheck-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_devnet"
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/devnet
          cluster: "devnet"
          wait_for_cluster_version: false
          context:
            - artifactory
            - canton-network-vpn
            - datadog
            - slack-context
          requires:
             - cancel_if_previous_pipeline

  cidaily_health_check:
    when:
      equal: [ healthcheck-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Only wait for sv runbook deployments, concurrent preflight checks are fine.
          workflow_names: "redeploy_sv_runbook_cidaily"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_cidaily_and_cidaily_testnet"
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cidaily
          cluster: "cidaily"
          channel_notify: C06DEUJ2LBT # TODO(#9130) -- return to original channel after
          wait_for_cluster_version: false
          context:
            - artifactory
            - canton-network-vpn
            - datadog
            - slack-context
          requires:
            - wait_for_previous_pipeline
            - cancel_if_previous_pipeline

  cidaily_testnet_health_check:
    when:
      equal: [ healthcheck-cidaily-testnet, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily-testnet
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_cidaily_and_cidaily_testnet"
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cidaily-testnet
          cluster: "cidaily-testnet"
          wait_for_cluster_version: false
          <<: *non_devnet_preflight_params
          context:
            - artifactory
            - canton-network-vpn
            - datadog
            - slack-context
          requires:
            - cancel_if_previous_pipeline

  cilr_health_check:
    when:
      equal: [ healthcheck-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          # Only wait for deployments, concurrent preflight checks are fine.
          workflow_names: "redeploy_sv_runbook_cilr"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_cilr"
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cilr
          cluster: "cilr"
          wait_for_cluster_version: false
          context:
            - artifactory
            - canton-network-vpn
            - datadog
            - slack-context
          requires:
             - wait_for_previous_pipeline
             - cancel_if_previous_pipeline

  redeploy_sv_runbook_cidaily:
    when:
      equal: [ redeploy-sv-runbook-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily_and_cidaily_testnet redeploy_sv_runbook_cidaily cidaily_health_check"
      - docker_images_push:
          <<: *notify-fail
          context:
            - artifactory
            - datadog
            - slack-context
          skip_if_exists: true
      - deploy_sv_runbook:
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - datadog
            - slack-context
          cluster: "cidaily"
          use_published_artifacts: false
          requires:
            - wait_for_previous_pipeline
            - docker_images_push
      - preflight_sv_check:
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - canton-network-vpn
            - datadog
            - slack-context
          cluster: "cidaily"
          channel_notify: C06DEUJ2LBT # TODO(#9130) -- return to original channel after
          wait_for_cluster_version: false
          requires:
            - deploy_sv_runbook

  redeploy_sv_runbook_cilr:
    when:
      equal: [ redeploy-sv-runbook-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
