jobs:
  hard_migration:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      # What to do
      action:
        type: enum
        enum:
          [
            "prepare",
            "migrate"
          ]
      # What to migrate
      scope:
        type: enum
        enum:
          [
            "all",
            "core",
            "sv",
            "validator"
          ]
      # Commit hash that will become the legacy version.
      # If left empty then the latest commit on the branch will be used, with locally-built charts.
      base_version:
        type: string
        default: ""
      # Commit hash that will become the active version.
      # If left empty then the latest commit on the branch will be used, with locally-built charts.
      upgrade_version:
        type: string
        default: ""
      cancel_workflow_on_failure:
        type: boolean
        default: false
      deploy_retry_count:
        type: integer
        default: 2
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - when:
          condition: << parameters.upgrade_version >>
          steps:
            - run:
                name: Checkout commit << parameters.upgrade_version >>
                command: |
                  echo "Checking out commit << parameters.upgrade_version >>"
                  git checkout << parameters.upgrade_version >>
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts for upgrade version
          cluster: << parameters.cluster >>
          cmd: |
            make cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Execute hard domain migration action
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep ARTIFACTORY_USER
            --keep ARTIFACTORY_PASSWORD
            --keep CIRCLECI_TOKEN
            --keep CIRCLE_WORKFLOW_ID
            --keep SLACK_ACCESS_TOKEN
            --keep CIRCLE_BUILD_URL
          gce_authenticate: true
          cmd_retry_count: << parameters.deploy_retry_count >>
          cmd_before_retry: |
            .circleci/post-slack-message.sh "Hard migration action on cluster << parameters.cluster >> failed. Retrying... ( <${CIRCLE_BUILD_URL}|CI Build> )"
            # TODO(#15454): remove this once we're more confident that pulumi won't make the repo dirty
            .circleci/reset-repo-if-dirty.sh "<${CIRCLE_BUILD_URL}|CI Build>" || true
          cmd: |
            set -eou pipefail

            base_version=$(build-tools/get-charts-version "<< parameters.base_version >>")
            upgrade_version=$(build-tools/get-charts-version "<< parameters.upgrade_version >>")

            # All CI-deployed clusters use split postgres instances per app, to support backups.
            export SPLIT_POSTGRES_INSTANCES=true
            echo "Running hard domain migration << parameters.action >> << parameters.scope >> from $base_version to $upgrade_version"
            cncluster activate
            cncluster hard_domain_migration_<< parameters.action >> << parameters.scope >> $base_version $upgrade_version --yes --skip-preview
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>
      - when:
          condition: << parameters.cancel_workflow_on_failure >>
          steps:
            - cancel_entire_workflow_if_this_job_failed

  # This job spins up a validator, and then waits until migration has been initiated and a
  # migration dump has been created. Ideally, we'd split it into two jobs, so that triggering
  # the migration depends on the validator being up, but that would add more complexity to the
  # workflow, so instead we're just relying on the docker-compose validator being much faster
  # to spin up than other things that are happening in parallel.
  pre_migration_compose_validator:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      # Commit hash that will become the legacy version.
      # If left empty then the latest commit on the branch will be used.
      base_version:
        type: string
        default: ""
      deploy_retry_count:
        type: integer
        default: 2
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      # TODO(#14646): since we're not backporting the docker-compose deployment, we need to deploy from
      #       main using only images from the base version. For now this seems to work, hopefully
      #       we will not break this. Once the base version includes the docker-compose validator,
      #       we should deploy from the base version.
      - when:
          condition: << parameters.base_version >>
          steps:
            - run:
                name: Find the image tag associated with << parameters.base_version >>
                command: |
                  echo "Checking out commit << parameters.base_version >>"
                  git checkout << parameters.base_version >>
                  echo $(build-tools/get-snapshot-version) > /tmp/base-version
                  git checkout "$CIRCLE_SHA1"
      - setup_nix
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - docker_login_internal
      - run_bash_command_in_nix:
          cluster: << parameters.cluster >>
          cmd_name: Wait for SV app to be responsive
          cmd: |
            succes=0
            for i in {1..30}; do
              if curl -m 10 -sfL https://sv.sv-2.${GCP_CLUSTER_HOSTNAME}/api/sv/version; then
                success=1
                break
              fi
              echo -n "."
              sleep 10
            done
            if [ $success -ne 1 ]; then
              echo "Timeout waiting for sv app to be ready"
              exit 1
            fi
      - run_bash_command_in_nix:
          cmd: /tmp/vpn-scripts/create-docker-network-on-vpn.sh onvpn
      - run_bash_command_in_nix:
          cmd_name: Deploy the docker-compose validator
          cluster: << parameters.cluster >>
          cmd: |
            # TODO(#14646): once we deploy from base_version we can remove the -t parameter
            build-tools/splice-compose.sh start -d -w -n onvpn -p "da-composeValidator-1" -t $(cat /tmp/base-version)
          cmd_retry_count: << parameters.deploy_retry_count >>
      - run_bash_command_in_nix:
          cmd_name: Run pre-migration steps, and wait for a migration dump to be available
          cmd: build-tools/splice-compose.sh test_before_migration
      - run_bash_command_in_nix:
          cmd_name: Stop the docker-compose validator
          cmd: build-tools/splice-compose.sh stop
      - run_bash_command_in_nix:
          cmd_name: Persist the migration dump to a CCI workspace
          cluster: << parameters.cluster >>
          cmd: build-tools/splice-compose.sh dump_volume splice-validator_domain-upgrade-dump workspace/domain-upgrade-dump.tar
      - persist_to_workspace:
          root: workspace
          paths:
            - domain-upgrade-dump.tar
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          # We need to dump the container logs again because the background process that continuously
          # dumps them died with the end of the first run_bash_command above.
          cmd_name: Store logs
          when: on_fail
          cmd: |
            docker logs splice-validator-validator-1 | gzip > log/splice-validator-validator-1.clog.gz 2>&1 || true
            docker logs splice-validator-participant-1 | gzip > log/splice-validator-participant-1.clog.gz 2>&1 || true
      - store_artifacts:
          name: Store logs
          path: log
          destination: log

  post_migration_compose_validator:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      # Commit hash that will become the active version.
      # If left empty then the latest commit on the branch will be used.
      upgrade_version:
        type: string
        default: ""
      deploy_retry_count:
        type: integer
        default: 2
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - when:
          condition: << parameters.upgrade_version >>
          steps:
            - run:
                name: Checkout commit << parameters.upgrade_version >>
                command: |
                  echo "Checking out commit << parameters.upgrade_version >>"
                  git checkout << parameters.upgrade_version >>
      - setup_nix
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - attach_workspace:
          at: workspace
      - run_bash_command_in_nix:
          cmd_name: Restore the migration dump into a docker volume
          cmd: build-tools/splice-compose.sh restore_volume splice-validator_domain-upgrade-dump workspace/domain-upgrade-dump.tar
      - docker_login_internal
      - run_bash_command_in_nix:
          cmd: /tmp/vpn-scripts/create-docker-network-on-vpn.sh onvpn
      - run_bash_command_in_nix:
          cmd_name: Deploy the docker-compose validator
          cluster: << parameters.cluster >>
          cmd: |
            if [ -z "<< parameters.upgrade_version >>" ]; then
              build-tools/splice-compose.sh start -m 1 -M -d -w -n onvpn -p "da-composeValidator-1"
            else
              build-tools/splice-compose.sh start -m 1 -M -d -w -n onvpn -p "da-composeValidator-1" -t << parameters.upgrade_version >>
            fi
          cmd_retry_count: << parameters.deploy_retry_count >>
      - run_bash_command_in_nix:
          cmd_name: Run post-migration steps
          cmd: build-tools/splice-compose.sh test_after_migration
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          # We need to dump the container logs again because the background process that continuously
          # dumps them died with the end of the first run_bash_command above.
          cmd_name: Store logs
          when: on_fail
          cmd: |
            docker logs splice-validator-validator-1 | gzip > log/splice-validator-validator-1.clog.gz 2>&1 || true
            docker logs splice-validator-participant-1 | gzip > log/splice-validator-participant-1.clog.gz 2>&1 || true
      - store_artifacts:
          name: Store logs
          path: log
          destination: log

  pre_migration_dump_identities:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Dump identities before the migration
          cluster: << parameters.cluster >>
          gce_authenticate: true
          additional_nix_args: >
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
          cmd: |
            cncluster activate
            mkdir -p workspace
            cncluster dump_identities > workspace/identities-before.json
      - persist_to_workspace:
          root: workspace
          paths:
            - identities-before.json
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>

  trigger_global_domain_migration:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Trigger the votes for a global domain migration
          cluster: << parameters.cluster >>
          gce_authenticate: true
          additional_nix_args: >
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
          cmd: |
            cncluster activate
            cncluster vote_for_migration 1
      - print_gcloud_logs_commands:
          cluster: << parameters.cluster >>
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>

  post_migration_verify_identities:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - attach_workspace:
          at: workspace
      - run_bash_command_in_nix:
          cmd_name: Dump identities after the migration, and compare
          cluster: << parameters.cluster >>
          gce_authenticate: true
          additional_nix_args: >
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
          cmd: |
            cncluster activate
            cncluster dump_identities > workspace/identities-after.json

            diff -u workspace/identities-before.json workspace/identities-after.json || exit 1
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>
