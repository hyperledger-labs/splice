jobs:
  preflight_check:
    parameters:
      <<: *cluster-parameter
      channel_notify:
        type: string
        # #team-canton-network-internal-ci
        default: C05DT77QF5M
      test_names_file:
        type: string
        default: "test-full-class-names-core-preflight.log,test-full-class-names-third-party-preflight.log"
      parallelism:
        type: integer
        default: 3
      wait_for_sv:
        type: boolean
        default: true
      wait_for_third_party:
        type: boolean
        default: true
      cluster_version:
        type: string
        default: ""
      migration_id:
        type: integer
        default: 0
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: << parameters.parallelism >>
    steps:
      - checkout_with_retry
      - run:
          # necessary for npm/webpack dev server launched in start-frontends.sh later
          # https://webpack.js.org/configuration/watch/#not-enough-watchers
          name: Set inotify fs watch
          command: |
            echo "Checking watch info..."
            sysctl fs.inotify
            echo "Setting max_user_watches..."
            echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p
      - when:
          condition: << parameters.cluster_version >>
          steps:
            - run:
                name: Checkout commit << parameters.cluster_version >>
                command: git checkout << parameters.cluster_version >>
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Activate cluster (configure kubectl)
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: cncluster activate
          cmd_retry_count: 5
      # TODO(#6630): bundle all these restores into a command, consider merging with setup_sbt_test_job
      - restore_sbt_cache
      - restore_precompiled_classes
      - restore_frontend_node_modules
      - restore_daml_artifacts
      - split_tests_for_parallel_run:
          test_names_file: << parameters.test_names_file >>
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: wait for deployment to finish
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          cmd: |
            VERSION=$(get-snapshot-version)
            cncluster wait_version $VERSION
            # We use readiness of validator-app in all namespaces as an approximation to the cluster's readiness
            if [[ << parameters.wait_for_third_party >> == true ]]; then
              cncluster wait validator1 validator-app
              cncluster wait splitwell validator-app
            fi
            validator_app="validator-app-<< parameters.migration_id >>"
            cncluster wait sv-1 $validator_app
            if (env-bool IS_DEVNET); then
              cncluster wait sv-2 $validator_app
              cncluster wait sv-3 $validator_app
              cncluster wait sv-4 $validator_app
            fi
            if [[ << parameters.wait_for_sv >> == true ]] && ( env-bool APPROVE_SV_RUNBOOK || env-bool IS_DEVNET ); then
              cncluster wait sv validator-app
            fi
            echo "Done waiting. All pods in the cluster are:"
            kubectl get pods -A
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_BASENAME}.network.canton.global; then echo "false"; else echo "true"; fi)
          cmd_retry_count: 2
          cmd_before_retry: |-
            echo "VPN connection seems to have died, restarting VPN and retrying..."
            /tmp/vpn-scripts/restart-vpn.sh
      - execute_sbt_command:
          pre_sbt_cmd: |
            set -eou pipefail
            . cluster/deployment/<< parameters.cluster >>/.envrc.vars
            NETWORK_APPS_ADDRESS="${GCP_CLUSTER_BASENAME}.network.canton.global" ./start-frontends.sh -d -v -p
          cmd: "\"$RUN_SPLITTED_TESTS_CMD\""
          post_sbt_cmd: ./stop-frontends.sh
          additional_nix_args: "--keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET --keep SV_DEV_NET_WEB_UI_PASSWORD --keep SV_WEB_UI_PASSWORD --keep VALIDATOR_WEB_UI_PASSWORD --keep GCP_DATA_DUMP_BUCKET_SERVICE_ACCOUNT_CREDENTIALS --keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          extra_env_vars: POSTGRES_DB=postgres DOMAIN_URL=https://sequencer.sv-1.svc.${GCP_CLUSTER_BASENAME}.network.canton.global NETWORK_APPS_ADDRESS=${GCP_CLUSTER_BASENAME}.network.canton.global NETWORK_APPS_ADDRESS_PROTOCOL=https VALIDATOR_USER_NAME="auto_preflight" CN_MIGRATION_DOMAIN_INDEX=<< parameters.migration_id >>
          extra_parameters: -DAUTH0_TENANT=dev
          timeout: "15m"
          cmd_retry_count: 3
          # retry if VPN got disconnected (approximated by trying to fetch docs from the cluster.
          # Note that this is expected to succeed even if the cluster deployment is down, because it fetches only the http->https redirect anyway)
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_BASENAME}.network.canton.global; then echo "false"; else echo "true"; fi)
          cluster: << parameters.cluster >>
          cmd_before_retry: |
            echo "Test failed, but VPN connection seems to have died, restarting VPN and retrying..."
            ./stop-frontends.sh
            /tmp/vpn-scripts/restart-vpn.sh

      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - cleanup_sbt_test_job
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
          channel_notify: << parameters.channel_notify >>
      - store_artifacts:
          name: Upload vpn log
          path: /var/log/vpn.log

  preflight_sv_check:
    parameters:
      <<: *cluster-parameter
      channel_notify:
        type: string
        # #team-canton-network-internal-ci
        default: C05DT77QF5M
      cluster_version:
        type: string
        default: ""
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    steps:
      - checkout_with_retry
      - when:
          condition: << parameters.cluster_version >>
          steps:
            - run_bash_command_in_nix:
                cmd_name: Checkout commit << parameters.cluster_version >>
                cmd: git checkout << parameters.cluster_version >>
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Activate cluster (configure kubectl)
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: cncluster activate
          cmd_retry_count: 5
      - restore_sbt_cache
      - restore_precompiled_classes
      - restore_frontend_node_modules
      - restore_daml_artifacts
      # We run sbt update with retries first to ensure that all dependency artifacts have been downloaded
      - execute_sbt_command:
          cmd: "update"
          cmd_retry_count: 3
      - execute_sbt_command:
          cmd: "Test/compile"
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: wait for sv-runbook deployment to finish
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          cmd: |
            VERSION=$(get-snapshot-version)
            cncluster wait_version $VERSION
            # We use readiness of validator-app in the sv namespace as an approximation to the sv's readiness
            cncluster wait sv validator-app
            echo "Done waiting. All pods in the cluster are:"
            kubectl get pods -A
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_BASENAME}.network.canton.global; then echo "false"; else echo "true"; fi)
          cmd_retry_count: 2
          cmd_before_retry: |-
            echo "VPN connection seems to have died, restarting VPN and retrying..."
            /tmp/vpn-scripts/restart-vpn.sh

      - run_bash_command_in_nix:
          cmd_name: Run SV preflight tests
          additional_nix_args: "--keep SV_DEV_NET_WEB_UI_PASSWORD \
            --keep ARTIFACTORY_USER \
            --keep ARTIFACTORY_PASSWORD \
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID \
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET \
            --keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          cluster: << parameters.cluster >>
          cmd: cncluster preflight_sv
          cmd_retry_count: 3
          # retry if VPN got disconnected (approximated by trying to fetch docs from the cluster.
          # Note that this is expected to succeed even if the cluster deployment is down, because it fetches only the http->https redirect anyway)
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_BASENAME}.network.canton.global; then echo "false"; else echo "true"; fi)
          cmd_before_retry: |
            echo "Test failed, but VPN connection seems to have died, restarting VPN and retrying..."
            ./stop-frontends.sh
            /tmp/vpn-scripts/restart-vpn.sh
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - cleanup_sbt_test_job
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
          channel_notify: << parameters.channel_notify >>
      - store_artifacts:
          name: Upload vpn log
          path: /var/log/vpn.log

  preflight_validator_check:
