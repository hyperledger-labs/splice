      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Activate cluster (configure kubectl)
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: cncluster activate
          cmd_retry_count: 5
      - restore_sbt_cache
      - restore_precompiled_classes
      - restore_frontend_node_modules
      - restore_daml_artifacts
      # We run sbt update with retries first to ensure that all dependency artifacts have been downloaded
      - execute_sbt_command:
          cmd: "update"
          cmd_retry_count: 3
      - execute_sbt_command:
          cmd: "Test/compile"
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: wait for validator-runbook deployment to finish
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          cmd: |
            VERSION=$(get-snapshot-version)
            cncluster wait_version $VERSION
            # We use readiness of validator-app in the validator namespace as an approximation to the validator's readiness
            cncluster wait validator validator-app
