    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      use_published_artifacts:
        type: boolean
        default: false
      deploy_version:
        type: string
        default: ""
      restore_cluster:
        type: boolean
        default: false
      silence_deployment_alerts:
        type: boolean
        default: false
      global_domain_active_migration_id:
        type: integer
        default: 0
      force_non_devnet:
        type: boolean
        default: false
      deploy_retry_count:
        type: integer
        default: 2
      # Load env vars that were unset at a base version, that otherwise break backwards compatibility
      run_upgrade_workarounds:
        type: boolean
        default: false
    steps:
      - checkout_with_retry
      - when:
          condition: << parameters.deploy_version >>
          steps:
            - run:
                name: Checkout commit << parameters.deploy_version >>
                command: |
                  echo "Checking out commit << parameters.deploy_version >>"
                  git checkout << parameters.deploy_version >>
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Apply Validator runbook Kubernetes manifest to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET --keep ARTIFACTORY_USER --keep ARTIFACTORY_PASSWORD --keep CIRCLECI_TOKEN --keep CIRCLE_WORKFLOW_ID --keep SLACK_ACCESS_TOKEN --keep CIRCLE_BUILD_URL"
          gce_authenticate: true
          cmd_retry_count: << parameters.deploy_retry_count >>
          cmd_before_retry: .circleci/post-slack-message.sh "Deployment of Validator runbook to cluster << parameters.cluster >> failed. Retrying... ( <${CIRCLE_BUILD_URL}|CI Build> )"
          cmd: |
            if [[ << parameters.run_upgrade_workarounds >> == true ]]; then
              # TODO (#14721): remove
              export COMETBFT_STABLE_CHAIN_ID=true
            fi
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi
            if [[ << parameters.force_non_devnet >> == true ]]; then
              export IS_DEVNET=0
              export APPROVE_SV_RUNBOOK=true
              export PREAPPROVE_VALIDATOR_RUNBOOK=true
            fi
            # || true can be removed once base version > 0.2.1
            cncluster hard_domain_migration_update_active_config << parameters.global_domain_active_migration_id >> internal || true
            cncluster activate
            cncluster ci_apply_validator $VERSION
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>

  deploy_multivalidator:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      deploy_retry_count:
        type: integer
        default: 2
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Apply multi-validator pulumi stack
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET --keep ARTIFACTORY_USER --keep ARTIFACTORY_PASSWORD --keep CIRCLECI_TOKEN --keep CIRCLE_WORKFLOW_ID --keep SLACK_ACCESS_TOKEN --keep CIRCLE_BUILD_URL"
          gce_authenticate: true
          cmd_retry_count: << parameters.deploy_retry_count >>
          cmd_before_retry: .circleci/post-slack-message.sh "Deployment of multi-validator pulumi stack to cluster << parameters.cluster >> failed. Retrying... ( <${CIRCLE_BUILD_URL}|CI Build> )"
          cmd: |
            cncluster activate
            cncluster ci_apply_multi
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>

  deploy_cluster:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      restore_cluster:
        type: boolean
        default: false
      deploy_version:
        type: string
        default: ""
      use_published_artifacts:
        type: boolean
        default: false
      skip_infra:
        type: boolean
        default: false
      update_deployment_branch:
        type: boolean
        default: true
      send_deployment_notification:
        type: boolean
        default: true
      global_domain_active_migration_id:
        type: integer
        default: 0
      cancel_workflow_on_failure:
        type: boolean
        default: false
      force_non_devnet:
        type: boolean
        default: false
      deploy_retry_count:
        type: integer
        default: 2
      # Load env vars that were unset at a base version, that otherwise break backwards compatibility
      run_upgrade_workarounds:
        type: boolean
        default: false

    steps:
      - checkout_with_retry
      - when:
          condition: << parameters.deploy_version >>
          steps:
            - run:
                name: Checkout commit << parameters.deploy_version >>
                command: |
                  echo "Checking out commit << parameters.deploy_version >>"
                  git checkout << parameters.deploy_version >>
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Apply Pulumi configuration to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep GITHUB_TOKEN
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep CIRCLECI_TOKEN
            --keep CIRCLE_WORKFLOW_ID
            --keep K6_USERS_PASSWORD
            --keep K6_VALIDATOR_ADMIN_USERNAME
            --keep K6_VALIDATOR_ADMIN_PASSWORD
            --keep SLACK_ACCESS_TOKEN
            --keep CIRCLE_BUILD_URL
          gce_authenticate: true
          cmd_retry_count: << parameters.deploy_retry_count >>
          cmd_before_retry: .circleci/post-slack-message.sh "Deployment of cluster << parameters.cluster >> failed. Retrying... ( <${CIRCLE_BUILD_URL}|CI Build> )"
          cmd: |
            cncluster activate
            # All CI-deployed clusters use split postgres instances per app, to support backups.
            export SPLIT_POSTGRES_INSTANCES=1
            if [[ << parameters.run_upgrade_workarounds >> == true ]]; then
              # TODO (#14721): remove
              export COMETBFT_STABLE_CHAIN_ID=true
            fi
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi
            # || true can be removed once base version > 0.2.1
            cncluster hard_domain_migration_update_active_config << parameters.global_domain_active_migration_id >> internal || true

            if [[ << parameters.force_non_devnet >> == true ]]; then
              export IS_DEVNET=0
              export APPROVE_SV_RUNBOOK=true
              export PREAPPROVE_VALIDATOR_RUNBOOK=true
            fi

            if [[ << parameters.skip_infra >> == true ]]; then
              cncluster ci_apply --skip-infra
            else
              cncluster ci_apply
            fi
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - when:
          condition: << parameters.update_deployment_branch >>
          steps:
            - run_bash_command_in_nix:
                cmd_name: Update deployment branch and tag for the cluster
                cluster: << parameters.cluster >>
                additional_nix_args: "--keep GITHUB_TOKEN"
                cmd: |
                  # deployment/scratch* branches break our deployment, so we guard against accidentally creating those here
                  if [[ << parameters.cluster >> != scratch* ]] && [[ << parameters.cluster >> != user-selected-scratchnet ]]; then
                    scripts/update-deployment-branch-and-tag.sh "<< parameters.cluster >>" HEAD
                  else
                    echo "NOTE: skipping deployment branch update for scratchnet cluster << parameters.cluster >>"
                  fi
                cmd_retry_count: 5
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>
      - when:
          condition: << parameters.cancel_workflow_on_failure >>
          steps:
            - cancel_entire_workflow_if_this_job_failed

  deploy_partial_upgrade:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      cancel_workflow_on_failure:
        type: boolean
        default: false
      run:
        type: boolean
        default: true
      silence_deployment_alerts:
        type: boolean
        default: false
      deploy_retry_count:
        type: integer
        default: 2
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          cmd: |
            if [[ << parameters.run >> == true ]]; then
              make -j cluster/build
            fi
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Apply Pulumi configuration to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep GITHUB_TOKEN
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep CIRCLECI_TOKEN
            --keep CIRCLE_WORKFLOW_ID
            --keep K6_USERS_PASSWORD
            --keep K6_VALIDATOR_ADMIN_USERNAME
            --keep K6_VALIDATOR_ADMIN_PASSWORD
            --keep SLACK_ACCESS_TOKEN
            --keep CIRCLE_BUILD_URL
          gce_authenticate: true
          cmd_retry_count: << parameters.deploy_retry_count >>
          cmd_before_retry: .circleci/post-slack-message.sh "Deployment of cluster << parameters.cluster >> failed. Retrying... ( <${CIRCLE_BUILD_URL}|CI Build> )"
          cmd: |
            if [[ << parameters.run >> == true ]]; then
              cncluster activate
              # All CI-deployed clusters use split postgres instances per app, to support backups.
              export SPLIT_POSTGRES_INSTANCES=1

              images="/tmp/ciupgrade.json"
              cncluster export_to "$images"

              if [[ << parameters.silence_deployment_alerts >> == true ]]; then
                # silence specific alerts that may fire due to SV downtime
                cncluster silence_grafana_alerts "20 minutes" -f "$REPO_ROOT/.circleci/silences/deployment_grafana.json"
              fi

              cncluster partial_upgrade $(get-snapshot-version) "$images"
            fi
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
      - when:
          condition: << parameters.cancel_workflow_on_failure >>
          steps:
            - cancel_entire_workflow_if_this_job_failed

  deploy_infra:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      deploy_retry_count:
        type: integer
        default: 2

    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Apply the pulumi infra stack
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep GITHUB_TOKEN
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep CIRCLECI_TOKEN
            --keep CIRCLE_WORKFLOW_ID
            --keep K6_USERS_PASSWORD
            --keep K6_VALIDATOR_ADMIN_USERNAME
            --keep K6_VALIDATOR_ADMIN_PASSWORD
            --keep SLACK_ACCESS_TOKEN
            --keep CIRCLE_BUILD_URL
          gce_authenticate: true
          cmd_retry_count: << parameters.deploy_retry_count >>
          cmd_before_retry: .circleci/post-slack-message.sh "Deployment of infra stack to cluster << parameters.cluster >> failed. Retrying... ( <${CIRCLE_BUILD_URL}|CI Build> )"
          cmd: |
            cncluster activate
            cncluster infra_up
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
