            fi
            if [[ << parameters.global_domain_migrate_from_id >> -ne -1 ]]; then
              export GLOBAL_DOMAIN_MIGRATE_FROM_MIGRATION_ID=<< parameters.global_domain_migrate_from_id >>
            fi
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi
            cncluster activate
            cncluster ci_apply_validator $VERSION
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>

  deploy_multivalidator:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      reset_cluster:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make cluster/build
          cmd_retry_count: 2
      - when:
          condition:
            and:
              - equal: [ true, <<pipeline.parameters.reset-before-deploy>> ]
              - equal: [ true, <<parameters.reset_cluster>> ]
          steps:
            - run_bash_command_in_nix:
                cmd_name: Reset multi-validator pulumi stack
                cluster: << parameters.cluster >>
                gce_authenticate: true
                cmd: |
                  cncluster activate
                  cncluster ci_pdown_multi
      - run_bash_command_in_nix:
          cmd_name: Apply multi-validator pulumi stack
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET --keep ARTIFACTORY_USER --keep ARTIFACTORY_PASSWORD --keep CIRCLECI_TOKEN --keep CIRCLE_WORKFLOW_ID"
          gce_authenticate: true
          cmd: |
            cncluster activate
            cncluster ci_apply_multi
      - notify-cluster-fail:
          cluster: << parameters.cluster >>

  deploy_cluster:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2024.01
    resource_class: xlarge
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      restore_cluster:
        type: boolean
        default: false
      deploy_version:
        type: string
        default: ""
      use_published_artifacts:
        type: boolean
        default: false
      reset_cluster:
        type: boolean
        default: true
      update_deployment_branch:
        type: boolean
        default: true
      send_deployment_notification:
        type: boolean
        default: true
      global_domain_active_migration_id:
        type: integer
        default: 0
      global_domain_upgrade_migration_id:
        type: integer
        default: 0
      global_domain_legacy_migration_id:
        type: integer
        default: -1
      global_domain_migrate_from_id:
        type: integer
        default: -1
      cancel_workflow_on_failure:
        type: boolean
        default: false

    steps:
      - checkout_with_retry
      - when:
          condition: << parameters.deploy_version >>
          steps:
            - run:
                name: Checkout commit << parameters.deploy_version >>
                command: |
                  echo "Checking out commit << parameters.deploy_version >>"
                  git checkout << parameters.deploy_version >>
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          cmd: |
            make cluster/build
          cmd_retry_count: 2
      - when:
          condition:
            and:
              - equal: [ true, <<pipeline.parameters.reset-before-deploy>> ]
              - equal: [ true, <<parameters.reset_cluster>> ]
              - equal: [ 0, <<parameters.global_domain_active_migration_id>> ]
          steps:
            - run_bash_command_in_nix:
                cmd_name: Reset cluster
                cluster: << parameters.cluster >>
                additional_nix_args: >
                  --keep GITHUB_TOKEN
                  --keep AUTH0_MANAGEMENT_API_CLIENT_ID
                  --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
                  --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
                  --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
                  --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
                  --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
                  --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
                  --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
                  --keep CIRCLECI_TOKEN
                  --keep CIRCLE_WORKFLOW_ID
                  --keep K6_USERS_PASSWORD
                  --keep K6_VALIDATOR_ADMIN_USERNAME
                  --keep K6_VALIDATOR_ADMIN_PASSWORD
                  --keep SLACK_ACCESS_TOKEN
                gce_authenticate: true
                cmd: |
                  cncluster activate
                  # on occasion, specially after previous failed deployments (e.g., because GCP is acting up),
                  # the cluster may be in a bad state and need a refresh before it can be correctly/completely reset.
                  cncluster prefresh
                  cncluster reset
      - run_bash_command_in_nix:
          cmd_name: Apply Pulumi configuration to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep GITHUB_TOKEN
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep CIRCLECI_TOKEN
            --keep CIRCLE_WORKFLOW_ID
            --keep K6_USERS_PASSWORD
            --keep K6_VALIDATOR_ADMIN_USERNAME
            --keep K6_VALIDATOR_ADMIN_PASSWORD
            --keep SLACK_ACCESS_TOKEN
          gce_authenticate: true
          cmd: |
            cncluster activate
            if [[ << parameters.restore_cluster >> == true ]]; then
              export RESTORE_CLUSTER=1
            fi
            # Note that we allow for RESTORE_CLUSTER to be false while bootstrapping-config is set. This is important for the combined cidaily/cidaily-testnet deployment which needs to restore cidaily-testnet but not cidaily.
            if (env-bool RESTORE_CLUSTER); then
              if [[ -n '<< pipeline.parameters.bootstrapping-config >>' ]]; then
                export BOOTSTRAPPING_CONFIG='<< pipeline.parameters.bootstrapping-config >>'
              fi
            fi
            # All CI-deployed clusters use split postgres instances per app, to support backups.
            export SPLIT_POSTGRES_INSTANCES=1
            # TODO (#11584): remove this once there's a new base version.
            if [[ << parameters.cluster >> == "ciupgrade" ]]; then
                export ENABLE_CLOUD_SQL=false
            fi
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi
            export GLOBAL_DOMAIN_ACTIVE_MIGRATION_ID=<< parameters.global_domain_active_migration_id >>
            if [[ << parameters.global_domain_legacy_migration_id >> -ne -1 ]]; then
              export GLOBAL_DOMAIN_LEGACY_MIGRATION_ID=<< parameters.global_domain_legacy_migration_id >>
            fi
            if [[ << parameters.global_domain_upgrade_migration_id >> -ne 0 ]]; then
              export GLOBAL_DOMAIN_UPGRADE_MIGRATION_ID=<< parameters.global_domain_upgrade_migration_id >>
            fi
            if [[ << parameters.global_domain_migrate_from_id >> -ne -1 ]]; then
              export GLOBAL_DOMAIN_MIGRATE_FROM_MIGRATION_ID=<< parameters.global_domain_migrate_from_id >>
            fi
            cncluster ci_apply
      - when:
          condition: << parameters.update_deployment_branch >>
          steps:
            - run_bash_command_in_nix:
                cmd_name: Update deployment branch and tag for the cluster
                cluster: << parameters.cluster >>
                additional_nix_args: "--keep GITHUB_TOKEN"
                cmd: |
                  # deployment/scratch* branches break our deployment, so we guard against accidentally creating those here
                  # This is a safeguard against people manually running e.g. deploy_devnet on a scratchnet.
                  if [[ << parameters.cluster >> != scratch* ]] && [[ << parameters.cluster >> != user-selected-scratchnet ]]; then
                    scripts/update-deployment-branch-and-tag.sh "<< parameters.cluster >>" HEAD
                  else
                    echo "NOTE: skipping deployment branch update for scratchnet cluster << parameters.cluster >>"
                  fi
                cmd_retry_count: 5
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>
      - when:
          condition: << parameters.send_deployment_notification >>
          steps:
            - notify-cluster-deployment:
                cluster: << parameters.cluster >>
      - when:
          condition: << parameters.cancel_workflow_on_failure >>
          steps:
            - cancel_entire_workflow_if_this_job_failed

  deploy_partial_upgrade:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2024.01
    resource_class: xlarge
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      send_deployment_notification:
        type: boolean
        default: true
      cancel_workflow_on_failure:
        type: boolean
        default: false
      run:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          cmd: |
            if [[ << parameters.run >> == true ]]; then
              make cluster/build
            fi
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Apply Pulumi configuration to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep GITHUB_TOKEN
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep CIRCLECI_TOKEN
            --keep CIRCLE_WORKFLOW_ID
            --keep K6_USERS_PASSWORD
            --keep K6_VALIDATOR_ADMIN_USERNAME
            --keep K6_VALIDATOR_ADMIN_PASSWORD
            --keep SLACK_ACCESS_TOKEN
          gce_authenticate: true
          cmd: |
            if [[ << parameters.run >> == true ]]; then
              cncluster activate
              # All CI-deployed clusters use split postgres instances per app, to support backups.
              export SPLIT_POSTGRES_INSTANCES=1
              # TODO (#11584): remove this once there's a new base version.
              export ENABLE_CLOUD_SQL=false
              images="/tmp/ciupgrade.json"
              cncluster export_to "$images"
              cncluster partial_upgrade $(get-snapshot-version) "$images"
            fi
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
      - when:
          condition: << parameters.send_deployment_notification >>
          steps:
            - notify-cluster-deployment:
                cluster: << parameters.cluster >>
      - when:
          condition: << parameters.cancel_workflow_on_failure >>
          steps:
            - cancel_entire_workflow_if_this_job_failed

  reset_cluster:
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    steps:
      - checkout_with_retry
      - setup_nix
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Reset Cluster and Free Lock (if on scratch*)
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET \
            --keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          gce_authenticate: true
          cmd: |
            cncluster activate
            cncluster ci_reset_unlock
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_BASENAME}.network.canton.global; then echo "false"; else echo "true"; fi)
          cmd_retry_count: 2
          cmd_before_retry: |-
            echo "VPN connection seems to have died, restarting VPN and retrying..."
            /tmp/vpn-scripts/restart-vpn.sh
            cncluster prefresh


  deploy_infra:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2024.01
    resource_class: large
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter

    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          cmd: |
            make cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Apply the pulumi infra stack
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep GITHUB_TOKEN
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep CIRCLECI_TOKEN
            --keep CIRCLE_WORKFLOW_ID
            --keep K6_USERS_PASSWORD
            --keep K6_VALIDATOR_ADMIN_USERNAME
            --keep K6_VALIDATOR_ADMIN_PASSWORD
            --keep SLACK_ACCESS_TOKEN
          gce_authenticate: true
          cmd: |
            cncluster activate
            cncluster infra_up
