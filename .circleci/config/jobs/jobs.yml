jobs:

  bump_configs:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Bump configs
          additional_nix_args: "--keep GH_TOKEN"
          cmd: |
            .circleci/cn-scripts/bump-configs.sh

  update_pipeline_schedule:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Update CircleCI pipeline configuration (incl. schedule triggers)
          additional_nix_args: --keep CIRCLECI_TOKEN
          cmd: |
            set -euo pipefail

            . .envrc.vars
            .circleci/triggers/setup-pipeline.sh

  build_tests_self_hosted:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - skip_if_flag_set:
          flag: force
      - setup_nix_self_hosted
      - setup_sbt_test_job:
          runner_type: "selfhosted"
      - execute_sbt_command:
          cmd: "Test/compile"
      - save_sbt_job_result:
          runner_type: "selfhosted"
          upload_caches: true

  build_tests_circleci:
    docker:
      - image: cimg/base:2024.01
    resource_class: xlarge
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - skip_if_flag_set:
          flag: force
      - setup_nix_self_hosted
      - setup_sbt_test_job:
          runner_type: "circleci"
      - execute_sbt_command:
          cmd: "Test/compile"
      - save_sbt_job_result:
          runner_type: "circleci"
          upload_caches: true

  artifacts_push:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
    parameters:
      is_public:
        type: boolean
        default: false
      checkout-branch:
        type: string
        default: "" # Default set to $CIRCLE_SHA1
    steps:
      - checkout_with_retry:
          checkout-branch: << parameters.checkout-branch >>
      - restore_frontend_builds
      - setup_nix
      - setup_sbt_test_job:
          runner_type: "circleci"
      - docker_login_artifactory
      - run_bash_command_in_nix:
          cmd_name: Check if release tag is on anything but a release-line branch
          additional_nix_args: --keep CIRCLE_BRANCH --keep SPLICE_ROOT
          cmd: ./scripts/halt-on-bad-release-commit-msg.sh .halt-build-step
      - run_bash_command_in_nix:
          cmd_name: Check if images already exist
          cmd: |
            if make docker-image-reference-exists IMG_REF_EXISTS_ARG=--err-missing; then
              echo "Docker images already exist"
              # Running a circleci-agent command from within run_bash_command_in_nix does not work, so we create a file
              # that represents the need to halt, and call `circleci-agent step halt` in a separate `run` step
              touch .halt-build-step
            fi
      - run:
          name: Halt build step if images already exist
          command: |
            if [ -f ".halt-build-step" ]; then
              echo "skipping rebuilding and pushing"
              circleci-agent step halt
            fi
      - run_bash_command_in_nix:
          cmd_name: Build app
          cmd: make build -j
          cmd_retry_count: 5 # Retry in case of dependency download errors
          additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD"
      - docker_prep_build
      - docker_build
      - run_bash_command_in_nix:
          cmd_name: Push Docker images
          additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY \
           --keep CIRCLE_BRANCH \
           --keep CIRCLE_REPOSITORY_URL \
           --keep CIRCLE_SHA1 \
           --keep GH_USER \
           --keep GH_TOKEN"
          cmd: |
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_USER" --password-stdin
            make docker-push -j
          cmd_retry_count: 5
      - run_bash_command_in_nix:
          additional_nix_args: "--keep ARTIFACTORY_USER \
            --keep ARTIFACTORY_PASSWORD \
            --keep CIRCLE_BRANCH \
            --keep OCI_DEV_HELM_REGISTRY \
            --keep GH_USER \
            --keep GH_TOKEN"
          cmd_name: Push Helm Artifacts
          cmd: |
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_USER" --password-stdin
            make cluster/helm/clean # otherwise the digests seem to be ignored as the charts are built in "Build app"
            make cluster/helm/write-digests
            make cluster/helm/build -j
            make cluster/helm/push -j
          cmd_retry_count: 5
      - run:
          name: Copy bundle
          command: |
            set -eou pipefail
            mkdir -p /tmp/artifacts
            cp apps/app/target/release/*.tar.gz /tmp/artifacts
      - run_bash_command_in_nix:
          cmd_name: Copy OpenAPI specs
          cmd: |
            set -eou pipefail
            scripts/copy-openapi.sh /tmp/artifacts/openapi.tar.gz
      - run_bash_command_in_nix:
          cmd_name: Rename release bundles
          cmd: |
            # we're renaming in a separate step because the `mv` command is not idempotent
            VERSION=$(get-snapshot-version)
            (cd /tmp/artifacts ; for filename in *.tar.gz; do mv "$filename" "${VERSION}_${filename}"; done)
      - run_bash_command_in_nix:
          cmd_name: Publish release bundles
          additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY"
          cmd: |
            echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
            export GOOGLE_CLOUD_PROJECT=da-cn-shared
            # we cp with -n so that it doesn't try to overwrite an already uploaded bundle with this version,
            # which would lead to an error due to a missing `delete` permission
            gsutil cp -n /tmp/artifacts/*.tar.gz gs://cn-release-bundles
          # We suspect that in case of concurrent uploads, one of the `gsutil cp` calls will fail with a 412 error,
          # which is not automatically retried by `gsutil`. Therefore, we retry the command here.
          cmd_retry_count: 2
      - when:
          condition:
            equal: [ << parameters.is_public >>, true ]
          steps:
            - run_bash_command_in_nix:
                cmd_name: Copy artifacts to Github Container Registry
                additional_nix_args: "--keep GH_TOKEN \
                  --keep GH_USER \
                  --keep DEV_HELM_REGISTRY \
                  --keep DEV_DOCKER_REGISTRY \
                  --keep RELEASE_HELM_REGISTRY \
                  --keep RELEASE_DOCKER_REGISTRY \
                  --keep ARTIFACTORY_USER \
                  --keep ARTIFACTORY_PASSWORD"
                cmd: |
                  make cluster/helm/copy_release_to_ghcr
                  make cluster/docker/copy_release_to_ghcr
            - run_bash_command_in_nix:
                cmd_name: tag git
                additional_nix_args: "--keep GH_TOKEN --keep GH_USER"
                cmd: |
                  git remote set-url origin https://${GH_USER}:${GH_TOKEN}@github.com/DACH-NY/canton-network-node.git
                  RELEASE_TAG=$(get-snapshot-version)

                  if [ $(git tag -l "${RELEASE_TAG}") ]; then
                    echo "tag ${RELEASE_TAG} already exists."
                    exit 1
                  else
                    git tag "${RELEASE_TAG}"
                    git push origin "${RELEASE_TAG}"
                  fi

      - save_frontend_builds
      - save_sbt_job_result:
          runner_type: "circleci"

  wait_for_previous_pipeline:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to wait for.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$|release-line.*"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
      wait_type:
        type: string
        default: "wait"
    steps:
      - checkout_with_retry
      - run:
          name: "Wait for previous pipeline"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh \
              --current_pipeline_number << pipeline.number >> \
              --workflow_names "<< parameters.workflow_names >>" \
              --branch_filter "<< parameters.branch_filter >>" \
              --branch_filter_is_regex "<< parameters.branch_filter_is_regex >>" \
              --branch_ignores "<< parameters.branch_ignores >>" \
              --max_age_seconds << parameters.max_pipeline_age_secs >> \
              --waiting_job_name "wait_for_previous_pipeline" \
              << parameters.wait_type >>

  cancel_if_previous_pipeline:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to check if they exist and cancel current workflow if so.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$|release-line.*"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
      extra_seconds_after_finish:
        type: integer
        default: 0
    steps:
      - checkout_with_retry
      - run:
          name: "Cancel if previous pipeline"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh \
              --current_pipeline_number << pipeline.number >> \
              --workflow_names "<< parameters.workflow_names >>" \
              --branch_filter "<< parameters.branch_filter >>" \
              --branch_filter_is_regex "<< parameters.branch_filter_is_regex >>" \
              --branch_ignores "<< parameters.branch_ignores >>" \
              --max_age_seconds << parameters.max_pipeline_age_secs >> \
              --extra_seconds_after_finish << parameters.extra_seconds_after_finish >> \
              cancel_self

  cancel_if_other_pipeline_failed:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to check if they exist and cancel current workflow if so.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$|release-line.*"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 86400  # limit search to pipelines that are 24 hours old
      extra_seconds_after_finish:
        type: integer
        default: 0
    steps:
      - checkout_with_retry
      - run:
          name: "Cancel self if other pipeline failed"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh \
              --current_pipeline_number << pipeline.number >> \
              --workflow_names "<< parameters.workflow_names >>" \
              --branch_filter "<< parameters.branch_filter >>" \
              --branch_filter_is_regex "<< parameters.branch_filter_is_regex >>" \
              --branch_ignores "<< parameters.branch_ignores >>" \
              --max_age_seconds << parameters.max_pipeline_age_secs >> \
              --extra_seconds_after_finish << parameters.extra_seconds_after_finish >> \
              cancel_self_if_pipeline_failed

  cancel_previous_pipelines:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to cancel if they exist.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: ""
      branch_filter_is_regex:
        type: boolean
        default: false
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
    steps:
      - checkout_with_retry
      - run:
          name: "Cancel previous pipelines"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh \
              --current_pipeline_number << pipeline.number >> \
              --workflow_names "<< parameters.workflow_names >>" \
              --branch_filter "<< parameters.branch_filter >>" \
              --branch_filter_is_regex "<< parameters.branch_filter_is_regex >>" \
              --branch_ignores "<< parameters.branch_ignores >>" \
              --max_age_seconds << parameters.max_pipeline_age_secs >> \
              cancel_pipeline

  cancel_if_not_opt_in:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - skip_if_flag_set:
          flag: force
      - run:
          name: Cancel the entire workflow if the current commit does not opt in for CI
          command: |
            last_commit_msg=$(git log -1 --pretty=%B)
            if [[ "${last_commit_msg}" != *"[ci]"* ]] && [[ "${last_commit_msg}" != *"[static]"* ]]; then
              echo "Cancelling the entire workflow because the current commit does not opt in for CI."
              curl -fsSL -X POST -H "Circle-Token: ${CIRCLECI_TOKEN}" "https://circleci.com/api/v2/workflow/${CIRCLE_WORKFLOW_ID}/cancel"
            else
              echo "Current commit opts in, letting it run."
            fi

  cancel_if_current_commit_is_base_version:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - run:
          name: Cancel the entire workflow if the current commit is a base version
          command: |
            source .envrc.vars
            latest_base_version=$(build-tools/find_latest_base_version.sh)
            if [[ "${CIRCLE_SHA1}" == "${latest_base_version}" ]]; then
              echo "Cancelling the entire workflow because the current commit is a base version."
              curl -fsSL -X POST -H "Circle-Token: ${CIRCLECI_TOKEN}" "https://circleci.com/api/v2/workflow/${CIRCLE_WORKFLOW_ID}/cancel"
            else
              echo "Current commit is ${CIRCLE_SHA1}, latest base version is ${latest_base_version}."
            fi
      - notify-cluster-fail:
          cluster: "ciupgrade"

  launch_ciupgrade_workflow:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - run:
          name: Launches the deploy_ciupgrade workflow, disabling partial upgrade if there are Helm/Pulumi changes
          command: |
            source .envrc.vars

            # defaults for base-version, run-daml-upgrade and run-partial-upgrade are good for main-like branches
            .circleci/launch-upgrade.sh --cluster ciupgrade --branch-filter-wait "^main|deployment/.*$|release-line.*"
      - notify-cluster-fail:
          cluster: "ciupgrade"

  wait_for_daml_upgrade:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      run:
        type: boolean
        default: false
      cluster:
        type: string
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Wait for vote to be effective
          cluster: << parameters.cluster >>
          gce_authenticate: true
          additional_nix_args: "--keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID \
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET"
          cmd: |
            if [[ << parameters.run >> == true ]]; then
              cncluster activate
              cncluster wait_for_daml_upgrade
            fi
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
  test_DR:
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Run disaster recovery test
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET \
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET \
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET \
            --keep ARTIFACTORY_USER --keep ARTIFACTORY_PASSWORD"
          gce_authenticate: true
          cmd: |
            cncluster activate
            cncluster disaster_recovery_test

  release_hold_set_scratchnet:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout_with_retry
      - run:
          name: Release main hold job
          command: |
            .circleci/release-hold.sh "hold_set_scratchnet"

  trigger_pulumi_previews:
    executor: self_hosted
    steps:
      - checkout_with_retry
      - set_pr_target_branch
      - run:
          name: Checkout trigger-previews.sh from main
          command: |
            git fetch
            git checkout origin/main -- .circleci/trigger-previews.sh
      - run:
          name: Trigger previews
          command: |
            .circleci/trigger-previews.sh "set_previews"

  # Persists the choice of scratchnet cluster to a CCI workspace
  set_scratchnet:
    parameters:
      <<: *cluster-parameter
    docker:
      - image: cimg/base:2024.01
    steps:
      - run: mkdir -p /tmp/workspace
      - run:
          name: Getting selected cluster and setting it in workspace
          command: |
            n=0
            until [ $n -gt 5 ]; do
              released=$(curl -s --location --request GET "https://circleci.com/api/v2/workflow/$CIRCLE_WORKFLOW_ID/job" --header "Circle-Token: ${CIRCLECI_TOKEN}" | jq -r '.items[]|select(.name | test("use_scratchnet*"))|select(.status == "success").name')
              if [ -n "$released" ]; then
                TARGET_CLUSTER=$(echo $released | sed s/use_//)
                echo "The hold job $released has been released, using cluster: $cluster"
                echo "export TARGET_CLUSTER=$TARGET_CLUSTER" >> /tmp/workspace/cn_env_vars
                exit 0
              else
                echo "No hold job has not been released yet (iteration $n)"
                n=$((n+1))
                sleep 5
              fi
            done
            echo "ERROR! No cluster hold job has been released, did you accidentally manually release the set_scratchnet one?"
            exit 1
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
            - cn_env_vars

  notify_on_readme_changed:
    parameters:
      <<: *channel-notify-parameter
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout_with_retry
      - run:
          name: Send slack notification if documentation has been changed
          when: always
          command: |
            commit=$(git rev-parse HEAD)
            changed_files=$(git diff --name-only HEAD~ HEAD -- '*.md' '*.rst')
            changed_files_list=$(git diff --name-only HEAD~ HEAD -- '*.md' '*.rst' | sed ':a;N;$!ba;s/\n/\\n/g')
            if [ -n "$changed_files" ]; then
              echo "Setting GITHUB_COMMIT_URL as document change is detected in commit $commit"
              echo "export GITHUB_COMMIT_URL=\"https://github.com/DACH-NY/canton-network-node/commit/${commit}\"" >> "$BASH_ENV"
              echo "export CHANGED_DOC_FILES=\"${changed_files_list}\"" >> "$BASH_ENV"
            else
              echo "No document changes are detected."
              circleci-agent step halt
            fi
      - slack/notify:
          channel: << parameters.channel_notify >>
          event: always
          custom: |
            { "text": "*📄Changes to `.md` or `.rst` files have been detected and merged into the main branch.*\n<${GITHUB_COMMIT_URL}| View change at $(git log -1 --oneline --no-color | sed s/\"//g)>\n\nChanged files:\n```\n${CHANGED_DOC_FILES}\n```" }

  build_oss:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - skip_if_flag_set:
          flag: force
      - setup_nix_self_hosted:
          # it's actually slower if we have lots of conflicting jobs trying to save the same nix so we save it just in one job
          save: true
      - setup_sbt_test_job:
          runner_type: "selfhosted"
      - run_bash_command_in_nix:
          cmd_name: Check use of disallowed strings in OSS copy
          cmd: |
            scripts/check-repo-names.sh
      - clone_and_update_open_source
      - execute_sbt_command:
          working_dir: "/home/circleci/splice"
          pre_sbt_cmd: "export CI_IGNORE_DIRTY_REPO=1"
          cmd: "bundle"

  create_oss_pr:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - setup_sbt_test_job:
          runner_type: "selfhosted"
      - clone_and_update_open_source
      - run_bash_command_in_nix:
          cmd_name: Push changes to DA OSS
          additional_nix_args: "--keep GH_TOKEN --keep CIRCLE_BRANCH --keep SSH_AUTH_SOCK"
          cmd: |
            .circleci/create-splice-pr.sh /home/circleci/oss
      - run_bash_command_in_nix:
          cmd_name: Push changes to Splice
          additional_nix_args: "--keep GH_TOKEN --keep CIRCLE_BRANCH --keep SSH_AUTH_SOCK"
          cmd: |
            .circleci/create-splice-pr.sh /home/circleci/splice
      - run_bash_command_in_nix:
          cmd_name: Create release in DA OSS
          additional_nix_args: "--keep GH_TOKEN --keep CIRCLE_BRANCH --keep GCP_DA_CN_SHARED_KEY"
          working_dir: "/home/circleci/oss"
          cmd: |
            if [[ "$CIRCLE_BRANCH" =~ ^release-line-.*$ ]]; then
              # Authenticate to shared GCP project for downloading the artifacts
              echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
              # Create the release draft and upload the artifacts to it
              /home/circleci/project/.circleci/create-gh-release.sh ${CIRCLE_BRANCH/release-line-/}
            fi

  update_cilr:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Create branch to point CILR to and update tag
          additional_nix_args: "--keep GH_TOKEN --keep CIRCLE_BRANCH --keep SSH_AUTH_SOCK"
          cmd: |
            VERSION="$(get-snapshot-version)"
            .circleci/update-cilr.sh

  # TODO(#14845): Currently, building the repo on arm fails, so we cannot run the docker compose
  #               preflight there. We therefore for now only spin up the validator and check that
  #               it succeeds.
  deploy_arm_compose_validator:
    machine:
      image: ubuntu-2204:2024.01.1
      resource_class: arm.large
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
    steps:
      - checkout_with_retry
      - setup_nix
      - setup_vpn
      - docker_login_artifactory
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Activate cluster (configure kubectl)
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: cncluster activate
          cmd_retry_count: 5
      - run_bash_command_in_nix:
          cluster: << parameters.cluster >>
          cmd_name: Wait for SV app to be responsive
          cmd: |
            cncluster wait sv-1 sv-app
      - run_bash_command_in_nix:
          cmd: /tmp/vpn-scripts/create-docker-network-on-vpn.sh onvpn
      - run_bash_command_in_nix:
          additional_nix_args: >
            --keep ARTIFACTORY_USER
            --keep ARTIFACTORY_PASSWORD
            --keep GCP_DA_CN_SHARED_KEY
          cmd_name: Deploy the docker-compose validator
          cluster: << parameters.cluster >>
          cmd: |
            echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
            gcloud auth configure-docker us-central1-docker.pkg.dev
            build-tools/splice-compose.sh start -d -w -n onvpn -p "da-composeValidatorArm-1"
          cmd_retry_count: 3
      - store_artifacts:
          name: Store logs
          path: log
          destination: log
