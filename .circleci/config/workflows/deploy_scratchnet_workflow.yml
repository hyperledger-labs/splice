      - release_hold_set_scratchnet:
          requires:
            - use_scratchneta
      - hold_scratchnet:
          <<: *main-branch-never
          name: use_scratchnetb
          type: approval
      - release_hold_set_scratchnet:
          requires:
            - use_scratchnetb
      - hold_scratchnet:
          <<: *main-branch-never
          name: use_scratchnetc
          type: approval
      - release_hold_set_scratchnet:
          requires:
            - use_scratchnetc
      - hold_scratchnet:
          <<: *main-branch-never
          name: use_scratchnetd
          type: approval
      - release_hold_set_scratchnet:
          requires:
            - use_scratchnetd
      - hold_scratchnet:
          <<: *main-branch-never
          name: use_scratchnete
          type: approval
      - release_hold_set_scratchnet:
          requires:
            - use_scratchnete
      - hold_set_scratchnet:
          <<: *main-branch-never
          type: approval
      - set_scratchnet:
          <<: *main-branch-never
          requires:
            - hold_set_scratchnet
      - artifacts_push:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          requires:
            - set_scratchnet
      - test_DR:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "user-selected-scratchnet"
          requires:
            - artifacts_push
