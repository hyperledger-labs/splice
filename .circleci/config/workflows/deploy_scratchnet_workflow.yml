      - preflight_sv_check:
          name: preflight_sv_check_DR
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "user-selected-scratchnet"
          migration_id: 1
          requires:
            - test_DR
      - deploy_validator_runbook:
