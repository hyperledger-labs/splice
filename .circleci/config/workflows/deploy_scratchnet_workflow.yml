  # Simple deployment with no migration
  deploy_scratchnet_basic:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - hold_scratchnet:
          <<: *main-branch-never
          name: use_scratchneta
          type: approval
      - release_hold_set_scratchnet:
          requires:
            - use_scratchneta
      - hold_scratchnet:
          <<: *main-branch-never
          name: use_scratchnetb
          type: approval
      - release_hold_set_scratchnet:
          requires:
            - use_scratchnetb
      - hold_scratchnet:
          <<: *main-branch-never
          name: use_scratchnetc
          type: approval
      - release_hold_set_scratchnet:
          requires:
            - use_scratchnetc
      - hold_scratchnet:
          <<: *main-branch-never
          name: use_scratchnetd
          type: approval
      - release_hold_set_scratchnet:
          requires:
            - use_scratchnetd
      - hold_scratchnet:
          <<: *main-branch-never
          name: use_scratchnete
          type: approval
      - release_hold_set_scratchnet:
          requires:
            - use_scratchnete
      - hold_set_scratchnet:
          <<: *main-branch-never
          type: approval
      - set_scratchnet:
          <<: *main-branch-never
          requires:
            - hold_set_scratchnet
      - build_tests_self_hosted:
          <<: *notify-fail
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
      - build_tests_circleci:
          <<: *notify-fail
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
            - set_scratchnet
      - artifacts_push:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          requires:
            - set_scratchnet
      - reset_cluster:
          name: "reset_initially"
          cluster: "user-selected-scratchnet"
          extra_migrations_reset: "0,1"
          unlock_shared_cluster: false
          silence_deployment_alerts: true
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - set_scratchnet
      - deploy_cluster:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "user-selected-scratchnet"
          # deployment/scratchnet* branches break the workflow links from Github to CircleCI.
          # So we want to avoid creating them.
          update_deployment_branch: false
          cancel_workflow_on_failure: true
          deploy_retry_count: 0
          requires:
            - reset_initially
            - artifacts_push
            - set_scratchnet
      - preflight_check:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "user-selected-scratchnet"
          wait_for_sv: false
          requires:
            - deploy_cluster
            - build_tests_self_hosted
      - preflight_check_docker:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "user-selected-scratchnet"
          wait_for_sv: false
          requires:
            - deploy_cluster
            - build_tests_circleci
      - backup_cluster:
          <<: *main-branch-never
          cluster: "user-selected-scratchnet"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster
            - deploy_sv_runbook
      - restore_node:
          <<: *main-branch-never
          cluster: "user-selected-scratchnet"
          namespace_name: "sv-3"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_check
            - preflight_check_docker
            - preflight_sv_check
            - preflight_validator_check
            - deploy_arm_compose_validator
            - backup_cluster
      - restore_node:
          name: "restore_validator_node"
          <<: *main-branch-never
          cluster: "user-selected-scratchnet"
          namespace_name: "validator1"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_check
            - preflight_check_docker
            - preflight_sv_check
            - preflight_validator_check
            - backup_cluster
      - deploy_sv_runbook:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "user-selected-scratchnet"
          deploy_retry_count: 0
          requires:
            - deploy_cluster
      - preflight_sv_check:
           <<: *main-branch-never
           context:
             - artifactory
             - canton-network-vpn
             - slack-context
           cluster: "user-selected-scratchnet"
           requires:
             - deploy_cluster
             - build_tests_self_hosted
      - deploy_validator_runbook:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "user-selected-scratchnet"
          deploy_retry_count: 0
          requires:
            - deploy_cluster
      - preflight_validator_check:
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "user-selected-scratchnet"
          requires:
            - deploy_cluster
            - build_tests_self_hosted
      - deploy_arm_compose_validator:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "user-selected-scratchnet"
          requires:
            - deploy_cluster
            - build_tests_circleci
      - reset_cluster:
          <<: *main-branch-never
          cluster: "user-selected-scratchnet"
          context:
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_validator_check
            - preflight_sv_check
            - restore_node


  deploy_scratchnet_DR:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
