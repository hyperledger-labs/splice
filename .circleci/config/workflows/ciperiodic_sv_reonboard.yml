workflow:
  deploy_ciperiodic_sv_reonboard:
    when:
      equal: [ deploy-ciperiodic-sv-reonboard, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_ciperiodic_sv_reonboard"
          wait_type: "wait_workflow"
      - docker_images_push:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          requires:
            - wait_for_previous_pipeline
      - deploy_cluster:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          # deployment/scratchnet* branches break the workflow links from Github to CircleCI.
          # So we want to avoid creating them.
          update_deployment_branch: false
          cancel_workflow_on_failure: true
          requires:
            - docker_images_push
      - deploy_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          requires:
            - deploy_cluster
      - preflight_check:
          name: "offboard_sv_runbook"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          test_names_file: "test-full-class-names-offboard-sv-runbook-preflight.log"
          parallelism: 1
          wait_for_sv: false
          requires:
            - deploy_sv_runbook
      - deploy_validator_to_recover_sv_amulets:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          validator_party_hint: "DA-Helm-Test-Node"
          validator_new_participant_id: "new-participant"
          restore_identity_from_sv_runbook: true
          cluster: "ciperiodic"
          requires:
            - offboard_sv_runbook
      - deploy_sv_runbook:
          name: "redeploy_sv_runbook"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          requires:
            - deploy_validator_to_recover_sv_amulets
      - preflight_check:
          name: "preflight_sv_reonboard_check"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          test_names_file: "test-full-class-names-re-onboard-sv-runbook-preflight.log"
          parallelism: 1
          wait_for_sv: false
          requires:
            - redeploy_sv_runbook
      - reset_cluster:
          <<: *main-branch-only
          cluster: "ciperiodic"
          context:
            - canton-network-vpn
          requires:
            - preflight_sv_reonboard_check
