workflow:
  testnet_health_check:
    when:
      equal: [ healthcheck-testnet, << pipeline.parameters.run-job >> ]
    jobs:
      - preflight_check:
          <<: *non_devnet_preflight_params
          filters:
            branches:
              only:
                - release-line-0.1.15
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "testnet"
          migration_id: 2
          context:
            - artifactory
            - canton-network-vpn
            - slack-context

  backup_testnet:
    when:
      equal: [ backup-testnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_cluster:
          filters:
            branches:
              only:
                - release-line-0.1.15
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "testnet"
          migration_id: << pipeline.parameters.migration-id >>
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
