workflow:
  deploy_cimain:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cimain"
          wait_type: "wait_workflow"
      - deploy_cluster:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cimain"
          update_deployment_branch: false  # No need to create a deployment branch for cimain
          silence_deployment_alerts: true
          cancel_workflow_on_failure: true
          deploy_retry_count: 0  # Alert us more quickly on hard deployment failures
          requires:
            - wait_for_previous_pipeline
            - artifacts_push
      - preflight_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cimain"
          wait_for_sv: false
          requires:
            - wait_for_previous_pipeline
            - artifacts_push
      - deploy_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cimain"
          silence_deployment_alerts: true
          deploy_retry_count: 0  # Alert us more quickly on hard deployment failures
          requires:
            - deploy_cluster
      - preflight_sv_check:
           <<: *main-branch-only
           context:
             - artifactory
             - canton-network-vpn
             - slack-context
           cluster: "cimain"
           requires:
             - deploy_cluster
      - deploy_validator_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cimain"
          silence_deployment_alerts: true
          deploy_retry_count: 0  # Alert us more quickly on hard deployment failures
          requires:
            - deploy_cluster
      - preflight_validator_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cimain"
          requires:
            - deploy_cluster
      - backup_cluster:
          <<: *main-branch-only
          cluster: "cimain"
          migration_id: 0
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster
            - deploy_sv_runbook
            - deploy_validator_runbook
      - restore_node:
          <<: *main-branch-only
          cluster: "cimain"
          namespace_name: "sv-3"
          migration_id: 0
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - backup_cluster
            - preflight_sv_check
            - preflight_validator_check
            - preflight_check
      - reset_cluster:
          <<: *main-branch-only
          cluster: "cimain"
          is_shared_cluster: false
          context:
            - canton-network-vpn
            - slack-context
          requires:
            - restore_node
