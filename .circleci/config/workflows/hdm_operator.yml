workflow:
  deploy_hdm_operator:
    when:
      equal: [ deploy-hdm-operator, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          # a bit weird that we're waiting on the periodic workflows but we're filtering on the branch so it should be fine
          workflow_names: "deploy_hdm_operator deploy_ciperiodic_sv_reonboard deploy_ciperiodic_non_devnet"
          wait_type: "wait_workflow"
          branch_filter: << pipeline.git.branch >>
      - artifacts_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - autoscaler_prevent_scaledown:
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_previous_pipeline
      - reset_cluster:
          name: "reset_before_deploy"
          cluster: << pipeline.parameters.cluster >>
          extra_migrations_reset: "0,1"
          unlock_shared_cluster: false
          context:
            - slack-context
          requires:
            - wait_for_previous_pipeline
      - deploy_cluster_for_migration_base_version:
          name: "deploy_cluster_for_migration"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          base_version: << pipeline.parameters.base-version >>
          git_repo: << pipeline.parameters.git-repo >>
          requires:
            - artifacts_push
            - autoscaler_prevent_scaledown
            - reset_before_deploy
      - pre_migration_dump_identities:
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          requires:
            - prepare_cluster_for_migration
      - pre_migration_compose_validator:
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          base_version: << pipeline.parameters.base-version >>
          requires:
            - artifacts_push
            - autoscaler_prevent_scaledown
            - reset_before_deploy
      - prepare_cluster_for_migration:
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          base_version: << pipeline.parameters.base-version >>
          git_repo: << pipeline.parameters.git-repo >>
          requires:
            - deploy_cluster_for_migration
      - trigger_global_domain_migration:
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - prepare_cluster_for_migration
      - migrate_cluster:
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - trigger_global_domain_migration
            - pre_migration_compose_validator
      - preflight_check:
          name: "preflight_check_migrated"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            - migrate_cluster
      - preflight_sv_check:
          name: "preflight_sv_check_migrated"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            - migrate_cluster
      - post_migration_verify_identities:
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          requires:
            - pre_migration_dump_identities
            - migrate_cluster
      - preflight_validator_check:
          name: "preflight_validator_check_migrated"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            - migrate_cluster
      - post_migration_compose_validator:
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - migrate_cluster
      - backup_cluster:
          name: "backup_cluster_after_migration"
          cluster: << pipeline.parameters.cluster >>
          checkout-branch: "<< pipeline.parameters.cluster >>-migration-upgrade"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated
      - restore_node:
          cluster: << pipeline.parameters.cluster >>
          checkout-branch: "<< pipeline.parameters.cluster >>-migration-upgrade"
          namespace_name: "sv-3"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - backup_cluster_after_migration
      - reset_and_wait_for_operator_to_redeploy_sv_runbook:
          name: "deploy_fresh_sv_runbook_after_migration"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated
      - preflight_sv_check:
          name: "preflight_sv_check_redeployed"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            # We wait for the runbook to redeploy to make sure we're not testing the original deployment
            - deploy_fresh_sv_runbook_after_migration
      - archive_legacy_migration:
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - restore_node
            - preflight_sv_check_redeployed
            - post_migration_compose_validator
      - reset_cluster:
          cluster: << pipeline.parameters.cluster >>
          extra_migrations_reset: "0,1"
          context:
            - canton-network-vpn
            - slack-context
          requires:
            - archive_legacy_migration
      - autoscaler_allow_scaledown:
          cluster: << pipeline.parameters.cluster >>
          requires:
            - archive_legacy_migration
