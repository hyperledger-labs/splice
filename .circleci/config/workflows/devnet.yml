workflow:
  devnet_health_check:
    when:
      equal: [ healthcheck-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_devnet"
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/devnet
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "devnet"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - cancel_if_previous_pipeline

  reset_sv_runbook_devnet:
    when:
      equal: [ reset-sv-runbook-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - slack-context
          workflow_names: "reset_sv_runbook_devnet"
      - reset_sv_runbook:
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "devnet"
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          requires:
            - wait_for_previous_pipeline

  reset_validator_runbook_devnet:
    when:
      equal: [ reset-validator-runbook-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - slack-context
          workflow_names: "reset_validator_runbook_devnet"
      - reset_validator_runbook:
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "devnet"
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          requires:
            - wait_for_previous_pipeline

  healthcheck_sv_runbook_devnet:
    when:
      equal: [ healthcheck-sv-runbook-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - slack-context
          workflow_names: "healthcheck_sv_runbook_devnet reset_sv_runbook_devnet"
      - preflight_sv_check:
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "devnet"
          migration_id: 2
          requires:
            - wait_for_previous_pipeline

  healthcheck_validator_runbook_devnet:
    when:
      equal: [ healthcheck-validator-runbook-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - slack-context
          workflow_names: "healthcheck_validator_runbook_devnet reset_validator_runbook_devnet"
      - preflight_validator_check:
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "devnet"
          migration_id: 2
          requires:
            - wait_for_previous_pipeline

  backup_devnet:
    when:
      equal: [ backup-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/devnet
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_devnet"
      - backup_cluster:
          filters:
            branches:
              only:
                - deployment/devnet
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "devnet"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline
