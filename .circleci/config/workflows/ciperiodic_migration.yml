workflow:
  deploy_ciperiodic_migration:
    when:
      equal: [ deploy-ciperiodic-migration, << pipeline.parameters.run-job >> ]
    jobs:
      - docker_images_push:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_ciperiodic_migration"
          wait_type: "wait_workflow"
      - deploy_cluster:
          name: "deploy_cluster_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          send_deployment_notification: false
          update_deployment_branch: false  # No need to create a deployment branch for ciperiodic
          cancel_workflow_on_failure: true
          deploy_version: << pipeline.parameters.base-version >>
          requires:
            - wait_for_previous_pipeline
            - docker_images_push
      - deploy_sv_runbook:
          name: "deploy_sv_runbook_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          send_deployment_notification: false
          deploy_version: << pipeline.parameters.base-version >>
          requires:
            - deploy_cluster_for_migration
      - deploy_validator_runbook:
          name: "deploy_validator_runbook_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          deploy_version: << pipeline.parameters.base-version >>
          requires:
            - deploy_cluster_for_migration
      - preflight_check:
          name: "trigger_global_domain_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          test_names_file: "test-full-class-names-global-domain-upgrade-preflight.log"
          parallelism: 1
          wait_for_sv: false
          cluster_version: << pipeline.parameters.base-version >>
          requires:
            - prepare_cluster_for_migration
            - prepare_sv_runbook_for_migration
      - backup_cluster:
          name: "backup_cluster_before_migration"
          <<: *main-branch-only
          cluster: "ciperiodic"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - trigger_global_domain_migration
      - hard_migration:
          name: "prepare_cluster_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          action: "prepare"
          scope: "core"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - deploy_cluster_for_migration
            - deploy_sv_runbook_for_migration
            - deploy_validator_runbook_for_migration
      - hard_migration_vpn: # VPN is required to resolve Validator1's PartyId
          name: "prepare_sv_runbook_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          action: "prepare"
          scope: "sv"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - deploy_cluster_for_migration
            - deploy_sv_runbook_for_migration
            - deploy_validator_runbook_for_migration
      - hard_migration:
          name: "migrate_cluster"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          action: "migrate"
          scope: "core"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - prepare_cluster_for_migration
            - backup_cluster_before_migration
      - preflight_check:
          name: "preflight_check_migrated"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            - backup_cluster_before_migration
      - hard_migration_vpn: # VPN is required to resolve Validator1's PartyId
          name: "migrate_sv_runbook"
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          action: "migrate"
          scope: "sv"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - prepare_sv_runbook_for_migration
            - backup_cluster_before_migration
      - preflight_sv_check:
          name: "preflight_sv_check_migrated"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            - backup_cluster_before_migration
      - hard_migration:
          name: "migrate_validator_runbook"
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          action: "migrate"
          scope: "validator"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - backup_cluster_before_migration
      - preflight_validator_check:
          <<: *main-branch-only
          name: "preflight_validator_check_migrated"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            - backup_cluster_before_migration
      - restore_node:
          <<: *main-branch-only
          cluster: "ciperiodic"
          namespace_name: "sv-3"
          expected_migration_id: 1
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated
      - reset_cluster:
          <<: *main-branch-only
          cluster: "ciperiodic"
          context:
            - canton-network-vpn
          requires:
            - restore_node
