workflow:
  cilr_health_check:
    when:
      equal: [ healthcheck-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          # Only wait for deployments, concurrent preflight checks are fine.
          workflow_names: "reset_sv_runbook_cilr"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_cilr"
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cilr
          cluster: "cilr"
          channel_notify: C06VDG5RXNE # team-canton-network-cilr-notifications
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline
            - cancel_if_previous_pipeline

  reset_sv_runbook_cilr:
    when:
      equal: [ reset-sv-runbook-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "reset_sv_runbook_cilr"
      - reset_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cilr"
          channel_notify: C06VDG5RXNE # team-canton-network-cilr-notifications
          requires:
            - wait_for_previous_pipeline

  reset_validator_runbook_cilr:
    when:
      equal: [ reset-validator-runbook-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "reset_validator_runbook_cilr"
      - reset_validator_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cilr"
          channel_notify: C06VDG5RXNE # team-canton-network-cilr-notifications
          requires:
            - wait_for_previous_pipeline
