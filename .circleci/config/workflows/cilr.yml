workflow:
  deploy_cilr:
    when:
      equal: [ deploy-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - docker_images_push:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cilr cilr_health_check redeploy_sv_runbook_cilr"
      - deploy_cluster:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cilr"
          requires:
            - docker_images_push
            - wait_for_previous_pipeline
      - deploy_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cilr"
          requires:
            - deploy_cluster
      - deploy_validator_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cilr"
          requires:
            - deploy_cluster
       # TODO(#10017): See if we want to re-enable them at some point
#      - preflight_check:
#          cluster: "cilr"
#          <<: *main-branch-only
#          context:
#            - artifactory
#            - canton-network-vpn
#            - slack-context
#          # require deploy_cluster and deploy_sv_runbook for stability and reliability
#          requires:
#            - docker_images_push
#            - deploy_cluster
#            - deploy_sv_runbook
#      - publish_public_release:
#          <<: *main-branch-only
#          requires:
#            - preflight_check
#          context:
#            - artifactory
#            - slack-context
      - preflight_sv_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cilr"
          requires:
            - deploy_sv_runbook
      - preflight_validator_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cilr"
          requires:
            - deploy_validator_runbook

  cilr_health_check:
    when:
      equal: [ healthcheck-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          # Only wait for deployments, concurrent preflight checks are fine.
          workflow_names: "redeploy_sv_runbook_cilr"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_cilr"
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cilr
          cluster: "cilr"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline
            - cancel_if_previous_pipeline

  redeploy_sv_runbook_cilr:
    when:
      equal: [ redeploy-sv-runbook-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cilr redeploy_sv_runbook_cilr cilr_health_check"
      - docker_images_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          skip_if_exists: true
      - deploy_sv_runbook:
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          cluster: "cilr"
          use_published_artifacts: false
          requires:
            - wait_for_previous_pipeline
            - docker_images_push
      - preflight_sv_check:
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cilr"
          requires:
            - deploy_sv_runbook
