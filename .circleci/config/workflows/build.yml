workflow:

  publish_public_artifacts:
    when:
      equal: [ publish-public-artifacts, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - publish_public_release:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - artifacts_push
      - create_oss_pr:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - artifacts_push

  build:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_previous_pipelines:
          <<: *notify-fail
          context:
            - slack-context
          workflow_names: "build"
          branch_filter: "$CIRCLE_BRANCH"
          # cannot use a simple CCI branch filter for the job since this job is a dependency for all the other jobs in this workflow
          # and cannot be skipped
          branch_ignores: "^(main|deployment/.*|release-line.*)$"
          max_pipeline_age_secs: 7776000  # 90 days which is the max that the CCI API allows for pipeline cancellation
      - cancel_if_not_opt_in:
          <<: *notify-fail
          filters:
            branches:
              ignore:
                - /release-line-.*/
                - main
      # Daml
      # TODO(#15988): In this job we currently also save the nix cache, if we migrate this
      # before others, make sure to enable saving the nix cache in some other job instead.
      - daml_test:
          <<: *minor-release-branch-never
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      # Scala
      - scala_test:
          <<: *minor-release-branch-never
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test app upgrade"
          test_names_file: "test-full-class-names-app-upgrade.log"
          start_canton_options: "-w"
          resource_class: "xlarge"
          parallelism: 1
          pre_sbt_cmd: "export CI_IGNORE_DIRTY_REPO=1; ./build-tools/prep-app-upgrade-test"
          skip_if_regex: "\\[breaking\\]"
          skip_if_files_changed: "nix/canton-sources.json"
      - scala_test:
          <<: *minor-release-branch-never
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test with docker images"
          test_names_file: "test-full-class-names-docker-based.log"
          start_canton_options: "-w -m"
          additional_nix_args: >
            --keep VALIDATOR_WEB_UI_PASSWORD
            --keep OIDC_AUTHORITY_VALIDATOR_AUDIENCE
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
          with_docker_images: true
          resource_class: "2xlarge"
          parallelism: 2
      - bundle:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      # Ops
      - update_pipeline_schedule:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - docker_images_build:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - notify_on_readme_changed:
          <<: *main-branch-only
          context:
            - slack-context
          channel_notify: C03J6NCPSE4
      - build_oss:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
