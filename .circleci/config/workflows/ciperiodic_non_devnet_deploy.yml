workflow:
  deploy_ciperiodic_non_devnet:
    when:
      equal: [ deploy-ciperiodic-non-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_ciperiodic_migration deploy_ciperiodic_sv_reonboard deploy_ciperiodic_non_devnet"
          wait_type: "wait_workflow"
      - autoscaler_prevent_scaledown:
          <<: *main-branch-only
          cluster: "ciperiodic"
          requires:
            - wait_for_previous_pipeline
      - reset_cluster:
          name: "reset_initially"
          cluster: "ciperiodic"
          extra_migrations_reset: "0,1"
          silence_deployment_alerts: true
          context:
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline
      - deploy_cluster:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          update_deployment_branch: false
          cancel_workflow_on_failure: true
          force_non_devnet: true
          requires:
            - reset_initially
            - artifacts_push
      - preflight_check:
          <<: *main-branch-only
          <<: *non_devnet_preflight_params
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          force_non_devnet: true
          requires:
            - wait_for_previous_pipeline
            - artifacts_push
      - deploy_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          force_non_devnet: true
          requires:
            - deploy_cluster
      - preflight_sv_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          force_non_devnet: true
          requires:
             - deploy_cluster
      - deploy_validator_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          force_non_devnet: true
          requires:
            - deploy_cluster
      - preflight_validator_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          force_non_devnet: true
          requires:
            - deploy_cluster
      - reset_cluster:
          <<: *main-branch-only
          cluster: "ciperiodic"
          context:
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_sv_check
            - preflight_validator_check
            - preflight_check
      - autoscaler_allow_scaledown:
          <<: *main-branch-only
          cluster: "ciperiodic"
          requires:
            - preflight_sv_check
            - preflight_validator_check
            - preflight_check
