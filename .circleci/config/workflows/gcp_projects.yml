workflow:
  update_gcp_projects:
    when:
      equal: [ update-gcp-projects, << pipeline.parameters.run-job >> ]
    jobs:
      - update_gcp_project:
          <<: *main-branch-only
          name: Update da-cn-scratchnets
          cluster: scratchneta
          context:
            - artifactory
      - update_gcp_project:
          <<: *main-branch-only
          name: Update da-cn-ci
          cluster: cimain
          context:
            - artifactory
      - update_gcp_project:
          <<: *main-branch-only
          name: Update da-cn-ci-2
          cluster: cidaily
          context:
            - artifactory
      - update_gcp_project:
          <<: *main-branch-only
          name: Update da-cn-devnet
          cluster: devnet
          context:
            - artifactory
      - update_gcp_project:
          <<: *main-branch-only
          name: Update da-cn-mainnet
          cluster: mainnet
          context:
            - artifactory
