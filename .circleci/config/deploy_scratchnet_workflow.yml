
  deploy__CLUSTERNAME_:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - hold:
          <<: *main-branch-never
          type: approval
      # Deployment
      - docker_images_push:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          requires:
            - hold
      - deployment_test:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          requires:
            - hold
      - deploy_cluster:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          # deployment/scratchnet* branches break the workflow links from Github to CircleCI.
          # So we want to avoid creating them.
          update_deployment_branch: false
          prepare_global_domain_upgrade: true
          cancel_workflow_on_failure: true
          requires:
            - deployment_test
            - docker_images_push
      - preflight_check:
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          wait_for_sv: false
          wait_for_third_party: false
          test_names_file: "test-full-class-names-core-preflight.log"
          parallelism: 1
          requires:
            - docker_images_push
      - preflight_check:
          name: "trigger_global_domain_migration"
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          test_names_file: "test-full-class-names-global-domain-upgrade-preflight.log"
          parallelism: 1
          wait_for_sv: false
          wait_for_third_party: false
          requires:
            - preflight_check
            - backup_cluster
      - deploy_cluster:
          name: "deploy_global_domain_upgrade"
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          # deployment/scratchnet* branches break the workflow links from Github to CircleCI.
          # So we want to avoid creating them.
          update_deployment_branch: false
          global_domain_upgrade_migration_id: 1
          requires:
            - trigger_global_domain_migration
      - backup_cluster:
          <<: *main-branch-never
          cluster: "_CLUSTERNAME_"
          include_non_sv_nodes: false
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster
      - restore_node:
          <<: *main-branch-never
          cluster: "_CLUSTERNAME_"
          namespace_name: "sv-3"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - trigger_global_domain_migration
      - deploy_cluster:
          name: "switch_global_domain_upgrade"
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          # deployment/scratchnet* branches break the workflow links from Github to CircleCI.
          # So we want to avoid creating them.
          update_deployment_branch: false
          global_domain_active_migration_id: 1
          requires:
            - deploy_global_domain_upgrade
            - restore_node
      - backup_cluster:
          <<: *main-branch-never
          # backup splitwell and validator1
          name: "backup_after_global_domain_upgrade"
          cluster: "_CLUSTERNAME_"
          include_sv: false
          parallelism: 1
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - switch_global_domain_upgrade
      - preflight_check:
          name: "preflight_check_global_domain_upgrade"
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          migration_id: 1
          requires:
            - switch_global_domain_upgrade
      - deploy_sv_runbook:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - switch_global_domain_upgrade
          global_domain_migration_id: 1
      # TODO(#10038) Reenable this once TxLogs work across domain migrations.
      # - preflight_sv_check:
      #     <<: *main-branch-never
      #     context:
      #       - artifactory
      #       - canton-network-vpn
      #       - slack-context
      #     cluster: "_CLUSTERNAME_"
      #     requires:
      #       - switch_global_domain_upgrade
      - deploy_validator_runbook:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - switch_global_domain_upgrade
      - preflight_validator_check:
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - switch_global_domain_upgrade
      - reset_cluster:
          <<: *main-branch-never
          cluster: "_CLUSTERNAME_"
          context:
            - canton-network-vpn
          requires:
            - backup_after_global_domain_upgrade
            # TODO(#10038) Reenable this once TxLogs work across domain migrations.
            # - preflight_sv_check
            - preflight_validator_check
            - preflight_check_global_domain_upgrade
