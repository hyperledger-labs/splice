
  deploy__CLUSTERNAME_:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - hold:
          <<: *main-branch-never
          type: approval
      # Deployment
      - docker_images_push:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          requires:
            - hold
      - deployment_test:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          requires:
            - hold
      - deploy_cluster:
          name: "deploy_cluster_for_migration"
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          # deployment/scratchnet* branches break the workflow links from Github to CircleCI.
          # So we want to avoid creating them.
          update_deployment_branch: false
          cancel_workflow_on_failure: true
          requires:
            - deployment_test
            - docker_images_push
      - preflight_check:
          name: "preflight_check_core"
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          wait_for_sv: false
          wait_for_splitwell: false
          # TODO(#10254) run splitwell tests once it's fixed
          test_names_file: "test-full-class-names-core-preflight.log,test-full-class-names-validator1-preflight.log"
          parallelism: 1
          requires:
            - docker_images_push
      - backup_cluster:
          name: "backup_cluster_before_migration"
          <<: *main-branch-never
          cluster: "_CLUSTERNAME_"
          include_splitwell: false
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster_for_migration
      - preflight_check:
          name: "trigger_global_domain_migration"
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          test_names_file: "test-full-class-names-global-domain-upgrade-preflight.log"
          parallelism: 1
          wait_for_sv: false
          wait_for_splitwell: false
          requires:
            - preflight_check_core
            - backup_cluster_before_migration
      - deploy_cluster:
          name: "migrate_cluster"
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          # deployment/scratchnet* branches break the workflow links from Github to CircleCI.
          # So we want to avoid creating them.
          update_deployment_branch: false
          global_domain_active_migration_id: 1
          global_domain_migrate_from_id: 0
          global_domain_legacy_migration_id: 0
          requires:
            - trigger_global_domain_migration
      - preflight_check:
          name: "preflight_check_migrated"
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          migration_id: 1
          parallelism: 1
          requires:
            - trigger_global_domain_migration
      - deploy_sv_runbook:
          name: "deploy_sv_runbook_migrated"
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - migrate_cluster
          global_domain_migration_id: 1
      - preflight_sv_check:
          name: "preflight_sv_check_migrated"
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - trigger_global_domain_migration
      - deploy_validator_runbook:
          name: "deploy_validator_runbook_migrated"
          global_domain_migration_id: 1
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - migrate_cluster
      - preflight_validator_check:
          name: "preflight_validator_check_migrated"
          migration_id: 1
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - trigger_global_domain_migration
      - restore_node:
          name: "restore_node_after_migration"
          <<: *main-branch-never
          cluster: "_CLUSTERNAME_"
          namespace_name: "sv-3"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated
      - reset_cluster:
          <<: *main-branch-never
          cluster: "_CLUSTERNAME_"
          context:
            - canton-network-vpn
          requires:
            - restore_node_after_migration
            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated
      # Simple deployment with no migration
      - hold:
          name: "hold_basic"
          <<: *main-branch-never
          type: approval
      # Deployment
      - docker_images_push:
          name: "docker_images_push_basic"
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          requires:
            - hold_basic
      - deployment_test:
          name: "deployment_test_basic"
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          requires:
            - hold_basic
      - deploy_cluster:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          # deployment/scratchnet* branches break the workflow links from Github to CircleCI.
          # So we want to avoid creating them.
          update_deployment_branch: false
          cancel_workflow_on_failure: true
          requires:
            - deployment_test_basic
            - docker_images_push_basic
      - preflight_check:
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          parallelism: 1
          requires:
            - docker_images_push_basic
      - backup_cluster:
          <<: *main-branch-never
          cluster: "_CLUSTERNAME_"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster
            - deploy_sv_runbook
      - restore_node:
          <<: *main-branch-never
          cluster: "_CLUSTERNAME_"
          namespace_name: "sv-3"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_check
            - preflight_sv_check
            - preflight_validator_check
            - backup_cluster
      - deploy_sv_runbook:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - deploy_cluster
      - preflight_sv_check:
           <<: *main-branch-never
           context:
             - artifactory
             - canton-network-vpn
             - slack-context
           cluster: "_CLUSTERNAME_"
           requires:
             - deploy_cluster
      - deploy_validator_runbook:
          <<: *main-branch-never
          context:
            - artifactory
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - deploy_cluster
      - preflight_validator_check:
          <<: *main-branch-never
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "_CLUSTERNAME_"
          requires:
            - deploy_cluster
      - reset_cluster:
          <<: *main-branch-never
          cluster: "_CLUSTERNAME_"
          context:
            - canton-network-vpn
          requires:
            - preflight_validator_check
            - preflight_check
            - preflight_sv_check
            - restore_node
