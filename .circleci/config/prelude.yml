# Scala CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/sample-config/ for more details
#
version: 2.1
orbs:
  slack: circleci/slack@4.9.3

env: &env
  TERM: dumb
  CI: "true"
  USER: circleci

non_devnet_preflight_params: &non_devnet_preflight_params
  parallelism: 1
  test_names_file: "test-full-class-names-core-preflight-non-devnet.log"

parameters:
  # Bump this when you change the definition of what is being cached to make sure
  # old files don't pollute your build.
  cache-version:
    type: string
    default: "39"
  run-job:
    type: enum
    enum:
      [
        build,
        deploy-cidaily,
        deploy-cilr,
        deploy-ciupgrade,
        deploy-ciperiodic-migration,
        deploy-ciperiodic-sv-reonboard,
        # Disabled to avoid accidental use. We keep the code for now in case
        # we do want to do a full reset.
        # TODO(#11648) Consider deleting this.
        # deploy-devnet,
        # deploy-testnet,
        healthcheck-cidaily,
        healthcheck-cidaily-testnet,
        healthcheck-cilr,
        healthcheck-devnet,
        healthcheck-testnet,
        redeploy-sv-runbook-cidaily,
        redeploy-validator-runbook-cidaily,
        redeploy-sv-runbook-devnet,
        redeploy-validator-runbook-devnet,
        reset-sv-runbook-cilr,
        backup-cidaily,
        restore-sv-cidaily,
        backup-cidaily-testnet,
        restore-validator-cidaily,
        restore-validator-cidaily-testnet,
        backup-devnet,
        backup-testnet,
        publish-public-artifacts,
        auth0-user-cleanup,
        cluster-lock-reaper,
        mark-for-testnet,
        apply-infra,
        update-deployment,
        preview-changes
      ]
    default: build
  # Tag the current commit for the next DevNet release, overwriting the existing tag if it exists.
  mark-for-devnet:
    type: boolean
    default: false
  # Tag the current commit for the next DevNet release if no commit is tagged already.
  mark-for-devnet-if-unmarked:
    type: boolean
    default: false
  # Overwrite the bootstrapping config for a cluster. If not set,
  # the cluster will be bootstrapped from the preceeding version of the cluster.
  bootstrapping-config:
    type: string
    default: ""
  # Whether the cluster should be reset before deploying.
  # It only makes sense to unset this if you are planning to use CI to fix a broken deployment.
  reset-before-deploy:
    type: boolean
    default: true
  # Cluster used for the apply-infra job
  cluster:
    type: string
    default: "none"
  # Controls whether to run partial upgrades in `deploy_ciupgrade`
  run-partial-upgrade:
    type: boolean
    default: true
  # Controls whether to run daml upgrades in `deploy_ciupgrade`
  run-daml-upgrade:
    type: boolean
    default: true
  # The base version to be used as part of a `deploy_ciupgrade` and `deploy_ciperiodic_migration` job
  # Empty/default means "upgrade version if set, else latest on branch"
  base-version:
    type: string
    default: ""
  # The target version for hard migrations in the `deploy_ciperiodic_migration` job
  # Empty/default means "latest on branch"
  upgrade-version:
    type: string
    default: ""
  # The pulumi project to be used in the `preview_pulumi_changes` job
  pulumi-project:
    type: string
    default: ""

notify-fail: &notify-fail
  context: slack-context
  post-steps:
    - set-failed-parallel-run-url
    - run:
        name: Dump input sent to slack/notify
        when: always
        command: |
          echo "Sending the following as input to slack/notify"
          echo "{ \"text\": \"*Job '${CIRCLE_JOB}' failed.* :red_circle:\n*$CIRCLE_BRANCH*: <${FAILED_PARALLEL_RUN_URL}|$(git log -1 --oneline --no-color | sed s/\"//g)> ($(git log -1 --pretty='%an'), <${FAILED_PARALLEL_RUN_URL}|CI Build in Run #${CIRCLE_NODE_INDEX}>)\" }"
    # Note that Slack force-wraps too-long lines within "blocks", and thus we don't use Slack message "blocks"
    # see stackoverflow.com/questions/57438097/how-to-make-slack-api-block-kit-take-up-the-entire-width-of-the-slack-window
    - slack/notify:
        branch_pattern: (deployment\/.*|main|release-line.*)
        # #team-canton-network-internal-ci
        channel: C05DT77QF5M
        event: fail
        custom: |
          { "text": "*Job '${CIRCLE_JOB}' failed.* :red_circle:\n*$CIRCLE_BRANCH*: <${FAILED_PARALLEL_RUN_URL}|$(git log -1 --oneline --no-color | sed s/\"//g)> ($(git log -1 --pretty='%an'), <${FAILED_PARALLEL_RUN_URL}|CI Build in Run #${CIRCLE_NODE_INDEX}>)" }

channel-notify-parameter: &channel-notify-parameter
  channel_notify:
    type: string
    # #team-canton-network-internal-ci
    default: C05DT77QF5M

cluster-parameter: &cluster-parameter
  cluster:
    type: enum
    enum:
      [
        "cimain",
        "cidaily",
        "cidaily-testnet",
        "cilr",
        "ciperiodic",
        "ciupgrade",
        "devnet",
        "mainnet",
        "testnet",
        "testnet-preview",
        "observability",
        "user-selected-scratchnet",
        # The explicit scratchnets are currently only used by the reaper.
        "scratchneta",
        "scratchnetb",
        "scratchnetc",
        "scratchnetd",
        "scratchnete",
        "none",
      ]
    default: "none"

main-branch-only: &main-branch-only
  filters:
    branches:
      only:
        - main

main-branch-never: &main-branch-never
  filters:
    branches:
      ignore:
        - main
