  deploy_validator_to_recover_sv_amulets:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      use_published_artifacts:
        type: boolean
        default: false
      restore_cluster:
        type: boolean
        default: false
      reset_cluster:
        type: boolean
        default: true
      validator_party_hint:
        type: string
        default: ""
      validator_new_participant_id:
        type: string
        default: ""
      restore_identity_from_sv_runbook:
        type: boolean
        default: false
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - setup_vpn # VPN is required to get sv runbook identities
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - when:
          condition:
            and:
              - equal: [ true, <<pipeline.parameters.reset-before-deploy>> ]
              - equal: [ true, <<parameters.reset_cluster>> ]
          steps:
            - run_bash_command_in_nix:
                cmd_name: Reset Validator runbook
                cluster: << parameters.cluster >>
                gce_authenticate: true
                cmd: |
                  cncluster activate
                  cncluster ci_pdown_validator
      - run_bash_command_in_nix:
          cmd_name: Apply Validator runbook Kubernetes manifest to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET --keep ARTIFACTORY_USER --keep ARTIFACTORY_PASSWORD --keep CIRCLECI_TOKEN --keep CIRCLE_WORKFLOW_ID"
          gce_authenticate: true
          cmd: |
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi

            if [[ -n '<< parameters.validator_party_hint >>' ]]; then
              echo "setting validator party hint << parameters.validator_party_hint >>"
              export VALIDATOR_PARTY_HINT='<< parameters.validator_party_hint >>'
            fi
            if [[ -n '<< parameters.validator_new_participant_id >>' ]]; then
              echo "using validator new participant id << parameters.validator_new_participant_id >>"
              export VALIDATOR_NEW_PARTICIPANT_ID='<< parameters.validator_new_participant_id >>'
              export VALIDATOR_MIGRATE_PARTY='true'
            fi
            if [[ << parameters.restore_identity_from_sv_runbook >> == true ]]; then
              echo "restoring identity from sv runbook"
              token=$(cncluster get_token sv)
              id=$(curl -s "https://wallet.sv.${GCP_CLUSTER_HOSTNAME}/api/validator/v0/admin/participant/identities" -H "authorization: Bearer ${token}")
              echo "$id" > id.json
              export PARTICIPANT_IDENTITIES_FILE=$(readlink -f id.json)
            fi

            cncluster activate

            # TODO(#12776): remove this once the flow is more robust to ACS changes
            # TODO(#11769): if we activate alerting on ciperiodic we might want to add a silencing here
            echo "scaling down validator1 to prevent it from tainting the SV party's ACS"
            kubectl scale deployment --replicas=0 -n validator1 validator-app

            cncluster ci_apply_validator $VERSION

            echo "scaling validator1 back up"
            kubectl scale deployment --replicas=1 -n validator1 validator-app
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>

workflows:
  version: 2

  publish_public_artifacts:
    when:
      equal: [ publish-public-artifacts, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - publish_public_release:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - artifacts_push
      - bundle:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context

  build:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_previous_pipelines:
          <<: *notify-fail
          context:
            - slack-context
          workflow_names: "build"
          branch_filter: "$CIRCLE_BRANCH"
          # cannot use a simple CCI branch filter for the job since this job is a dependency for all the other jobs in this workflow
          # and cannot be skipped
          branch_ignores: "^(main|deployment/.*|release-line.*)$"
          max_pipeline_age_secs: 7776000  # 90 days which is the max that the CCI API allows for pipeline cancellation
      # Linting and formatting
      - static_tests:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      # Daml
      - daml_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      # Scala
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test wall clock time"
          test_names_file: "test-full-class-names.log"
          start_canton_options: "-w -f -m"
          resource_class: "xlarge"
          # TODO(#10912) Investigate why things got slower
          parallelism: 11
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test sim time"
          test_names_file: "test-full-class-names-sim-time.log"
          start_canton_options: "-s"
          resource_class: "xlarge"
          parallelism: 5
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test frontend wall clock time"
          test_names_file: "test-full-class-names-frontend.log"
          start_canton_options: "-w -m"
          pre_sbt_cmd: "./start-frontends.sh -d -s"
          post_sbt_cmd: "./stop-frontends.sh"
          resource_class: "2xlarge"
          parallelism: 4
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test frontend sim time"
          test_names_file: "test-full-class-names-frontend-sim-time.log"
          start_canton_options: "-s"
          pre_sbt_cmd: "./start-frontends.sh -d -s"
          post_sbt_cmd: "./stop-frontends.sh"
          resource_class: "xlarge"
          parallelism: 1
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test frontend app manager"
          test_names_file: "test-full-class-names-frontend-app-manager.log"
          start_canton_options: "-w"
          pre_sbt_cmd: "./start-frontends.sh -d -s -m"
          post_sbt_cmd: "./stop-frontends.sh"
          resource_class: "xlarge"
          parallelism: 1
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test global upgrade"
          test_names_file: "test-full-class-names-global-soft-migration.log"
          start_canton_options: "-w -g"
          resource_class: "xlarge"
          parallelism: 1
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test disaster recovery"
          test_names_file: "test-full-class-names-disaster-recovery.log"
          start_canton_options: "-w"
          resource_class: "xlarge"
          parallelism: 1
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test app upgrade"
          test_names_file: "test-full-class-names-app-upgrade.log"
          start_canton_options: "-w"
          resource_class: "xlarge"
          parallelism: 1
          pre_sbt_cmd: "export CI_IGNORE_DIRTY_REPO=1; ./build-tools/prep-app-upgrade-test"
          skip_if_regex: "\\[breaking\\]"
          skip_if_files_changed: "nix/canton-sources.json"
          with_shared_gcp: true
      - ui_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - bundle:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      # Ops
      - update_pipeline_schedule:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - deployment_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - docker_images_build:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - notify_on_readme_changed:
          <<: *main-branch-only
          context:
            - slack-context
          channel_notify: C03J6NCPSE4

  deploy_cidaily:
    when:
      equal: [ deploy-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily cidaily_health_check redeploy_validator_runbook_cidaily redeploy_sv_runbook_cidaily backup_cidaily restore_sv_cidaily"
      - deploy_cluster:
          name: deploy_cluster_cidaily
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily"
          silence_deployment_alerts: true
          requires:
            - artifacts_push
            - wait_for_previous_pipeline
      - preflight_check:
          cluster: "cidaily"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          wait_for_sv: false
          # Order: deploy_cluster->preflight_check->publish_public_release->deploy_sv_runbook->preflight_sv_check
          requires:
            - artifacts_push
            - deploy_cluster_cidaily
      - publish_public_release:
          <<: *main-branch-only
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - preflight_check
      - deploy_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cidaily"
          use_published_artifacts: true
          requires:
            - deploy_cluster_cidaily
            - publish_public_release
      - deploy_validator_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily"
          use_published_artifacts: true
          requires:
            - deploy_cluster_cidaily
            - publish_public_release
      - preflight_sv_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cidaily"
          requires:
            - deploy_sv_runbook
      - preflight_validator_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cidaily"
          requires:
            - deploy_validator_runbook
      - backup_cluster:
          name: backup_cidaily
          <<: *main-branch-only
          cluster: "cidaily"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster_cidaily

  cidaily_health_check:
    when:
      equal: [ healthcheck-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Only wait for sv runbook deployments and for backup-recovery, concurrent preflight checks are fine.
          workflow_names: "redeploy_sv_runbook_cidaily redeploy_validator_runbook_cidaily"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_cidaily"
      - cancel_if_previous_pipeline:
          name: skip_during_catchup
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Skip healthchecks for 60 minutes after starting an sv/validator node restore from backup.
          # ATM, some tests are expected to fail while an SV is catching up, others are prone to failure.
          max_pipeline_age_secs: 3600
          workflow_names: "restore_sv_cidaily restore_validator_cidaily"
          only_if_running: false
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cidaily
          cluster: "cidaily"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline
            - cancel_if_previous_pipeline
            - skip_during_catchup

  redeploy_sv_runbook_cidaily:
    when:
      equal: [ redeploy-sv-runbook-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily redeploy_validator_runbook_cidaily redeploy_sv_runbook_cidaily cidaily_health_check restore_sv_cidaily restore_validator_cidaily"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Cancel runbook deployment if any deploy is running as it will try to deploy an old version
          # because the branch is not yet updated.
          workflow_names: "deploy_cidaily"
      - artifacts_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          skip_if_exists: true
      - deploy_sv_runbook:
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cidaily"
          use_published_artifacts: false
          requires:
            - wait_for_previous_pipeline
            - artifacts_push
      - preflight_sv_check:
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cidaily"
          requires:
            - deploy_sv_runbook

  redeploy_validator_runbook_cidaily:
    when:
      equal: [ redeploy-validator-runbook-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "redeploy_validator_runbook_cidaily cidaily_health_check restore_sv_cidaily restore_validator_cidaily"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Cancel runbook deployment if any deploy is running as it will try to deploy an old version
          # because the branch is not yet updated.
          workflow_names: "deploy_cidaily"
      - artifacts_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          skip_if_exists: true
      - deploy_validator_runbook:
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          cluster: "cidaily"
          use_published_artifacts: false
          requires:
            - wait_for_previous_pipeline
            - artifacts_push
      - preflight_validator_check:
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cidaily"
          requires:
            - deploy_validator_runbook

  backup_cidaily:
    when:
      equal: [ backup-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily"
      - backup_cluster:
          filters:
            branches:
              only:
                - deployment/cidaily
          cluster: "cidaily"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline

  restore_sv_cidaily:
    when:
      equal: [ restore-sv-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily cidaily_health_check redeploy_sv_runbook_cidaily "
      - restore_node:
          filters:
            branches:
              only:
                - deployment/cidaily
          cluster: "cidaily"
          # sv-3 chosen quite arbitrarily as one SV to restore from backup
          namespace_name: "sv-3"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline

  restore_validator_cidaily:
    when:
      equal: [ restore-validator-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily cidaily_health_check redeploy_validator_runbook_cidaily"
      - restore_node:
          filters:
            branches:
              only:
                - deployment/cidaily
          cluster: "cidaily"
          namespace_name: "validator1"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline

  cilr_health_check:
    when:
      equal: [ healthcheck-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          # Only wait for deployments, concurrent preflight checks are fine.
          workflow_names: "redeploy_sv_runbook_cilr"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cilr
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_cilr"
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cilr
          cluster: "cilr"
          channel_notify: C06VDG5RXNE # team-canton-network-cilr-notifications
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline
            - cancel_if_previous_pipeline

  reset_sv_runbook_cilr:
    when:
      equal: [ reset-sv-runbook-cilr, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "reset_sv_runbook_cilr"
      - reset_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cilr"
          channel_notify: C06VDG5RXNE # team-canton-network-cilr-notifications
          requires:
            - wait_for_previous_pipeline

  deploy_cimain:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cimain"
          wait_type: "wait_workflow"
      - autoscaler_set_min_nodes:
          name: "set min nodes to 6"
          <<: *main-branch-only
          cluster: "cimain"
          num_nodes: 6
          requires:
            - wait_for_previous_pipeline
      - deploy_cluster:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cimain"
          update_deployment_branch: false  # No need to create a deployment branch for cimain
          silence_deployment_alerts: true
          cancel_workflow_on_failure: true
          requires:
            - wait_for_previous_pipeline
            - artifacts_push
      - preflight_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cimain"
          wait_for_sv: false
          parallelism: 1
          requires:
            - wait_for_previous_pipeline
            - artifacts_push
      - deploy_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cimain"
          requires:
            - deploy_cluster
      - preflight_sv_check:
           <<: *main-branch-only
           context:
             - artifactory
             - canton-network-vpn
             - slack-context
           cluster: "cimain"
           requires:
             - deploy_cluster
      - deploy_validator_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cimain"
          requires:
            - deploy_cluster
      - preflight_validator_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cimain"
          requires:
            - deploy_cluster
      - backup_cluster:
          <<: *main-branch-only
          cluster: "cimain"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster
            - deploy_sv_runbook
            - deploy_validator_runbook
      - restore_node:
          <<: *main-branch-only
          cluster: "cimain"
          namespace_name: "sv-3"
          expected_migration_id: 0
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - backup_cluster
            - preflight_sv_check
            - preflight_validator_check
            - preflight_check
      - autoscaler_set_min_nodes:
          name: "set min nodes to 0"
          <<: *main-branch-only
          cluster: "cimain"
          num_nodes: 0
          requires:
            - restore_node
      - reset_cluster:
          <<: *main-branch-only
          cluster: "cimain"
          is_shared_cluster: false
          context:
            - canton-network-vpn
          requires:
            - restore_node

  deploy_ciperiodic_migration:
    when:
      equal: [ deploy-ciperiodic-migration, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_ciperiodic_migration deploy_ciperiodic_sv_reonboard deploy_ciperiodic_non_devnet"
          wait_type: "wait_workflow"
      - enable_autoscaler:
          name: "ensure_autoscaler_enabled"
          <<: *main-branch-only
          cluster: "ciperiodic"
          requires:
            - wait_for_previous_pipeline
      - deploy_cluster:
          name: "deploy_cluster_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          update_deployment_branch: false  # No need to create a deployment branch for ciperiodic
          cancel_workflow_on_failure: true
          deploy_version: << pipeline.parameters.base-version >>
          requires:
            - wait_for_previous_pipeline
            - artifacts_push
      - deploy_sv_runbook:
          name: "deploy_sv_runbook_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          deploy_version: << pipeline.parameters.base-version >>
          requires:
            - deploy_cluster_for_migration
      - deploy_validator_runbook:
          name: "deploy_validator_runbook_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          deploy_version: << pipeline.parameters.base-version >>
          requires:
            - deploy_cluster_for_migration
      - preflight_check:
          name: "trigger_global_domain_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          test_names_file: "test-full-class-names-global-domain-upgrade-preflight.log"
          parallelism: 1
          wait_for_sv: false
          cluster_version: << pipeline.parameters.base-version >>
          check_cluster_version: false
          requires:
            - prepare_cluster_for_migration
            - prepare_sv_runbook_for_migration
      - backup_cluster:
          name: "backup_cluster_before_migration"
          <<: *main-branch-only
          cluster: "ciperiodic"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - trigger_global_domain_migration
      - hard_migration:
          name: "prepare_cluster_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          action: "prepare"
          scope: "core"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - deploy_cluster_for_migration
            - deploy_sv_runbook_for_migration
            - deploy_validator_runbook_for_migration
      - hard_migration_vpn: # VPN is required to resolve Validator1's PartyId
          name: "prepare_sv_runbook_for_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          action: "prepare"
          scope: "sv"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - deploy_cluster_for_migration
            - deploy_sv_runbook_for_migration
            - deploy_validator_runbook_for_migration
      - hard_migration:
          name: "migrate_cluster"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          action: "migrate"
          scope: "core"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - prepare_cluster_for_migration
            - backup_cluster_before_migration
      - preflight_check:
          name: "preflight_check_migrated"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          wait_for_disabled_autoscaler: true
          requires:
            - backup_cluster_before_migration
      - hard_migration_vpn: # VPN is required to resolve Validator1's PartyId
          name: "migrate_sv_runbook"
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          action: "migrate"
          scope: "sv"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - prepare_sv_runbook_for_migration
            - migrate_cluster
      - preflight_sv_check:
          name: "preflight_sv_check_migrated"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          wait_for_disabled_autoscaler: true
          requires:
            - migrate_cluster
      - hard_migration:
          name: "migrate_validator_runbook"
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          action: "migrate"
          scope: "validator"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          requires:
            - migrate_cluster
      - preflight_validator_check:
          <<: *main-branch-only
          name: "preflight_validator_check_migrated"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          wait_for_disabled_autoscaler: true
          requires:
            - migrate_cluster
      - disable_autoscaler:
          context:
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          migration_id: 1
          requires:
            - migrate_cluster
# TODO (#12393): reenable, this restore nukes the database of migration ID 1,
#      - restore_node:
#          <<: *main-branch-only
#          cluster: "ciperiodic"
#          namespace_name: "sv-3"
#          expected_migration_id: 1
#          context:
#            - artifactory
#            - canton-network-vpn
#            - slack-context
#          requires:
#            - preflight_sv_check_migrated
#            - preflight_validator_check_migrated
#            - preflight_check_migrated
      - deploy_sv_runbook:
          name: "deploy_fresh_sv_runbook_after_migration"
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          deploy_version: << pipeline.parameters.upgrade-version >>
          global_domain_active_migration_id: 1
          reset_cluster: true # it's the default, but to make it explicit
          # TODO (#12393): require only restore_node
          requires:
          #  - restore_node
            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated
      - preflight_sv_check:
          name: "preflight_sv_check_redeployed"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          delay_mins: 10 # delay the preflight tests to give autoscaler some time to be happy
          requires:
            # We wait for the runbook to redeploy to make sure we're not testing the original deployment
            - deploy_fresh_sv_runbook_after_migration
      - reset_cluster:
          <<: *main-branch-only
          cluster: "ciperiodic"
          is_shared_cluster: false
          context:
            - canton-network-vpn
          requires:
            - preflight_sv_check_redeployed
      - enable_autoscaler:
          <<: *main-branch-only
          cluster: "ciperiodic"
          requires:
            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated

  deploy_ciperiodic_non_devnet:
