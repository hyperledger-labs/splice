  deploy_cluster_for_migration_base_version:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      base_version:
        type: string
        default: ""
      deploy_retry_count:
        type: integer
        default: 2
    steps:
      - checkout_with_retry
      - when:
          condition: << parameters.base_version >>
          steps:
            - run:
                name: Checkout commit << parameters.base_version >>
                command: |
                  echo "Checking out commit << parameters.base_version >>"
                  git checkout << parameters.base_version >>
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Push new branch for base version with migration config changes
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          additional_nix_args:  "--keep GITHUB_TOKEN --keep CIRCLE_BRANCH --keep CIRCLE_WORKFLOW_ID"
          cmd: |
            git config user.email "splice-maintainers@digitalasset.com"
            git config user.name "DA Automation"
            git remote set-url origin https://canton-network-da:${GITHUB_TOKEN}@github.com/DACH-NY/canton-network-node.git

            BASE_VERSION_BRANCH="${GCP_CLUSTER_BASENAME}-migration-base"
            git branch -f $BASE_VERSION_BRANCH HEAD
            git checkout $BASE_VERSION_BRANCH
            git push -f origin $BASE_VERSION_BRANCH
            BASE_VERSION=$(build-tools/get-charts-version "<< parameters.base_version >>")
            RELEASE_REF="refs/heads/$BASE_VERSION_BRANCH"
            cncluster hard_domain_migration_update_config active 0 internal $BASE_VERSION $RELEASE_REF

            file="${REPO_ROOT}/cluster/deployment/${TARGET_CLUSTER}/.envrc.vars"

            echo "export SPLIT_POSTGRES_INSTANCES=true" >> "$file"
            echo "export SPLICE_DEPLOY_SV_RUNBOOK=true" >> "$file"
            echo "export SPLICE_DEPLOY_VALIDATOR_RUNBOOK=true" >> "$file"
            echo "export SPLICE_DEPLOYMENT_SV_USE_INTERNAL_VALIDATOR_DNS=true" >> "$file"

            git add **/.envrc.vars
            git add **/config.yaml
            git commit -m "Add migration config to deploy version $BASE_VERSION to << parameters.cluster >>"
            git push origin $BASE_VERSION_BRANCH
      - deploy_operator:
          cluster: << parameters.cluster >>
          deploy_retry_count: << parameters.deploy_retry_count >>
      - wait_for_pulumi_stacks_updated:
          cluster: << parameters.cluster >>
          pulumi_stack_names: "canton-network,infra,sv-runbook,validator-runbook"
  prepare_cluster_for_migration:
