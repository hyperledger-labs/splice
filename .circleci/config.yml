          cmd: |
            scripts/check-repo-names.sh
      - clone_and_update_open_source
      - execute_sbt_command:
          working_dir: "/home/circleci/splice"
          pre_sbt_cmd: "export CI_IGNORE_DIRTY_REPO=1"
          cmd: "bundle"

  create_oss_pr:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - setup_sbt_test_job:
          runner_type: "selfhosted"
      - clone_and_update_open_source
      - run_bash_command_in_nix:
          cmd_name: Push changes to DA OSS
          additional_nix_args: "--keep GH_TOKEN --keep CIRCLE_BRANCH --keep SSH_AUTH_SOCK"
          cmd: |
            .circleci/create-splice-pr.sh /home/circleci/oss
      - run_bash_command_in_nix:
          cmd_name: Push changes to Splice
          additional_nix_args: "--keep GH_TOKEN --keep CIRCLE_BRANCH --keep SSH_AUTH_SOCK"
          cmd: |
            .circleci/create-splice-pr.sh /home/circleci/splice
      - run_bash_command_in_nix:
          cmd_name: Create release in DA OSS
          additional_nix_args: "--keep GH_TOKEN --keep CIRCLE_BRANCH --keep GCP_DA_CN_SHARED_KEY"
          working_dir: "/home/circleci/oss"
          cmd: |
            if [[ "$CIRCLE_BRANCH" =~ ^release-line-.*$ ]]; then
              # Authenticate to shared GCP project for downloading the artifacts
              echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
              # Create the release draft and upload the artifacts to it
              /home/circleci/project/.circleci/create-gh-release.sh ${CIRCLE_BRANCH/release-line-/}
            fi

  update_cilr:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Create branch to point CILR to and update tag
          additional_nix_args: "--keep GH_TOKEN --keep CIRCLE_BRANCH --keep SSH_AUTH_SOCK"
          cmd: |
            VERSION="$(get-snapshot-version)"
            .circleci/update-cilr.sh

  # TODO(#14845): Currently, building the repo on arm fails, so we cannot run the docker compose
  #               preflight there. We therefore for now only spin up the validator and check that
  #               it succeeds.
  deploy_arm_compose_validator:
    machine:
      image: ubuntu-2204:2024.01.1
      resource_class: arm.large
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
    steps:
      - checkout_with_retry
      - setup_nix
      - setup_vpn
      - docker_login_artifactory
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Activate cluster (configure kubectl)
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: cncluster activate
          cmd_retry_count: 5
      - run_bash_command_in_nix:
          cluster: << parameters.cluster >>
          cmd_name: Wait for SV app to be responsive
          cmd: |
            cncluster wait sv-1 sv-app
      - run_bash_command_in_nix:
          cmd: /tmp/vpn-scripts/create-docker-network-on-vpn.sh onvpn
      - run_bash_command_in_nix:
          additional_nix_args: >
            --keep ARTIFACTORY_USER
            --keep ARTIFACTORY_PASSWORD
            --keep GCP_DA_CN_SHARED_KEY
          cmd_name: Deploy the docker-compose validator
          cluster: << parameters.cluster >>
          cmd: |
            echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
            gcloud auth configure-docker us-central1-docker.pkg.dev
            build-tools/splice-compose.sh start -d -w -n onvpn -p "da-composeValidatorArm-1"
          cmd_retry_count: 3
      - store_artifacts:
          name: Store logs
          path: log
          destination: log

