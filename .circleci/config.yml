      - cluster_lock_reaper:
          cluster: "scratchnetd"
      - cluster_lock_reaper:
          cluster: "scratchnete"

  mark_for_testnet:
    docker:
    - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Mark latest snapshot in branch for next TestNet release
          additional_nix_args: "--keep GITHUB_TOKEN"
          cmd: |
            git remote set-url origin https://githubuser-da:${GITHUB_TOKEN}@github.com/DACH-NY/canton-network-node.git
            LATEST_SNAPSHOT=`git describe --tags --match '*-snapshot.*' --abbrev=0 HEAD`
            git tag --force testnet-next $LATEST_SNAPSHOT
            git push --force origin testnet-next
      - slack/notify:
          channel: C05DT77QF5M
          event: pass
          custom: |
            { "text": "*✅Job '${CIRCLE_JOB}' marked the commit for testnet*\n<${CIRCLE_BUILD_URL}| Commit $(git describe --tags --match '*-snapshot.*' --abbrev=0 HEAD | sed s/\"//g)>" }

  update_pipeline_schedule:
    docker:
    - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: Update CircleCI pipeline configuration (incl. schedule triggers)
         additional_nix_args: --keep CIRCLECI_TOKEN
         cmd: |
           set -euo pipefail

           . .envrc.vars
           .circleci/triggers/setup-pipeline.sh

  docker_images_push:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
    parameters:
      skip_if_exists:
        type: boolean
        default: false
    steps:
      - checkout_with_retry
      - restore_frontend_builds
      - setup_sbt_test_job
      - docker_login_artifactory
      - run_bash_command_in_nix:
         cmd_name: GCloud authorization
         additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: |
           echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
           (yes || true) | gcloud auth configure-docker us-central1-docker.pkg.dev
      - when:
          condition: << parameters.skip_if_exists >>
          steps:
          - run_bash_command_in_nix:
             cmd_name: Check if images already exist
             cmd: |
               if make docker-check; then
                  echo "Docker images already exist"
                  touch .halt-build-step
               fi
          - run:
              name: Halt build step if images already exist
              command: |
                if [ -f ".halt-build-step" ]; then
                  echo "skipping rebuilding and pushing"
                  circleci-agent step halt
                fi
      - run_bash_command_in_nix:
         cmd_name: Build app
         cmd: make build -j
         cmd_retry_count: 5 # Retry in case of dependency download errors
         additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD"
      - docker_build
      - run_bash_command_in_nix:
         cmd_name: Push Docker images
         additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: make docker-push -j
         cmd_retry_count: 5
      - save_frontend_builds
      - cleanup_sbt_test_job

  publish_public_release:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_sbt_test_job
      - docker_login_artifactory
      - run_bash_command_in_nix:
         cmd_name: Promote images to Artifactory
         additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: |
           echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
           (yes || true) | gcloud auth configure-docker us-central1-docker.pkg.dev

           make docker-promote
         cmd_retry_count: 5 # Retry in case of connectivity issues
      - run_bash_command_in_nix:
         cmd_name: Push Helm charts and tag git accordingly
         additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD \
           --keep GITHUB_TOKEN"
         cmd: |
           publish () {
             source=$1
             full_path=$2
             echo "Publishing ${source} to ${full_path}"
             curl -u "${ARTIFACTORY_USER}:${ARTIFACTORY_PASSWORD}" -sSf -X PUT --upload-file "${source}" "${full_path}"
           }

           make cluster/helm/build -j

           for chart in cluster/helm/target/*.tgz; do
             artifactory_url="https://digitalasset.jfrog.io/artifactory"
             publish "${chart}" "${artifactory_url}/canton-network-helm/digitalasset/$(basename ${chart})"
           done

           git remote set-url origin https://githubuser-da:${GITHUB_TOKEN}@github.com/DACH-NY/canton-network-node.git
           RELEASE_TAG=$(get-snapshot-version)
           git fetch origin
           if [ $(git tag -l "${RELEASE_TAG}") ]; then
             echo "tag ${RELEASE_TAG} already exists. not tagging"
           else
             git tag "${RELEASE_TAG}"
             git push origin "${RELEASE_TAG}"
           fi
           if [[ << pipeline.parameters.mark-for-devnet >> == true ]]; then
             git tag --force devnet-next
             git push --force origin devnet-next
           elif [[ << pipeline.parameters.mark-for-devnet-if-unmarked >> == true ]] &&
             ! [ $(git tag -l devnet-next) ]
           then
             git tag devnet-next
             git push origin devnet-next
           fi
      - when:
          condition:
            equal: [ true, <<pipeline.parameters.mark-for-devnet>> ]

          steps:
            - slack/notify:
                channel: C05DT77QF5M
                event: pass
                custom: |
                  { "text": "*✅Job '${CIRCLE_JOB}' marked the commit for devnet*\n<${CIRCLE_BUILD_URL}| Commit $(git log -1 --oneline --no-color | sed s/\"//g)>" }

  docker_images_build:
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: xlarge
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - restore_frontend_builds
      - setup_sbt_test_job
      - run_bash_command_in_nix:
         cmd_name: Build app
         cmd: make build -j
         cmd_retry_count: 5 # Retry in case of dependency download errors
         additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD"
      - docker_login_artifactory
      - docker_build
      - save_frontend_builds
      - cleanup_sbt_test_job

  wait_for_previous_pipeline:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    parameters:
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
    steps:
      - checkout_with_retry
      - run:
          name: "Wait for previous pipeline"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh << pipeline.number >> "<< parameters.workflow_names >>" \
              "<< parameters.branch_filter >>" "<< parameters.branch_filter_is_regex >>" "<< parameters.branch_ignores >>" \
              << parameters.max_pipeline_age_secs >> wait

  cancel_if_previous_pipeline:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    parameters:
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
      only_if_running:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - run:
          name: "Cancel if previous pipeline"
          command: |
            if [[ << parameters.only_if_running >> == true ]]; then
              action="cancel_self"
            else
              action="cancel_self_if_found"
            fi
            .circleci/wait_for_or_cancel_pipelines.sh << pipeline.number >> "<< parameters.workflow_names >>" \
              "<< parameters.branch_filter >>" "<< parameters.branch_filter_is_regex >>" "<< parameters.branch_ignores >>" \
              << parameters.max_pipeline_age_secs >> $action

  cancel_previous_pipelines:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    parameters:
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: ""
      branch_filter_is_regex:
        type: boolean
        default: false
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
    steps:
      - checkout_with_retry
      - run:
          name: "Cancel previous pipelines"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh << pipeline.number >> "<< parameters.workflow_names >>" \
              "<< parameters.branch_filter >>" "<< parameters.branch_filter_is_regex >>" "<< parameters.branch_ignores >>" \
              << parameters.max_pipeline_age_secs >> cancel_pipeline

  backup_cluster:
    parameters:
      <<: *cluster-parameter
      include_sv:
        type: boolean
        default: true
      include_splitwell:
        type: boolean
        default: true
      parallelism:
        type: integer
        default: 3
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: << parameters.parallelism >>
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Listing nodes for backup
          cluster: << parameters.cluster >>
          cmd: |
            nodes=""
            if [[ << parameters.include_sv >> != false ]]; then
              if (env-bool IS_DEVNET); then
                nodes="sv-1 sv-2 sv-3 sv-4 validator1"
              else
                nodes="sv-1 validator1"
              fi
            fi
            if [[ << parameters.include_splitwell >> != false ]]; then
              nodes="$nodes splitwell"
            fi
            echo $nodes > nodes.txt
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run:
          name: Split backup tasks
          command: |
            nodes=$(cat nodes.txt)
            echo "$nodes" | circleci tests run --command "xargs ./.circleci/grab-tests.sh"
            echo "Nodes to backup: $(cat tests-to-run.txt)"
      - run_bash_command_in_nix:
          cmd_name: Backup nodes
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: |
            cncluster activate
            for ns in $(cat tests-to-run.txt); do
              cncluster wait $ns validator-app
            done
            cncluster backup_nodes $(cat tests-to-run.txt)
      - notify-cluster-fail:
          cluster: << parameters.cluster >>

  restore_node:
    parameters:
      <<: *cluster-parameter
      namespace_name:
        type: string
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    steps:
      - checkout_with_retry
      - setup_nix
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Restoring node
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: |
            cncluster activate
            cncluster restore_node --force << parameters.namespace_name >>

            case "<< parameters.namespace_name >>" in
              "sv-1"|"sv-2"|"sv-3"|"sv-4")
                cncluster wait << parameters.namespace_name >> scan-app
                cncluster wait << parameters.namespace_name >> sv-app
                cncluster wait << parameters.namespace_name >> validator-app
                ;;
              "validator1")
                cncluster wait << parameters.namespace_name >> validator-app
                ;;
            esac
      - notify-cluster-fail:
          cluster: << parameters.cluster >>

  preflight_check:
    parameters:
      <<: *cluster-parameter
      channel_notify:
        type: string
        default: C05DT77QF5M
      test_names_file:
        type: string
        default: "test-full-class-names-core-preflight.log,test-full-class-names-splitwell-preflight.log,test-full-class-names-validator1-preflight.log"
      parallelism:
        type: integer
        default: 3
      wait_for_sv:
        type: boolean
        default: true
      wait_for_splitwell:
        type: boolean
        default: true
      cluster_version:
        type: string
        default: ""
      migration_id:
        type: integer
        default: 0
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: << parameters.parallelism >>
    steps:
      - checkout_with_retry
      - run:
          name: Set inotify fs watch
          command: |
            echo "Checking watch info..."
            sysctl fs.inotify
            echo "Setting max_user_watches..."
            echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p
      - when:
          condition: << parameters.cluster_version >>
          steps:
            - run:
                name: Checkout commit << parameters.cluster_version >>
                command: git checkout << parameters.cluster_version >>
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Activate cluster (configure kubectl)
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: cncluster activate
          cmd_retry_count: 5
      - restore_sbt_cache
      - restore_precompiled_classes
      - restore_frontend_node_modules
      - restore_daml_artifacts
      - split_tests_for_parallel_run:
          test_names_file: << parameters.test_names_file >>
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: wait for deployment to finish
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          cmd: |
            VERSION=$(get-snapshot-version)
            cncluster wait_version $VERSION
            validator_app="validator-app"
            if [[ << parameters.wait_for_splitwell >> == true ]]; then
              cncluster wait splitwell $validator_app
            fi
            cncluster wait sv-1 $validator_app
            cncluster wait validator1 $validator_app
            if (env-bool IS_DEVNET); then
              cncluster wait sv-2 $validator_app
              cncluster wait sv-3 $validator_app
              cncluster wait sv-4 $validator_app
            fi
            if [[ << parameters.wait_for_sv >> == true ]] && ( env-bool APPROVE_SV_RUNBOOK || env-bool IS_DEVNET ); then
              cncluster wait sv $validator_app
            fi
            echo "Done waiting. All pods in the cluster are:"
            kubectl get pods -A
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_BASENAME}.network.canton.global; then echo "false"; else echo "true"; fi)
          cmd_retry_count: 2
          cmd_before_retry: |-
            echo "VPN connection seems to have died, restarting VPN and retrying..."
            /tmp/vpn-scripts/restart-vpn.sh
      - execute_sbt_command:
          pre_sbt_cmd: |
            set -eou pipefail
            . cluster/deployment/<< parameters.cluster >>/.envrc.vars
            NETWORK_APPS_ADDRESS="${GCP_CLUSTER_BASENAME}.network.canton.global" ./start-frontends.sh -d -v -p
          cmd: "\"$RUN_SPLITTED_TESTS_CMD\""
          post_sbt_cmd: ./stop-frontends.sh
          additional_nix_args: "--keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET --keep SV_DEV_NET_WEB_UI_PASSWORD --keep SV_WEB_UI_PASSWORD --keep VALIDATOR_WEB_UI_PASSWORD --keep GCP_DATA_DUMP_BUCKET_SERVICE_ACCOUNT_CREDENTIALS --keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          extra_env_vars: POSTGRES_DB=postgres DOMAIN_URL=https://sequencer.sv-1.svc.${GCP_CLUSTER_BASENAME}.network.canton.global NETWORK_APPS_ADDRESS=${GCP_CLUSTER_BASENAME}.network.canton.global NETWORK_APPS_ADDRESS_PROTOCOL=https VALIDATOR_USER_NAME="auto_preflight" CN_MIGRATION_DOMAIN_INDEX=<< parameters.migration_id >>
          timeout: "15m"
          cmd_retry_count: 3
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_BASENAME}.network.canton.global; then echo "false"; else echo "true"; fi)
          cluster: << parameters.cluster >>
          cmd_before_retry: |
            echo "Test failed, but VPN connection seems to have died, restarting VPN and retrying..."
            ./stop-frontends.sh
            /tmp/vpn-scripts/restart-vpn.sh

      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - cleanup_sbt_test_job
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
          channel_notify: << parameters.channel_notify >>
      - store_artifacts:
          name: Upload vpn log
          path: /var/log/vpn.log

  preflight_sv_check:
    parameters:
      <<: *cluster-parameter
      channel_notify:
        type: string
        default: C05DT77QF5M
      cluster_version:
        type: string
        default: ""
