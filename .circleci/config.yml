            fi

            if [[ << parameters.silence_deployment_alerts >> == true ]]; then
              # silence specific alerts that may fire due to reset downtime
              cncluster silence_grafana_alerts "20 minutes" -f "$SPLICE_ROOT/.circleci/silences/deployment_grafana.json"
            fi

            cncluster ci_pdown_sv
          cmd_retry_count: 3
          # wait a bit in case the operator is legitimately holding the Pulumi lock
          cmd_retry_wait: 60
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>

  reset_validator_runbook:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      silence_deployment_alerts:
        type: boolean
        default: false
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Reset validator runbook
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: |
            cncluster activate
            if [[ << parameters.silence_deployment_alerts >> == true ]]; then
              # silence specific alerts that may fire due to reset downtime
              cncluster silence_grafana_alerts "20 minutes" -f "$SPLICE_ROOT/.circleci/silences/deployment_grafana.json"
            fi
            cncluster ci_pdown_validator
          cmd_retry_count: 3
          # wait a bit in case the operator is legitimately holding the Pulumi lock
          cmd_retry_wait: 60
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>

  deploy_validator_to_recover_sv_amulets:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      use_published_artifacts:
        type: boolean
        default: false
      restore_cluster:
        type: boolean
        default: false
      reset_cluster:
        type: boolean
        default: true
      validator_party_hint:
        type: string
        default: ""
      validator_new_participant_id:
        type: string
        default: ""
      restore_identity_from_sv_runbook:
        type: boolean
        default: false
      deploy_retry_count:
        type: integer
        default: 2
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - when:
          condition:
            and:
              - equal: [ true, <<pipeline.parameters.reset-before-deploy>> ]
              - equal: [ true, <<parameters.reset_cluster>> ]
          steps:
            - run_bash_command_in_nix:
                cmd_name: Reset Validator runbook
                cluster: << parameters.cluster >>
                gce_authenticate: true
                cmd: |
                  cncluster activate
                  cncluster ci_pdown_validator
      - run_bash_command_in_nix:
          cmd_name: Apply Validator runbook Kubernetes manifest to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID \
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET \
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID \
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET \
            --keep ARTIFACTORY_USER \
            --keep ARTIFACTORY_PASSWORD
            --keep CIRCLECI_TOKEN \
            --keep CIRCLE_WORKFLOW_ID \
            --keep SLACK_ACCESS_TOKEN \
            --keep CIRCLE_BUILD_URL"
          gce_authenticate: true
          cmd_retry_count: << parameters.deploy_retry_count >>

          cmd: |
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi

            if [[ -n '<< parameters.validator_party_hint >>' ]]; then
              echo "setting validator party hint << parameters.validator_party_hint >>"
              export VALIDATOR_PARTY_HINT='<< parameters.validator_party_hint >>'
            fi
            if [[ -n '<< parameters.validator_new_participant_id >>' ]]; then
              echo "using validator new participant id << parameters.validator_new_participant_id >>"
              export VALIDATOR_NEW_PARTICIPANT_ID='<< parameters.validator_new_participant_id >>'
              export VALIDATOR_MIGRATE_PARTY='true'
            fi
            if [[ << parameters.restore_identity_from_sv_runbook >> == true ]]; then
              echo "restoring identity from sv runbook"
              token=$(cncluster get_token sv validator)
              id=$(curl -s "https://wallet.sv.${GCP_CLUSTER_HOSTNAME}/api/validator/v0/admin/participant/identities" -H "authorization: Bearer ${token}")
              echo "$id" > id.json
              export PARTICIPANT_IDENTITIES_FILE=$(readlink -f id.json)
            fi

            cncluster activate

            # TODO(#12776): remove this once the flow is more robust to ACS changes
            # TODO(#11769): if we activate alerting on ciperiodic we might want to add a silencing here
            echo "scaling down validator1 to prevent it from tainting the SV party's ACS"
            kubectl scale deployment --replicas=0 -n validator1 validator-app

            cncluster ci_apply_validator $VERSION

            echo "scaling validator1 back up"
            kubectl scale deployment --replicas=1 -n validator1 validator-app
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>

  offboard_sv_runbook:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Trigger the votes for offboarding
          cluster: << parameters.cluster >>
          gce_authenticate: true
          additional_nix_args: >
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
          cmd: |
            cncluster activate
            ${SPLICE_ROOT}/cluster/scripts/vote-for-offboard-sv-runbook.sh
      - print_gcloud_logs_commands:
          cluster: << parameters.cluster >>
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>


workflows:
  version: 2

  publish_public_artifacts:
    when:
      equal: [ publish-public-artifacts, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          is_public: true
      - create_oss_pr:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - artifacts_push

  build:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_previous_pipelines:
          <<: *notify-fail
          context:
            - slack-context
          workflow_names: "build"
          branch_filter: "$CIRCLE_BRANCH"
          # cannot use a simple CCI branch filter for the job since this job is a dependency for all the other jobs in this workflow
          # and cannot be skipped
          branch_ignores: "^(main|deployment/.*|release-line.*)$"
          max_pipeline_age_secs: 7776000  # 90 days which is the max that the CCI API allows for pipeline cancellation
      - cancel_if_not_opt_in:
          <<: *notify-fail
          filters:
            branches:
              ignore:
                - /release-line-.*/
                - main
      # Ops
      - update_pipeline_schedule:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - notify_on_readme_changed:
          <<: *main-branch-only
          context:
            - slack-context
          channel_notify: C03J6NCPSE4
      # Note that in the build_oss job we currently also save the nix cache. Before we retire it,
      # make sure to enable saving the nix cache in some other job instead.
      - build_oss:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context

  bump_configs:
    when:
      equal: [ bump-configs, << pipeline.parameters.run-job >> ]
    jobs:
      - bump_configs:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context

  determine_ciupgrade_work:
    when:
      # TODO(#19109) Reenable ciupgrade
      equal: [ never-build, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_if_current_commit_is_base_version:
          <<: *main-branch-only
          context: slack-context
      - launch_ciupgrade_workflow:
          <<: *main-branch-only
          context: slack-context
          requires:
            - cancel_if_current_commit_is_base_version

  devnet_health_check:
    when:
      equal: [ healthcheck-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - preflight_check:
          filters:
            branches:
              only:
                - /release-line-.*/
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "devnet"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context

  reset_sv_runbook_devnet:
    when:
      equal: [ reset-sv-runbook-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - /release-line-.*/
          context:
            - artifactory
            - slack-context
          workflow_names: "reset_sv_runbook_devnet"
      - reset_sv_runbook:
          unprotect_dbs: true
          filters:
            branches:
              only:
                - /release-line-.*/
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "devnet"
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          requires:
            - wait_for_previous_pipeline

  reset_validator_runbook_devnet:
    when:
      equal: [ reset-validator-runbook-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - /release-line-.*/
          context:
            - artifactory
            - slack-context
          workflow_names: "reset_validator_runbook_devnet"
      - reset_validator_runbook:
          filters:
            branches:
              only:
                - /release-line-.*/
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "devnet"
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          requires:
            - wait_for_previous_pipeline

  healthcheck_sv_runbook_devnet:
    when:
      equal: [ healthcheck-sv-runbook-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - /release-line-.*/
          context:
            - artifactory
            - slack-context
          workflow_names: "healthcheck_sv_runbook_devnet reset_sv_runbook_devnet"
      - preflight_sv_check:
          filters:
            branches:
              only:
                - /release-line-.*/
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "devnet"
          requires:
            - wait_for_previous_pipeline

  healthcheck_validator_runbook_devnet:
    when:
      equal: [ healthcheck-validator-runbook-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - /release-line-.*/
          context:
            - artifactory
            - slack-context
          workflow_names: "healthcheck_validator_runbook_devnet reset_validator_runbook_devnet"
      - preflight_validator_check:
          filters:
            branches:
              only:
                - /release-line-.*/
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "devnet"
          requires:
            - wait_for_previous_pipeline

  backup_devnet:
    when:
      equal: [ backup-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_cluster:
          filters:
            branches:
              only:
                - /release-line-.*/
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "devnet"
          internal_stack: false
          context:
            - artifactory
            - canton-network-vpn
            - slack-context

  backup_status_devnet:
    when:
      equal: [ backup-status-devnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_status_cluster:
          cluster: "devnet"
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          context:
            - slack-context
            - canton-network-vpn

  backup_mainnet:
    when:
      equal: [ backup-mainnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_cluster:
          filters:
            branches:
              only:
                - /release-line-.*/
          include_splitwell: false
          include_validator1: false
          channel_notify: C0731SHS3HB # #team-canton-network-mainnet-deployment
          cluster: "mainnet"
          internal_stack: false
          parallelism: 1
          context:
            - artifactory
            - canton-network-vpn
            - slack-context

  backup_status_mainnet:
    when:
      equal: [ backup-status-mainnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_status_cluster:
          cluster: "mainnet"
          channel_notify: C0731SHS3HB # #team-canton-network-mainnet-deployment
          alert_threshold: "4 hours ago"
          context:
            - slack-context
            - canton-network-vpn

  copy_mainnet_backup:
    when:
      equal: [ copy-mainnet-backup, << pipeline.parameters.run-job >> ]
    jobs:
      - copy_backup_to_bucket_mainnet:
          context:
            - slack-context
            - canton-network-vpn

  redeploy_operator:
    when:
      equal: [ deploy-operator, << pipeline.parameters.run-job >> ]
    jobs:
      - deploy_operator:
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>

  preview_operator:
    when:
      equal: [ preview-operator, << pipeline.parameters.run-job >> ]
    jobs:
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for << pipeline.parameters.cluster >>
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          deployment_only: true
  preview_pulumi_changes:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - trigger_pulumi_previews
      - set_previews:
          <<: *main-branch-never
          name: set_previews_devnet
          type: approval
      - set_previews:
          <<: *main-branch-never
          name: set_previews_testnet
          type: approval
      - set_previews:
          <<: *main-branch-never
          name: set_previews_mainnet
          type: approval
      - set_previews:
          <<: *main-branch-never
          name: set_previews_cilr
          type: approval
      - set_previews:
          <<: *main-branch-never
          name: set_previews_deployment
          type: approval
      - preview_pulumi_changes:
          name: Preview pulumi changes for DevNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "devnet"
          deployment_only: false
          requires:
            - set_previews_devnet
      - preview_pulumi_changes:
          name: Preview pulumi changes for TestNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "testnet"
          deployment_only: false
          requires:
            - set_previews_testnet
      - preview_pulumi_changes:
          name: Preview pulumi changes for MainNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "mainnet"
          deployment_only: false
          requires:
            - set_previews_mainnet
      - preview_pulumi_changes:
          name: Preview pulumi changes for CILR
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cilr"
          deployment_only: false
          requires:
            - set_previews_cilr
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for CILR
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cilr"
          deployment_only: true
          requires:
            - set_previews_cilr
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for DevNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "devnet"
          deployment_only: true
          requires:
            - set_previews_deployment
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for TestNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "testnet"
          deployment_only: true
          requires:
            - set_previews_deployment
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for MainNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "mainnet"
          deployment_only: true
          requires:
            - set_previews_deployment

  backup_testnet:
    when:
      equal: [ backup-testnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_cluster:
          filters:
            branches:
              only:
                - /release-line-.*/
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "testnet"
          internal_stack: false
          context:
            - artifactory
            - canton-network-vpn
            - slack-context

  backup_status_testnet:
    when:
      equal: [ backup-status-testnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_status_cluster:
          cluster: "testnet"
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          context:
            - slack-context
            - canton-network-vpn

  deploy_upgrade:
    # the parameters run-job, run-partial-upgrade and base-version are set in launch_ciupgrade_workflow
    when:
      equal: [ deploy-upgrade, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_upgrade"
          wait_type: "cancel_waiting_and_wait_workflow"
          branch_filter: << pipeline.parameters.branch-filter >>
      - build_tests_self_hosted:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - autoscaler_prevent_scaledown:
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_previous_pipeline
      - reset_cluster:
          # note that this reset is executed on the latest version to properly cleanup previous deploy_ciupgrade runs
          name: reset_cluster
          cluster: << pipeline.parameters.cluster >>
          unlock_shared_cluster: false
          silence_deployment_alerts: true
          context:
            - slack-context
            - artifactory
          requires:
            - wait_for_previous_pipeline
      - deploy_cluster:
          name: "deploy_cluster_for_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          skip_infra: false
          update_deployment_branch: false  # No need to create a deployment branch for ciupgrade
          cancel_workflow_on_failure: true
          deploy_version: << pipeline.parameters.base-version >>
          requires:
            - reset_cluster
            - autoscaler_prevent_scaledown
      - preflight_check:
          name: "preflight_check_initial"
          cluster_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - deploy_cluster_for_upgrade
            - build_tests_self_hosted
      - deploy_sv_runbook:
          name: "deploy_sv_runbook_for_upgrade"
          deploy_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          requires:
            - deploy_cluster_for_upgrade
      - preflight_sv_check:
          name: "preflight_sv_check_initial"
          cluster_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - deploy_cluster_for_upgrade
            - build_tests_self_hosted
      - deploy_validator_runbook:
          name: "deploy_validator_runbook_for_upgrade"
          deploy_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - deploy_cluster_for_upgrade
      - preflight_validator_check:
          name: "preflight_validator_initial"
          cluster_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - deploy_cluster_for_upgrade
            - build_tests_self_hosted
      - artifacts_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - wait_for_previous_pipeline
      - deploy_partial_upgrade:
          name: "deploy_partial_upgrade"
          cluster: << pipeline.parameters.cluster >>
          context:
            - artifactory
            - slack-context
          run: << pipeline.parameters.run-partial-upgrade >>
          silence_deployment_alerts: true
          requires:
            - artifacts_push
            - preflight_check_initial
            - preflight_sv_check_initial
            - preflight_validator_initial
      - preflight_check:
          name: "preflight_check_partial_upgrade"
          cluster_version: << pipeline.parameters.base-version >>
          check_cluster_version: false # we want to run the preflight in base version, but the version is reported as upgraded
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          run: << pipeline.parameters.run-partial-upgrade >>
          wait_for_sv: false
          requires:
            - deploy_partial_upgrade
      - preflight_sv_check:
          name: "preflight_sv_check_partial_upgrade"
          cluster_version: << pipeline.parameters.base-version >>
          check_cluster_version: false # we want to run the preflight in base version, but the version is reported as upgraded
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          run: << pipeline.parameters.run-partial-upgrade >>
          requires:
            - deploy_partial_upgrade
      - preflight_validator_check:
          name: "preflight_validator_partial_upgrade"
          cluster_version: << pipeline.parameters.base-version >>
          check_cluster_version: false # we want to run the preflight in base version, but the version is reported as upgraded
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          run: << pipeline.parameters.run-partial-upgrade >>
          requires:
            - deploy_partial_upgrade
      - deploy_cluster:
          name: "deploy_final_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          update_deployment_branch: false
          cancel_workflow_on_failure: true
          requires:
            - preflight_check_partial_upgrade
            - preflight_sv_check_partial_upgrade
            - preflight_validator_partial_upgrade
      - preflight_check_docker:
          name: "preflight_check_final_upgrade_docker"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - deploy_final_upgrade
      - preflight_check:
          name: "preflight_check_final_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - deploy_final_upgrade
      - preflight_check:
          name: "preflight_daml_upgrade"
          run: << pipeline.parameters.run-daml-upgrade >>
          test_names_file: "test-daml-ciupgrade-vote.log"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - preflight_check_final_upgrade
            - preflight_check_final_upgrade_docker
      # the deployment of both SV runbook and validator runbook should be finished
      # before the daml upgrade vote is effective
      - deploy_sv_runbook:
          name: "upgrade_sv_runbook_after_daml_upgrade"
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          requires:
            - preflight_daml_upgrade
      - deploy_validator_runbook:
          name: "upgrade_validator_runbook_after_daml_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - preflight_daml_upgrade
      - wait_for_daml_upgrade:
          name: "wait_for_daml_upgrade"
          context:
            - canton-network-vpn
          run: << pipeline.parameters.run-daml-upgrade >>
          cluster: << pipeline.parameters.cluster >>
          requires:
            - preflight_daml_upgrade
      - preflight_check:
          name: "preflight_after_daml_upgrade"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - wait_for_daml_upgrade
            - upgrade_sv_runbook_after_daml_upgrade
            - upgrade_validator_runbook_after_daml_upgrade
      - preflight_sv_check:
          name: "preflight_sv_check_after_sv_upgrade"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_daml_upgrade
            - upgrade_sv_runbook_after_daml_upgrade
            - upgrade_validator_runbook_after_daml_upgrade
      - preflight_validator_check:
          name: "preflight_validator_runbook_after_upgrade"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_daml_upgrade
            - upgrade_sv_runbook_after_daml_upgrade
            - upgrade_validator_runbook_after_daml_upgrade
          # by resetting the SV runbook, it's as if a new SV was onboarded,
          # thus testing that SVs joining after an upgrade also work
      - reset_sv_runbook:
          name: "reset_sv_runbook_after_upgrade"
          context:
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          silence_deployment_alerts: true
          requires:
            - wait_for_daml_upgrade
            - preflight_sv_check_after_sv_upgrade
            - preflight_validator_runbook_after_upgrade
      - deploy_sv_runbook:
          name: "redeploy_sv_runbook_after_daml_upgrade"
          silence_deployment_alerts: true
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          requires:
            - reset_sv_runbook_after_upgrade
        # by resetting the Validator runbook, it's as if a new Validator was onboarded,
        # thus testing that Validators joining after an upgrade also work
      - reset_validator_runbook:
          name: "reset_validator_runbook_after_upgrade"
          silence_deployment_alerts: true
          context:
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_daml_upgrade
            - preflight_validator_runbook_after_upgrade
      - deploy_validator_runbook:
          name: "redeploy_validator_runbook_after_daml_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          silence_deployment_alerts: true
          requires:
            - reset_validator_runbook_after_upgrade
      - preflight_sv_check:
          name: "preflight_sv_check_after_sv_redeploy"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - redeploy_sv_runbook_after_daml_upgrade
      - preflight_validator_check:
          name: "preflight_validator_runbook_after_redeploy"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - redeploy_validator_runbook_after_daml_upgrade
      - reset_cluster:
          name: reset_cluster_after_upgrade
          unlock_shared_cluster: true
          cluster: << pipeline.parameters.cluster >>
          context:
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_sv_check_after_sv_redeploy
            - preflight_validator_runbook_after_redeploy
      - autoscaler_allow_scaledown:
          cluster: << pipeline.parameters.cluster >>
          requires:
            - reset_cluster_after_upgrade

