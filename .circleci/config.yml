          upgrade_version: << pipeline.parameters.upgrade-version >>
          send_notifications: false
          requires:
            - artifacts_push
            - deploy_cluster_for_migration
            - deploy_sv_runbook_for_migration
            - deploy_validator_runbook_for_migration
      - hard_migration:
          name: "prepare_sv_runbook_for_migration"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          action: "prepare"
          scope: "sv"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          send_notifications: false
          requires:
            - artifacts_push
            - deploy_cluster_for_migration
            - deploy_sv_runbook_for_migration
            - deploy_validator_runbook_for_migration
      - trigger_global_domain_migration:
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - deploy_cluster_for_migration
            - deploy_sv_runbook_for_migration
            - deploy_validator_runbook_for_migration
            - prepare_cluster_for_migration
            - prepare_sv_runbook_for_migration
      - hard_migration:
          name: "migrate_cluster"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          action: "migrate"
          scope: "core"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          send_notifications: false
          requires:
            - prepare_cluster_for_migration
            - trigger_global_domain_migration
            - pre_migration_compose_validator
            - pre_migration_dump_identities
      - preflight_check:
          name: "preflight_check_migrated"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            - trigger_global_domain_migration
      - hard_migration:
          name: "migrate_sv_runbook"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          action: "migrate"
          scope: "sv"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          send_notifications: false
          requires:
            - prepare_sv_runbook_for_migration
            - migrate_cluster
      # Re-enable once latest release is > 0.2.3
      #      - preflight_sv_check:
      #          name: "preflight_sv_check_migrated"
      #          context:
      #            - artifactory
      #            - canton-network-vpn
      #            - slack-context
      #          cluster: << pipeline.parameters.cluster >>
      #          cluster_version: << pipeline.parameters.upgrade-version >>
      #          migration_id: 1
      #          requires:
      #            - migrate_cluster
      - hard_migration:
          name: "migrate_validator_runbook"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          action: "migrate"
          scope: "validator"
          base_version: << pipeline.parameters.base-version >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          send_notifications: false
          requires:
            - migrate_cluster
      - post_migration_verify_identities:
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          send_notifications: false
          requires:
            - pre_migration_dump_identities
            - migrate_cluster
            - migrate_validator_runbook
      - preflight_validator_check:
          name: "preflight_validator_check_migrated"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            - migrate_cluster
      - post_migration_compose_validator:
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          upgrade_version: << pipeline.parameters.upgrade-version >>
          send_notifications: false
          requires:
            - migrate_cluster
      - backup_cluster:
          name: "backup_cluster_after_migration"
          migration_id: 1
          cluster: << pipeline.parameters.cluster >>
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            # Re-enable once latest release is > 0.2.3
            #            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated
      - restore_node:
          cluster: << pipeline.parameters.cluster >>
          namespace_name: "sv-3"
          migration_id: 1
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - backup_cluster_after_migration
      - reset_sv_runbook:
          name: "reset_sv_runbook_after_migration"
          extra_migrations_reset: "0,1"
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          requires:
            - migrate_sv_runbook
      - deploy_sv_runbook:
          name: "deploy_fresh_sv_runbook_after_migration"
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          deploy_version: << pipeline.parameters.upgrade-version >>
          global_domain_active_migration_id: 1
          requires:
            - reset_sv_runbook_after_migration
#          # Re-enable once latest release is > 0.2.3
      #            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated
      - preflight_sv_check:
          name: "preflight_sv_check_redeployed"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          cluster_version: << pipeline.parameters.upgrade-version >>
          migration_id: 1
          requires:
            # We wait for the runbook to redeploy to make sure we're not testing the original deployment
            - deploy_fresh_sv_runbook_after_migration
      - reset_cluster:
          cluster: << pipeline.parameters.cluster >>
          extra_migrations_reset: "0,1"
          unlock_shared_cluster: true
          context:
            - canton-network-vpn
            - slack-context
          requires:
            - restore_node
            - preflight_sv_check_redeployed
            - post_migration_compose_validator

  apply_infra:
    when:
      equal: [ apply-infra, << pipeline.parameters.run-job >> ]
    jobs:
      - deploy_infra:
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>

  backup_mainnet:
    when:
      equal: [ backup-mainnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_cluster:
          filters:
            branches:
              only:
                - /release-line-.*/
          include_splitwell: false
          include_validator1: false
          channel_notify: C0731SHS3HB # #team-canton-network-mainnet-deployment
          cluster: "mainnet"
          parallelism: 1
          migration_id: 1
          context:
            - artifactory
            - canton-network-vpn
            - slack-context

  backup_status_mainnet:
    when:
      equal: [ backup-status-mainnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_status_cluster:
          cluster: "mainnet"
          migration_id: 1
          channel_notify: C0731SHS3HB # #team-canton-network-mainnet-deployment
          alert_threshold: "4 hours ago"
          context:
            - slack-context
            - canton-network-vpn

  update_deployment:
    when:
      equal: [ update-deployment, << pipeline.parameters.run-job >> ]
    jobs:
      - deploy_operator:
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>

  preview_operator:
    when:
      equal: [ preview-operator, << pipeline.parameters.run-job >> ]
    jobs:
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for << pipeline.parameters.cluster >>
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          deployment_only: true
  preview_pulumi_changes:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - trigger_pulumi_previews
      - set_previews:
          <<: *main-branch-never
          name: set_previews_devnet
          type: approval
      - set_previews:
          <<: *main-branch-never
          name: set_previews_testnet
          type: approval
      - set_previews:
          <<: *main-branch-never
          name: set_previews_mainnet
          type: approval
      - set_previews:
          <<: *main-branch-never
          name: set_previews_cilr
          type: approval
      - set_previews:
          <<: *main-branch-never
          name: set_previews_deployment
          type: approval
      - preview_pulumi_changes:
          name: Preview pulumi changes for DevNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "devnet"
          deployment_only: false
          requires:
            - set_previews_devnet
      - preview_pulumi_changes:
          name: Preview pulumi changes for TestNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "testnet"
          deployment_only: false
          requires:
            - set_previews_testnet
      - preview_pulumi_changes:
          name: Preview pulumi changes for MainNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "mainnet"
          deployment_only: false
          requires:
            - set_previews_mainnet
      - preview_pulumi_changes:
          name: Preview pulumi changes for CILR
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cilr"
          deployment_only: false
          requires:
            - set_previews_cilr
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for CILR
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cilr"
          deployment_only: true
          requires:
            - set_previews_cilr
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for DevNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "devnet"
          deployment_only: true
          requires:
            - set_previews_deployment
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for TestNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "testnet"
          deployment_only: true
          requires:
            - set_previews_deployment
      - preview_pulumi_changes:
          name: Preview operator pulumi changes for MainNet
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "mainnet"
          deployment_only: true
          requires:
            - set_previews_deployment

  backup_testnet:
    when:
      equal: [ backup-testnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_cluster:
          filters:
            branches:
              only:
                - /release-line-.*/
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          cluster: "testnet"
          migration_id: 2
          context:
            - artifactory
            - canton-network-vpn
            - slack-context

  backup_status_testnet:
    when:
      equal: [ backup-status-testnet, << pipeline.parameters.run-job >> ]
    jobs:
      - backup_status_cluster:
          cluster: "testnet"
          migration_id: 2
          channel_notify: C06SMCCBYQH # #team-canton-network-dev-testnet-deployment
          context:
            - slack-context
            - canton-network-vpn

  deploy_upgrade:
    # the parameters run-job, run-partial-upgrade and base-version are set in launch_ciupgrade_workflow
    when:
      equal: [ deploy-upgrade, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_upgrade"
          wait_type: "cancel_waiting_and_wait_workflow"
          branch_filter: << pipeline.parameters.branch-filter >>
      - autoscaler_prevent_scaledown:
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_previous_pipeline
      - reset_cluster:
          # note that this reset is executed on the latest version to properly cleanup previous deploy_ciupgrade runs
          name: reset_cluster
          cluster: << pipeline.parameters.cluster >>
          unlock_shared_cluster: false
          silence_deployment_alerts: true
          context:
            - slack-context
            - artifactory
          requires:
            - wait_for_previous_pipeline
      - deploy_cluster:
          name: "deploy_cluster_for_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          skip_infra: false
          update_deployment_branch: false  # No need to create a deployment branch for ciupgrade
          cancel_workflow_on_failure: true
          deploy_version: << pipeline.parameters.base-version >>
          run_upgrade_workarounds: true
          requires:
            - reset_cluster
      - preflight_check:
          name: "preflight_check_initial"
          cluster_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - reset_cluster
      - deploy_sv_runbook:
          name: "deploy_sv_runbook_for_upgrade"
          deploy_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          run_upgrade_workarounds: true
          requires:
            - deploy_cluster_for_upgrade
      - preflight_sv_check:
          name: "preflight_sv_check_initial"
          cluster_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - deploy_cluster_for_upgrade
      - deploy_validator_runbook:
          name: "deploy_validator_runbook_for_upgrade"
          deploy_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          run_upgrade_workarounds: true
          requires:
            - deploy_cluster_for_upgrade
      - preflight_validator_check:
          name: "preflight_validator_initial"
          cluster_version: << pipeline.parameters.base-version >>
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - deploy_cluster_for_upgrade
      - artifacts_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - wait_for_previous_pipeline
      - deploy_partial_upgrade:
          name: "deploy_partial_upgrade"
          cluster: << pipeline.parameters.cluster >>
          context:
            - artifactory
            - slack-context
          run: << pipeline.parameters.run-partial-upgrade >>
          silence_deployment_alerts: true
          requires:
            - artifacts_push
            - preflight_check_initial
            - preflight_sv_check_initial
            - preflight_validator_initial
      - preflight_check:
          name: "preflight_check_partial_upgrade"
          cluster_version: << pipeline.parameters.base-version >>
          check_cluster_version: false # we want to run the preflight in base version, but the version is reported as upgraded
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          run: << pipeline.parameters.run-partial-upgrade >>
          wait_for_sv: false
          requires:
            - deploy_partial_upgrade
      - preflight_sv_check:
          name: "preflight_sv_check_partial_upgrade"
          cluster_version: << pipeline.parameters.base-version >>
          check_cluster_version: false # we want to run the preflight in base version, but the version is reported as upgraded
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          run: << pipeline.parameters.run-partial-upgrade >>
          requires:
            - deploy_partial_upgrade
      - preflight_validator_check:
          name: "preflight_validator_partial_upgrade"
          cluster_version: << pipeline.parameters.base-version >>
          check_cluster_version: false # we want to run the preflight in base version, but the version is reported as upgraded
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          run: << pipeline.parameters.run-partial-upgrade >>
          requires:
            - deploy_partial_upgrade
      - deploy_cluster:
          name: "deploy_final_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          update_deployment_branch: false
          cancel_workflow_on_failure: true
          requires:
            - preflight_check_partial_upgrade
            - preflight_sv_check_partial_upgrade
            - preflight_validator_partial_upgrade
      - preflight_check_docker:
          name: "preflight_check_final_upgrade_docker"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - deploy_final_upgrade
      - preflight_check:
          name: "preflight_check_final_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - deploy_final_upgrade
      - preflight_check:
          name: "preflight_daml_upgrade"
          run: << pipeline.parameters.run-daml-upgrade >>
          test_names_file: "test-daml-ciupgrade-vote.log"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - preflight_check_final_upgrade
            - preflight_check_final_upgrade_docker
      # the deployment of both SV runbook and validator runbook should be finished
      # before the daml upgrade vote is effective
      - deploy_sv_runbook:
          name: "upgrade_sv_runbook_after_daml_upgrade"
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          requires:
            - preflight_daml_upgrade
      - deploy_validator_runbook:
          name: "upgrade_validator_runbook_after_daml_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - preflight_daml_upgrade
      - wait_for_daml_upgrade:
          name: "wait_for_daml_upgrade"
          context:
            - canton-network-vpn
          run: << pipeline.parameters.run-daml-upgrade >>
          cluster: << pipeline.parameters.cluster >>
          requires:
            - preflight_daml_upgrade
      - preflight_check:
          name: "preflight_after_daml_upgrade"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          wait_for_sv: false
          requires:
            - wait_for_daml_upgrade
            - upgrade_sv_runbook_after_daml_upgrade
            - upgrade_validator_runbook_after_daml_upgrade
      - preflight_sv_check:
          name: "preflight_sv_check_after_sv_upgrade"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_daml_upgrade
            - upgrade_sv_runbook_after_daml_upgrade
            - upgrade_validator_runbook_after_daml_upgrade
      - preflight_validator_check:
          name: "preflight_validator_runbook_after_upgrade"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_daml_upgrade
            - upgrade_sv_runbook_after_daml_upgrade
            - upgrade_validator_runbook_after_daml_upgrade
          # by resetting the SV runbook, it's as if a new SV was onboarded,
          # thus testing that SVs joining after an upgrade also work
      - reset_sv_runbook:
          name: "reset_sv_runbook_after_upgrade"
          context:
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_daml_upgrade
            - preflight_sv_check_after_sv_upgrade
            - preflight_validator_runbook_after_upgrade
      - deploy_sv_runbook:
          name: "redeploy_sv_runbook_after_daml_upgrade"
          silence_deployment_alerts: true
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: << pipeline.parameters.cluster >>
          requires:
            - reset_sv_runbook_after_upgrade
        # by resetting the Validator runbook, it's as if a new Validator was onboarded,
        # thus testing that Validators joining after an upgrade also work
      - reset_validator_runbook:
          name: "reset_validator_runbook_after_upgrade"
          silence_deployment_alerts: true
          context:
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - wait_for_daml_upgrade
            - preflight_validator_runbook_after_upgrade
      - deploy_validator_runbook:
          name: "redeploy_validator_runbook_after_daml_upgrade"
          context:
            - artifactory
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - reset_validator_runbook_after_upgrade
      - preflight_sv_check:
          name: "preflight_sv_check_after_sv_redeploy"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - redeploy_sv_runbook_after_daml_upgrade
      - preflight_validator_check:
          name: "preflight_validator_runbook_after_redeploy"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: << pipeline.parameters.cluster >>
          requires:
            - redeploy_validator_runbook_after_daml_upgrade
      - reset_cluster:
          name: reset_cluster_after_upgrade
          unlock_shared_cluster: true
          cluster: << pipeline.parameters.cluster >>
          context:
            - canton-network-vpn
            - slack-context
          requires:
            - preflight_sv_check_after_sv_redeploy
            - preflight_validator_runbook_after_redeploy
      - autoscaler_allow_scaledown:
          cluster: << pipeline.parameters.cluster >>
          requires:
            - reset_cluster_after_upgrade

