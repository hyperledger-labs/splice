  cache-version:
    type: string
    default: "39"
  run-job:
    type: enum
    enum:
      [
        build,
        deploy-cidaily,
        deploy-ciupgrade,
        deploy-ciperiodic-migration,
        deploy-ciperiodic-sv-reonboard,
        deploy-ciperiodic-non-devnet,
        healthcheck-cidaily,
        healthcheck-cilr,
        healthcheck-devnet,
        healthcheck-testnet,
        redeploy-sv-runbook-cidaily,
        redeploy-validator-runbook-cidaily,
        reset-sv-runbook-cilr,
        reset-sv-runbook-devnet,
        healthcheck-sv-runbook-devnet,
        reset-validator-runbook-devnet,
        healthcheck-validator-runbook-devnet,
        backup-cidaily,
        restore-sv-cidaily,
        restore-validator-cidaily,
        backup-devnet,
        backup-testnet,
        backup-mainnet,
        publish-public-artifacts,
        auth0-user-cleanup,
        cluster-lock-reaper,
        apply-infra,
        update-deployment,
        preview-changes
      ]
    default: build
  # Whether the cluster should be reset before deploying.
  # It only makes sense to unset this if you are planning to use CI to fix a broken deployment.
  reset-before-deploy:
    type: boolean
    default: true
  # Cluster used for the apply-infra job
  cluster:
    type: string
    default: "none"
  # Controls whether to run partial upgrades in `deploy_ciupgrade`
  run-partial-upgrade:
    type: boolean
