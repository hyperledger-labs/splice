  preflight_check_docker:
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      test_names_file:
        type: string
        default: "test-full-class-names-docker-compose-validator-preflight.log"
      wait_for_sv:
        type: boolean
        default: true
      wait_for_splitwell:
        type: boolean
        default: true
      cluster_version:
        type: string
        default: ""
      check_cluster_version:
        type: boolean
        default: true
      migration_id:
        type: integer
        default: 0
      extra_env_vars:
        type: string
        default: ""
      force_non_devnet:
        type: boolean
        default: false
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: 1
    steps:
      - checkout_with_retry
      - run:
          # necessary for npm/webpack dev server launched in start-frontends.sh later
          # https://webpack.js.org/configuration/watch/#not-enough-watchers
          name: Set inotify fs watch
          command: |
            echo "Checking watch info..."
            sysctl fs.inotify
            echo "Setting max_user_watches..."
            echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p
      - when:
          condition: << parameters.cluster_version >>
          steps:
            - run:
                name: Checkout commit << parameters.cluster_version >>
                command: git checkout << parameters.cluster_version >>
      - setup_nix
      - export_migration_id:
          cluster: << parameters.cluster >>
          migration_id: << parameters.migration_id >>
      - setup_sbt_test_job:
          runner_type: "circleci"
      - run_bash_command_in_nix:
          cmd_name: Activate cluster (configure kubectl)
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: cncluster activate
          cmd_retry_count: 5
      - split_tests_for_parallel_run:
          test_names_file: << parameters.test_names_file >>
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: wait for deployment to finish
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP --keep ACTIVE_MIGRATION_ID"
          cmd: |
            if [[ << parameters.check_cluster_version >> == true ]]; then
              VERSION=$(get-snapshot-version)
              cncluster wait_version $VERSION
            fi
            validator_app="validator-app"
            # We use readiness of validator-app in all namespaces as an approximation to the cluster's readiness
            if [[ << parameters.wait_for_splitwell >> == true ]]; then
              cncluster wait splitwell $validator_app ${ACTIVE_MIGRATION_ID}
            fi
            cncluster wait sv-1 $validator_app ${ACTIVE_MIGRATION_ID}
            cncluster wait validator1 $validator_app ${ACTIVE_MIGRATION_ID}
            if (env-bool IS_DEVNET) && [ << parameters.force_non_devnet >> == false ]; then
              cncluster wait sv-2 $validator_app ${ACTIVE_MIGRATION_ID}
              cncluster wait sv-3 $validator_app ${ACTIVE_MIGRATION_ID}
              cncluster wait sv-4 $validator_app ${ACTIVE_MIGRATION_ID}
            fi
            if [[ << parameters.wait_for_sv >> == true ]] && ( env-bool APPROVE_SV_RUNBOOK || env-bool IS_DEVNET ); then
              cncluster wait sv $validator_app ${ACTIVE_MIGRATION_ID}
            fi
            echo "Done waiting. All pods in the cluster are:"
            kubectl get pods -A
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_HOSTNAME}; then echo "false"; else echo "true"; fi)
          cmd_retry_count: 2
          cmd_before_retry: |-
            echo "VPN connection seems to have died, restarting VPN and retrying..."
            /tmp/vpn-scripts/restart-vpn.sh
      - get_cluster:
          cluster: << parameters.cluster >>
      - docker_login_artifactory
      - run_bash_command_in_nix:
          cmd: /tmp/vpn-scripts/create-docker-network-on-vpn.sh onvpn
      - execute_sbt_command:
          pre_sbt_cmd: |
            set -eou pipefail
            . cluster/deployment/${TARGET_CLUSTER}/.envrc.vars
            # authenticate to GAR for the docker-compose preflight test to pull the images
            echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
            gcloud auth configure-docker us-central1-docker.pkg.dev
          cmd: "\"$RUN_SPLITTED_TESTS_CMD\""
          additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET --keep SV_DEV_NET_WEB_UI_PASSWORD --keep SV_WEB_UI_PASSWORD --keep VALIDATOR_WEB_UI_PASSWORD --keep GCP_DATA_DUMP_BUCKET_SERVICE_ACCOUNT_CREDENTIALS --keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP --keep ACTIVE_MIGRATION_ID"
          extra_env_vars: POSTGRES_DB=postgres NETWORK_APPS_ADDRESS=${GCP_CLUSTER_HOSTNAME} NETWORK_APPS_ADDRESS_PROTOCOL=https VALIDATOR_USER_NAME="auto_preflight" MIGRATION_ID=${ACTIVE_MIGRATION_ID} << parameters.extra_env_vars >>
          timeout: "15m"
          cmd_retry_count: 3
          # retry if VPN got disconnected (approximated by trying to fetch docs from the cluster.
          # Note that this is expected to succeed even if the cluster deployment is down, because it fetches only the http->https redirect anyway)
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_HOSTNAME}; then echo "false"; else echo "true"; fi)
          cluster: << parameters.cluster >>
          cmd_before_retry: |
            echo "Test failed, but VPN connection seems to have died, restarting VPN and retrying..."
            ./stop-frontends.sh
            /tmp/vpn-scripts/restart-vpn.sh
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - save_sbt_job_result:
          runner_type: "circleci"
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
          channel_notify: << parameters.channel_notify >>
      - store_artifacts:
          name: Upload vpn log
          path: /var/log/vpn.log

