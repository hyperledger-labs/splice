# Scala CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/sample-config/ for more details
#
version: 2.1
orbs:
  slack: circleci/slack@4.9.3

env: &env
  TERM: dumb
  CI: "true"
  USER: circleci

notify-fail: &notify-fail
  context: slack-context
  post-steps:
  - slack/notify:
      branch_pattern: main
      event: fail
      template: basic_fail_1

main-branch-only: &main-branch-only
  filters:
    branches:
      only:
         - main

commands:
  install_daml_sdk:
    description: Install Daml SDK
    steps:
    - run:
        name: install daml sdk
        command: |
          set -eou pipefail
          curl -sSL https://get.daml.com/ | sh -s << pipeline.parameters.sdk-version >>
  setup_nix:
    description: Set up Nix
    steps:
    - run:
        name: make_cache_key
        command: |
          set -euo pipefail
          git log -n1 --format=%H nix shell.nix > /tmp/nix-cache-key
          sudo mkdir /nix
          sudo chown $USER /nix
    - restore_cache:
        name: Restore nix cache
        keys:
        - nix-{{ checksum "/tmp/nix-cache-key" }}
    - run:
       name: setup_nix
       command: |
         set -euo pipefail
         if [ -f ~/.config/nix/nix.conf ]; then
             exit 0
         fi
         # Disabling sandbox because:
         # 1. It doesn't work on CircleCI (sethostname is not allowed)
         # 2. We don't plan to build anything, so the risk is fairly low
         mkdir -p ~/.config/nix
         echo 'sandbox = false' >> ~/.config/nix/nix.conf
         sh <(curl -fsSL https://nixos.org/nix/install) --no-daemon
         . /home/circleci/.nix-profile/etc/profile.d/nix.sh
         nix-shell shell.nix --run 'echo "Done loading all packages."'
    - save_cache:
        key: nix-{{ checksum "/tmp/nix-cache-key" }}
        paths:
        - /nix
        - /home/circleci/.nix-profile
        - /home/circleci/.nix-channels
        - /home/circleci/.nix-defexpr
        - /home/circleci/.config/nix


  # Note: compiled_classes and sbt_cache commands are largely copied from the Canton repo
  # save compiled target directories to cache (so we don't recompile everything again and again)
  # uses the target directories in the project (e.g. `the-real-canton-coin/target`) which sbt doesn't cache.
  # This cache is not shared among CI jobs.
  save_compiled_classes:
    steps:
      - run:
          name: Creating archive of compiled classes
          command: |
            mkdir -p /tmp/classes
            # Excluding ./track, as its contents may change while the archive is created.
            # Excluding ./log, as its large and we don't need it.
            # Excluding frontend since caching NPM is a terrible idea and we should not do it or Moritz will cry.
            # Excluding .daml to avoid any issues where package ids might not be reliable on incremental builds.
            tar -czf /tmp/classes/classes.tar.gz --exclude-vcs --exclude=./track --exclude=./log --exclude frontend --exclude .daml -H posix .
      - save_cache:
          name: Uploading archive with compiled classes to cache
          # Key components:
          # - classes: fixed prefix for uniqueness
          # - branch: to prevent re-usage of classes between branches
          # - dependencies: to prevent re-usage of classes with mismatching libraries (this can lead to subtle errors)
          # - rev: to allow for updating the cache when sources have changed
          key: &compiled_classes_key classes-<< pipeline.parameters.cache-version >> ci-job={{ .Environment.CIRCLE_JOB }} branch:{{ .Branch }} buildprops:{{ checksum "project/build.properties" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} damlplugin:{{ checksum "project/DamlPlugin.scala" }} dependencies:{{ checksum "project/Dependencies.scala" }} canton-dependencies:{{ checksum "project/CantonDependencies.scala" }} houserules:{{ checksum "project/Houserules.scala" }} plugins:{{ checksum "project/plugins.sbt" }} build={{ checksum "build.sbt" }} rev:{{ .Revision }}
          paths:
            - /tmp/classes
      - store_artifacts:
          name: Storing archive of compiled classes
          path: /tmp/classes
          destination: classes

  # restore pre-compiled target directories from cache (so we don't recompile everything again and again)
  # uses the target directories in the project (e.g. `the-real-canton-coin/target`) which sbt doesn't cache.
  # This cache is not shared among CI jobs.
  restore_precompiled_classes:
    parameters:
      reset_classes_if_requested:
        type: boolean
        default: false
    steps:
      - checkout # Also required to compute cache keys in the next step
      - restore_cache:
          name: Downloading archive with compiled classes from cache
          keys:
            # First, try to download class files from the same revision
            - *compiled_classes_key
            # Then, try to download the latest class files produced for the same branch.
            # Make sure that library versions still match.
            - classes-<< pipeline.parameters.cache-version >> ci-job={{ .Environment.CIRCLE_JOB }} branch:{{ .Branch }} buildprops:{{ checksum "project/build.properties" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} damlplugin:{{ checksum "project/DamlPlugin.scala" }} dependencies:{{ checksum "project/Dependencies.scala" }} canton-dependencies:{{ checksum "project/CantonDependencies.scala" }} houserules:{{ checksum "project/Houserules.scala" }} plugins:{{ checksum "project/plugins.sbt" }} build={{ checksum "build.sbt" }}
            # Then, try to download the latest class files produced for the main branch.
            # Make sure that library versions still match.
            - classes-<< pipeline.parameters.cache-version >> ci-job={{ .Environment.CIRCLE_JOB }} branch:main buildprops:{{ checksum "project/build.properties" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} damlplugin:{{ checksum "project/DamlPlugin.scala" }} dependencies:{{ checksum "project/Dependencies.scala" }} canton-dependencies:{{ checksum "project/CantonDependencies.scala" }} houserules:{{ checksum "project/Houserules.scala" }} plugins:{{ checksum "project/plugins.sbt" }} build={{ checksum "build.sbt" }}
      - run:
          name: Extracting precompiled classes
          command: |
            if [[ << parameters.reset_classes_if_requested >> == true ]] &&
               grep "^$CIRCLE_BRANCH$" .circleci/branches_to_be_fully_recompiled_in_ci.txt > /dev/null
            then
              echo "Do not extract precompiled classes, as a full recompilation has been requested."
              exit 0
            fi

            if [[ -e /tmp/classes/classes.tar.gz ]]; then
              tar -zxf /tmp/classes/classes.tar.gz


              # For some reason, the reset below may change file modification times stamps, if we don't run `git status`.
              git status

              # Reset changes to files under version control.
              git reset --hard

              # Delete untracked files, except for ignored files.
              git clean -fd
              echo "Finished restoring the pre-compiled cache files"

            else
              echo "No precompiled classes found. Skipping..."
            fi

  save_sbt_cache:
    steps:
      - run:
          name: Make caches readable
          # On machine executors, some files in the caches may be owned by root.
          # Make them readable to the cirecleci user.
          command: |
            for dir in "$HOME/.ivy2/cache" "$HOME/.cache/coursier/v1" "$HOME/.sbt"; do
              if [[ -e "$dir" ]]; then
                # The combination of sudo and `|| true` is a bit of a hack.
                # The underlying assumption is that chmod is only needed when sudo is available.
                # Unfortunately, there are jobs where sudo is not available.
                sudo chmod -R a+r "$dir" || true
              fi
            done

      - save_cache:
          name: Uploading Coursier cache
          # The cache is stored only when the build definition or dependencies change
          key: &coursier-cache-key coursier-canton-job={{ .Environment.CIRCLE_JOB }}-dependencies={{ checksum "project/Dependencies.scala" }}-canton-dependencies={{ checksum "project/CantonDependencies.scala" }}-buildcommon:{{ checksum "project/BuildCommon.scala" }}-configyml={{ checksum ".circleci/config.yml" }}-buildproperties={{ checksum "project/build.properties" }}-houserules={{ checksum "project/Houserules.scala" }}-plugins={{ checksum "project/plugins.sbt" }}-build={{ checksum "build.sbt" }}
          # Components of the cache key:
          # - Keyword "coursier" to indicate this stores the coursier cache.
          # - Name of the job, to avoid interferences between jobs. (Different jobs populate the cached folders differently.)
          # - Dockerfile to start with a clean state if build tools are updated.
          # - This file to be on the save side.
          # - Everything in project that may contain a dependency.
          # - build.sbt as it may contain a hardcoded dependency.
          paths:
            - "~/.cache/coursier/v1/"

      - save_cache:
          name: Uploading Sbt caches
          # The cache is stored only when the build definition or dependencies change
          key: &sbt-cache-key sbt-canton-job={{ .Environment.CIRCLE_JOB }}-dependencies={{ checksum "project/Dependencies.scala" }}-canton-dependencies={{ checksum "project/CantonDependencies.scala" }}-buildcommon:{{ checksum "project/BuildCommon.scala" }}-configyml={{ checksum ".circleci/config.yml" }}-buildproperties={{ checksum "project/build.properties" }}-houserules={{ checksum "project/Houserules.scala" }}-plugins={{ checksum "project/plugins.sbt" }}-build={{ checksum "build.sbt" }}
          # Components of the cache key:
          # - Keyword "sbt" to indicate this stores Sbt caches.
          # - Otherwise as for the coursier cache key.
          paths:
            - "~/.ivy2/cache" # despite sbt 1.3 using coursier it appears a handful of dependencies are placed in the ivy cache (core sbt plugins and coursier itself)
            - "~/.sbt"

  restore_sbt_cache:
    # We are saving to / restoring from several caches to keep individual caches below 500MB.
    # Otherwise, restore_cache may fail for no good reason.
    # See https://circleci.com/docs/2.0/caching/#cache-size
    steps:
      - run:
          name: Deleting cache directories
          # Delete the cache directories so that we don't include arbitrary stuff coming from the docker image.
          command: |
            for dir in "$HOME/.ivy2/cache" "$HOME/.cache/coursier/v1" "$HOME/.sbt"; do
              if [[ -e "$dir" ]]; then
                rm -rfv "$dir"
              fi
            done

      - restore_cache:
          name: Restoring Coursier cache
          keys:
            # Restore the cache for the exact same build configuration.
            - *coursier-cache-key
            # Previously, a cache matching CIRCLE_JOB and project/Dependencies.scala was also attempted but
            # unfortunately sbt and/or coursier fail to detect and use credentials to retrieve missing artifacts
            # from authenticated repos.

      - restore_cache:
          name: Restoring Sbt caches
          keys:
            # First try to restore the cache for the exact same build configuration.
            - *sbt-cache-key
            # If this is not possible and Dependencies.scala hasn't changed, populate the cache with slightly outdated data.
            # This will speed-up compilation, because most libraries are already in the cache.
            - sbt-canton-job={{ .Environment.CIRCLE_JOB }}-dependencies={{ checksum "project/Dependencies.scala" }}-canton-dependencies={{ checksum "project/CantonDependencies.scala" }}


  # Largely copied from Canton's CI definition
  execute_sbt_command:
    description: |
      A context within which SBT commands can be run correctly for our needs
    parameters:
      cmd:
        # This may contain several commands.
        # The caller needs to quote commands that contain spaces, e.g. "\"testOnly myTest\"".
        type: string
      timeout:
        type: string
        default: "25m"
      succeed_on_error:
        # Will cause the command to always succeed regardless of the sbt exit code.
        type: boolean
        default: false
      retry_fetch:
        # If true, will send a few \r\n to sbt to ensure we download dependencies
        type: string
        default: "0"
      extra_parameters:
        type: string
        default: ""
      fail_on_error_in_output:
        # Fail if there is an error in the sbt output.
        default: true
        type: boolean
      pre_sbt_cmd:
        type: string
        default: ""
      post_sbt_cmd:
        type: string
        default: ""
    steps:
      - run_bash_command_in_nix:
          cmd_name: Executing "sbt << parameters.cmd >>"
          cmd: |
            on_exit() {
              local CODE="$?"
              # Provide some explanation on exit
              if [ "$CODE" == 0 ]
              then
                echo "sbt terminated successfully."
              elif [ "$CODE" == 124 ]
              then
                echo "sbt has been aborted with the TERM signal after << parameters.timeout >>."
              elif [ "$CODE" == 137 ]
              then
                echo "sbt has been killed because it has allocated too much memory or it has ignored the TERM signal after << parameters.timeout >>."
              else
                echo "sbt failed with exit code $CODE."
              fi
              <<# parameters.succeed_on_error >>
              echo "Overriding original exit code $CODE with zero."
              exit 0
              <</ parameters.succeed_on_error >>
            }
            trap on_exit EXIT

            set -euo pipefail
            # Necessary for tests of the REPL
            export TERM=dumb

            run_sbt() {
               # Define sbt command
               SBT_CMD=(sbt -verbose)


               # Add extra parameters
               SBT_CMD+=(<< parameters.extra_parameters >>)

               # Add sbt commands.
               # Do not quote this, to allow the caller to pass in several commands.
               # The caller needs to take care of quoting, if a command contains spaces.
               SBT_CMD+=(<< parameters.cmd >>)
               SBT_CMD+=(checkErrors)

               # Setup heap size; corresponds to Canton large executors
               SBT_CMD+=("-J-Xmx5000M" "-J-Xms5000M")
               # Run command
               # also send a few newline characters to sbt to ensure we keep on downloading dependencies
               python3 -c "print ('r\n'*<< parameters.retry_fetch >>)" |
                 timeout --kill-after=30s << parameters.timeout >> "${SBT_CMD[@]}" 2>&1 |
                 tee sbt_output

                <<# parameters.fail_on_error_in_output >>
                # Check and report whether sbt has output errors
                # Need to also apply ignore rules for the log, as errors in the log are emitted to stdout by default.
                .circleci/canton-scripts/check-sbt-output.sh "sbt_output" "project/errors-in-sbt-output-to-ignore.txt" "project/errors-in-log-to-ignore.txt"
                <</ parameters.fail_on_error_in_output >>
            }
            << parameters.pre_sbt_cmd >>
            run_sbt
            << parameters.post_sbt_cmd >>



  run_bash_command_in_nix:
    parameters:
      cmd:
        type: string
      cmd_name:
        type: string
        default: "Executing bash command << parameters.cmd >> in the nix shell"
      with_devnet_authentication:
        type: boolean
        default: false
      with_scratchnet_authentication:
        type: boolean
        default: false
      additional_nix_args:
        type: string
        default: ""
    steps:
      - run:
          name: << parameters.cmd_name >>
          command: |
            set -euo pipefail
            . /home/circleci/.nix-profile/etc/profile.d/nix.sh
            ADDITIONAL_NIX_ARGS="<< parameters.additional_nix_args >>"

            if [[ << parameters.with_devnet_authentication >> == true ]]; then
              ADDITIONAL_NIX_ARGS+=" --keep GCP_DA_CN_DEVNET_KEY"
            fi
            if [[ << parameters.with_scratchnet_authentication >> == true ]]; then
              ADDITIONAL_NIX_ARGS+=" --keep GCP_DA_CN_SCRATCHNET_KEY"
            fi

            nix-shell shell.nix \
              --pure \
              --keep CI $ADDITIONAL_NIX_ARGS \
              --run bash \<<'EOF'
              set -euo pipefail
              . .envrc.vars

              if [[ << parameters.with_devnet_authentication >> == true ]]; then
                echo $GCP_DA_CN_DEVNET_KEY | gcloud auth activate-service-account --key-file=-
              fi
              if [[ << parameters.with_scratchnet_authentication >> == true ]]; then
                echo $GCP_DA_CN_SCRATCHNET_KEY | gcloud auth activate-service-account --key-file=-
              fi

              << parameters.cmd >>

            EOF

  cleanup_sbt_test_job:
    steps:
      - upload_test_reports
      - save_sbt_cache
      - save_compiled_classes
      - run: # Pack logfiles to speedup downloads.
          name: Pack Logfiles
          when: always
          command: |
            if [[ -d log ]]; then
              gzip -r log/*
            fi
      - store_artifacts:
          name: Store test logs as artifacts (if any)
          path: log
          destination: log


  upload_test_reports:
    steps:
      - run:
          when: always
          name: Group test reports by subproject
          command: |
            for subproject in `find . -path "*/target/test-reports" | sed -e 's/^\.\///' -e 's/\/target\/test-reports$//'`
            do
              mkdir -p test-reports/"$subproject"
              # Keep going, if there is no test report.
              cp -v "$subproject"/target/test-reports/TEST-*.xml test-reports/"$subproject" || true
            done
      - store_test_results:
          path: test-reports

  setup_sbt_test_job:
    steps:
      - checkout
      - setup_nix
      - restore_sbt_cache
      - restore_precompiled_classes

  install_daml_dependencies:
    steps:
      - run:
          name: install Daml deps
          command: |
            set -eoux pipefail
            apt-get update && apt-get install -y make curl
            curl https://get.daml.com | sh -s $SDK_VERSION
            printf "auto-install: false\nupdate-check: never\n" >> $HOME/.daml/daml-config.yaml

  run_todo_script:
    steps:
      - run_bash_command_in_nix:
          cmd: ./scripts/check-todos.sh
          additional_nix_args: "--keep GITHUB_TOKEN --keep CIRCLE_BRANCH --keep CIRCLE_PULL_REQUEST"
      - store_artifacts:
          name: Store todos as artifacts
          path: todo-out/todos
          destination: todos

parameters:
  sdk-version:
    type: string
    default: "2.4.0-snapshot.20220905.10544.0.a2ea3ce6" # sdk-version
  # Bump this when you change the definition of what is being cached to make sure
  # old files don’t pollute your build.
  cache-version:
    type: string
    default: "2"
  # Set to true for all scheduled jobs
  run-schedule:
    type: boolean
    default: false
  # Set to true for daily devnet deploy
  run-devnet-schedule:
    type: boolean
    default: false
  # Set to true for weekly testnet deploy
  run-testnet-schedule:
    type: boolean
    default: false

jobs:

  # Inspired by Canton, we put the lint-like checks into their own CI job
  static_tests:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "lint"
          retry_fetch: "50"
      - run_todo_script
      - cleanup_sbt_test_job

  test:
    docker:
      - image: cimg/base:2021.04
      - image: postgres:11
        command: postgres -c max_connections=500
        environment:
          POSTGRES_INITDB_ARGS: -A scram-sha-256
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
    resource_class: xlarge
    environment:
      <<: *env
      POSTGRES_HOST: localhost
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    steps:
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "Test/compile"
          retry_fetch: "50"
      - execute_sbt_command:
          # run all tests except the live cluster ones
          pre_sbt_cmd: ./start-canton.sh external && ./start-frontends.sh -d
          cmd: "\"testOnly * -- -l LiveDevNetTest\""
          post_sbt_cmd: ./stop-canton.sh external && ./stop-frontends.sh
          timeout: "10m"
      - execute_sbt_command:
          cmd: "damlTest"
          timeout: "10m"
      - cleanup_sbt_test_job

  bundle:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "protocGenerate damlBuild"
          retry_fetch: "50"
      - run_bash_command_in_nix:
          cmd_name: Build wallet web frontend
          cmd: |
            cd apps/wallet/frontend
            ./setup.sh
            npm run build
      - run_bash_command_in_nix:
          cmd_name: Build directory web frontend
          cmd: |
            cd apps/directory/frontend
            ./setup.sh
            npm run build
      - execute_sbt_command:
          cmd: "bundle"
          retry_fetch: "50"
      - run:
          name: copy bundle
          command: |
            set -eou pipefail
            mkdir -p /tmp/artifacts
            cp apps/app/target/release/*.tar.gz /tmp/artifacts
      - store_artifacts:
          path: /tmp/artifacts
          destination: release-artifacts
      - run_bash_command_in_nix:
         cmd_name: publish release bundles
         additional_nix_args: "--keep GCP_DA_CN_IMAGES_KEY"
         cmd: |
           echo $GCP_DA_CN_IMAGES_KEY | gcloud auth activate-service-account --key-file=-
           export GOOGLE_CLOUD_PROJECT=da-cn-images
           VERSION=$(version-gen)
           (cd /tmp/artifacts ; for filename in *.tar.gz; do mv "$filename" "${VERSION}_${filename}"; done)
           gsutil cp /tmp/artifacts/*.tar.gz gs://release-bundles

      - cleanup_sbt_test_job

  wallet_frontend:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "protocGenerate damlBuild"
          retry_fetch: "50"
      - run_bash_command_in_nix:
          cmd_name: Build web frontend
          cmd: |
            cd apps/wallet/frontend
            ./setup.sh
            npm run check
            npm run build
      - cleanup_sbt_test_job

  splitwise_frontend:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "protocGenerate damlBuild"
          retry_fetch: "50"
      - run_bash_command_in_nix:
          cmd_name: Build web frontend
          cmd: |
            cd apps/splitwise/frontend
            ./setup.sh
            npm run check
            npm run build
      - cleanup_sbt_test_job

  directory_frontend:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "protocGenerate damlBuild"
          retry_fetch: "50"
      - run_bash_command_in_nix:
          cmd_name: Build web frontend
          cmd: |
            cd apps/directory/frontend
            ./setup.sh
            npm run check
            npm run build
      - cleanup_sbt_test_job

  deployment_test:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: deployment test
         cmd: make test

  deploy_cluster:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      cluster:
        type: enum
        enum: ["staging", "devnet", "testnet"]
      slack_notify_success:
        type: boolean
        default: true
    steps:
      - checkout
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: apply cluster manifest
          with_scratchnet_authentication: true
          with_devnet_authentication: true
          cmd: |
            set -eou pipefail
            . $REPO_ROOT/cluster/deployment/<< parameters.cluster >>/.envrc.vars
            cncluster activate
            cncluster ciapply
      - when:
          condition: << parameters.slack_notify_success >>
          steps:
            # TODO(#1059): Generalise as mix-in
          - slack/notify:
              event: pass
              # Based on success_tagged_deploy_1 from https://circleci.com/developer/orbs/orb/circleci/slack#orb-source and
              # adapted to our needs
              custom: |
                {
                    "blocks": [
                        {
                            "type": "header",
                            "text": {
                                "type": "plain_text",
                                "text": "Deploying cluster '<< parameters.cluster >>' was successful! :tada:",
                                "emoji": true
                            }
                        },
                        {
                            "type": "section",
                            "fields": [
                                { "type": "mrkdwn", "text": "*Branch*: $CIRCLE_BRANCH" },
                                { "type": "mrkdwn", "text": "*Commit*: $(git log -1 --oneline --no-color)" },
                                { "type": "mrkdwn", "text": "*Author*: $(git log -1 --pretty='%an')" }
                            ]
                        },
                        {
                            "type": "actions",
                            "elements": [
                                { "type": "button", "text": { "type": "plain_text", "text": "View Job" },
                                    "url": "${CIRCLE_BUILD_URL}"
                                }
                            ]
                        }
                    ]
                }
      # TODO(#1059): Generalise as mix-in
      - slack/notify:
          event: fail
          custom: |
            {
            	"blocks": [
            		{
            			"type": "header",
            			"text": {
            				"type": "plain_text",
            				"text": "Deploying cluster << parameters.cluster >> failed. :red_circle:",
            				"emoji": true
            			}
            		},
                    {
                    	"type": "section",
                    	"fields": [
                    		{ "type": "mrkdwn", "text": "*Branch*: $CIRCLE_BRANCH" },
                            { "type": "mrkdwn", "text": "*Commit*: $(git log -1 --oneline --no-color)" },
                            { "type": "mrkdwn", "text": "*Author*: $(git log -1 --pretty='%an')" }
                    	]
                    },
            		{
            			"type": "actions",
            			"elements": [
            				{ "type": "button",
            					"text": { "type": "plain_text", "text": "View Job" },
            					"url": "${CIRCLE_BUILD_URL}"
            				}
            			]
            		}
            	]
            }

  preflight_check:
    parameters:
      cluster:
        type: enum
        enum: ["staging", "dev", "test"]
      slack_notify_success:
        type: boolean
        default: true
    machine:
      image: ubuntu-2004:202010-01
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    steps:
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "Test/compile"
          retry_fetch: "50"
      - run:
          name: install vpn client
          command: |
            sudo apt-get update
            sudo apt-get install -y expect charon-cmd
      - run:
          name: start vpn client
          # the charon-cmd process must remain running throughout the whole job,
          # so run this step in the background to allow subsequent steps to continue
          background: true
          # we use an "expect" script to spawn charon-cmd, and supply credentials,
          # because the interactive password prompt reads directly from
          # /dev/tty rather than stdin, and simple IO piping doesn't work
          command: |
            cat \<<EOF >route
            #!/usr/bin/expect -f
            set timeout -1

            set VPN_HOST_NAME [lindex \$argv 0]
            set VPN_USER [lindex \$argv 1]
            set VPN_PASSWORD [lindex \$argv 2]

            spawn echo \$VPN_USER \$VPN_PASSWORD
            spawn sudo charon-cmd --host \$VPN_HOST_NAME --identity \$VPN_USER --eap-identity \$VPN_USER --profile ikev2-eap --cert /etc/ssl/certs/ISRG_Root_X1.pem
            expect "EAP password: "

            send "\$VPN_PASSWORD\r"
            expect eof
            EOF

            chmod +x route
            ./route $VPN_HOST_NAME $VPN_USER $VPN_PASSWORD
      - run:
          name: verify vpn connection
          command: |
            set +e

            echo "Checking IP"

            count=0
            success=42
            while [ ${count} -lt 10 ]; do
              if [ "$(curl checkip.amazonaws.com)" == "$VPN_HOST_IP" ]; then
                echo "Check IP passed"
                success=0
                break
              else
                echo "Current IP is not desired VPN server IP. Retry count $count"
                (( count++ ))
                sleep 1
              fi
            done

            exit $success
      - execute_sbt_command:
          cmd: "\"testOnly *PreflightIntegrationTest\""
          extra_parameters: -DDOMAIN_URL=http://<<parameters.cluster>>.network.canton.global:5008 -DNETWORK_APPS_ADDRESS=<<parameters.cluster>>.network.canton.global
          timeout: "10m"
      - when:
          condition: << parameters.slack_notify_success >>
          steps:
          - slack/notify:
              event: pass
              branch_pattern: main
              # TODO(#1059): Generalise as mix-in
              custom: |
                {
                  "blocks": [
                    {
                      "type": "section",
                      "fields": [
                        {
                          "type": "plain_text",
                          "text": "Pre-flight validator check on the '<< parameters.cluster >>' cluster succeeded! :dart:",
                          "emoji": true
                        }
                      ]
                    },
                    {
                    	"type": "section",
                    	"fields": [
                    		{ "type": "mrkdwn", "text": "*Branch*: $CIRCLE_BRANCH" },
                            { "type": "mrkdwn", "text": "*Commit*: $(git log -1 --oneline --no-color)" },
                            { "type": "mrkdwn", "text": "*Author*: $(git log -1 --pretty='%an')" }
                    	]
                    }
                  ]
                }
      # TODO(#1059): Generalise as mix-in
      - slack/notify:
          event: fail
          custom: |
            {
            	"blocks": [
            		{
            			"type": "header",
            			"text": {
            				"type": "plain_text",
            				"text": "Pre-flight validator check on the '<< parameters.cluster >>' cluster failed. :red_circle:",
            				"emoji": true
            			}
            		},
                    {
                    	"type": "section",
                    	"fields": [
                    		{ "type": "mrkdwn", "text": "*Branch*: $CIRCLE_BRANCH" },
                            { "type": "mrkdwn", "text": "*Commit*: $(git log -1 --oneline --no-color)" },
                            { "type": "mrkdwn", "text": "*Author*: $(git log -1 --pretty='%an')" }
                    	]
                    },
            		{
            			"type": "actions",
            			"elements": [
            				{ "type": "button",
            					"text": { "type": "plain_text", "text": "View Job" },
            					"url": "${CIRCLE_BUILD_URL}"
            				}
            			]
            		}
            	]
            }
      - run:
          name: stop vpn
          command: |
            sudo killall charon-cmd
      - cleanup_sbt_test_job

  update_pipeline_schedule:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - run:
         name: update pipeline schedule
         command: |
           set -euo pipefail

           . .envrc.vars
           .circleci/setup-pipeline.sh

  docs:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - install_daml_sdk
      - run_bash_command_in_nix:
         cmd_name: build
         cmd: |
           cd cluster/images/docs
           export PATH=$HOME/.daml/bin:$PATH
           ./gen-daml-docs.sh
           make html

  docker-images-push:
    machine:
      image: ubuntu-2004:202010-01
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - install_daml_sdk
      - run_bash_command_in_nix:
         cmd_name: build images
         additional_nix_args: "--keep DOCKER_CERT_PATH \
                              --keep DOCKER_HOST \
                              --keep DOCKER_MACHINE_NAME \
                              --keep DOCKER_TLS_VERIFY \
                              --keep NO_PROXY"
         cmd: |
           export PATH=$HOME/.daml/bin:$PATH
           make docker-build


      - run_bash_command_in_nix:
         cmd_name: push images
         additional_nix_args: "--keep GCP_DA_CN_IMAGES_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: |
           echo $GCP_DA_CN_IMAGES_KEY | gcloud auth activate-service-account --key-file=-
           (yes || true) | gcloud auth configure-docker us-central1-docker.pkg.dev
           export PATH=$HOME/.daml/bin:$PATH
           make docker-push


workflows:
  version: 2
  build:
    when:
      not: << pipeline.parameters.run-schedule >>
    jobs:
    # Documentation
    - docs:
        <<: *notify-fail
    # Linting and formatting
    - static_tests:
        <<: *notify-fail
    # Scala
    - test:
        <<: *notify-fail
    - bundle:
        <<: *notify-fail
    - wallet_frontend:
        <<: *notify-fail
    - splitwise_frontend:
        <<: *notify-fail
    - directory_frontend:
        <<: *notify-fail
    # Ops
    - update_pipeline_schedule:
        <<: *notify-fail
        <<: *main-branch-only
    - deployment_test:
        <<: *notify-fail

  deploy_staging:
    jobs:
    # Deployment
    - docker-images-push:
        <<: *notify-fail
        <<: *main-branch-only
    - deployment_test:
        <<: *notify-fail
        <<: *main-branch-only
    - deploy_cluster:
        <<: *main-branch-only
        context:
          - slack-context
        cluster: "staging"
        slack_notify_success: false
        requires:
           - deployment_test
           - docker-images-push
    - preflight_check:
        cluster: staging
        slack_notify_success: false
        <<: *main-branch-only
        context:
          - canton-network-vpn
          - slack-context
        requires:
          - deployment_test
          - docker-images-push
          - deploy_cluster

  deploy_devnet:
    when: << pipeline.parameters.run-devnet-schedule >>
    jobs:
    - docker-images-push:
        <<: *notify-fail
        <<: *main-branch-only
    - deployment_test:
        <<: *notify-fail
        <<: *main-branch-only
    - deploy_cluster:
        <<: *main-branch-only
        context:
          - slack-context
        cluster: "devnet"
        requires:
           - deployment_test
           - docker-images-push
    - preflight_check:
        cluster: dev
        <<: *main-branch-only
        context:
          - canton-network-vpn
          - slack-context
        requires:
          - deployment_test
          - docker-images-push
          - deploy_cluster

  deploy_testnet:
    when: << pipeline.parameters.run-testnet-schedule >>
    jobs:
    - docker-images-push:
        <<: *notify-fail
        <<: *main-branch-only
    - deployment_test:
        <<: *notify-fail
        <<: *main-branch-only
    - deploy_cluster:
        <<: *main-branch-only
        context:
          - slack-context
        cluster: "testnet"
        requires:
           - deployment_test
           - docker-images-push
    - preflight_check:
        cluster: test
        <<: *main-branch-only
        context:
          - canton-network-vpn
          - slack-context
        requires:
          - deployment_test
          - docker-images-push
          - deploy_cluster

  manual_preflight_check:
    jobs:
      - click_to_run_workflow:
          type: approval
      - preflight_check:
          cluster: dev
          slack_notify_success: false
          context:
            - canton-network-vpn
          requires:
            - click_to_run_workflow
