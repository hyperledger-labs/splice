          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep GH_USER --keep GH_TOKEN --keep CIRCLE_BRANCH --keep CIRCLE_WORKFLOW_ID"
          cmd: |
            git config user.email "splice-maintainers@digitalasset.com"
            git config user.name "DA Automation"
            git remote set-url origin https://${GH_USER}:${GH_TOKEN}@github.com/DACH-NY/canton-network-node.git

            # Update the upgrade branch to archive the base version

            UPGRADE_VERSION_BRANCH="<< parameters.cluster >>-migration-upgrade"
            git checkout $UPGRADE_VERSION_BRANCH
            cncluster update_config_to_archive_legacy_migration

            git add **/config.yaml || true
            git commit -m "Update config to archive legacy version on << parameters.cluster >>"
            git push origin $UPGRADE_VERSION_BRANCH

            # Forward-port the same change to the deployment branch

            DEPLOYMENT_UPGRADE_BRANCH="<< parameters.cluster >>-deployment-upgrade"
            git checkout $DEPLOYMENT_UPGRADE_BRANCH
            cncluster update_config_to_archive_legacy_migration

            git add **/config.yaml || true
            git commit -m "Update config to archive legacy version on << parameters.cluster >>"
            git push origin $DEPLOYMENT_UPGRADE_BRANCH

      - wait_for_pulumi_stacks_updated:
          cluster: << parameters.cluster >>
          pulumi_stack_names: "canton-network,infra,validator1,splitwell,sv-runbook,validator-runbook,sv-canton.sv-1-migration-1,sv-canton.sv-2-migration-1,sv-canton.sv-3-migration-1,sv-canton.sv-4-migration-1,sv-canton.sv-migration-1"
          expected_branch: << parameters.cluster >>-migration-upgrade
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>
  reset_and_wait_for_operator_to_redeploy_sv_runbook:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
