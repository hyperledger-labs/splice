  deploy_cluster_for_migration_base_version:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      base_version:
        type: string
        default: ""
      git_repo:
        type: string
        default: "canton-network-node"
      deploy_retry_count:
        type: integer
        default: 2
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Push new branch for base version with migration config changes
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep GH_USER --keep GH_TOKEN --keep CIRCLE_BRANCH --keep CIRCLE_WORKFLOW_ID --keep BASH_ENV"
          cmd: |
            git config user.email "splice-maintainers@digitalasset.com"
            git config user.name "DA Automation"
            git remote set-url origin https://${GH_USER}:${GH_TOKEN}@github.com/DACH-NY/canton-network-node.git

            if [ -n "<< parameters.base_version >>" ]; then
              echo "Checking out commit << parameters.base_version >>"
              git checkout << parameters.base_version >>
            fi

            # Create a base version branch, with an active migration ID 0 on the base version
            # (this represents the release-line branch corresponding to the current migration ID in a prod cluster)

            BASE_VERSION_BRANCH="<< parameters.cluster >>-migration-base"
            git branch -f $BASE_VERSION_BRANCH HEAD
            git checkout $BASE_VERSION_BRANCH
            git push -f origin $BASE_VERSION_BRANCH
            if [ -n "<< parameters.base_version >>" ]; then
              base_version="<< parameters.base_version >>"
              BASE_VERSION=$(build-tools/get-charts-version "$base_version")
            else
              base_version=$(build-tools/get-snapshot-version)
              BASE_VERSION=$base_version
            fi

            echo "Using BASE_VERSION: $BASE_VERSION"

            RELEASE_REF="refs/heads/$BASE_VERSION_BRANCH"
            cncluster update_config active 0 $BASE_VERSION $RELEASE_REF << parameters.git_repo >>

            # We write the changes to envrc.vars into a separate file first, so we can easily apply
            # the same changes to the update branch later. We do not rely on e.g. `git cherry-pick`
            # to avoid conflicts that cannot be resolved automatically.
            file="${SPLICE_ROOT}/cluster/deployment/${TARGET_CLUSTER}/.envrc.vars.base"
            rm -f "$file"

            echo "export SPLIT_POSTGRES_INSTANCES=true" >> "$file"
            echo "export SPLICE_DEPLOY_SV_RUNBOOK=true" >> "$file"
            echo "export SPLICE_DEPLOY_VALIDATOR_RUNBOOK=true" >> "$file"
            echo "export SPLICE_DEPLOYMENT_SV_USE_INTERNAL_VALIDATOR_DNS=true" >> "$file"
            # requires sv1 sv-app to be up so we disable it for faster deployments
            echo "export DISABLE_COMETBFT_STATE_SYNC=true" >> "$file"
            echo "export CHARTS_VERSION=$BASE_VERSION" >> "$file"
            echo "export OVERRIDE_VERSION=$BASE_VERSION" >> "$file"

            cat "$file" >> ${SPLICE_ROOT}/cluster/deployment/${TARGET_CLUSTER}/.envrc.vars

            git add "$file"
            git add **/.envrc.vars
            git add **/config.yaml
            git commit -m "Add migration config to deploy version $BASE_VERSION to << parameters.cluster >>"
            git push origin $BASE_VERSION_BRANCH

            # Create a deployment branch and configure the deployment stack to follow it
            # (for prod clusters, this will typically be `main`)

            DEPLOYMENT_BRANCH="<< parameters.cluster >>-migration-deployment"
            git branch -f  $DEPLOYMENT_BRANCH HEAD
            git checkout $DEPLOYMENT_BRANCH
            git push -f origin $DEPLOYMENT_BRANCH
            cncluster set_operator_deployment_reference refs/heads/$DEPLOYMENT_BRANCH << parameters.git_repo >>
            echo "export OPERATOR_IMAGE_VERSION=$BASE_VERSION" >> ${SPLICE_ROOT}/cluster/deployment/${TARGET_CLUSTER}/.envrc.vars
            git add **/config.yaml
            git add **/.envrc.vars
            git commit -m "Set the operator deployment reference to $DEPLOYMENT_BRANCH on << parameters.cluster >>"
            git push origin $DEPLOYMENT_BRANCH

      - deploy_operator:
          cluster: << parameters.cluster >>
          deploy_retry_count: << parameters.deploy_retry_count >>
      - wait_for_pulumi_stacks_updated:
          cluster: << parameters.cluster >>
          pulumi_stack_names: "canton-network,infra,sv-runbook,validator-runbook"
          expected_branch: << parameters.cluster >>-migration-base
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>

  prepare_cluster_for_migration:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      base_version:
        type: string
        default: ""
      upgrade_version:
        type: string
        default: ""
      git_repo:
        type: string
        default: "canton-network-node"
      deploy_retry_count:
        type: integer
        default: 2
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - when:
          condition: << parameters.upgrade_version >>
          steps:
            - run:
                name: Checkout commit << parameters.upgrade_version >>
                command: |
                  echo "Checking out commit << parameters.upgrade_version >>"
                  git checkout << parameters.upgrade_version >>
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Push new branch with migration config changes
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep GH_USER --keep GH_TOKEN --keep CIRCLE_BRANCH --keep CIRCLE_WORKFLOW_ID"
          cmd: |
            git config user.email "splice-maintainers@digitalasset.com"
            git config user.name "DA Automation"
            git remote set-url origin https://${GH_USER}:${GH_TOKEN}@github.com/DACH-NY/canton-network-node.git

            UPGRADE_VERSION=$(build-tools/get-snapshot-version)

            # Create a branch for the upgrade version, with a "upgrade" migration ID 1, on the upgrade version
            # This represents the release-line branch corresponding to the next migration ID in a prod cluster

            BASE_VERSION_BRANCH="<< parameters.cluster >>-migration-base"
            UPGRADE_VERSION_BRANCH="<< parameters.cluster >>-migration-upgrade"
            git branch -f $UPGRADE_VERSION_BRANCH HEAD
            git checkout $UPGRADE_VERSION_BRANCH
            git push -f origin $UPGRADE_VERSION_BRANCH
            if [ -n "<< parameters.base_version >>" ]; then
              base_version="<< parameters.base_version >>"
              BASE_VERSION=$(build-tools/get-charts-version "$base_version")
            else
              base_version=$(build-tools/get-snapshot-version)
              BASE_VERSION=$base_version
            fi
            BASE_RELEASE_REF="refs/heads/$BASE_VERSION_BRANCH"
            UPGRADE_RELEASE_REF="refs/heads/$UPGRADE_VERSION_BRANCH"

            # Apply the same config changes that we applied in the base branch also to the upgrade branch
            # (we do not cherry-pick the commit, to avoid conflicts that cannot be resolved automatically)

            basefile="cluster/deployment/${TARGET_CLUSTER}/.envrc.vars.base"
            rm -f "$basefile"
            git checkout origin/$BASE_VERSION_BRANCH -- "$basefile"

            file="${SPLICE_ROOT}/cluster/deployment/${TARGET_CLUSTER}/.envrc.vars"
            cat "$basefile" >> "$file"
            rm "$basefile"

            # We start from the target branch which has no entry in `active` so add it again pointing at old version and release ref.
            # (same as above, we do not cherry-pick the commit, to avoid conflicts that cannot be resolved automatically)
            cncluster update_config active 0 $BASE_VERSION $BASE_RELEASE_REF << parameters.git_repo >>
            # Add the new entry for the staging nodes.
            cncluster update_config upgrade 1 $UPGRADE_VERSION $UPGRADE_RELEASE_REF << parameters.git_repo >>

            git add **/.envrc.vars
            git add **/config.yaml
            git commit -m "Add config to deploy upgrade version $UPGRADE_VERSION to << parameters.cluster >>"
            git push origin $UPGRADE_VERSION_BRANCH

            # In order to jump over breaking changes, we create a new deployment branch based off of the upgrade version,
            # and redeploy the operator from it. That resembles what we will do in the prod cluster.

            DEPLOYMENT_UPGRADE_BRANCH="<< parameters.cluster >>-deployment-upgrade"
            git branch -f $DEPLOYMENT_UPGRADE_BRANCH HEAD
            git checkout $DEPLOYMENT_UPGRADE_BRANCH
            git push -f origin $DEPLOYMENT_UPGRADE_BRANCH

            cncluster set_operator_deployment_reference refs/heads/$DEPLOYMENT_UPGRADE_BRANCH << parameters.git_repo >>
            echo "export OPERATOR_IMAGE_VERSION=$UPGRADE_VERSION" >> ${SPLICE_ROOT}/cluster/deployment/${TARGET_CLUSTER}/.envrc.vars
            git add **/config.yaml
            git add **/.envrc.vars
            git commit -m "Set the operator deployment reference to $DEPLOYMENT_UPGRADE_BRANCH on << parameters.cluster >>"
            git push origin $DEPLOYMENT_UPGRADE_BRANCH

      - deploy_operator:
          cluster: << parameters.cluster >>
          deploy_retry_count: << parameters.deploy_retry_count >>
      - wait_for_pulumi_stacks_updated:
          cluster: << parameters.cluster >>
          pulumi_stack_names: "sv-canton.sv-1-migration-1,sv-canton.sv-2-migration-1,sv-canton.sv-3-migration-1,sv-canton.sv-4-migration-1,sv-canton.sv-migration-1"
          expected_branch: << parameters.cluster >>-migration-upgrade
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>
  migrate_cluster:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      deploy_retry_count:
        type: integer
        default: 2
      send_notifications:
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Push new branch with migration config changes
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep GH_USER --keep GH_TOKEN --keep CIRCLE_BRANCH --keep CIRCLE_WORKFLOW_ID"
          cmd: |
            git config user.email "splice-maintainers@digitalasset.com"
            git config user.name "DA Automation"
            git remote set-url origin https://${GH_USER}:${GH_TOKEN}@github.com/DACH-NY/canton-network-node.git

            UPGRADE_VERSION=$(build-tools/get-snapshot-version)

            UPGRADE_VERSION_BRANCH="<< parameters.cluster >>-migration-upgrade"
            git checkout $UPGRADE_VERSION_BRANCH
            UPGRADE_RELEASE_REF="refs/heads/$UPGRADE_VERSION_BRANCH"

            # Update the upgrade branch to a "migrating" state

            file=$(mktemp)
            envfile="${SPLICE_ROOT}/cluster/deployment/${TARGET_CLUSTER}/.envrc.vars"
            echo "export CHARTS_VERSION=$UPGRADE_VERSION" >> "$file"
            echo "export OVERRIDE_VERSION=$UPGRADE_VERSION" >> "$file"
            cat $file >> "$envfile"
            cncluster update_config_to_migrate

            git add **/.envrc.vars
            git add **/config.yaml
            git commit -m "Update config to migrate to version $UPGRADE_VERSION on << parameters.cluster >>"
            git push origin $UPGRADE_VERSION_BRANCH

            # Update also the deployment branch to a "migrating" state (we would typically do this
            # by back/fwd-porting the commit between the two branches, here we just apply the same
            # changes to both, to avoid conflicts that cannot be resolved automatically)

            DEPLOYMENT_UPGRADE_BRANCH="<< parameters.cluster >>-deployment-upgrade"
            git checkout $DEPLOYMENT_UPGRADE_BRANCH
            cat $file >> "$envfile"
            cncluster update_config_to_migrate

            git add **/.envrc.vars
            git add **/config.yaml || true
            git commit -m "Update config to migrate to version $UPGRADE_VERSION on << parameters.cluster >>"
            git push origin $DEPLOYMENT_UPGRADE_BRANCH

      - wait_for_pulumi_stacks_updated:
          cluster: << parameters.cluster >>
          pulumi_stack_names: "canton-network,infra,validator1,splitwell,sv-runbook,validator-runbook,sv-canton.sv-1-migration-1,sv-canton.sv-2-migration-1,sv-canton.sv-3-migration-1,sv-canton.sv-4-migration-1,sv-canton.sv-migration-1"
          expected_branch: << parameters.cluster >>-migration-upgrade
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>
  archive_legacy_migration:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
