# Scala CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/sample-config/ for more details
#
version: 2.1
orbs:
  slack: circleci/slack@4.9.3

env: &env
  TERM: dumb
  CI: "true"
  USER: circleci
  # This might help resolve https://github.com/DACH-NY/canton-network-node/issues/8146
  PROTOCBRIDGE_NO_CLEANUP: "1"

non_devnet_preflight_params: &non_devnet_preflight_params
  parallelism: 1
  test_names_file: "test-full-class-names-core-preflight-non-devnet.log"

parameters:
  # Bump this when you change the definition of what is being cached to make sure
  # old files don't pollute your build.
  cache-version:
    type: string
    default: "25"
  run-job:
    type: enum
    enum:
      [
        build,
        deploy-cidaily,
        deploy-cilr,
        deploy-devnet,
        deploy-testnet,
        healthcheck-cidaily,
        healthcheck-cidaily-testnet,
        healthcheck-cilr,
        healthcheck-devnet,
        healthcheck-testnet,
        redeploy-sv-runbook-cidaily,
        redeploy-sv-runbook-cilr,
        redeploy-sv-runbook-devnet,
        publish-public-artifacts,
        auth0-user-cleanup,
        cluster-lock-reaper,
        mark-for-testnet,
      ]
    default: build
  # Tag the current commit for the next DevNet release, overwriting the existing tag if it exists.
  mark-for-devnet:
    type: boolean
    default: false
  # Tag the current commit for the next DevNet release if no commit is tagged already.
  mark-for-devnet-if-unmarked:
    type: boolean
    default: false
  # Overwrite the bootstrapping config for a cluster. If not set,
  # the cluster will be bootstrapped from the preceeding version of the cluster.
  bootstrapping-config:
    type: string
    default: ""
  # Whether the cluster should be reset before deploying.
  # It only makes sense to unset this if you are planning to use CI to fix a broken deployment.
  reset-before-deploy:
    type: boolean
    default: true

notify-fail: &notify-fail
  context: slack-context
  post-steps:
    - set-failed-parallel-run-url
    - run:
        name: Dump input sent to slack/notify
        when: always
        command: |
          echo "Sending the following as input to slack/notify"
          echo "{ \"text\": \"*Job '${CIRCLE_JOB}' failed.* :red_circle:\n*$CIRCLE_BRANCH*: <${FAILED_PARALLEL_RUN_URL}|$(git log -1 --oneline --no-color | sed s/\"//g)> ($(git log -1 --pretty='%an'), <${FAILED_PARALLEL_RUN_URL}|CI Build in Run #${CIRCLE_NODE_INDEX}>)\" }"
    # Note that Slack force-wraps too-long lines within "blocks", and thus we don't use Slack message "blocks"
    # see stackoverflow.com/questions/57438097/how-to-make-slack-api-block-kit-take-up-the-entire-width-of-the-slack-window
    - slack/notify:
        branch_pattern: (deployment\/.*|main)
        # #team-canton-network-internal-ci
        channel: C05DT77QF5M
        event: fail
        custom: |
          { "text": "*Job '${CIRCLE_JOB}' failed.* :red_circle:\n*$CIRCLE_BRANCH*: <${FAILED_PARALLEL_RUN_URL}|$(git log -1 --oneline --no-color | sed s/\"//g)> ($(git log -1 --pretty='%an'), <${FAILED_PARALLEL_RUN_URL}|CI Build in Run #${CIRCLE_NODE_INDEX}>)" }

cluster-parameter: &cluster-parameter
  cluster:
    type: enum
    enum:
      [
        "scratchneta",
        "scratchnetb",
        "scratchnetc",
        "scratchnetd",
        "scratchnete",
        "cimain",
        "cidaily",
        "cidaily-testnet",
        "cilr",
        "devnet",
        "testnet",
        "testnet-preview",
        "observability",
        "none",
      ]

commands:
  setup_nix:
    description: Set up Nix
    steps:
    - run:
        name: Make Nix cache key
        command: |
          set -euo pipefail
          git ls-files nix/ | grep -v '[.]md$' | LANG=C sort | xargs sha256sum -b > /tmp/nix-cache-key
          sudo mkdir /nix
          sudo chown $USER /nix
    - restore_cache:
        name: Restore Nix cache
        keys:
        - nix-{{ checksum "/tmp/nix-cache-key" }}
    - run:
       name: Setup Nix
       # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
       no_output_timeout: "20m"
       command: |
         set -euo pipefail
         echo 'source ~/.nix-profile/etc/profile.d/nix.sh' >> "$BASH_ENV"
         if [ -f ~/.config/nix/nix.conf ]; then
             exit 0
         fi
         # Disabling sandbox because:
         # 1. It doesn't work on CircleCI (sethostname is not allowed)
         # 2. We don't plan to build anything, so the risk is fairly low
         mkdir -p ~/.config/nix
         cat \<<EOF > ~/.config/nix/nix.conf
         sandbox = false
         netrc-file = /home/circleci/.config/nix/netrc
         extra-experimental-features = nix-command flakes
         EOF
         sh <(curl -fsSL --retry 8 https://releases.nixos.org/nix/nix-2.13.3/install) --no-daemon
         cat \<<EOF > ~/.config/nix/netrc
         machine digitalasset.jfrog.io
         login $ARTIFACTORY_USER
         password $ARTIFACTORY_PASSWORD
         EOF
         . /home/circleci/.nix-profile/etc/profile.d/nix.sh
         echo "Building nix env"
         nix develop path:nix -v --profile "$HOME/.nix-shell" --command echo "Done loading packages"
         echo "Garbage collecting to reduce cache size"
         nix-store --gc
    - save_cache:
        key: nix-{{ checksum "/tmp/nix-cache-key" }}
        paths:
        - /nix
        - /home/circleci/.nix-profile
        - /home/circleci/.nix-channels
        - /home/circleci/.nix-defexpr
        - /home/circleci/.config/nix


  # Note: compiled_classes and sbt_cache commands are largely copied from the Canton repo
  # save compiled target directories to cache (so we don't recompile everything again and again)
  # uses the target directories in the project (e.g. `canton-network-node/target`) which sbt doesn't cache.
  # This cache is not shared among CI jobs.
  save_compiled_classes:
    steps:
      - run:
          name: Creating archive of compiled classes
          command: |
            mkdir -p /tmp/classes
            # We cache */target/scala/* files and */target/streams/* which
            # includes everything that is required for SBT to do fast rebuilds
            # while avoiding issues arising from caching typescript, daml files or anything else.
            find . -type f -a \( -path '*/target/scala*' -o -path '*/target/streams/*' \) | tar --use-compress-program=pigz -cf /tmp/classes/classes.tar.gz --exclude-vcs -T -
      - save_cache:
          name: Uploading archive with compiled classes to cache
          # Key components:
          # - classes: fixed prefix for uniqueness
          # - branch: to prevent re-usage of classes between branches
          # - dependencies: to prevent re-usage of classes with mismatching libraries (this can lead to subtle errors)
          # - rev: to allow for updating the cache when sources have changed
          # - openapi: guardrail does not track dependencies for schema changes properly so we disable the cache if the imported schema changes, see #2747
          key: &compiled_classes_key classes-<< pipeline.parameters.cache-version >> branch:{{ .Branch }} buildprops:{{ checksum "project/build.properties" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} damlplugin:{{ checksum "project/DamlPlugin.scala" }} dependencies:{{ checksum "project/Dependencies.scala" }} canton-dependencies:{{ checksum "project/CantonDependencies.scala" }} houserules:{{ checksum "project/Houserules.scala" }} plugins:{{ checksum "project/plugins.sbt" }} build={{ checksum "build.sbt" }} daml:{{ checksum "daml/dars.lock" }} openapi={{ checksum "openapi-cache-key.txt" }} rev:{{ .Revision }}
          paths:
            - /tmp/classes

  # restore pre-compiled target directories from cache (so we don't recompile everything again and again)
  # uses the target directories in the project (e.g. `canton-network-node/target`) which sbt doesn't cache.
  # This cache is not shared among CI jobs.
  restore_precompiled_classes:
    parameters:
      reset_classes_if_requested:
        type: boolean
        default: false
    steps:
      - run:
          name:
          command: |
            find . -wholename '*/openapi/*.yaml' | LANG=C sort | xargs sha256sum > openapi-cache-key.txt
      - restore_cache:
          name: Downloading archive with compiled classes from cache
          keys:
            # First, try to download class files from the same revision
            - *compiled_classes_key
            # Then, try to download the latest class files produced for the same branch.
            # Make sure that library versions still match.
            - classes-<< pipeline.parameters.cache-version >> branch:{{ .Branch }} buildprops:{{ checksum "project/build.properties" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} damlplugin:{{ checksum "project/DamlPlugin.scala" }} dependencies:{{ checksum "project/Dependencies.scala" }} canton-dependencies:{{ checksum "project/CantonDependencies.scala" }} houserules:{{ checksum "project/Houserules.scala" }} plugins:{{ checksum "project/plugins.sbt" }} build={{ checksum "build.sbt" }} daml:{{ checksum "daml/dars.lock" }} openapi={{ checksum "openapi-cache-key.txt" }}
            # Then, try to download the latest class files produced for the main branch.
            # Make sure that library versions still match.
            - classes-<< pipeline.parameters.cache-version >> branch:main buildprops:{{ checksum "project/build.properties" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} damlplugin:{{ checksum "project/DamlPlugin.scala" }} dependencies:{{ checksum "project/Dependencies.scala" }} canton-dependencies:{{ checksum "project/CantonDependencies.scala" }} houserules:{{ checksum "project/Houserules.scala" }} plugins:{{ checksum "project/plugins.sbt" }} build={{ checksum "build.sbt" }} daml:{{ checksum "daml/dars.lock" }} openapi={{ checksum "openapi-cache-key.txt" }}
      - run:
          name: Extracting precompiled classes
          command: |
            if [[ << parameters.reset_classes_if_requested >> == true ]] &&
               grep "^$CIRCLE_BRANCH$" .circleci/branches_to_be_fully_recompiled_in_ci.txt > /dev/null
            then
              echo "Do not extract precompiled classes, as a full recompilation has been requested."
              exit 0
            fi

            if [[ -e /tmp/classes/classes.tar.gz ]]; then
              tar --use-compress-program=pigz -xf /tmp/classes/classes.tar.gz

              # For some reason, the reset below may change file modification times stamps, if we don't run `git status`.
              git status

              # Reset changes to files under version control.
              git reset --hard

              # Delete untracked files, except for ignored files.
              git clean -fd
              echo "Finished restoring the pre-compiled cache files"

            else
              echo "No precompiled classes found. Skipping..."
            fi

  save_sbt_cache:
    steps:
      - run:
          name: Make caches readable
          # On machine executors, some files in the caches may be owned by root.
          # Make them readable to the cirecleci user.
          command: |
            for dir in "$HOME/.ivy2/cache" "$HOME/.cache/coursier/v1" "$HOME/.sbt"; do
              if [[ -e "$dir" ]]; then
                # The combination of sudo and `|| true` is a bit of a hack.
                # The underlying assumption is that chmod is only needed when sudo is available.
                # Unfortunately, there are jobs where sudo is not available.
                sudo chmod -R a+r "$dir" || true
              fi
            done

      - save_cache:
          name: Uploading Coursier cache
          # The cache is stored only when the build definition or dependencies change
          key: &coursier-cache-key coursier-canton-job={{ .Environment.CIRCLE_JOB }}-dependencies={{ checksum "project/Dependencies.scala" }}-canton-dependencies={{ checksum "project/CantonDependencies.scala" }}-buildcommon:{{ checksum "project/BuildCommon.scala" }}-buildproperties={{ checksum "project/build.properties" }}-houserules={{ checksum "project/Houserules.scala" }}-plugins={{ checksum "project/plugins.sbt" }}-build={{ checksum "build.sbt" }}
          # Components of the cache key:
          # - Keyword "coursier" to indicate this stores the coursier cache.
          # - Name of the job, to avoid interferences between jobs. (Different jobs populate the cached folders differently.)
          # - Dockerfile to start with a clean state if build tools are updated.
          # - Everything in project that may contain a dependency.
          # - build.sbt as it may contain a hardcoded dependency.
          paths:
            - "~/.cache/coursier/v1/"

      - save_cache:
          name: Uploading Sbt caches
          # The cache is stored only when the build definition or dependencies change
          key: &sbt-cache-key sbt-canton-job={{ .Environment.CIRCLE_JOB }}-dependencies={{ checksum "project/Dependencies.scala" }}-canton-dependencies={{ checksum "project/CantonDependencies.scala" }}-buildcommon:{{ checksum "project/BuildCommon.scala" }}-buildproperties={{ checksum "project/build.properties" }}-houserules={{ checksum "project/Houserules.scala" }}-plugins={{ checksum "project/plugins.sbt" }}-build={{ checksum "build.sbt" }}
          # Components of the cache key:
          # - Keyword "sbt" to indicate this stores Sbt caches.
          # - Otherwise as for the coursier cache key.
          paths:
            - "~/.ivy2/cache" # despite sbt 1.3 using coursier it appears a handful of dependencies are placed in the ivy cache (core sbt plugins and coursier itself)
            - "~/.sbt"

  restore_sbt_cache:
    # We are saving to / restoring from several caches to keep individual caches below 500MB.
    # Otherwise, restore_cache may fail for no good reason.
    # See https://circleci.com/docs/2.0/caching/#cache-size
    steps:
      - run:
          name: Deleting cache directories
          # Delete the cache directories so that we don't include arbitrary stuff coming from the docker image.
          command: |
            for dir in "$HOME/.ivy2/cache" "$HOME/.cache/coursier/v1" "$HOME/.sbt"; do
              if [[ -e "$dir" ]]; then
                rm -rfv "$dir"
              fi
            done

      - restore_cache:
          name: Restoring Coursier cache
          keys:
            # Restore the cache for the exact same build configuration.
            - *coursier-cache-key
            # Previously, a cache matching CIRCLE_JOB and project/Dependencies.scala was also attempted but
            # unfortunately sbt and/or coursier fail to detect and use credentials to retrieve missing artifacts
            # from authenticated repos.

      - restore_cache:
          name: Restoring Sbt caches
          keys:
            # First try to restore the cache for the exact same build configuration.
            - *sbt-cache-key
            # If this is not possible and Dependencies.scala hasn't changed, populate the cache with slightly outdated data.
            # This will speed-up compilation, because most libraries are already in the cache.
            - sbt-canton-job={{ .Environment.CIRCLE_JOB }}-dependencies={{ checksum "project/Dependencies.scala" }}-canton-dependencies={{ checksum "project/CantonDependencies.scala" }}

  save_frontend_builds:
    steps:
      - save_cache:
          name: Uploading frontend build artifacts to cache
          # Components of the cache key:
          # - Keyword "frontend-builds" for uniqueness
          # - The branch name
          # - rev: to allow for updating the cache when sources have changed
          key: &frontend_builds_key frontend-builds-<< pipeline.parameters.cache-version >> branch:{{ .Branch }} daml:{{ checksum "daml/dars.lock" }} openapi:{{ checksum "openapi-cache-key.txt" }} package-lock:{{ checksum "apps/package-lock.json" }} rev:{{ .Revision }}
          paths:
            - ./apps/common/frontend/target
            - ./apps/cns/frontend/build
            - ./apps/cns/frontend/target
            - ./apps/scan/frontend/build
            - ./apps/scan/frontend/target
            - ./apps/sv/frontend/build
            - ./apps/sv/frontend/target
            - ./apps/splitwell/frontend/build
            - ./apps/splitwell/frontend/target
            - ./apps/wallet/frontend/build
            - ./apps/wallet/frontend/target

  restore_frontend_builds:
    steps:
      - run:
          name:
          command: |
            find . -wholename '*/openapi/*.yaml' | LANG=C sort | xargs sha256sum > openapi-cache-key.txt
      - restore_cache:
          name: Restoring frontend build artifacts from cache
          keys:
            # Try to download a cache with an exact match
            - *frontend_builds_key
            # Then, try to download a cache from the same branch
            - frontend-builds-<< pipeline.parameters.cache-version >> branch:{{ .Branch }} daml:{{ checksum "daml/dars.lock" }} openapi:{{ checksum "openapi-cache-key.txt" }} package-lock:{{ checksum "apps/package-lock.json" }}
            # Then, try to download a cache from main branch
            - frontend-builds-<< pipeline.parameters.cache-version >> branch:main daml:{{ checksum "daml/dars.lock" }} openapi:{{ checksum "openapi-cache-key.txt" }} package-lock:{{ checksum "apps/package-lock.json" }}

  save_frontend_node_modules:
    steps:
      - run:
          name: Creating archive of npm dependencies
          command: |
            mkdir -p /tmp/npm_install
            find apps/ \( -path '*/node_modules' -a -not -path '*/node_modules/*/node_modules' -a -not -path '*openapi-ts-client/*' \)  | tar --use-compress-program=pigz -cf /tmp/npm_install/node_modules.tar.gz -T -
            find apps/ \( -path '*openapi-ts-client/*' \)  | tar --use-compress-program=pigz -cf /tmp/npm_install/openapi-ts-client.tar.gz -T -
      - save_cache:
          name: Uploading node_modules cache
          # Components of the cache key:
          # - Keyword "frontend-npm-install" for uniqueness
          # - The branch name
          # - The NPM package lock file
          # - OpenAPI definitions, since we do not currently version them, so cannot rely on their version number in package-lock
          # - The BuildCommon sbt file, because it has settings that may affect openapi-typescript generation
          # - rev: to allow for updating the cache when sources have changed
          key: &frontend_npm_install_key frontend-npm-install-<< pipeline.parameters.cache-version >> branch:{{ .Branch }} package-lock:{{ checksum "apps/package-lock.json" }} openapi:{{ checksum "openapi-cache-key.txt" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} rev:{{ .Revision }}
          paths:
            - /tmp/npm_install

  restore_frontend_node_modules:
    steps:
      - run:
          name: Compute openapi cache key
          command: |
            find . -wholename '*/openapi/*.yaml' | LANG=C sort | xargs sha256sum > openapi-cache-key.txt
      - restore_cache:
          name: Restore npm install cache
          keys:
            # Try to download a cache with an exact match
            - *frontend_npm_install_key
            # Then, try to download a cache from the same branch
            - frontend-npm-install-<< pipeline.parameters.cache-version >> branch:{{ .Branch }} package-lock:{{ checksum "apps/package-lock.json" }} openapi:{{ checksum "openapi-cache-key.txt" }} buildcommon:{{ checksum "project/BuildCommon.scala" }}
            # Then, try to download a cache from main branch
            - frontend-npm-install-<< pipeline.parameters.cache-version >> branch:main package-lock:{{ checksum "apps/package-lock.json" }} openapi:{{ checksum "openapi-cache-key.txt" }} buildcommon:{{ checksum "project/BuildCommon.scala" }}
      - run:
          name: Extracting archive of npm dependencies
          command: |
            if [[ -e /tmp/npm_install ]]; then
              tar --use-compress-program=pigz -xf /tmp/npm_install/node_modules.tar.gz
              tar --use-compress-program=pigz -xf /tmp/npm_install/openapi-ts-client.tar.gz
            else
              echo "No npm install cache found. Skipping..."
            fi

  save_daml_artifacts:
    steps:
      - run:
          name: Create archive of Daml compilation artifacts
          command: |
            mkdir -p /tmp/daml
            find . -type d -name ".daml" | tar --use-compress-program=pigz -cvf /tmp/daml/daml.tar.gz -T -
      - save_cache:
          name: Uploading artifacts generated from daml code
          # Components of the cache key:
          # - Keyword "daml-artifacts" for uniqueness
          # - The branch name
          # - The build configuration (build.properties, BuildCommon.scala, DamlPlugin.scala, build.sbt)
          # - The CN dars lock file
          # - The Canton dars lock file, since we cache also artifacts for those dars
          # - rev: to allow for updating the cache when sources have changed
          key: &daml_artifacts daml-artifacts-<< pipeline.parameters.cache-version >> branch:{{ .Branch }} buildprops:{{ checksum "project/build.properties" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} damlplugin:{{ checksum "project/DamlPlugin.scala" }} build={{ checksum "build.sbt" }} daml:{{ checksum "daml/dars.lock" }} cantonDars:{{ checksum "canton/dars.lock" }} rev:{{ .Revision }}
          paths:
            - /tmp/daml
            - apps/common/frontend/daml.js

  restore_daml_artifacts:
    steps:
      - restore_cache:
          name: Downloading archive of Daml compilation artifacts
          keys:
            - *daml_artifacts
            - daml-artifacts-<< pipeline.parameters.cache-version >> branch:{{ .Branch }} buildprops:{{ checksum "project/build.properties" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} damlplugin:{{ checksum "project/DamlPlugin.scala" }} build={{ checksum "build.sbt" }} daml:{{ checksum "daml/dars.lock" }} cantonDars:{{ checksum "canton/dars.lock" }}
            - daml-artifacts-<< pipeline.parameters.cache-version >> branch:main buildprops:{{ checksum "project/build.properties" }} buildcommon:{{ checksum "project/BuildCommon.scala" }} damlplugin:{{ checksum "project/DamlPlugin.scala" }} build={{ checksum "build.sbt" }} daml:{{ checksum "daml/dars.lock" }} cantonDars:{{ checksum "canton/dars.lock" }}
      - run:
          name: Extracting Daml compilation artifacts
          command: |
            if [[ -e /tmp/daml/daml.tar.gz ]]; then
              tar --use-compress-program=pigz -xvf /tmp/daml/daml.tar.gz
            else
              echo "No cached daml artifacts files found. Skipping..."
            fi

  cluster_lock_reaper:
    parameters:
      <<: *cluster-parameter
    steps:
      - run_bash_command_in_nix:
          cmd_name: Reap << parameters.cluster >> if lock older than 6 hours
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep SLACK_ACCESS_TOKEN --keep CIRCLE_BUILD_URL --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET"
          gce_authenticate: true
          cmd: |
            export KUBECONFIG=$PWD/.kubecfg

            cncluster activate
            cncluster show
            if ! cncluster ci_assert_fresh_lock; then
              lockholder=$(cncluster lockholder)

              curl -s -f -X POST --url "https://slack.com/api/chat.postMessage" \
                 -H "Content-type: application/json" \
                 -H "Authorization: Bearer $SLACK_ACCESS_TOKEN" \
                 --data '{ "text": "The cluster lock on '<< parameters.cluster >>' held by '${lockholder}' is too old. \n*Unlocking and resetting cluster.* :reaper: ( <'${CIRCLE_BUILD_URL}'|CI Build> )", "channel": "C05DT77QF5M" }'

              cncluster ci_reset_unlock
            fi


  # Largely copied from Canton's CI definition
  execute_sbt_command:
    description: |
      A context within which SBT commands can be run correctly for our needs
    parameters:
      cmd:
        # This may contain several commands.
        # The caller needs to quote commands that contain spaces, e.g. "\"testOnly myTest\"".
        type: string
      cmd_retry_count:
        description: Number of times to retry the command
        type: integer
        default: 0
      cmd_retry_wait:
        description: Number of seconds to wait between retries
        type: integer
        default: 5
      cmd_retry_condition:
        description: Condition for retrying the command (up to the maximum number of retries)
        type: string
        default: "true"
      cmd_before_retry:
        description: Extra command to run before retrying the command
        type: string
        default: ""
      timeout:
        type: string
        default: "25m"
      no_output_timeout:
        type: string
        default: "10m"
      succeed_on_error:
        # Will cause the command to always succeed regardless of the sbt exit code.
        type: boolean
        default: false
      extra_parameters:
        type: string
        default: ""
      extra_env_vars:
        type: string
        default: ""
      fail_on_error_in_output:
        # Fail if there is an error in the sbt output.
        default: true
        type: boolean
      pre_sbt_cmd:
        type: string
        default: ""
      post_sbt_cmd:
        type: string
        default: ""
      when:
        type: enum
        enum: ["on_success", "always", "on_fail"]
        default: "on_success"
      additional_nix_args:
        type: string
        default: ""
      <<: *cluster-parameter
      cluster:
        type: enum
        enum: ["scratchneta", "scratchnetb", "scratchnetc", "scratchnetd", "scratchnete", "cimain", "cidaily", "cidaily-testnet", "cilr", "devnet", "testnet", "testnet-preview", "none", "observability"]
        default: "none"
    steps:
      - run_bash_command_in_nix:
          cmd_name: Executing "sbt << parameters.cmd >>"
          no_output_timeout: << parameters.no_output_timeout >>
          when: << parameters.when >>
          additional_nix_args: --keep ARTIFACTORY_USER --keep ARTIFACTORY_PASSWORD --keep GCP_DATA_EXPORT_INTEGRATION_TEST_SERVICE_ACCOUNT_CREDENTIALS << parameters.additional_nix_args >>
          cluster: << parameters.cluster >>
          cmd: |
            on_exit() {
              local CODE="$?"
              # Provide some explanation on exit
              if [ "$CODE" == 0 ]
              then
                echo "sbt terminated successfully."
              elif [ "$CODE" == 124 ]
              then
                echo "sbt has been aborted with the TERM signal after << parameters.timeout >>."
              elif [ "$CODE" == 137 ]
              then
                echo "sbt has been killed because it has allocated too much memory or it has ignored the TERM signal after << parameters.timeout >>."
              else
                echo "sbt failed with exit code $CODE."
              fi
              <<# parameters.succeed_on_error >>
              echo "Overriding original exit code $CODE with zero."
              exit 0
              <</ parameters.succeed_on_error >>
            }
            trap on_exit EXIT

            set -euo pipefail
            # Necessary for tests of the REPL
            export TERM=dumb

            run_sbt() {
               export << parameters.extra_env_vars >>
               # Define sbt command
               SBT_CMD=(sbt -verbose)


               # Add extra parameters
               SBT_CMD+=(<< parameters.extra_parameters >>)

               # Add sbt commands.
               # Do not quote this, to allow the caller to pass in several commands.
               # The caller needs to take care of quoting, if a command contains spaces.
               SBT_CMD+=(<< parameters.cmd >>)

               # Setup heap size; corresponds to Canton large executors
               SBT_CMD+=("-J-Xmx5000M" "-J-Xms5000M")
               # Run command
               timeout --kill-after=30s << parameters.timeout >> "${SBT_CMD[@]}" 2>&1 |
                 tee sbt_output

                <<# parameters.fail_on_error_in_output >>
                # Check and report whether sbt has output errors
                .circleci/canton-scripts/check-sbt-output.sh "sbt_output"
                <</ parameters.fail_on_error_in_output >>
            }
            << parameters.pre_sbt_cmd >>
            run_sbt
            << parameters.post_sbt_cmd >>
          cmd_retry_count: << parameters.cmd_retry_count >>
          cmd_retry_wait: << parameters.cmd_retry_wait >>
          cmd_retry_condition: << parameters.cmd_retry_condition >>
          cmd_before_retry: << parameters.cmd_before_retry >>

  collect_failing_test_data_and_send_to_datadog:
    steps:
      - run_bash_command_in_nix:
          when: always
          additional_nix_args: "--keep DATADOG_API_KEY --keep CIRCLE_BRANCH --keep CIRCLE_BUILD_URL --keep CIRCLE_NODE_INDEX --keep CIRCLE_JOB"
          cmd_name: Send name of each failing test to datadog
          cmd: |
            python3 .circleci/canton-scripts/collect_failing_tests_and_send_to_datadog.py
          cmd_retry_count: 5

  collect_test_timings_and_send_to_datadog:
    steps:
      - run_bash_command_in_nix:
          when: always
          additional_nix_args: "--keep DATADOG_API_KEY --keep CIRCLE_BRANCH --keep CIRCLE_BUILD_URL --keep CIRCLE_NODE_INDEX --keep CIRCLE_JOB"
          cmd_name: Send time duration of each test to datadog
          cmd: |
            python3 .circleci/canton-scripts/collect_test_timings_and_send_to_datadog.py
          cmd_retry_count: 5

  # Writes the job time to a file. For accurate reporting, assumes this is the first step in the job,
  # and "collect_test_timings..." is the last step
  record_job_start_time:
    steps:
      - run:
          name: Write job starting time to file
          command: date +%s > ~/job_start_time.txt

  run_bash_command_in_nix:
    parameters:
      cmd:
        type: string
      cmd_name:
        type: string
        default: Executing bash command << parameters.cmd >> in the nix shell
      cmd_retry_count:
        description: Number of times to retry the command
        type: integer
        default: 0
      cmd_retry_wait:
        description: Number of seconds to wait between retries
        type: integer
        default: 5
      cmd_retry_condition:
        description: Condition for retrying the command (up to the maximum number of retries)
        type: string
        default: "true"
      cmd_before_retry:
        description: Extra command to run before retrying the command
        type: string
        default: ""
      gce_authenticate:
        type: boolean
        default: false
      cluster:
        type: enum
        enum: ["scratchneta", "scratchnetb", "scratchnetc", "scratchnetd", "scratchnete", "cimain", "cidaily", "cidaily-testnet", "cilr", "devnet", "testnet", "testnet-preview", "none", "observability"]
        default: "none"
      additional_nix_args:
        type: string
        default: ""
      no_output_timeout:
        type: string
        default: "10m"
      when:
        type: enum
        enum: ["on_success", "always", "on_fail"]
        default: "on_success"
      background:
        type: boolean
        default: false
    steps:
      - run:
          name: << parameters.cmd_name >>
          when: << parameters.when >>
          no_output_timeout: << parameters.no_output_timeout >>
          background: << parameters.background >>
          command: |
            set -euo pipefail
            . /home/circleci/.nix-profile/etc/profile.d/nix.sh
            ADDITIONAL_NIX_ARGS="<< parameters.additional_nix_args >>"

            nix develop \
              path:nix \
              --ignore-environment \
              --keep USER \
              --keep HOME \
              --keep TERM \
              --keep CI \
              --keep RUN_SPLITTED_TESTS_CMD \
              --keep GCP_DA_CN_DEVNET_KEY \
              --keep GCP_DA_CN_CI_KEY \
              --keep GCP_DA_CN_SCRATCHNET_KEY \
              --keep GCP_DA_CN_SCRATCHNET2_KEY \
              $ADDITIONAL_NIX_ARGS \
              --command bash \<<'EOF'

              set -euo pipefail

              . .envrc.vars
              if [[ << parameters.cluster >> != none ]]; then
                . $REPO_ROOT/cluster/deployment/<< parameters.cluster >>/.envrc.vars
              fi

              if [[ << parameters.gce_authenticate >> == true ]]; then
                # Authenticate to the correct GCP project for the cluster
                echo "Authenticating to cluster \"<< parameters.cluster >>\" in project \"${CLOUDSDK_CORE_PROJECT}\""
                case ${CLOUDSDK_CORE_PROJECT} in
                  da-cn-scratchnet)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_SCRATCHNET_KEY}"
                    ;;

                  da-cn-scratchnet2)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_SCRATCHNET2_KEY}"
                    ;;

                  da-cn-ci)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_CI_KEY}"
                    ;;

                  da-cn-devnet)
                    export CN_ACTIVE_ENVIRONMENT_KEY="${GCP_DA_CN_DEVNET_KEY}"
                    ;;

                  *)
                    echo "Cannot authenticate to GCP project without key: ${CLOUDSDK_CORE_PROJECT}"
                    exit 1
                    ;;
                esac

                # GOOGLE_CREDENTIALS variable is used by pulumi
                export GOOGLE_CREDENTIALS=${CN_ACTIVE_ENVIRONMENT_KEY}

                # TODO(#7702) Extract retry logic for CI tasks into command/script
                # gcloud auth with a limited number of retries
                MAX_AUTH_RETRIES=5
                AUTH_TRY_COUNT=0
                AUTH_RETRY_WAIT=30
                until [ $AUTH_TRY_COUNT -gt $MAX_AUTH_RETRIES ]
                do
                    echo "Trying gcloud auth. Attempt #$[AUTH_TRY_COUNT+1]"

                    # Try to authenticate and break retry loop in case of success
                    echo ${CN_ACTIVE_ENVIRONMENT_KEY} | gcloud auth activate-service-account --key-file=- && break

                    AUTH_TRY_COUNT=$[$AUTH_TRY_COUNT+1]
                    sleep $AUTH_RETRY_WAIT
                done

                if [ $AUTH_TRY_COUNT -gt $MAX_AUTH_RETRIES ]; then
                    echo "Exceeded maximum retries, no more attempts: gcloud auth activate-service-account" >&2
                    exit 1
                fi

              fi

              MAX_RETRY=<< parameters.cmd_retry_count >>
              n=0
              until [ $n -gt $MAX_RETRY ]
              do
                  cmd_wrapper() {
                    # We write the cmd to a separate file. That way `set -e` statements in the cmd will take effect
                    # despite us using this in a tested context below where they would usually be disabled.
                    # See https://gist.github.com/cocreature/9c345b75b7dad05ed32865b21c1b0460 for a minimal example
                    # of what happens if we just call parameters.cmd directly.
                    # We enforce set -euo pipefail by including it in all the commands. Even if the command has already set it, then it will have no effect
                    # but this way we ensure all the commands will fail on error and no lead to confusing behaviour
                    # append random string to the cmd.sh file to avoid parallel steps writing and executing the same cmd.sh files
                    CMD_FILE=$(mktemp cmd-XXXXXX.sh)
                    cat \<<'EOF2' > $CMD_FILE
                    set -euo pipefail
                    << parameters.cmd >>
            EOF2
                    bash $CMD_FILE
                  }
                  cmd_wrapper && break
                  if [ << parameters.cmd_retry_condition >> != true ]; then
                    echo "Retry condition not met, not retrying" >&2
                    exit 1
                  fi
                  n=$[$n+1]
                  sleep << parameters.cmd_retry_wait >>
                  << parameters.cmd_before_retry >>
              done

              if [ $n -gt $MAX_RETRY ]; then
                echo "Exceeded maximum retries, no more attempts << parameters.cmd_name >>" >&2
                exit 1
              fi
            EOF

  cleanup_sbt_test_job:
    parameters:
      upload_caches:
        type: boolean
        default: false
    steps:
      - upload_test_reports
      # sbt caches are job-specific, so we're ignoring the upload_caches parameter,
      # and saving those caches in every job
      - save_sbt_cache
      - when:
          condition: << parameters.upload_caches >>
          steps:
            - save_compiled_classes
            - save_frontend_node_modules
            - save_daml_artifacts
      - run:
          name: Convert time stamps in browser logs
          when: always
          command: |
            if [[ -d log && -f scripts/convts.py ]]; then
              find log -type f -name "browser*.log" -print0 | xargs -r0 python3 scripts/convts.py
            fi
      - run: # Pack logfiles to speedup downloads.
          name: Pack Logfiles
          when: always
          command: |
            if [[ -d log ]]; then
              # pigz fails if there is no file to compress, which can be the case if Canton just rolled its logs
              pigz -r log/* || true
            fi
      - store_artifacts:
          name: Store test logs as artifacts (if any)
          path: log
          destination: log


  upload_test_reports:
    steps:
      - run:
          when: always
          name: Group test reports by subproject
          command: |
            for subproject in `find . -path "*/target/test-reports" | sed -e 's/^\.\///' -e 's/\/target\/test-reports$//'`
            do
              mkdir -p test-reports/"$subproject"
              # Keep going, if there is no test report.
              cp -v "$subproject"/target/test-reports/TEST-*.xml test-reports/"$subproject" || true
            done
      - store_test_results:
          path: test-reports

  setup_sbt_test_job:
    steps:
      - setup_nix
      - restore_sbt_cache
      - restore_precompiled_classes
      - restore_frontend_node_modules
      - restore_daml_artifacts

  # Adapted from Canton's CI definition
  split_tests_for_parallel_run:
    description: split tests for parallel execution
    parameters:
      test_names_file:
        type: string
    steps:
      - execute_sbt_command:
          cmd: "Test/compile printTests"
          fail_on_error_in_output: false
      - run:
          name: Splitting tests
          command: |
            echo "[fix negative test times]"
            # scalatest actually reported occasionally test times with negative numbers
            # this confused the circleci test runner. the easiest fix (suggested by circleci)
            # is to use sed to adapt any such time and set it to 0
            TIMING_DATA_FILE="$CIRCLE_INTERNAL_TASK_DATA/circle-test-results/results.json"
            if [[ -e $TIMING_DATA_FILE ]]; then
              sed -ri 's/"run_time": ?\-[0-9]+\.?[0-9]+,/"run_time":0.0,/g' "$TIMING_DATA_FILE"
            fi
            echo "[split tests ${extraargs}]"
            rm -f tests-to-run.txt

            # Set time-default to 5 minutes so that tests with unknown duration get distributed evenly.
            # (The default for tests with unknown duration would be 1s.)
            # The tests run command wants to invoke the test runner for each test. That doesn't work for us.
            # However, what we do instead is we just print the tests it wants to run into a file and pass
            # that content then to sbt ...
            n=0
            MAX_RETRY=5
            until [ $n -gt $MAX_RETRY ]; do
              cat << parameters.test_names_file >> | circleci tests run --command "xargs ./.circleci/grab-tests.sh" $extraargs --split-by=timings --test-selector=classname --time-default=5m && break
              n=$[$n+1]
              sleep 10
            done

            if [ $n -gt $MAX_RETRY ]; then
              echo "Exceeded maximum retries, no more attempts" >&2
              exit 1
            fi


            # if we are re-running but don't have anything todo, then the file won't be there and we can halt
            if [ -e tests-to-run.txt ]; then
              splitted=$(cat tests-to-run.txt)
              tests=$(echo $splitted | tr '\n' ' ')
              count=$(echo $tests | wc -w)
              echo "We are running $count tests in this batch:"
              cat \<<< "$splitted"
              echo "export RUN_SPLITTED_TESTS_CMD=\"testOnly $tests\"" >> "$BASH_ENV"
              mkdir tests
              for t in $tests; do echo " " > tests/$t; done # CircleCI refuses to upload empty files
            else
              echo "re-running this bucket can be aborted, as nothing flaked here"
              circleci-agent step halt
            fi
      - store_artifacts:
          name: Upload list of tests executed in this run (as empty files)
          path: tests
          destination: _tests # the _ is so this appears on top in the artifacts list

  start_canton_in_background:
    description: Start canton in the background
    parameters:
      start_canton_options:
        type: string
    steps:
      - run_bash_command_in_nix:
          cmd_name: "Start canton"
          cmd: |
            mkdir -p log
            top -b -o %MEM -c -w 256 > log/memory &
            ./start-canton.sh << parameters.start_canton_options >> -b
          background: true
          additional_nix_args: "--keep CIRCLE_USERNAME --keep CIRCLE_BRANCH --keep CIRCLE_BUILD_NUM --keep CIRCLE_JOB --keep CIRCLE_NODE_INDEX"
          # Retrying as sometimes it fails finding the images
          cmd_retry_count: 3

  stop_canton:
    description: Stop Canton
    steps:
      - run_bash_command_in_nix:
          when: always
          cmd_name: "Save Postgres Logs"
          cmd: ./scripts/copy-postgres-logs.sh || true
      - run_bash_command_in_nix:
          when: always
          cmd_name: "Stop canton"
          cmd: ./stop-canton.sh || true

  run_splitted_scala_tests:
    description: run splitted scala tests
    parameters:
      pre_sbt_cmd:
        type: string
        default: ""
      post_sbt_cmd:
        type: string
        default: ""
      cmd_retry_count:
        description: Number of times to retry the command
        type: integer
        default: 0
      start_canton_options:
        type: string
    steps:
      - run_bash_command_in_nix:
          cmd_name: "Wait for canton to be ready before running tests"
          cmd: |
            ./wait-for-canton.sh << parameters.start_canton_options >>
      - execute_sbt_command:
          # run all tests except the live cluster ones
          pre_sbt_cmd: |
            << parameters.pre_sbt_cmd >>
          extra_env_vars: POSTGRES_DB=postgres
          cmd: "\"$RUN_SPLITTED_TESTS_CMD\""
          post_sbt_cmd: << parameters.post_sbt_cmd >>
          additional_nix_args: "--keep AUTH0_TESTS_MANAGEMENT_API_CLIENT_ID --keep AUTH0_TESTS_MANAGEMENT_API_CLIENT_SECRET"
          extra_parameters: -DAUTH0_MANAGEMENT_API_CLIENT_ID=${AUTH0_TESTS_MANAGEMENT_API_CLIENT_ID} -DAUTH0_MANAGEMENT_API_CLIENT_SECRET=${AUTH0_TESTS_MANAGEMENT_API_CLIENT_SECRET}
          # it is in our best interest for our tests to be faster than this,
          # but failing CI because of slow tests is also not very nice
          # TODO(#8608): reduce `timeout` to at least 25m again
          timeout: "35m"
          no_output_timeout: "20m"
          cmd_retry_count: << parameters.cmd_retry_count >>
      - execute_sbt_command:
          cmd: "checkErrors"

  setup_vpn:
    steps:
      - run:
          name: Install VPN client
          command: |
            # Retry because we've seen Ubuntu be down sometimes.
            n=0
            until [ $n -gt 50 ]; do
              sudo apt-get update && break
              n=$((n+1))
              sleep 10
            done
            n=0
            until [ $n -gt 50 ]; do
              sudo apt-get install -y expect charon-cmd && break
              n=$((n+1))
              sleep 10
            done

            sudo tee /etc/strongswan.d/logging.conf \<<'EOF'
            charon-cmd {
                 filelog {
                     charon {
                           path = /var/log/vpn.log
                           time_format = %b %e %T
                           ike_name = yes
                           flush_line = yes
                           append = yes
                           default = 1
                     }
                    # Uncomment to log also to stderr (but that pollutes also the test step in case we retry there after a VPN failure)
                    #  stderr {
                    #        ike = 2
                    #  }
                 }
            }
      - run:
          name: Copy vpn-related scripts
          command: |
            # We're copying the vpn scripts out of the repo so that we can use them also later,
            # after we checkout an older commit for preflight checks. For vpn scripts, always
            # using the latest version seems the most sensible anyway.
            cp -r .circleci/vpn-scripts /tmp
      - run:
          name: Dump public IP
          command: curl checkip.amazonaws.com
      - run:
          name: Start VPN connection
          # the charon-cmd process must remain running throughout the whole job,
          # so run this step in the background to allow subsequent steps to continue
          background: true
          # we use an "expect" script to spawn charon-cmd, and supply credentials,
          # because the interactive password prompt reads directly from
          # /dev/tty rather than stdin, and simple IO piping doesn't work
          command: |
            /usr/bin/sudo touch /var/log/vpn.log
            /usr/bin/sudo chmod a+w /var/log/vpn.log
            /tmp/vpn-scripts/connect-vpn.expect $VPN_HOST_NAME $VPN_USER $VPN_PASSWORD
      - run:
          name: Define local hostname
          command: |
              # Some CircleCI machine failed to resolve local hostname to 127.0.0.1.
              # Giving "sudo: unable to resolve host ip-172-28-55-xx" for sudo commands
              # This (hacky) step should fix the issue (copied from https://circleci.com/developer/orbs/orb/kindred/kin-l2tp-vpn)
              hostname=$(cat /etc/hostname)
              grep -qxF "127.0.0.1 ${hostname}" /etc/hosts || echo "127.0.0.1 ${hostname}" | sudo tee -a /etc/hosts
      - run:
          name: Verify VPN connection
          command: |
            /tmp/vpn-scripts/wait-for-vpn-and-del-default-route.sh

  # This is separate from setup_vpn since we need to interleave the step that sets up
  # nix for this to work
  setup_vpn_routes:
    parameters:
      <<: *cluster-parameter
    steps:
      - run_bash_command_in_nix:
          cmd_name: Setup VPN Routes - Fetching kube config
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: |
            export KUBECONFIG=$PWD/.kubecfg
            cncluster activate
          cmd_retry_count: 5
      - run:
          # Separate command since running this outside of nix is easier.
          name: Setup VPN Routes - Adding new routes
          command: |
            . cluster/deployment/<< parameters.cluster >>/.envrc.vars
            /tmp/vpn-scripts/setup-vpn-routes.sh

  run_todo_script:
    steps:
      - run_bash_command_in_nix:
          when: always
          cmd: ./scripts/check-todos.sh
          additional_nix_args: "--keep GITHUB_TOKEN --keep CIRCLE_BRANCH --keep CIRCLE_PULL_REQUEST"
      - store_artifacts:
          name: Store To-dos as artifacts
          when: always
          path: todo-out/todos
          destination: todos

  run_trailing_whitespace_check:
    steps:
      - run_bash_command_in_nix:
          cmd_name: Check for trailing whitespace
          cmd: ./scripts/check-trailing-whitespace.sh

  set-failed-parallel-run-url:
    steps:
      - run:
          name: Set FAILED_PARALLEL_RUN_URL
          when: always
          command: |
            echo "export FAILED_PARALLEL_RUN_URL=\"https://app.circleci.com/pipelines/github/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/<< pipeline.number >>/workflows/${CIRCLE_WORKFLOW_ID}/jobs/${CIRCLE_BUILD_NUM}/parallel-runs/${CIRCLE_NODE_INDEX}\"" >> "$BASH_ENV"

  # Actually downloading the logs is too slow so we only print the command and ask people
  # to run it for the apps they really need.
  print_gcloud_logs_commands:
    parameters:
      <<: *cluster-parameter
    steps:
      - run_bash_command_in_nix:
          when: always
          cmd_name: Displaying commands to download gcloud logs
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: |
            # download various interesting logs since "20 minutes ago"
            duration=1200
            now=$(date -u +%s)
            now_formatted=$(date -u -d @$now +"%Y-%m-%dT%H:%M:%S")
            before=$(date -u -d @$((now-duration)) +"%Y-%m-%dT%H:%M:%S")
            query="timestamp>=\"$before\" AND timestamp<=\"$now_formatted\""
            apps=(
              "sv-1 sv-app"
              "sv-1 participant"
              "sv-1 scan-app"
              "sv-2 sv-app"
              "sv-3 sv-app"
              "sv-4 sv-app"
              "validator1 participant"
              "validator1 validator-app"
              "splitwell domain"
              "splitwell participant"
              "splitwell splitwell-app"
              "splitwell validator-app"
            )
            for app in "${apps[@]}"
            do
              echo "# --- Use the following command to download logs for $app '$query':"
              echo "cncluster gcloud_logs $app '$query'"
            done

  # Cannot be defined as a mix-in (like `<<: notify-fail`) because we need to pass the current cluster as parameter
  notify-cluster-fail:
    parameters:
      <<: *cluster-parameter
      channel_notify:
        # This parameter allows selecting different notification channels, which can be handy when a subteam
        # focuses on bringing a potentially noisy deployment under control; e.g., when we sped up devnet in #3126.
        type: string
        # #team-canton-network-internal-ci
        default: C05DT77QF5M
    steps:
      - set-failed-parallel-run-url
      - run:
          name: Dump input sent to slack/notify
          when: always
          command: |
            echo "Sending the following as input to slack/notify"
            echo "{ \"text\": \"*Job '${CIRCLE_JOB}' failed on cluster '<< parameters.cluster >>'* :dumpster-fire:.\n*$CIRCLE_BRANCH*: <${FAILED_PARALLEL_RUN_URL}|$(git log -1 --oneline --no-color | sed s/\"//g)> ($(git log -1 --pretty='%an'), <${FAILED_PARALLEL_RUN_URL}|CI Build in Run #${CIRCLE_NODE_INDEX}>)\" }"
      # Note that Slack force-wraps too-long lines within "blocks", and thus we don't use Slack message "blocks"
      # see stackoverflow.com/questions/57438097/how-to-make-slack-api-block-kit-take-up-the-entire-width-of-the-slack-window
      - slack/notify:
          channel: << parameters.channel_notify >>
          branch_pattern: (deployment\/.*|main)
          event: fail
          custom: |
            { "text": "*Job '${CIRCLE_JOB}' failed on cluster '<< parameters.cluster >>'* :dumpster-fire:.\n*$CIRCLE_BRANCH*: <${FAILED_PARALLEL_RUN_URL}|$(git log -1 --oneline --no-color | sed s/\"//g)> ($(git log -1 --pretty='%an'), <${FAILED_PARALLEL_RUN_URL}|CI Build in Run #${CIRCLE_NODE_INDEX}>)" }

  notify-cluster-deployment:
    parameters:
      <<: *cluster-parameter
      channel_notify:
        type: string
        default: C05DT77QF5M
    steps:
      - slack/notify:
          channel: << parameters.channel_notify >>
          branch_pattern: (deployment\/.*|main)
          event: pass
          custom: |
            { "text": "*✅Job '${CIRCLE_JOB}' deployed on cluster '<< parameters.cluster >>'*\n<${CIRCLE_BUILD_URL}| Commit $(git log -1 --oneline --no-color | sed s/\"//g)>" }

  docker_build:
    steps:
      - run_bash_command_in_nix:
         cmd_name: Build docker images
         additional_nix_args: "--keep DOCKER_CERT_PATH \
                              --keep DOCKER_HOST \
                              --keep DOCKER_MACHINE_NAME \
                              --keep DOCKER_TLS_VERIFY \
                              --keep NO_PROXY"
         # Retrying as sometimes the download from docker.io fails
         cmd_retry_count: 5
         cmd: make docker-build -j
  docker_login_artifactory:
    steps:
      - run:
          name: Pre-login checks
          command: |
            if [[ -z "${ARTIFACTORY_USER}" || -z "${ARTIFACTORY_PASSWORD}" ]]; then
                echo "artifactory user:key is empty: ${ARTIFACTORY_USER} / pw. maybe add context:artifactory?"
                exit 1
            fi
      - run_bash_command_in_nix:
         cmd_name: Log in to Artifactory
         additional_nix_args: "--keep DOCKER_CERT_PATH \
                              --keep DOCKER_HOST \
                              --keep DOCKER_MACHINE_NAME \
                              --keep DOCKER_TLS_VERIFY \
                              --keep ARTIFACTORY_USER \
                              --keep ARTIFACTORY_PASSWORD \
                              --keep NO_PROXY"
         # Retrying as sometimes the login fails
         cmd_retry_count: 5
         cmd: |
           echo $ARTIFACTORY_PASSWORD | docker login digitalasset-canton-enterprise-docker.jfrog.io -u "$ARTIFACTORY_USER" --password-stdin
           echo $ARTIFACTORY_PASSWORD | docker login digitalasset-canton-network-docker.jfrog.io -u "$ARTIFACTORY_USER" --password-stdin
  docker_pull_test_images:
    steps:
      - run_bash_command_in_nix:
          cmd_name: "Pull docker images used for integration tests"
          additional_nix_args: "--keep DOCKER_CERT_PATH \
                              --keep DOCKER_HOST \
                              --keep DOCKER_MACHINE_NAME \
                              --keep DOCKER_TLS_VERIFY \
                              --keep NO_PROXY"
          # Retrying as network stuff can be flaky
          cmd_retry_count: 5
          cmd: |
            docker pull ${COMETBFT_DOCKER_IMAGE}
            docker pull ${TESTCONTAINERS_SSHD_CONTAINER_IMAGE}
            docker pull ${OTEL_COLLECTOR_IMAGE}
jobs:
  deploy_sv_runbook:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      use_published_artifacts:
        type: boolean
        default: false
      deploy_version:
        type: string
        default: ""
      restore_cluster:
        type: boolean
        default: false
      send_deployment_notification:
        type: boolean
        default: true
    steps:
      - checkout
      - record_job_start_time
      - setup_nix
      - when:
          condition: << parameters.deploy_version >>
          steps:
            - run_bash_command_in_nix:
                cmd_name: Checkout commit << parameters.deploy_version >>
                cmd: git checkout << parameters.deploy_version >>
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make cluster/build
      - run_bash_command_in_nix:
          cmd_name: Apply SV-runbook Kubernetes manifest to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET --keep ARTIFACTORY_USER --keep ARTIFACTORY_PASSWORD --keep CIRCLECI_TOKEN --keep CIRCLE_WORKFLOW_ID"
          gce_authenticate: true
          cmd: |
            if [[ << parameters.restore_cluster >> == true ]]; then
              export RESTORE_CLUSTER=1
            fi
            if [[ -n '<< pipeline.parameters.bootstrapping-config >>' ]]; then
              export BOOTSTRAPPING_CONFIG='<< pipeline.parameters.bootstrapping-config >>'
              if [[ -z "${RESTORE_CLUSTER:-}" ]]; then
                echo "BOOTSTRAPPING_CONFIG set but not RESTORE_CLUSTER"
                exit 1
              fi
            fi
            cncluster activate
            cncluster ci_pdown_sv
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi
            cncluster ci_apply_sv $VERSION
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
      - when:
          condition: << parameters.send_deployment_notification >>
          steps:
            - notify-cluster-deployment:
                cluster: << parameters.cluster >>
      - collect_test_timings_and_send_to_datadog

  deploy_validator_runbook:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      use_published_artifacts:
        type: boolean
        default: false
      deploy_version:
        type: string
        default: ""
      restore_cluster:
        type: boolean
        default: false
    steps:
      - checkout
      - record_job_start_time
      - setup_nix
      - when:
          condition: << parameters.deploy_version >>
          steps:
            - run_bash_command_in_nix:
                cmd_name: Checkout commit << parameters.deploy_version >>
                cmd: git checkout << parameters.deploy_version >>
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make cluster/build
      - run_bash_command_in_nix:
          cmd_name: Apply Validator runbook Kubernetes manifest to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET --keep ARTIFACTORY_USER --keep ARTIFACTORY_PASSWORD --keep CIRCLECI_TOKEN --keep CIRCLE_WORKFLOW_ID"
          gce_authenticate: true
          cmd: |
            if [[ << parameters.restore_cluster >> == true ]]; then
              export RESTORE_CLUSTER=1
            fi
            if [[ -n '<< pipeline.parameters.bootstrapping-config >>' ]]; then
              export BOOTSTRAPPING_CONFIG='<< pipeline.parameters.bootstrapping-config >>'
              if [[ -z "${RESTORE_CLUSTER:-}" ]]; then
                echo "BOOTSTRAPPING_CONFIG set but not RESTORE_CLUSTER"
                exit 1
              fi
            fi
            cncluster activate
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi
            cncluster ci_apply_validator $VERSION
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
      - collect_test_timings_and_send_to_datadog

  deploy_cluster:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      restore_cluster:
        type: boolean
        default: false
      deploy_version:
        type: string
        default: ""
      use_published_artifacts:
        type: boolean
        default: false
      update_deployment_branch:
        type: boolean
        default: true
      send_deployment_notification:
        type: boolean
        default: true
    steps:
      - checkout
      - record_job_start_time
      - setup_nix
      - when:
          condition: << parameters.deploy_version >>
          steps:
            - run_bash_command_in_nix:
                cmd_name: Checkout commit << parameters.deploy_version >>
                cmd: git checkout << parameters.deploy_version >>
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          cmd: |
            make cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Apply Pulumi configuration to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep GITHUB_TOKEN
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep CIRCLECI_TOKEN
            --keep CIRCLE_WORKFLOW_ID
            --keep K6_USERS_PASSWORD
            --keep K6_VALIDATOR_ADMIN_USERNAME
            --keep K6_VALIDATOR_ADMIN_PASSWORD
            --keep SLACK_ACCESS_TOKEN
          gce_authenticate: true
          cmd: |
            if [[ << parameters.restore_cluster >> == true ]]; then
              export RESTORE_CLUSTER=1
            fi
            if [[ -n '<< pipeline.parameters.bootstrapping-config >>' ]]; then
              export BOOTSTRAPPING_CONFIG='<< pipeline.parameters.bootstrapping-config >>'
              if [[ -z "${RESTORE_CLUSTER:-}" ]]; then
                echo "BOOTSTRAPPING_CONFIG set but not RESTORE_CLUSTER"
                exit 1
              fi
            fi
            cncluster activate
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi
            if [[ << pipeline.parameters.reset-before-deploy >> == true ]]; then
              cncluster ci_apply
            else
              cncluster ci_apply --skip-reset
            fi
      - when:
          condition: << parameters.update_deployment_branch >>
          steps:
            - run_bash_command_in_nix:
                cmd_name: Update deployment branch for cluster
                cluster: << parameters.cluster >>
                additional_nix_args: "--keep GITHUB_TOKEN"
                cmd: |
                  # deployment/scratch* branches break our deployment, so we guard against accidentally creating those here
                  # This is a safeguard against people manually running e.g. deploy_devnet on a scratchnet.
                  if [[ << parameters.cluster >> != scratch* ]]; then
                    scripts/update-deployment-branch.sh "<< parameters.cluster >>" HEAD
                  else
                    echo "NOTE: skipping deployment branch update for scratchnet cluster << parameters.cluster >>"
                  fi
                cmd_retry_count: 5
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
      - when:
          condition: << parameters.send_deployment_notification >>
          steps:
            - notify-cluster-deployment:
                cluster: << parameters.cluster >>
      - collect_test_timings_and_send_to_datadog

  reset_cluster:
    parameters:
      <<: *cluster-parameter
      channel_notify:
        type: string
        # #team-canton-network-internal-ci
        default: C05DT77QF5M
    machine:
      image: ubuntu-2004:2023.04.2
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    steps:
      - checkout
      - record_job_start_time
      - setup_vpn
      # Needs to occur before setup_vpn_routes
      - setup_nix
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Reset Cluster and Free Lock (if on scratch*)
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET"
          gce_authenticate: true
          cmd: |
            cncluster activate
            cncluster ci_reset_unlock
      - collect_test_timings_and_send_to_datadog


  # Inspired by Canton, we put the lint-like checks into their own CI job
  static_tests:
    docker:
      - image: cimg/base:2021.04
    resource_class: "xlarge"
    environment:
      <<: *env
    steps:
      - checkout
      - record_job_start_time
      - run:
          name: Verify config.yml is up to date with source.
          command: |
            source .envrc.vars
            .circleci/build-config.sh --check
      - setup_sbt_test_job
      # Run the cheap checks before the sbt based ones to provide fast feedback
      - run_trailing_whitespace_check
      - run_todo_script
      - execute_sbt_command:
          cmd: "Test/compile lint"
          cmd_retry_count: 3
      - cleanup_sbt_test_job
      - collect_test_timings_and_send_to_datadog

  # We put our Daml tests in their own job for more parallelization
  daml_test:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - record_job_start_time
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "damlTest"
          timeout: "10m"
          extra_env_vars: DAML_DEBUG=1
      - collect_test_timings_and_send_to_datadog

  # Run UI unit tests
  ui_test:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - record_job_start_time
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "apps-common-frontend/npmTest"
          fail_on_error_in_output: false # TODO(#7579) -- turn this back on when we figure out what to ignore/what not to
      - cleanup_sbt_test_job
      - collect_test_timings_and_send_to_datadog

  # We want to run our Scala tests with parallelism and therefore put them in their own job with no other tests in it;
  # work on anything but the Scala tests is duplicated across all parallel runs of this job
  scala_test:
    machine:
      image: ubuntu-2004:2023.04.2
    parameters:
      test_names_file:
        type: string
      start_canton_options:
        type: string
      pre_sbt_cmd:
        type: string
        default: ""
      post_sbt_cmd:
        type: string
        default: ""
      parallelism:
        type: integer
      resource_class:
        type: string
      cmd_retry_count:
        description: Number of times to retry the command
        type: integer
        default: 0
    resource_class: << parameters.resource_class >>
    environment:
      <<: *env
      POSTGRES_HOST: localhost
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: << parameters.parallelism >>
    steps:
      - checkout
      - record_job_start_time
      - setup_sbt_test_job
      # Used to pull docker images for cometbft
      - docker_login_artifactory
      - docker_pull_test_images
      # Start canton before compiling, as it takes a long time to start
      # Note that we start canton before connecting VPN, so some initial
      # metrics from Canton will be lost. Currently, they're Canton metrics
      # before our actual tests start are not of interest for us,
      # so we accept that.
      - start_canton_in_background:
          start_canton_options: << parameters.start_canton_options >>
      - setup_vpn
      - setup_vpn_routes:
          cluster: "observability"
      - split_tests_for_parallel_run:
          test_names_file: << parameters.test_names_file >>
      - run_splitted_scala_tests:
          pre_sbt_cmd: << parameters.pre_sbt_cmd >>
          post_sbt_cmd: << parameters.post_sbt_cmd >>
          cmd_retry_count: << parameters.cmd_retry_count >>
          start_canton_options: << parameters.start_canton_options >>
      - stop_canton
      - cleanup_sbt_test_job
      - collect_failing_test_data_and_send_to_datadog
      - collect_test_timings_and_send_to_datadog

  bundle:
    docker:
      - image: cimg/base:2021.04
    resource_class: xlarge
    environment:
      <<: *env
    steps:
      - checkout
      - record_job_start_time
      - setup_sbt_test_job
      - execute_sbt_command:
          # compile tests, as well as bundle, to make sure the cache that is uploaded here is complete
          cmd: "Test/compile bundle"
          cmd_retry_count: 3
      - run:
          name: Copy bundle
          command: |
            set -eou pipefail
            mkdir -p /tmp/artifacts
            cp apps/app/target/release/*.tar.gz /tmp/artifacts
      - run:
          name: Copy OpenAPI specs
          command: |
            set -eou pipefail
            .circleci/copy-openapi.sh
      - store_artifacts:
          path: /tmp/artifacts
          destination: release-artifacts
      - run_bash_command_in_nix:
         cmd_name: Publish release bundles
         additional_nix_args: "--keep GCP_DA_CN_IMAGES_KEY"
         cmd: |
           echo $GCP_DA_CN_IMAGES_KEY | gcloud auth activate-service-account --key-file=-
           export GOOGLE_CLOUD_PROJECT=da-cn-images
           VERSION=$(get-snapshot-version)
           (cd /tmp/artifacts ; for filename in *.tar.gz; do mv "$filename" "${VERSION}_${filename}"; done)
           # we cp with -n so that it doesn't try to overwrite an already uploaded bundle with this version,
           # which would lead to an error due to a misisng `delete` permission
           gsutil cp -n /tmp/artifacts/*.tar.gz gs://release-bundles
         # we're not adding a cmd_retry_count here because of the `mv` above and because gsutil cp has a retry mechanism of its own
      - cleanup_sbt_test_job:
          upload_caches: true
      - collect_test_timings_and_send_to_datadog

  deployment_test:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - record_job_start_time
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: Deployment Test
         cmd_retry_count: 5 # Retry in case of dependency download errors
         cmd: make cluster/pulumi/test
      - run_bash_command_in_nix:
         cmd_name: Check Pulumi deployment
         cmd: make --keep-going cluster/pulumi/test
      - collect_test_timings_and_send_to_datadog

  auth0_user_cleanup:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      # TODO(#6630): look into these caches
      - restore_precompiled_classes
      - restore_sbt_cache
      - execute_sbt_command:
          cmd: "\"tools/run\""
          additional_nix_args: "--keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID \
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_TESTS_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_TESTS_MANAGEMENT_API_CLIENT_SECRET
            --keep ARTIFACTORY_USER
            --keep ARTIFACTORY_PASSWORD"
          timeout: "10m"
      - save_sbt_cache
      - save_compiled_classes

  cluster_lock_reaper:
    circleci_ip_ranges: true
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - cluster_lock_reaper:
          cluster: "scratchneta"
      - cluster_lock_reaper:
          cluster: "scratchnetb"
      - cluster_lock_reaper:
          cluster: "scratchnetc"
      - cluster_lock_reaper:
          cluster: "scratchnetd"
      - cluster_lock_reaper:
          cluster: "scratchnete"

  mark_for_testnet:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Mark latest snapshot in branch for next TestNet release
          additional_nix_args: "--keep GITHUB_TOKEN"
          cmd: |
            git remote set-url origin https://githubuser-da:${GITHUB_TOKEN}@github.com/DACH-NY/canton-network-node.git
            LATEST_SNAPSHOT=`git describe --tags --match '*-snapshot.*' --abbrev=0 HEAD`
            git tag --force testnet-next $LATEST_SNAPSHOT
            git push --force origin testnet-next

  update_pipeline_schedule:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: Update CircleCI pipeline configuration (incl. schedule triggers)
         additional_nix_args: --keep CIRCLECI_TOKEN
         cmd: |
           set -euo pipefail

           . .envrc.vars
           .circleci/triggers/setup-pipeline.sh

  docker_images_push:
    machine:
      image: ubuntu-2004:2023.04.2
    environment:
      <<: *env
    parameters:
      skip_if_exists:
        type: boolean
        default: false
    steps:
      - checkout
      - record_job_start_time
      - restore_frontend_builds
      - setup_sbt_test_job
      - docker_login_artifactory
      - run_bash_command_in_nix:
         cmd_name: GCloud authorization
         additional_nix_args: "--keep GCP_DA_CN_IMAGES_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: |
           echo $GCP_DA_CN_IMAGES_KEY | gcloud auth activate-service-account --key-file=-
           (yes || true) | gcloud auth configure-docker us-central1-docker.pkg.dev
      - when:
          condition: << parameters.skip_if_exists >>
          steps:
          - run_bash_command_in_nix:
             cmd_name: Check if images already exist
             cmd: |
               if make docker-check; then
                  echo "Docker images already exist"
                  # Running a circleci-agent command from within run_bash_command_in_nix does not work, so we create a file
                  # that represents the need to halt, and call `circleci-agent step halt` in a separate `run` step
                  touch .halt-build-step
               fi
          - run:
              name: Halt build step if images already exist
              command: |
                if [ -f ".halt-build-step" ]; then
                  echo "skipping rebuilding and pushing"
                  circleci-agent step halt
                fi
      - run_bash_command_in_nix:
         cmd_name: Build app
         cmd: make build -j
         cmd_retry_count: 5 # Retry in case of dependency download errors
         additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD"
      - docker_build
      - run_bash_command_in_nix:
         cmd_name: Push Docker images
         additional_nix_args: "--keep GCP_DA_CN_IMAGES_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: make docker-push -j
         cmd_retry_count: 5
      - save_frontend_builds
      - cleanup_sbt_test_job
      - collect_test_timings_and_send_to_datadog

  publish_public_release:
    machine:
      image: ubuntu-2004:2023.04.2
    environment:
      <<: *env
    steps:
      - checkout
      - record_job_start_time
      - setup_sbt_test_job
      - docker_login_artifactory
      - run_bash_command_in_nix:
         cmd_name: Promote images to Artifactory
         additional_nix_args: "--keep GCP_DA_CN_IMAGES_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: |
           echo $GCP_DA_CN_IMAGES_KEY | gcloud auth activate-service-account --key-file=-
           (yes || true) | gcloud auth configure-docker us-central1-docker.pkg.dev

           make docker-promote
         cmd_retry_count: 5 # Retry in case of connectivity issues
      - run_bash_command_in_nix:
         cmd_name: Push Helm charts and tag git accordingly
         additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD \
           --keep GITHUB_TOKEN"
         cmd: |
           publish () {
             source=$1
             full_path=$2
             echo "Publishing ${source} to ${full_path}"
             curl -u "${ARTIFACTORY_USER}:${ARTIFACTORY_PASSWORD}" -sSf -X PUT --upload-file "${source}" "${full_path}"
           }

           make cluster/helm/build -j

           for chart in cluster/helm/target/*.tgz; do
             artifactory_url="https://digitalasset.jfrog.io/artifactory"
             publish "${chart}" "${artifactory_url}/canton-network-helm/digitalasset/$(basename ${chart})"
           done

           git remote set-url origin https://githubuser-da:${GITHUB_TOKEN}@github.com/DACH-NY/canton-network-node.git
           RELEASE_TAG=$(get-snapshot-version)
           git fetch origin
           if [ $(git tag -l "${RELEASE_TAG}") ]; then
             echo "tag ${RELEASE_TAG} already exists. not tagging"
           else
             git tag "${RELEASE_TAG}"
             git push origin "${RELEASE_TAG}"
           fi
           if [[ << pipeline.parameters.mark-for-devnet >> == true ]]; then
             # This is a mutating tag pointing to the most recent
             # valid build for DevNet, and therefore the next build
             # to go to DevNet.
             git tag --force devnet-next
             git push --force origin devnet-next
           elif [[ << pipeline.parameters.mark-for-devnet-if-unmarked >> == true ]] &&
             ! [ $(git tag -l devnet-next) ]
           then
             git tag devnet-next
             git push origin devnet-next
           fi
      - collect_test_timings_and_send_to_datadog

  docker_images_build:
    machine:
      image: ubuntu-2004:2023.04.2
    resource_class: xlarge
    environment:
      <<: *env
    steps:
      - checkout
      - record_job_start_time
      - restore_frontend_builds
      - setup_sbt_test_job
      - run_bash_command_in_nix:
         cmd_name: Build app
         cmd: make build -j
         cmd_retry_count: 5 # Retry in case of dependency download errors
         additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD"
      - docker_login_artifactory
      - docker_build
      - save_frontend_builds
      - cleanup_sbt_test_job
      - collect_test_timings_and_send_to_datadog

  wait_for_previous_pipeline:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to wait for.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
    steps:
      - checkout
      - run:
          name: "Wait for previous pipeline"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh << pipeline.number >> "<< parameters.workflow_names >>" \
              "<< parameters.branch_filter >>" "<< parameters.branch_filter_is_regex >>" "<< parameters.branch_ignores >>" \
              << parameters.max_pipeline_age_secs >> wait

  cancel_if_previous_pipeline:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to check if they exist and cancel current workflow if so.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
    steps:
      - checkout
      - run:
          name: "Cancel if previous pipeline"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh << pipeline.number >> "<< parameters.workflow_names >>" \
              "<< parameters.branch_filter >>" "<< parameters.branch_filter_is_regex >>" "<< parameters.branch_ignores >>" \
              << parameters.max_pipeline_age_secs >> cancel_self

  cancel_previous_pipelines:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to cancel if they exist.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: ""
      branch_filter_is_regex:
        type: boolean
        default: false
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
    steps:
      - checkout
      - run:
          name: "Cancel previous pipelines"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh << pipeline.number >> "<< parameters.workflow_names >>" \
              "<< parameters.branch_filter >>" "<< parameters.branch_filter_is_regex >>" "<< parameters.branch_ignores >>" \
              << parameters.max_pipeline_age_secs >> cancel_pipeline

  preflight_check:
    parameters:
      <<: *cluster-parameter
      channel_notify:
        type: string
        # #team-canton-network-internal-ci
        default: C05DT77QF5M
      test_names_file:
        type: string
        default: "test-full-class-names-core-preflight.log"
      parallelism:
        type: integer
        default: 3
      wait_for_sv:
        type: boolean
        default: true
      wait_for_cluster_version:
        type: boolean
        default: true
      cluster_version:
        type: string
        default: ""
    machine:
      image: ubuntu-2004:2023.04.2
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: << parameters.parallelism >>
    steps:
      - checkout
      - record_job_start_time
      - run:
          # necessary for npm/webpack dev server launched in start-frontends.sh later
          # https://webpack.js.org/configuration/watch/#not-enough-watchers
          name: Set inotify fs watch
          command: |
            echo "Checking watch info..."
            sysctl fs.inotify
            echo "Setting max_user_watches..."
            echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p
      - setup_vpn
      # Needs to occur before setup_vpn_routes
      - setup_nix
      - when:
          condition: << parameters.cluster_version >>
          steps:
            - run_bash_command_in_nix:
                cmd_name: Checkout commit << parameters.cluster_version >>
                cmd: git checkout << parameters.cluster_version >>
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Activate cluster (configure kubectl)
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: cncluster activate
          cmd_retry_count: 5
      # TODO(#6630): bundle all these restores into a command, consider merging with setup_sbt_test_job
      - restore_sbt_cache
      - restore_precompiled_classes
      - restore_frontend_node_modules
      - restore_daml_artifacts
      - execute_sbt_command:
          cmd: "Test/compile"
          # TODO(#6153): we bumped this up to allow nix to rebuild everything if needed.
          # Instead, we should fetch the correct nix cache and avoid those rebuilds
          no_output_timeout: "20m"
          cmd_retry_count: 3
      - split_tests_for_parallel_run:
          test_names_file: << parameters.test_names_file >>
      - run_bash_command_in_nix:
          cmd_name: wait for deployment to finish
          cluster: << parameters.cluster >>
          cmd: |
            if [[ << parameters.wait_for_cluster_version >> == true ]]; then
              VERSION=$(get-snapshot-version)
              cncluster wait_version $VERSION
            fi
            # We use readiness of validator-app in all namespaces as an approximation to the cluster's readiness
            cncluster wait validator1 validator-app
            cncluster wait splitwell validator-app
            cncluster wait sv-1 validator-app
            # note that ["${IS_DEVNET-}" = true] is not equivalent when IS_DEVNET is not defined
            if [[ "${IS_DEVNET-}" != false ]]; then
              cncluster wait sv-2 validator-app
              cncluster wait sv-3 validator-app
              cncluster wait sv-4 validator-app
            fi
            if [[ << parameters.wait_for_sv >> == true && ( "${APPROVE_SV_RUNBOOK-}" = true || "${IS_DEVNET-}" != false ) ]]; then
              cncluster wait sv validator-app
            fi
            echo "Done waiting. All pods in the cluster are:"
            kubectl get pods -A
      - execute_sbt_command:
          pre_sbt_cmd: |
            set -eou pipefail
            . cluster/deployment/<< parameters.cluster >>/.envrc.vars
            NETWORK_APPS_ADDRESS="${GCP_CLUSTER_BASENAME}.network.canton.global" ./start-frontends.sh -d -v -p
          cmd: "\"$RUN_SPLITTED_TESTS_CMD\""
          post_sbt_cmd: ./stop-frontends.sh
          additional_nix_args: "--keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET --keep SV_DEV_NET_WEB_UI_PASSWORD --keep SV_WEB_UI_PASSWORD --keep VALIDATOR_WEB_UI_PASSWORD --keep GCP_DATA_DUMP_BUCKET_SERVICE_ACCOUNT_CREDENTIALS --keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          extra_env_vars: POSTGRES_DB=postgres DOMAIN_URL=https://sequencer.sv-1.svc.${GCP_CLUSTER_BASENAME}.network.canton.global NETWORK_APPS_ADDRESS=${GCP_CLUSTER_BASENAME}.network.canton.global NETWORK_APPS_ADDRESS_PROTOCOL=https VALIDATOR_USER_NAME="auto_preflight"
          extra_parameters: -DAUTH0_TENANT=dev
          timeout: "15m"
          cmd_retry_count: 3
          # retry if VPN got disconnected (approximated by trying to fetch docs from the cluster.
          # Note that this is expected to succeed even if the cluster deployment is down, because it fetches only the http->https redirect anyway)
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_BASENAME}.network.canton.global; then echo "false"; else echo "true"; fi)
          cluster: << parameters.cluster >>
          cmd_before_retry: |
            echo "Test failed, but VPN connection seems to have died, restarting VPN and retrying..."

            ./stop-frontends.sh

            /tmp/vpn-scripts/stop-vpn.sh

            echo "Starting VPN..." | tee -a /var/log/vpn.log
            /tmp/vpn-scripts/connect-vpn.expect $VPN_HOST_NAME $VPN_USER $VPN_PASSWORD &

            echo "Waiting for VPN to reconnect"
            /tmp/vpn-scripts/wait-for-vpn-and-del-default-route.sh

            echo "Authenticating to cluster again"
            export KUBECONFIG=$PWD/.kubecfg
            cncluster activate

            echo "Setting VPN routes again"
            . cluster/deployment/<< parameters.cluster >>/.envrc.vars
            /tmp/vpn-scripts/setup-vpn-routes.sh
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - cleanup_sbt_test_job
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
          channel_notify: << parameters.channel_notify >>
      - collect_test_timings_and_send_to_datadog
      - store_artifacts:
          name: Upload vpn log
          path: /var/log/vpn.log

  preflight_sv_check:
