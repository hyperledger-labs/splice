          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Reset validator runbook
          cluster: << parameters.cluster >>
          gce_authenticate: true
          cmd: |
            cncluster activate
            if [[ << parameters.silence_deployment_alerts >> == true ]]; then
              # silence specific alerts that may fire due to reset downtime
              cncluster silence_grafana_alerts "20 minutes" -f "$REPO_ROOT/.circleci/silences/deployment_grafana.json"
            fi
            cncluster ci_pdown_validator
          cmd_retry_count: 3
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>

  deploy_validator_to_recover_sv_amulets:
    executor: self_hosted
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      use_published_artifacts:
        type: boolean
        default: false
      restore_cluster:
        type: boolean
        default: false
      reset_cluster:
        type: boolean
        default: true
      validator_party_hint:
        type: string
        default: ""
      validator_new_participant_id:
        type: string
        default: ""
      restore_identity_from_sv_runbook:
        type: boolean
        default: false
      deploy_retry_count:
        type: integer
        default: 2
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - when:
          condition:
            and:
              - equal: [ true, <<pipeline.parameters.reset-before-deploy>> ]
              - equal: [ true, <<parameters.reset_cluster>> ]
          steps:
            - run_bash_command_in_nix:
                cmd_name: Reset Validator runbook
                cluster: << parameters.cluster >>
                gce_authenticate: true
                cmd: |
                  cncluster activate
                  cncluster ci_pdown_validator
      - run_bash_command_in_nix:
          cmd_name: Apply Validator runbook Kubernetes manifest to cluster
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID \
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET \
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID \
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET \
            --keep ARTIFACTORY_USER \
            --keep ARTIFACTORY_PASSWORD
            --keep CIRCLECI_TOKEN \
            --keep CIRCLE_WORKFLOW_ID \
            --keep SLACK_ACCESS_TOKEN \
            --keep CIRCLE_BUILD_URL"
          gce_authenticate: true
          cmd_retry_count: << parameters.deploy_retry_count >>

          cmd: |
            VERSION=""
            if [[ << parameters.use_published_artifacts >> == true ]]; then
              VERSION=$(get-snapshot-version)
            fi

            if [[ -n '<< parameters.validator_party_hint >>' ]]; then
              echo "setting validator party hint << parameters.validator_party_hint >>"
              export VALIDATOR_PARTY_HINT='<< parameters.validator_party_hint >>'
            fi
            if [[ -n '<< parameters.validator_new_participant_id >>' ]]; then
              echo "using validator new participant id << parameters.validator_new_participant_id >>"
              export VALIDATOR_NEW_PARTICIPANT_ID='<< parameters.validator_new_participant_id >>'
              export VALIDATOR_MIGRATE_PARTY='true'
            fi
            if [[ << parameters.restore_identity_from_sv_runbook >> == true ]]; then
              echo "restoring identity from sv runbook"
              token=$(cncluster get_token sv validator)
              id=$(curl -s "https://wallet.sv.${GCP_CLUSTER_HOSTNAME}/api/validator/v0/admin/participant/identities" -H "authorization: Bearer ${token}")
              echo "$id" > id.json
              export PARTICIPANT_IDENTITIES_FILE=$(readlink -f id.json)
            fi

            cncluster activate

            # TODO(#12776): remove this once the flow is more robust to ACS changes
            # TODO(#11769): if we activate alerting on ciperiodic we might want to add a silencing here
            echo "scaling down validator1 to prevent it from tainting the SV party's ACS"
            kubectl scale deployment --replicas=0 -n validator1 validator-app

            cncluster ci_apply_validator $VERSION

            echo "scaling validator1 back up"
            kubectl scale deployment --replicas=1 -n validator1 validator-app
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>

  # We want to run our Scala tests with parallelism and therefore put them in their own job with no other tests in it;
  # work on anything but the Scala tests is duplicated across all parallel runs of this job
  scala_test:
    machine:
      image: ubuntu-2204:2024.01.1
    parameters:
      test_names_file:
        type: string
      start_canton_options:
        type: string
      pre_sbt_cmd:
        type: string
        default: ""
      post_sbt_cmd:
        type: string
        default: ""
      parallelism:
        type: integer
      resource_class:
        type: string
      skip_if_regex:
        type: string
        default: ""
      skip_if_files_changed:
        type: string
        default: ""
      with_shared_gcp:
        type: boolean
        default: false
      with_docker_images:
        type: boolean
        default: false
      additional_nix_args:
        type: string
        default: ""
    resource_class: << parameters.resource_class >>
    environment:
      <<: *env
      POSTGRES_HOST: localhost
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: << parameters.parallelism >>
    steps:
      - checkout_with_retry
      - when:
          condition:
            not:
              equal: [ "", "<< parameters.skip_if_regex >>" ]
          steps:
            - run:
                name: Checking git commit against regex << parameters.skip_if_regex >>
                command: |
                  base=$(build-tools/get-latest-main-commit)
                  msg=$(git log "$base"..HEAD --pretty=%B)
                  if [[ $msg =~ << parameters.skip_if_regex >> ]]; then
                    echo "Commit message ($msg) matches regex (<< parameters.skip_if_regex >>), breaking"
                    circleci-agent step halt
                  fi
      - when:
          condition:
            not:
              equal: [ "", "<< parameters.skip_if_files_changed >>" ]
          steps:
            - run:
                name: "Checking changed files against list: << parameters.skip_if_files_changed >>"
                command: |
                  latest_release=$(cat "LATEST_RELEASE")
                  base=$(git rev-parse heads/origin/release-line-"${latest_release}")
                  changed=$(git diff --name-only $base -- << parameters.skip_if_files_changed >>)
                  if [ -n "$changed" ]; then
                    echo "Lock files changed ($changed), breaking"
                    circleci-agent step halt
                  fi
      - setup_nix
      - docker_prep_build
      # Used to pull docker images for cometbft
      - docker_login_artifactory
      - docker_pull_test_images
      # Start canton before compiling, as it takes a long time to start
      # Note that we start canton before connecting VPN, so some initial
      # metrics from Canton will be lost. Currently, they're Canton metrics
      # before our actual tests start are not of interest for us,
      # so we accept that.
      - start_canton_in_background:
          start_canton_options: << parameters.start_canton_options >>
      - setup_sbt_test_job:
          runner_type: "circleci"
      - when:
          condition:
            equal: [ true, "<< parameters.with_shared_gcp >>" ]
          steps:
            run_bash_command_in_nix:
              cmd_name: "Authenticate to shared GCP project"
              additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY"
              cmd: |
                echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
      - when:
          condition:
            equal: [ true, "<< parameters.with_docker_images >>" ]
          steps:
            - run_bash_command_in_nix:
                cmd_name: Build app
                cmd: make build -j
                cmd_retry_count: 5 # Retry in case of dependency download errors
                additional_nix_args: "--keep ARTIFACTORY_USER \
                  --keep ARTIFACTORY_PASSWORD"
            - docker_build
      - split_tests_for_parallel_run:
          test_names_file: << parameters.test_names_file >>
      - run_splitted_scala_tests:
          pre_sbt_cmd: << parameters.pre_sbt_cmd >>
          post_sbt_cmd: << parameters.post_sbt_cmd >>
          start_canton_options: << parameters.start_canton_options >>
          additional_nix_args: << parameters.additional_nix_args >>
      - stop_canton
      - save_sbt_job_result:
          runner_type: "circleci"
  # We want to run our Scala tests with parallelism and therefore put them in their own job with no other tests in it;
  # work on anything but the Scala tests is duplicated across all parallel runs of this job
  scala_test_self_hosted:
    executor: self_hosted_large
    parameters:
      test_names_file:
        type: string
      start_canton_options:
        type: string
      pre_sbt_cmd:
        type: string
        default: ""
      post_sbt_cmd:
        type: string
        default: ""
      parallelism:
        type: integer
      skip_if_regex:
        type: string
        default: ""
      skip_if_files_changed:
        type: string
        default: ""
      with_shared_gcp:
        type: boolean
        default: false
      additional_nix_args:
        type: string
        default: ""
    environment:
      <<: *env
      POSTGRES_HOST: localhost
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    parallelism: << parameters.parallelism >>
    steps:
      - checkout_with_retry
      - when:
          condition:
            not:
              equal: [ "", "<< parameters.skip_if_regex >>" ]
          steps:
            - run:
                name: Checking git commit against regex << parameters.skip_if_regex >>
                command: |
                  base=$(build-tools/get-latest-main-commit)
                  msg=$(git log "$base"..HEAD --pretty=%B)
                  if [[ $msg =~ << parameters.skip_if_regex >> ]]; then
                    echo "Commit message ($msg) matches regex (<< parameters.skip_if_regex >>), breaking"
                    circleci-agent step halt
                  fi
      - when:
          condition:
            not:
              equal: [ "", "<< parameters.skip_if_files_changed >>" ]
          steps:
            - run:
                name: "Checking changed files against list: << parameters.skip_if_files_changed >>"
                command: |
                  latest_release=$(cat "LATEST_RELEASE")
                  base=$(git rev-parse heads/origin/release-line-"${latest_release}")
                  changed=$(git diff --name-only $base -- << parameters.skip_if_files_changed >>)
                  if [ -n "$changed" ]; then
                    echo "Lock files changed ($changed), breaking"
                    circleci-agent step halt
                  fi
      - run:
          name: "Prepare postgres"
          command: |
            sudo mkdir -p /run/postgresql
            sudo chown $USER /run/postgresql
      - setup_nix_self_hosted
      - start_canton_in_background:
          start_canton_options: << parameters.start_canton_options >> -p local
      - setup_sbt_test_job:
          runner_type: "selfhosted"
      - when:
          condition:
            equal: [ true, "<< parameters.with_shared_gcp >>" ]
          steps:
            run_bash_command_in_nix:
              cmd_name: "Authenticate to shared GCP project"
              additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY"
              cmd: |
                echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
      - split_tests_for_parallel_run:
          test_names_file: << parameters.test_names_file >>
      - run_splitted_scala_tests:
          pre_sbt_cmd: << parameters.pre_sbt_cmd >>
          post_sbt_cmd: << parameters.post_sbt_cmd >>
          start_canton_options: << parameters.start_canton_options >>
          additional_nix_args: << parameters.additional_nix_args >>
      - stop_canton
      - save_sbt_job_result:
          runner_type: "selfhosted"

workflows:
  version: 2

  publish_public_artifacts:
    when:
      equal: [ publish-public-artifacts, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - publish_public_release:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - artifacts_push
      - create_oss_pr:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context

  build:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_previous_pipelines:
          <<: *notify-fail
          context:
            - slack-context
          workflow_names: "build"
          branch_filter: "$CIRCLE_BRANCH"
          # cannot use a simple CCI branch filter for the job since this job is a dependency for all the other jobs in this workflow
          # and cannot be skipped
          branch_ignores: "^(main|deployment/.*|release-line.*)$"
          max_pipeline_age_secs: 7776000  # 90 days which is the max that the CCI API allows for pipeline cancellation
      - cancel_if_not_opt_in:
          <<: *notify-fail
          filters:
            branches:
              ignore:
                - /release-line-.*/
                - main
      # Linting and formatting
      - static_tests:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      # Daml
      - daml_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      # Scala
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test wall clock time"
          test_names_file: "test-full-class-names.log"
          start_canton_options: "-w -f -m"
          resource_class: "xlarge"
          # TODO(#10912) Investigate why things got slower
          parallelism: 11
      - scala_test_self_hosted:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          name: "scala_test resource intensive"
          test_names_file: "test-full-class-names-resource-intensive.log"
          start_canton_options: "-w"
          parallelism: 2
      - scala_test_self_hosted:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          name: "scala_test sim time"
          test_names_file: "test-full-class-names-sim-time.log"
          start_canton_options: "-s"
          parallelism: 5
      - scala_test_self_hosted:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          name: "scala_test record time tolerance"
          test_names_file: "test-full-class-names-record-time-tolerance.log"
          start_canton_options: "-s"
          parallelism: 1
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test frontend wall clock time"
          test_names_file: "test-full-class-names-frontend.log"
          start_canton_options: "-w -m"
          pre_sbt_cmd: "./start-frontends.sh -d -s"
          post_sbt_cmd: "./stop-frontends.sh"
          resource_class: "2xlarge"
          parallelism: 4
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test frontend sim time"
          test_names_file: "test-full-class-names-frontend-sim-time.log"
          start_canton_options: "-s"
          pre_sbt_cmd: "./start-frontends.sh -d -s"
          post_sbt_cmd: "./stop-frontends.sh"
          resource_class: "xlarge"
          parallelism: 1
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test frontend app manager"
          test_names_file: "test-full-class-names-frontend-app-manager.log"
          start_canton_options: "-w"
          pre_sbt_cmd: "./start-frontends.sh -d -s -m"
          post_sbt_cmd: "./stop-frontends.sh"
          resource_class: "xlarge"
          parallelism: 1
      - scala_test_self_hosted:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          name: "scala_test global upgrade"
          test_names_file: "test-full-class-names-global-soft-migration.log"
          start_canton_options: "-w -g"
          parallelism: 1
      - scala_test_self_hosted:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          name: "scala_test global upgrade topology"
          test_names_file: "test-full-class-names-global-soft-migration-topology.log"
          start_canton_options: "-w --soft-domain-migration"
          parallelism: 1
      - scala_test_self_hosted:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          name: "scala_test disaster recovery"
          test_names_file: "test-full-class-names-disaster-recovery.log"
          start_canton_options: "-w"
          parallelism: 1
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test app upgrade"
          test_names_file: "test-full-class-names-app-upgrade.log"
          start_canton_options: "-w"
          resource_class: "xlarge"
          parallelism: 1
          pre_sbt_cmd: "export CI_IGNORE_DIRTY_REPO=1; ./build-tools/prep-app-upgrade-test"
          skip_if_regex: "\\[breaking\\]"
          skip_if_files_changed: "nix/canton-sources.json"
          with_shared_gcp: true
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test with docker images"
          test_names_file: "test-full-class-names-docker-based.log"
          start_canton_options: "-w -m"
          additional_nix_args: >
            --keep VALIDATOR_WEB_UI_PASSWORD
            --keep OIDC_AUTHORITY_VALIDATOR_AUDIENCE
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
          with_docker_images: true
          resource_class: "xlarge"
          parallelism: 2
      - ui_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - bundle:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      # Ops
      - update_pipeline_schedule:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - deployment_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - docker_images_build:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - notify_on_readme_changed:
          <<: *main-branch-only
          context:
            - slack-context
          channel_notify: C03J6NCPSE4
      - build_oss:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context

  deploy_cidaily:
    when:
      equal: [ deploy-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - artifacts_push:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily cidaily_health_check redeploy_validator_runbook_cidaily redeploy_sv_runbook_cidaily backup_cidaily restore_sv_cidaily restore_validator_cidaily"
      - reset_cluster:
          cluster: "cidaily"
          silence_deployment_alerts: true
          context:
            - artifactory
            - slack-context
          requires:
            - wait_for_previous_pipeline
      - deploy_cluster:
          name: deploy_cluster_cidaily
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily"
          requires:
            - artifacts_push
            - reset_cluster
      - preflight_check:
          cluster: "cidaily"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          wait_for_sv: false
          # Order: deploy_cluster->preflight_check->publish_public_release->deploy_sv_runbook->preflight_sv_check
          requires:
            - artifacts_push
            - deploy_cluster_cidaily
      - publish_public_release:
          <<: *main-branch-only
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - preflight_check
      - create_oss_pr:
          <<: *main-branch-only
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - preflight_check
      - deploy_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "cidaily"
          use_published_artifacts: true
          requires:
            - deploy_cluster_cidaily
            - publish_public_release
      - deploy_validator_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily"
          use_published_artifacts: true
          requires:
            - deploy_cluster_cidaily
            - publish_public_release
      - preflight_sv_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cidaily"
          requires:
            - deploy_sv_runbook
      - preflight_validator_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cidaily"
          requires:
            - deploy_validator_runbook
      - backup_cluster:
          name: backup_cidaily
          <<: *main-branch-only
          cluster: "cidaily"
          migration_id: 0
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster_cidaily

  cidaily_health_check:
    when:
      equal: [ healthcheck-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Only wait for sv runbook deployments and for backup-recovery, concurrent preflight checks are fine.
          workflow_names: "redeploy_sv_runbook_cidaily redeploy_validator_runbook_cidaily deploy-cidaily"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Cancel health check if any deploy is running as it's redundant to run it (they are run as part of the deployment)
          # It doesn't make sense to run it as there are high chances that the old version pre-flights will fail on the new deployment
          workflow_names: "deploy_cidaily"
      - cancel_if_previous_pipeline:
          name: skip_during_catchup
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          # Skip healthchecks for 60 minutes after starting an sv/validator node restore from backup.
          # ATM, some tests are expected to fail while an SV is catching up, others are prone to failure.
          max_pipeline_age_secs: 3600
          workflow_names: "restore_sv_cidaily restore_validator_cidaily"
          only_if_running: false
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cidaily
          cluster: "cidaily"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline
            - cancel_if_previous_pipeline
            - skip_during_catchup

  redeploy_sv_runbook_cidaily:
    when:
      equal: [ redeploy-sv-runbook-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily redeploy_validator_runbook_cidaily redeploy_sv_runbook_cidaily cidaily_health_check restore_sv_cidaily restore_validator_cidaily"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
