# Scala CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/sample-config/ for more details
#
version: 2.1
orbs:
  slack: circleci/slack@4.9.3

env: &env
  TERM: dumb
  CI: "true"
  USER: circleci

notify-fail: &notify-fail
  context: slack-context
  post-steps:
  - slack/notify:
      branch_pattern: main
      event: fail
      template: basic_fail_1

main-branch-only: &main-branch-only
  filters:
    branches:
      only:
         - main

commands:
  setup_nix:
    description: Set up Nix
    steps:
    - run:
        name: make_cache_key
        command: |
          set -euo pipefail
          git log -n1 --format=%H nix shell.nix > /tmp/nix-cache-key
          sudo mkdir /nix
          sudo chown $USER /nix
    - restore_cache:
        keys:
        - nix-{{ checksum "/tmp/nix-cache-key" }}
    - run:
       name: setup_nix
       command: |
         set -euo pipefail
         if [ -f ~/.config/nix/nix.conf ]; then
             exit 0
         fi
         # Disabling sandbox because:
         # 1. It doesn't work on CircleCI (sethostname is not allowed)
         # 2. We don't plan to build anything, so the risk is fairly low
         mkdir -p ~/.config/nix
         echo 'sandbox = false' >> ~/.config/nix/nix.conf
         sh <(curl -fsSL https://nixos.org/nix/install) --no-daemon
         . /home/circleci/.nix-profile/etc/profile.d/nix.sh
         nix-shell shell.nix --run 'echo "Done loading all packages."'
    - save_cache:
        key: nix-{{ checksum "/tmp/nix-cache-key" }}
        paths:
        - /nix
        - /home/circleci/.nix-profile
        - /home/circleci/.nix-channels
        - /home/circleci/.nix-defexpr
        - /home/circleci/.config/nix

  # Largely copied from Canton's CI definition
  execute_sbt_command:
    description: |
      A context within which SBT commands can be run correctly for our needs
    parameters:
      cmd:
        # This may contain several commands.
        # The caller needs to quote commands that contain spaces, e.g. "\"testOnly myTest\"".
        type: string
      timeout:
        type: string
        default: "25m"
      succeed_on_error:
        # Will cause the command to always succeed regardless of the sbt exit code.
        type: boolean
        default: false
      retry_fetch:
        # If true, will send a few \r\n to sbt to ensure we download dependencies
        type: string
        default: "0"
      extra_parameters:
        type: string
        default: ""
      with_authentication:
        type: boolean
        default: false
      pre_sbt_cmd:
        type: string
        default: ""
      post_sbt_cmd:
        type: string
        default: ""
    steps:
      - run_bash_command_in_nix:
          cmd_name: Executing "sbt << parameters.cmd >>"
          with_authentication: << parameters.with_authentication >>
          cmd: |
            on_exit() {
              local CODE="$?"
              # Provide some explanation on exit
              if [ "$CODE" == 0 ]
              then
                echo "sbt terminated successfully."
              elif [ "$CODE" == 124 ]
              then
                echo "sbt has been aborted with the TERM signal after << parameters.timeout >>."
              elif [ "$CODE" == 137 ]
              then
                echo "sbt has been killed because it has allocated too much memory or it has ignored the TERM signal after << parameters.timeout >>."
              else
                echo "sbt failed with exit code $CODE."
              fi
              <<# parameters.succeed_on_error >>
              echo "Overriding original exit code $CODE with zero."
              exit 0
              <</ parameters.succeed_on_error >>
            }
            trap on_exit EXIT

            set -euo pipefail
            # Necessary for tests of the REPL
            export TERM=dumb

            run_sbt() {
               # Define sbt command
               SBT_CMD=(sbt -verbose)


               # Add extra parameters
               SBT_CMD+=(<< parameters.extra_parameters >>)

               # Add sbt commands.
               # Do not quote this, to allow the caller to pass in several commands.
               # The caller needs to take care of quoting, if a command contains spaces.
               SBT_CMD+=(<< parameters.cmd >>)

               # Setup heap size; corresponds to Canton large executors
               SBT_CMD+=("-J-Xmx5000M" "-J-Xms5000M")
               # Run command
               # also send a few newline characters to sbt to ensure we keep on downloading dependencies
               python3 -c "print ('r\n'*<< parameters.retry_fetch >>)" |
                 timeout --kill-after=30s << parameters.timeout >> "${SBT_CMD[@]}" 2>&1 |
                 tee sbt_output
            }
            << parameters.pre_sbt_cmd >>
            run_sbt
            << parameters.post_sbt_cmd >>

  run_bash_command_in_nix:
    parameters:
      cmd:
        type: string
      cmd_name:
        type: string
        default: "Executing bash command << parameters.cmd >> in the nix shell"
      with_authentication:
        type: boolean
        default: false
      additional_nix_args:
        type: string
        default: ""
    steps:
      - run:
          name: << parameters.cmd_name >>
          command: |
            set -euo pipefail
            . /home/circleci/.nix-profile/etc/profile.d/nix.sh
            ADDITIONAL_NIX_ARGS="<< parameters.additional_nix_args >>"

            if [[ << parameters.with_authentication >> == true ]]; then
              ADDITIONAL_NIX_ARGS+="--keep GCP_DA_CN_DEVNET_KEY"
            fi

            nix-shell shell.nix \
              --pure \
              --keep CI $ADDITIONAL_NIX_ARGS \
              --run bash \<<'EOF'
              set -euo pipefail
              . .envrc.vars

              if [[ << parameters.with_authentication >> == true ]]; then
                . $REPO_ROOT/deployment/devnet/.envrc.vars
                echo $GCP_DA_CN_DEVNET_KEY | gcloud auth activate-service-account --key-file=-
              fi

              << parameters.cmd >>

            EOF


  cleanup_test_job:
    steps:
      - upload_test_reports
      - run: # Pack logfiles to speedup downloads.
          name: Pack Logfiles
          when: always
          command: |
            if [[ -d log ]]; then
              gzip -r log/*
            fi
      - store_artifacts:
          name: Store test logs as artifacts (if any)
          path: log
          destination: log


  upload_test_reports:
    steps:
      - run:
          when: always
          name: Group test reports by subproject
          command: |
            for subproject in `find . -path "*/target/test-reports" | sed -e 's/^\.\///' -e 's/\/target\/test-reports$//'`
            do
              mkdir -p test-reports/"$subproject"
              # Keep going, if there is no test report.
              cp -v "$subproject"/target/test-reports/TEST-*.xml test-reports/"$subproject" || true
            done
      - store_test_results:
          path: test-reports



parameters:
  sdk-version:
    type: string
    default: "2.4.0-snapshot.20220801.10312.0.d2c7be9d" # sdk-version
  run-schedule:
    type: boolean
    default: false

jobs:

  test:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - execute_sbt_command:
          # Moved to the front to give quick feedback before starting the lengthy compile
          cmd: "protobufLint"
          retry_fetch: "50"
      - execute_sbt_command:
          cmd: "Test/compile"
          retry_fetch: "50"
      - execute_sbt_command:
          # run all tests except the live cluster ones
          pre_sbt_cmd: ./start-canton.sh
          cmd: "\"testOnly * -- -l LiveDevNetTest\""
          post_sbt_cmd: ./stop-canton.sh
          timeout: "10m"
      - execute_sbt_command:
          cmd: "damlTest"
          timeout: "10m"
      - cleanup_test_job

  bundle:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - execute_sbt_command:
          cmd: "bundle"
          retry_fetch: "50"
      - run:
          name: copy bundle
          command: |
            set -eou pipefail
            mkdir -p /tmp/artifacts
            cp apps/app/target/release/*.tar.gz /tmp/artifacts
      - store_artifacts:
          path: /tmp/artifacts
          destination: release-artifacts

  deployment_test:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: deployment test
         cmd: make test

  deploy_cluster:
    circleci_ip_ranges: true
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    steps:
      - checkout
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: apply cluster manifest
         with_authentication: true
         cmd: |
           cncluster activate
           (yes || true) | cncluster apply
      - slack/notify:
          event: pass
          template: success_tagged_deploy_1

  preflight_check:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    steps:
      - checkout
      - setup_nix
      - execute_sbt_command:
          cmd: "Test/compile"
          retry_fetch: "50"
      - execute_sbt_command:
          cmd: "\"testOnly *RunbookIntegrationTest\""
          timeout: "10m"
          with_authentication: true
      - slack/notify:
          event: pass
          branch_pattern: main
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "plain_text",
                      "text": "Pre-flight validator check succeeded! :dart:",
                      "emoji": true
                    }
                  ]
                }
              ]
            }
      - cleanup_test_job

  update_pipeline_schedule:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - run:
         name: update pipeline schedule
         command: |
           set -euo pipefail

           . .envrc.vars
           .circleci/setup-pipeline.sh

  upgrading_coin:
    docker:
    - image: eclipse-temurin:11
    environment:
      <<: *env
      SDK_VERSION: << pipeline.parameters.sdk-version >>
    steps:
      - checkout
      - run:
          name: install deps
          command: |
            set -eou pipefail
            curl https://get.daml.com | sh -s $SDK_VERSION
            printf "auto-install: false\nupdate-check: never\n" >> $HOME/.daml/daml-config.yaml
            apt-get update && apt-get install -y make
      - run:
         name: make all
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach1
           make all
      - run:
         name: make test
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach1
           make test

  upgrading_coin_2:
    docker:
    - image: eclipse-temurin:11
    environment:
      <<: *env
      SDK_VERSION: << pipeline.parameters.sdk-version >>
    steps:
      - checkout
      - run:
          name: install deps
          command: |
            set -eou pipefail
            curl https://get.daml.com | sh -s $SDK_VERSION
            printf "auto-install: false\nupdate-check: never\n" >> $HOME/.daml/daml-config.yaml
            apt-get update && apt-get install -y make
      - run:
         name: make all
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach2
           make all
      - run:
         name: make test
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach2
           make test-cc

  docs:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: build
         cmd: |
           cd docs
           make html

  docker-images-push:
    machine:
      image: ubuntu-2004:202010-01
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: build images
         additional_nix_args: "--keep DOCKER_CERT_PATH \
                              --keep DOCKER_HOST \
                              --keep DOCKER_MACHINE_NAME \
                              --keep DOCKER_TLS_VERIFY \
                              --keep NO_PROXY"
         cmd: make docker-build


      - run_bash_command_in_nix:
         cmd_name: push images
         additional_nix_args: "--keep GCP_DA_CN_IMAGES_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: |
           (yes || true) | gcloud auth configure-docker us-central1-docker.pkg.dev
           make docker-push


workflows:
  version: 2
  build:
    when:
      not: << pipeline.parameters.run-schedule >>
    jobs:
    - upgrading_coin:
        <<: *notify-fail
    - upgrading_coin_2:
        <<: *notify-fail
    # Documentation
    - docs:
        <<: *notify-fail
    # Scala
    - test:
        <<: *notify-fail
    - bundle:
        <<: *notify-fail
    # Ops
    - update_pipeline_schedule:
        <<: *notify-fail
        <<: *main-branch-only
    - deployment_test:
        <<: *notify-fail

  deploy:
    when: << pipeline.parameters.run-schedule >>
    jobs:
    # Deployment
    - docker-images-push:
        <<: *notify-fail
        <<: *main-branch-only
    - deployment_test:
        <<: *notify-fail
        <<: *main-branch-only
    - deploy_cluster:
        <<: *notify-fail
        <<: *main-branch-only
        requires:
           - deployment_test
           - docker-images-push
    - preflight_check:
        <<: *notify-fail
        <<: *main-branch-only
        requires:
          - deployment_test
          - docker-images-push
          - deploy_cluster

  manual_preflight_check:
    jobs:
      - click_to_run_workflow:
          type: approval
      - preflight_check:
          requires:
            - click_to_run_workflow
