  bundle:
    docker:
      - image: cimg/base:2024.01
    resource_class: xlarge
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "update"
          cmd_retry_count: 3
      - execute_sbt_command:
          cmd: "Test/compile bundle"
      - run:
          name: Copy bundle
          command: |
            set -eou pipefail
            mkdir -p /tmp/artifacts
            cp apps/app/target/release/*.tar.gz /tmp/artifacts
      - run:
          name: Copy OpenAPI specs
          command: |
            set -eou pipefail
            .circleci/copy-openapi.sh
      - store_artifacts:
          path: /tmp/artifacts
          destination: release-artifacts
      - run_bash_command_in_nix:
         cmd_name: Publish release bundles
         additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY"
         cmd: |
           echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
           export GOOGLE_CLOUD_PROJECT=da-cn-shared
           VERSION=$(get-snapshot-version)
           (cd /tmp/artifacts ; for filename in *.tar.gz; do mv "$filename" "${VERSION}_${filename}"; done)
           gsutil cp -n /tmp/artifacts/*.tar.gz gs://cn-release-bundles
      - cleanup_sbt_test_job:
          upload_caches: true

  deployment_test:
