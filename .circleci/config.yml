# Scala CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/sample-config/ for more details
#
version: 2.1
orbs:
  slack: circleci/slack@4.9.3

env: &env
  TERM: dumb
  CI: "true"
  USER: circleci

notify-fail: &notify-fail
  context: slack-context
  post-steps:
  - slack/notify:
      branch_pattern: main
      event: fail
      template: basic_fail_1

commands:
  setup_nix:
    description: Set up Nix
    steps:
    - run:
        name: make_cache_key
        command: |
          set -euo pipefail
          git log -n1 --format=%H nix shell.nix > /tmp/nix-cache-key
          sudo mkdir /nix
          sudo chown $USER /nix
    - restore_cache:
        keys:
        - nix-{{ checksum "/tmp/nix-cache-key" }}
    - run:
       name: setup_nix
       command: |
         set -euo pipefail
         if [ -f ~/.config/nix/nix.conf ]; then
             exit 0
         fi
         # Disabling sandbox because:
         # 1. It doesn't work on CircleCI (sethostname is not allowed)
         # 2. We don't plan to build anything, so the risk is fairly low
         mkdir -p ~/.config/nix
         echo 'sandbox = false' >> ~/.config/nix/nix.conf
         sh <(curl -fsSL https://nixos.org/nix/install) --no-daemon
         . /home/circleci/.nix-profile/etc/profile.d/nix.sh
         nix-shell shell.nix --run 'echo "Done loading all packages."'
    - save_cache:
        key: nix-{{ checksum "/tmp/nix-cache-key" }}
        paths:
        - /nix
        - /home/circleci/.nix-profile
        - /home/circleci/.nix-channels
        - /home/circleci/.nix-defexpr
        - /home/circleci/.config/nix

parameters:
  sdk-version:
    type: string
    default: "2.3.0-snapshot.20220606.10031.0.ce98be86" # sdk-version

jobs:

  canton_coin:
    docker:
    - image: digitalasset/daml-sdk:<< pipeline.parameters.sdk-version >>
    environment:
      <<: *env
    steps:
      - checkout
      - run:
         name: daml test
         command: |
           set -euo pipefail
           cd canton-coin
           daml test --ghc-option=-Werror

  upgrading_coin:
    docker:
    - image: eclipse-temurin:11
    environment:
      <<: *env
      SDK_VERSION: << pipeline.parameters.sdk-version >>
    steps:
      - checkout
      - run:
          name: install deps
          command: |
            set -eou pipefail
            curl https://get.daml.com | sh -s $SDK_VERSION
            printf "auto-install: false\nupdate-check: never\n" >> $HOME/.daml/daml-config.yaml
            apt-get update && apt-get install -y make
      - run:
         name: make all
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach1
           make all
      - run:
         name: make test
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach1
           make test

  upgrading_coin_2:
    docker:
    - image: eclipse-temurin:11
    environment:
      <<: *env
      SDK_VERSION: << pipeline.parameters.sdk-version >>
    steps:
      - checkout
      - run:
          name: install deps
          command: |
            set -eou pipefail
            curl https://get.daml.com | sh -s $SDK_VERSION
            printf "auto-install: false\nupdate-check: never\n" >> $HOME/.daml/daml-config.yaml
            apt-get update && apt-get install -y make
      - run:
         name: make all
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach2
           make all
      - run:
         name: make test
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach2
           make test-cc

  pay_with_cc:
    docker:
    - image: eclipse-temurin:11
    environment:
      <<: *env
      SDK_VERSION: << pipeline.parameters.sdk-version >>
    steps:
      - run:
          name: install deps
          command: |
            set -eou pipefail
            curl https://get.daml.com | sh -s $SDK_VERSION
            printf "auto-install: false\nupdate-check: never\n" >> $HOME/.daml/daml-config.yaml
            curl -fsSL https://deb.nodesource.com/setup_16.x | bash -
            apt-get install -y nodejs
      - checkout
      - run:
         name: daml build
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH

           cd canton-coin
           daml build
      - run:
         name: daml build & codegen
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH

           cd experiments/pay-with-cc
           daml build
           ./codegen.sh
      - run:
          name: "directory service: npm build"
          command: |
            set -eou pipefail
            export PATH=$HOME/.daml/bin:$PATH

            cd experiments/pay-with-cc/directoryservice
            npm install
            npm run build
      - run:
          name: "ccwallet: npm build"
          command: |
            set -eou pipefail
            export PATH=$HOME/.daml/bin:$PATH

            cd experiments/pay-with-cc/ccwallet
            npm install
            npm run build

  docs:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - run:
         name: build
         command: |
           set -euo pipefail
           . /home/circleci/.nix-profile/etc/profile.d/nix.sh

           nix-shell shell.nix \
             --pure \
             --run bash \<<'EOF'
             set -euo pipefail
             cd docs
             make html
           EOF
workflows:
  version: 2
  build:
    jobs:
    - canton_coin:
        <<: *notify-fail
    - pay_with_cc:
        <<: *notify-fail
    - upgrading_coin:
        <<: *notify-fail
    - upgrading_coin_2:
        <<: *notify-fail
    - docs:
        <<: *notify-fail
