              --workflow_names "<< parameters.workflow_names >>" \
              --branch_filter "<< parameters.branch_filter >>" \
              --branch_filter_is_regex "<< parameters.branch_filter_is_regex >>" \
              --branch_ignores "<< parameters.branch_ignores >>" \
              --max_age_seconds << parameters.max_pipeline_age_secs >> \
              --extra_seconds_after_finish << parameters.extra_seconds_after_finish >> \
              cancel_self_if_pipeline_failed

  cancel_previous_pipelines:
    executor: self_hosted
