# Scala CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/sample-config/ for more details
#
version: 2.1

env: &env
  TERM: dumb
  CI: "true"
  USER: circleci

jobs:
  daml_test:
    docker:
    - image: digitalasset/daml-sdk:2.0.0
    environment:
      <<: *env
    steps:
      - checkout
      - run:
         name: daml test
         command: |
           set -euo pipefail

           cd poc6
           daml test --ghc-option=-Werror

workflows:
  version: 2
  build:
    jobs:
    - daml_test
