# Scala CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/sample-config/ for more details
#
version: 2.1
orbs:
  slack: circleci/slack@4.9.3

env: &env
  TERM: dumb
  CI: "true"
  USER: circleci

notify-fail: &notify-fail
  context: slack-context
  post-steps:
  - slack/notify:
      branch_pattern: main
      event: fail
      template: basic_fail_1

commands:
  setup_nix:
    description: Set up Nix
    steps:
    - run:
        name: make_cache_key
        command: |
          set -euo pipefail
          git log -n1 --format=%H nix shell.nix > /tmp/nix-cache-key
          sudo mkdir /nix
          sudo chown $USER /nix
    - restore_cache:
        keys:
        - nix-{{ checksum "/tmp/nix-cache-key" }}
    - run:
       name: setup_nix
       command: |
         set -euo pipefail
         if [ -f ~/.config/nix/nix.conf ]; then
             exit 0
         fi
         # Disabling sandbox because:
         # 1. It doesn't work on CircleCI (sethostname is not allowed)
         # 2. We don't plan to build anything, so the risk is fairly low
         mkdir -p ~/.config/nix
         echo 'sandbox = false' >> ~/.config/nix/nix.conf
         sh <(curl -fsSL https://nixos.org/nix/install) --no-daemon
         . /home/circleci/.nix-profile/etc/profile.d/nix.sh
         nix-shell shell.nix --run 'echo "Done loading all packages."'
    - save_cache:
        key: nix-{{ checksum "/tmp/nix-cache-key" }}
        paths:
        - /nix
        - /home/circleci/.nix-profile
        - /home/circleci/.nix-channels
        - /home/circleci/.nix-defexpr
        - /home/circleci/.config/nix

  # Largely copied from Canton's CI definition
  execute_sbt_command:
    description: |
      A context within which SBT commands can be run correctly for our needs
    parameters:
      cmd:
        # This may contain several commands.
        # The caller needs to quote commands that contain spaces, e.g. "\"testOnly myTest\"".
        type: string
      timeout:
        type: string
        default: "25m"
      succeed_on_error:
        # Will cause the command to always succeed regardless of the sbt exit code.
        # The original exit code will be available through the `STATUS` shell variable.
        type: boolean
        default: false
      retry_fetch:
        # If true, will send a few \r\n to sbt to ensure we download dependencies
        type: string
        default: "0"
      extra_parameters:
        type: string
        default: ""
    steps:
      - run:
          name: Executing "sbt << parameters.cmd >>"
          # In general jobs should be terminated by << parameters.timeout >>. If that does not work for some reason,
          # use CircleCi's no-output timeout.
          # We choose a value of 1h, because that is the highest value for << parameters.timeout >> that we currently use.
          no_output_timeout: 1h
          command: |
            on_exit() {
              local CODE="$?"
              # Export exit code for usage in subsequent steps
              echo "export STATUS=$CODE" >> $BASH_ENV
              # Provide some explanation on exit
              if [ "$CODE" == 0 ]
              then
                echo "The script has terminated successfully."
              elif [ "$CODE" == 124 ]
              then
                echo "sbt has been aborted with the TERM signal after << parameters.timeout >>."
              elif [ "$CODE" == 137 ]
              then
                echo "sbt has been killed because it has allocated too much memory or it has ignored the TERM signal after << parameters.timeout >>."
              else
                echo "The script has failed with exit code $CODE."
              fi
              <<# parameters.succeed_on_error >>
              echo "Overriding original exit code $CODE with zero."
              exit 0
              <</ parameters.succeed_on_error >>
            }
            trap on_exit EXIT

            set -euo pipefail
            . /home/circleci/.nix-profile/etc/profile.d/nix.sh

            nix-shell shell.nix --pure --run bash \<<'EOF'
               run_sbt() {
                 # Define sbt command
                 SBT_CMD=(sbt -verbose)


                 # Add extra parameters
                 SBT_CMD+=(<< parameters.extra_parameters >>)

                 # Add sbt commands.
                 # Do not quote this, to allow the caller to pass in several commands.
                 # The caller needs to take care of quoting, if a command contains spaces.
                 SBT_CMD+=(<< parameters.cmd >>)

                 # Setup heap size; corresponds to Canton large executors
                 SBT_CMD+=("-J-Xmx5000M" "-J-Xms5000M")

                 # Run command
                 # also send a few newline characters to sbt to ensure we keep on downloading dependencies
                 python3 -c "print ('r\n'*<< parameters.retry_fetch >>)" |
                   timeout --kill-after=30s << parameters.timeout >> "${SBT_CMD[@]}" 2>&1 |
                   tee sbt_output
               }
               run_sbt
            EOF

          environment:
            # Necessary for tests of the REPL
            TERM: dumb



parameters:
  sdk-version:
    type: string
    default: "2.3.0-snapshot.20220619.10104.0.253b0b18" # sdk-version

jobs:

  test:
    docker:
      - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - execute_sbt_command:
          cmd: "test:compile"
          retry_fetch: "50"
      - execute_sbt_command:
          cmd: "test"
          timeout: "10m"


  canton_coin:
    docker:
    - image: digitalasset/daml-sdk:<< pipeline.parameters.sdk-version >>
    environment:
      <<: *env
    steps:
      - checkout
      - run:
         name: daml test
         command: |
           set -euo pipefail
           cd canton-coin
           daml test --ghc-option=-Werror

  upgrading_coin:
    docker:
    - image: eclipse-temurin:11
    environment:
      <<: *env
      SDK_VERSION: << pipeline.parameters.sdk-version >>
    steps:
      - checkout
      - run:
          name: install deps
          command: |
            set -eou pipefail
            curl https://get.daml.com | sh -s $SDK_VERSION
            printf "auto-install: false\nupdate-check: never\n" >> $HOME/.daml/daml-config.yaml
            apt-get update && apt-get install -y make
      - run:
         name: make all
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach1
           make all
      - run:
         name: make test
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach1
           make test

  upgrading_coin_2:
    docker:
    - image: eclipse-temurin:11
    environment:
      <<: *env
      SDK_VERSION: << pipeline.parameters.sdk-version >>
    steps:
      - checkout
      - run:
          name: install deps
          command: |
            set -eou pipefail
            curl https://get.daml.com | sh -s $SDK_VERSION
            printf "auto-install: false\nupdate-check: never\n" >> $HOME/.daml/daml-config.yaml
            apt-get update && apt-get install -y make
      - run:
         name: make all
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach2
           make all
      - run:
         name: make test
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH
           cd experiments/upgrading/approach2
           make test-cc

  pay_with_cc:
    docker:
    - image: eclipse-temurin:11
    environment:
      <<: *env
      SDK_VERSION: << pipeline.parameters.sdk-version >>
    steps:
      - run:
          name: install deps
          command: |
            set -eou pipefail
            curl https://get.daml.com | sh -s $SDK_VERSION
            printf "auto-install: false\nupdate-check: never\n" >> $HOME/.daml/daml-config.yaml
            curl -fsSL https://deb.nodesource.com/setup_16.x | bash -
            apt-get install -y nodejs
      - checkout
      - run:
         name: daml build
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH

           cd canton-coin
           daml build
      - run:
         name: daml build & codegen
         command: |
           set -euo pipefail
           export PATH=$HOME/.daml/bin:$PATH

           cd experiments/pay-with-cc
           daml build
           ./codegen.sh
      - run:
          name: "directory service: npm build"
          command: |
            set -eou pipefail
            export PATH=$HOME/.daml/bin:$PATH

            cd experiments/pay-with-cc/directoryservice
            npm install
            npm run build
      - run:
          name: "ccwallet: npm build"
          command: |
            set -eou pipefail
            export PATH=$HOME/.daml/bin:$PATH

            cd experiments/pay-with-cc/ccwallet
            npm install
            npm run build

  docs:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_nix
      - run:
         name: build
         command: |
           set -euo pipefail
           . /home/circleci/.nix-profile/etc/profile.d/nix.sh

           nix-shell shell.nix \
             --pure \
             --run bash \<<'EOF'
             set -euo pipefail
             cd docs
             make html

  docs-deploy:
    docker:
    - image: cimg/base:2021.04
    environment:
      <<: *env
    steps:
      - checkout
      - setup_remote_docker
      - setup_nix
      - run:
         name: deploy
         command: |
           set -euo pipefail
           . /home/circleci/.nix-profile/etc/profile.d/nix.sh

           use () {
              echo "direnv stub..."
           }
           . .envrc

           nix-shell shell.nix \
             --run bash \<<'EOF'
             set -euo pipefail

             echo $GCLOUD_SERVICE_KEY | gcloud auth activate-service-account --key-file=-
             (yes || true) | gcloud auth configure-docker us-central1-docker.pkg.dev

             gcloud --quiet config set project ${GCP_PROJECT_NAME}
             gcloud --quiet config set compute/zone us-central1

             cd cluster
             ./image-build docs
             ./image-push docs
           EOF


workflows:
  version: 2
  build:
    jobs:
    # CC Daml model
    - canton_coin:
        <<: *notify-fail
    - pay_with_cc:
        <<: *notify-fail
    - upgrading_coin:
        <<: *notify-fail
    - upgrading_coin_2:
        <<: *notify-fail
    # Documentation
    - docs:
        <<: *notify-fail
    - docs-deploy:
        <<: *notify-fail
        filters:
          branches:
            only:
                - main
    # Scala
    - test:
        <<: *notify-fail
