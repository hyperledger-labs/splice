            # currently using the _vpn job makes sense only for the sv runbook
            # where VPN is required to resolve Validator1's PartyId
            "sv",
          ]
      # Commit hash that will become the legacy version.
      # If left empty then the latest commit on the branch will be used, with locally-built charts.
      base_version:
        type: string
        default: ""
      # Commit hash that will become the active version.
      # If left empty then the latest commit on the branch will be used, with locally-built charts.
      upgrade_version:
        type: string
        default: ""
      cancel_workflow_on_failure:
        type: boolean
        default: false
    steps:
      - checkout_with_retry
      - when:
          condition: << parameters.upgrade_version >>
          steps:
            - run:
                name: Checkout commit << parameters.upgrade_version >>
                command: |
                  echo "Checking out commit << parameters.upgrade_version >>"
                  git checkout << parameters.upgrade_version >>
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts for upgrade version
          cluster: << parameters.cluster >>
          cmd: |
            make cluster/build
          cmd_retry_count: 2
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Execute hard domain migration action
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep ARTIFACTORY_USER
            --keep ARTIFACTORY_PASSWORD
            --keep CIRCLECI_TOKEN
            --keep CIRCLE_WORKFLOW_ID
            --keep SLACK_ACCESS_TOKEN
          gce_authenticate: true
          cmd: |
            set -eou pipefail
            if [ -z "<< parameters.upgrade_version >>" ]; then
              upgrade_version="local"
            else
              # gives us the latest tag that looks like a release tag (e.g. 1.2.3)
              upgrade_version=$(git describe --tags --match "[0-9][0-9\.][0-9\.]*" --abbrev=0 "<< parameters.upgrade_version >>")
            fi
            if [ -z "<< parameters.base_version >>" ]; then
              base_version="local"
            else
              # gives us the latest tag that looks like a release tag (e.g. 1.2.3)
              base_version=$(git describe --tags --match "[0-9][0-9\.][0-9\.]*" --abbrev=0 "<< parameters.base_version >>")
            fi
            # All CI-deployed clusters use split postgres instances per app, to support backups.
            export SPLIT_POSTGRES_INSTANCES=true

            cncluster activate
            cncluster hard_domain_migration_<< parameters.action >> << parameters.scope >> $base_version $upgrade_version --yes --skip-preview
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - notify-cluster-fail:
          channel_notify: << parameters.channel_notify >>
          cluster: << parameters.cluster >>
      - when:
          condition: << parameters.cancel_workflow_on_failure >>
          steps:
            - cancel_entire_workflow_if_this_job_failed


  # Inspired by Canton, we put the lint-like checks into their own CI job
  static_tests:
    docker:
      - image: cimg/base:2024.01
    resource_class: "xlarge"
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - run:
          name: Verify config.yml is up to date with source.
          command: |
            source .envrc.vars
            .circleci/build-config.sh --check
      - setup_sbt_test_job
      # Run the cheap checks before the sbt based ones to provide fast feedback
      - run_trailing_whitespace_check
      - run_daml_warts_check
      - run_daml_return_types_check
      - run_todo_script
      # We run sbt update with retries first to ensure that all dependency artifacts have been downloaded
      - execute_sbt_command:
          cmd: "update"
          cmd_retry_count: 3
      - execute_sbt_command:
          cmd: "Test/compile lint"
      - cleanup_sbt_test_job

  # We put our Daml tests in their own job for more parallelization
  daml_test:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "damlTest"
          timeout: "10m"
          extra_env_vars: DAML_DEBUG=1

  # Run UI unit tests
  ui_test:
    docker:
      - image: cimg/base:2024.01
    resource_class: "xlarge"
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_sbt_test_job
      - execute_sbt_command:
          cmd: "apps-common-frontend/npmTest"
          fail_on_error_in_output: false # TODO(#7579) -- turn this back on when we figure out what to ignore/what not to
      - cleanup_sbt_test_job

  # We want to run our Scala tests with parallelism and therefore put them in their own job with no other tests in it;
  # work on anything but the Scala tests is duplicated across all parallel runs of this job
  scala_test:
    machine:
      image: ubuntu-2204:2024.01.1
    parameters:
      test_names_file:
        type: string
      start_canton_options:
        type: string
      pre_sbt_cmd:
        type: string
        default: ""
      post_sbt_cmd:
        type: string
        default: ""
      parallelism:
        type: integer
      resource_class:
        type: string
      skip_if_regex:
        type: string
        default: ""
      skip_if_files_changed:
        type: string
        default: ""
      with_shared_gcp:
        type: boolean
        default: false
    resource_class: << parameters.resource_class >>
    environment:
      <<: *env
      POSTGRES_HOST: localhost
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: << parameters.parallelism >>
    steps:
      - checkout_with_retry
      - when:
          condition:
            not:
              equal: [ "", "<< parameters.skip_if_regex >>" ]
          steps:
            - run:
                name: Checking git commit against regex << parameters.skip_if_regex >>
                command: |
                  base=$(build-tools/get-latest-main-commit)
                  msg=$(git log "$base"..HEAD --pretty=%B)
                  if [[ $msg =~ << parameters.skip_if_regex >> ]]; then
                    echo "Commit message ($msg) matches regex (<< parameters.skip_if_regex >>), breaking"
                    circleci-agent step halt
                  fi
      - when:
          condition:
            not:
              equal: [ "", "<< parameters.skip_if_files_changed >>" ]
          steps:
            - run:
                name: "Checking changed files against list: << parameters.skip_if_files_changed >>"
                command: |
                  latest_release=$(cat "LATEST_RELEASE")
                  base=$(git rev-parse heads/origin/release-line-"${latest_release}")
                  changed=$(git diff --name-only $base -- << parameters.skip_if_files_changed >>)
                  if [ -n "$changed" ]; then
                    echo "Lock files changed ($changed), breaking"
                    circleci-agent step halt
                  fi
      - setup_sbt_test_job
      # Used to pull docker images for cometbft
      - docker_login_artifactory
      - docker_pull_test_images
      # Start canton before compiling, as it takes a long time to start
      # Note that we start canton before connecting VPN, so some initial
      # metrics from Canton will be lost. Currently, they're Canton metrics
      # before our actual tests start are not of interest for us,
      # so we accept that.
      - start_canton_in_background:
          start_canton_options: << parameters.start_canton_options >>
      - when:
          condition:
            equal: [ true, "<< parameters.with_shared_gcp >>" ]
          steps:
            run_bash_command_in_nix:
              cmd_name: "Authenticate to shared GCP project"
              additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY"
              cmd: |
                echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
      - split_tests_for_parallel_run:
          test_names_file: << parameters.test_names_file >>
      - run_splitted_scala_tests:
          pre_sbt_cmd: << parameters.pre_sbt_cmd >>
          post_sbt_cmd: << parameters.post_sbt_cmd >>
          start_canton_options: << parameters.start_canton_options >>
      - stop_canton
      - cleanup_sbt_test_job

  bundle:
    docker:
      - image: cimg/base:2024.01
    resource_class: xlarge
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_sbt_test_job
      # We run sbt update with retries first to ensure that all dependency artifacts have been downloaded
      - execute_sbt_command:
          cmd: "update"
          cmd_retry_count: 3
      - execute_sbt_command:
          # compile tests, as well as bundle, to make sure the cache that is uploaded here is complete
          cmd: "Test/compile bundle"
      - run:
          name: Copy bundle
          command: |
            set -eou pipefail
            mkdir -p /tmp/artifacts
            cp apps/app/target/release/*.tar.gz /tmp/artifacts
      - run:
          name: Copy OpenAPI specs
          command: |
            set -eou pipefail
            .circleci/copy-openapi.sh
      - store_artifacts:
          path: /tmp/artifacts
          destination: release-artifacts
      - run_bash_command_in_nix:
         cmd_name: Publish release bundles
         additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY"
         cmd: |
           echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
           export GOOGLE_CLOUD_PROJECT=da-cn-shared
           VERSION=$(get-snapshot-version)
           (cd /tmp/artifacts ; for filename in *.tar.gz; do mv "$filename" "${VERSION}_${filename}"; done)
           # we cp with -n so that it doesn't try to overwrite an already uploaded bundle with this version,
           # which would lead to an error due to a misisng `delete` permission
           gsutil cp -n /tmp/artifacts/*.tar.gz gs://cn-release-bundles
         # we're not adding a cmd_retry_count here because of the `mv` above and because gsutil cp has a retry mechanism of its own
      - cleanup_sbt_test_job:
          upload_caches: true

  deployment_test:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: Deployment Test
         cmd_retry_count: 5 # Retry in case of dependency download errors
         cmd: make cluster/pulumi/test

  auth0_user_cleanup:
    docker:
    - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix
      # TODO(#6630): look into these caches
      - restore_precompiled_classes
      - restore_sbt_cache
      - execute_sbt_command:
          cmd: "\"tools/run\""
          additional_nix_args: "--keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID \
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_TESTS_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_TESTS_MANAGEMENT_API_CLIENT_SECRET
            --keep ARTIFACTORY_USER
            --keep ARTIFACTORY_PASSWORD"
          timeout: "10m"
      - save_sbt_cache
      - save_compiled_classes

  cluster_lock_reaper:
    circleci_ip_ranges: true
    docker:
    - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix
      - cluster_lock_reaper:
          cluster: "scratchneta"
      - cluster_lock_reaper:
          cluster: "scratchnetb"
      - cluster_lock_reaper:
          cluster: "scratchnetc"
      - cluster_lock_reaper:
          cluster: "scratchnetd"
      - cluster_lock_reaper:
          cluster: "scratchnete"

  update_pipeline_schedule:
    docker:
    - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
         cmd_name: Update CircleCI pipeline configuration (incl. schedule triggers)
         additional_nix_args: --keep CIRCLECI_TOKEN
         cmd: |
           set -euo pipefail

           . .envrc.vars
           .circleci/triggers/setup-pipeline.sh

  artifacts_push:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
    parameters:
      skip_if_exists:
        type: boolean
        default: false
    steps:
      - checkout_with_retry
      - restore_frontend_builds
      - setup_sbt_test_job
      - docker_login_artifactory
      - run_bash_command_in_nix:
         cmd_name: GCloud authorization
         additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: |
           echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
           (yes || true) | gcloud auth configure-docker us-central1-docker.pkg.dev
           gcloud auth print-access-token | helm registry login -u oauth2accesstoken --password-stdin https://us-central1-docker.pkg.dev
      - when:
          condition: << parameters.skip_if_exists >>
          steps:
          - run_bash_command_in_nix:
             cmd_name: Check if images already exist
             cmd: |
               if make docker-check; then
                  echo "Docker images already exist"
                  # Running a circleci-agent command from within run_bash_command_in_nix does not work, so we create a file
                  # that represents the need to halt, and call `circleci-agent step halt` in a separate `run` step
                  touch .halt-build-step
               fi
          - run:
              name: Halt build step if images already exist
              command: |
                if [ -f ".halt-build-step" ]; then
                  echo "skipping rebuilding and pushing"
                  circleci-agent step halt
                fi
      - run_bash_command_in_nix:
         cmd_name: Build app
         cmd: make build -j
         cmd_retry_count: 5 # Retry in case of dependency download errors
         additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD"
      - docker_build
      - run_bash_command_in_nix:
         cmd_name: Push Docker images
         additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: make docker-push -j
         cmd_retry_count: 5
      - run_bash_command_in_nix:
          cmd_name: Push Helm Artifacts
          cmd: make cluster/helm/push -j
          cmd_retry_count: 5
      - save_frontend_builds
      - cleanup_sbt_test_job

  publish_public_release:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_sbt_test_job
      - docker_login_artifactory
      - run_bash_command_in_nix:
         cmd_name: Promote images to Artifactory
         additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY"
         cmd: |
           echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
           (yes || true) | gcloud auth configure-docker us-central1-docker.pkg.dev

           make docker-promote
         cmd_retry_count: 5 # Retry in case of connectivity issues
      - run_bash_command_in_nix:
         cmd_name: Push Helm charts and tag git accordingly
         additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD \
           --keep GITHUB_TOKEN"
         cmd: |
           publish () {
             source=$1
             full_path=$2
             echo "Publishing ${source} to ${full_path}"
             curl -u "${ARTIFACTORY_USER}:${ARTIFACTORY_PASSWORD}" -sSf -X PUT --upload-file "${source}" "${full_path}"
           }

           make cluster/helm/build -j

           for chart in cluster/helm/target/*.tgz; do
             artifactory_url="https://digitalasset.jfrog.io/artifactory"
             publish "${chart}" "${artifactory_url}/canton-network-helm/digitalasset/$(basename ${chart})"
           done

           git remote set-url origin https://githubuser-da:${GITHUB_TOKEN}@github.com/DACH-NY/canton-network-node.git
           RELEASE_TAG=$(get-snapshot-version)
           if [ $(git tag -l "${RELEASE_TAG}") ]; then
             echo "tag ${RELEASE_TAG} already exists. not tagging"
           else
             git tag "${RELEASE_TAG}"
             git push origin "${RELEASE_TAG}"
           fi

  docker_images_build:
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: xlarge
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - restore_frontend_builds
      - setup_sbt_test_job
      - run_bash_command_in_nix:
         cmd_name: Build app
         cmd: make build -j
         cmd_retry_count: 5 # Retry in case of dependency download errors
         additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD"
      - docker_login_artifactory
      - docker_build
      - save_frontend_builds
      - cleanup_sbt_test_job

  wait_for_previous_pipeline:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to wait for.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$|release-line.*"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
      wait_type:
        type: string
        default: "wait"
    steps:
      - checkout_with_retry
      - run:
          name: "Wait for previous pipeline"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh << pipeline.number >> "<< parameters.workflow_names >>" \
              "<< parameters.branch_filter >>" "<< parameters.branch_filter_is_regex >>" "<< parameters.branch_ignores >>" \
              << parameters.max_pipeline_age_secs >> << parameters.wait_type >>

  cancel_if_previous_pipeline:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to check if they exist and cancel current workflow if so.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$|release-line.*"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
      only_if_running:
        # if set to false, will cancel if a relevant pipeline is found, regardless of its current status
        type: boolean
        default: true
    steps:
      - checkout_with_retry
      - run:
          name: "Cancel if previous pipeline"
          command: |
            if [[ << parameters.only_if_running >> == true ]]; then
              action="cancel_self"
            else
              action="cancel_self_if_found"
            fi
            .circleci/wait_for_or_cancel_pipelines.sh << pipeline.number >> "<< parameters.workflow_names >>" \
              "<< parameters.branch_filter >>" "<< parameters.branch_filter_is_regex >>" "<< parameters.branch_ignores >>" \
              << parameters.max_pipeline_age_secs >> $action

  cancel_previous_pipelines:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to cancel if they exist.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: ""
      branch_filter_is_regex:
        type: boolean
        default: false
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
    steps:
      - checkout_with_retry
      - run:
          name: "Cancel previous pipelines"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh << pipeline.number >> "<< parameters.workflow_names >>" \
              "<< parameters.branch_filter >>" "<< parameters.branch_filter_is_regex >>" "<< parameters.branch_ignores >>" \
              << parameters.max_pipeline_age_secs >> cancel_pipeline

  cancel_if_current_commit_is_base_version:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - run:
          name: Cancel the entire workflow if the current commit is a base version
          command: |
            source .envrc.vars
            latest_base_version=$(build-tools/find_latest_base_version.sh)
            if [[ "${CIRCLE_SHA1}" == "${latest_base_version}" ]]; then
              echo "Cancelling the entire workflow because the current commit is a base version."
              curl -fsSL -X POST -H "Circle-Token: ${CIRCLECI_TOKEN}" "https://circleci.com/api/v2/workflow/${CIRCLE_WORKFLOW_ID}/cancel"
            else
              echo "Current commit is ${CIRCLE_SHA1}, latest base version is ${latest_base_version}."
            fi

  launch_ciupgrade_workflow:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - run:
          name: Launches the deploy_ciupgrade workflow, disabling partial upgrade if there are Helm/Pulumi changes
          command: |
            source .envrc.vars

            run_partial_upgrade=""
            if build-tools/changes-vs-base "$REPO_ROOT/cluster"; then
              echo "Proceeding with partial upgrade."
              run_partial_upgrade="true"
            else
              echo "Skipping cluster partial upgrade and preflights steps."
              run_partial_upgrade="false"
            fi

            run_daml_upgrade=""
            if build-tools/changes-vs-base "$REPO_ROOT/daml/dars.lock"; then
              echo "Skipping cluster daml upgrade."
              run_daml_upgrade="false"
            else
              echo "Proceeding with daml upgrade."
              run_daml_upgrade="true"
            fi

            latest_base_version=$(build-tools/find_latest_base_version.sh)
            curl --fail-with-body --request POST \
              --url https://circleci.com/api/v2/project/github/DACH-NY/canton-network-node/pipeline \
              --header "Circle-Token: ${CIRCLECI_TOKEN}" \
              --header 'content-type: application/json' \
              --data "{\"branch\": \"main\", \"parameters\":{\"run-job\":\"deploy-ciupgrade\", \"run-partial-upgrade\": $run_partial_upgrade, \"run-daml-upgrade\": $run_daml_upgrade, \"base-version\": \"$latest_base_version\"}}"

  wait_for_daml_upgrade:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parameters:
      run:
        type: boolean
        default: false
      cluster:
        type: string
    steps:
      - checkout_with_retry
      - setup_nix
      - setup_vpn # VPN is required to get the effective date from SV-1
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Wait for vote to be effective
          cluster: << parameters.cluster >>
          gce_authenticate: true
          additional_nix_args: "--keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
          cmd: |
            if [[ << parameters.run >> == true ]]; then
              cncluster activate
              cncluster wait_for_daml_upgrade
            fi
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_HOSTNAME}; then echo "false"; else echo "true"; fi)
          cmd_retry_count: 2
          cmd_before_retry: |-
            echo "VPN connection seems to have died, restarting VPN and retrying..."
            /tmp/vpn-scripts/restart-vpn.sh

  backup_cluster:
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      include_sv:
        type: boolean
        default: true
      include_splitwell:
        type: boolean
        default: true
      include_validator1:
        type: boolean
        default: true
      parallelism:
        type: integer
        default: 3
      migration_id:
        type: integer
        default: 0
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: << parameters.parallelism >>
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Listing nodes for backup
          cluster: << parameters.cluster >>
          cmd: |
            nodes=""
            if [[ << parameters.include_sv >> != false ]]; then
              if (env-bool IS_DEVNET); then
                nodes="sv-1 sv-2 sv-3 sv-4"
              else
                nodes="sv-1"
              fi
            fi
            if [[ << parameters.include_validator1 >> != false ]]; then
              nodes="$nodes validator1"
            fi
            if [[ << parameters.include_splitwell >> != false ]]; then
              nodes="$nodes splitwell"
            fi
            echo $nodes > nodes.txt
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run:
          name: Split backup tasks
          command: |
            nodes=$(cat nodes.txt)
            echo "$nodes" | circleci tests run --command "xargs ./.circleci/grab-tests.sh"
            if [ -e tests-to-run.txt ]; then
              echo "Nodes to backup: $(cat tests-to-run.txt)"
            else
              echo "No nodes to backup, stopping"
              circleci-agent step halt
            fi
      - run_bash_command_in_nix:
          cmd_name: Backup nodes
          cluster: << parameters.cluster >>
          gce_authenticate: true
          no_output_timeout: "20m"
          cmd: |
            cncluster activate
            # We use readiness of validator-app as an approximation to the node's readiness
            for ns in $(cat tests-to-run.txt); do
              cncluster wait $ns validator-app << parameters.migration_id >>
            done
            cncluster backup_nodes << parameters.migration_id >> $(cat tests-to-run.txt)
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
          channel_notify: << parameters.channel_notify >>

  restore_node:
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      namespace_name:
        type: string
      expected_migration_id:
        type: integer
        default: 0
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    steps:
      - checkout_with_retry
      - setup_nix
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Restoring node
          cluster: << parameters.cluster >>
          gce_authenticate: true
          no_output_timeout: "20m"
          cmd: |
            cncluster activate
            cncluster restore_node --force << parameters.namespace_name >>

            case "<< parameters.namespace_name >>" in
              "sv-1"|"sv-2"|"sv-3"|"sv-4")
                cncluster wait << parameters.namespace_name >> scan-app << parameters.expected_migration_id >>
                cncluster wait << parameters.namespace_name >> sv-app << parameters.expected_migration_id >>
                cncluster wait << parameters.namespace_name >> validator-app << parameters.expected_migration_id >>
                ;;
              "validator1")
                cncluster wait << parameters.namespace_name >> validator-app << parameters.expected_migration_id >>
                ;;
            esac
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - notify-cluster-fail:
          cluster: << parameters.cluster >>
          channel_notify: << parameters.channel_notify >>

  test_DR:
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    steps:
      - checkout_with_retry
      - setup_nix
      - setup_vpn
      - setup_vpn_routes:
          cluster: << parameters.cluster >>
      - run_bash_command_in_nix:
          cmd_name: Build Helm & Pulumi artifacts
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Run disaster recovery test
          cluster: << parameters.cluster >>
          additional_nix_args: "--keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET \
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET \
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET"
          gce_authenticate: true
          cmd: |
            cncluster activate
            cncluster disaster_recovery_test
          cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_HOSTNAME}; then echo "false"; else echo "true"; fi)
          cmd_retry_count: 2
          cmd_before_retry: |-
            echo "VPN connection seems to have died, restarting VPN and retrying..."
            /tmp/vpn-scripts/restart-vpn.sh
            cncluster prefresh

  release_hold_set_scratchnet:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout_with_retry
      - run:
          name: Release main hold job
          command: |
            .circleci/release-hold.sh "hold_set_scratchnet"

  # Persists the choice of scratchnet cluster to a CCI workspace
  set_scratchnet:
    parameters:
      <<: *cluster-parameter
    docker:
      - image: cimg/base:2024.01
    steps:
      - run: mkdir -p /tmp/workspace
      - run:
          name: Getting selected cluster and setting it in workspace
          command: |
            n=0
            until [ $n -gt 5 ]; do
              released=$(curl -s --location --request GET "https://circleci.com/api/v2/workflow/$CIRCLE_WORKFLOW_ID/job" --header "Circle-Token: ${CIRCLECI_TOKEN}" | jq -r '.items[]|select(.name | test("use_scratchnet*"))|select(.status == "success").name')
              if [ -n "$released" ]; then
                TARGET_CLUSTER=$(echo $released | sed s/use_//)
                echo "The hold job $released has been released, using cluster: $cluster"
                echo "export TARGET_CLUSTER=$TARGET_CLUSTER" >> /tmp/workspace/cn_env_vars
                exit 0
              else
                echo "No hold job has not been released yet (iteration $n)"
                n=$((n+1))
                sleep 5
              fi
            done
            echo "ERROR! No cluster hold job has been released, did you accidentally manually release the set_scratchnet one?"
            exit 1
      - persist_to_workspace:
          root: /tmp/workspace
          paths:
              - cn_env_vars

  notify_on_readme_changed:
    parameters:
      <<: *channel-notify-parameter
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout_with_retry
      - run:
          name: Skip slack notification if no documentation has benn changed
          when: always
          command: |
            commit=$(git rev-parse HEAD)
            changed_files=$(git diff --name-only HEAD~ HEAD -- '*.md')
            changed_files_list=$(git diff --name-only HEAD~ HEAD -- '*.md' | sed ':a;N;$!ba;s/\n/\\n/g')
            if [ -n "$changed_files" ]; then
              echo "Setting GITHUB_COMMIT_URL as document change is detected in commit $commit"
              echo "export GITHUB_COMMIT_URL=\"https://github.com/DACH-NY/canton-network-node/commit/${commit}\"" >> "$BASH_ENV"
              echo "export CHANGED_DOC_FILES=\"${changed_files_list}\"" >> "$BASH_ENV"
            else
              echo "No document changes are detected."
              circleci-agent step halt
            fi
      - slack/notify:
          channel: << parameters.channel_notify >>
          event: always
          custom: |
            { "text": "*📄Changes to any `.md` files are detected, and they are merged into the main branch.*\n<${GITHUB_COMMIT_URL}| View change at $(git log -1 --oneline --no-color | sed s/\"//g)>\n\nChanged files:\n```\n${CHANGED_DOC_FILES}\n```" }

  deploy_operator:
    circleci_ip_ranges: true
    docker:
      - image: cimg/base:2024.01
    resource_class: large
    environment:
      <<: *env
      CIRCLE_TAG: git-<< pipeline.git.revision >>
    parameters:
      <<: *cluster-parameter

    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Install pulumi dependencies
          # When nix packages changed, nix will rebuild stuff here, and sometimes go silent for long periods of time
          no_output_timeout: "20m"
          cluster: << parameters.cluster >>
          cmd: |
            make -j cluster/pulumi/build
          cmd_retry_count: 2
      - run_bash_command_in_nix:
          cmd_name: Apply the deployment stack
          cluster: << parameters.cluster >>
          additional_nix_args: >
            --keep GITHUB_TOKEN
            --keep SLACK_ACCESS_TOKEN
            --keep AUTH0_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_SV_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_VALIDATOR_MANAGEMENT_API_CLIENT_SECRET
            --keep AUTH0_MAIN_MANAGEMENT_API_CLIENT_ID
            --keep AUTH0_MAIN_MANAGEMENT_API_CLIENT_SECRET
            --keep ARTIFACTORY_USER
            --keep ARTIFACTORY_PASSWORD
            --keep K6_USERS_PASSWORD
            --keep K6_VALIDATOR_ADMIN_USERNAME
            --keep K6_VALIDATOR_ADMIN_PASSWORD
          gce_authenticate: true
          cmd: |
            export CN_PULUMI_LOAD_ENV_CONFIG_FILE=true
            cncluster activate
            cncluster pulumi deployment up --skip-preview

  preflight_check:
    parameters:
      <<: *cluster-parameter
      <<: *channel-notify-parameter
      run: # CircleCI workaround... only used for ciupgrade's partial upgrade.
        type: boolean
        default: true
      test_names_file:
        type: string
        default: "test-full-class-names-core-preflight.log,test-full-class-names-validator1-preflight.log"
      parallelism:
        type: integer
        default: 3
      wait_for_sv:
        type: boolean
        default: true
      wait_for_splitwell:
        type: boolean
        default: true
      wait_for_disabled_autoscaler:
        type: boolean
        default: false
      cluster_version:
        type: string
        default: ""
      check_cluster_version:
        type: boolean
        default: true
      migration_id:
        type: integer
        default: 0
      extra_env_vars:
        type: string
        default: ""
      force_non_devnet:
        type: boolean
        default: false
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
      VPN_HOST_NAME: vpn-cn-devnet.da-int.net
      VPN_HOST_IP: 34.132.91.75
    parallelism: << parameters.parallelism >>
    steps:
      - run:
          # CircleCI does not allow a job to only contain a when (because when false, there's no steps)
          name: "Log run"
          command: |
            echo "Running preflight check: << parameters.run >>"
      - when:
          condition:
            equal: [ true, << parameters.run >> ]
          steps:
            - checkout_with_retry
            - run:
                # necessary for npm/webpack dev server launched in start-frontends.sh later
                # https://webpack.js.org/configuration/watch/#not-enough-watchers
                name: Set inotify fs watch
                command: |
                  echo "Checking watch info..."
                  sysctl fs.inotify
                  echo "Setting max_user_watches..."
                  echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p
            - when:
                condition: << parameters.cluster_version >>
                steps:
                  - run:
                      name: Checkout commit << parameters.cluster_version >>
                      command: git checkout << parameters.cluster_version >>
            - setup_nix
            - run_bash_command_in_nix:
                cmd_name: Activate cluster (configure kubectl)
                cluster: << parameters.cluster >>
                gce_authenticate: true
                cmd: cncluster activate
                cmd_retry_count: 5
            # TODO(#6630): bundle all these restores into a command, consider merging with setup_sbt_test_job
            - restore_sbt_cache
            - restore_precompiled_classes
            - restore_frontend_node_modules
            - restore_daml_artifacts
            - split_tests_for_parallel_run:
                test_names_file: << parameters.test_names_file >>
            - setup_vpn
            - setup_vpn_routes:
                cluster: << parameters.cluster >>
            - run_bash_command_in_nix:
                cmd_name: wait for deployment to finish
                cluster: << parameters.cluster >>
                additional_nix_args: "--keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
                cmd: |
                  if [[ << parameters.check_cluster_version >> == true ]]; then
                    VERSION=$(get-snapshot-version)
                    cncluster wait_version $VERSION
                  fi
                  validator_app="validator-app"
                  # We use readiness of validator-app in all namespaces as an approximation to the cluster's readiness
                  if [[ << parameters.wait_for_splitwell >> == true ]]; then
                    cncluster wait splitwell $validator_app << parameters.migration_id >>
                  fi
                  cncluster wait sv-1 $validator_app << parameters.migration_id >>
                  cncluster wait validator1 $validator_app << parameters.migration_id >>
                  if (env-bool IS_DEVNET) && [ << parameters.force_non_devnet >> == false ]; then
                    cncluster wait sv-2 $validator_app << parameters.migration_id >>
                    cncluster wait sv-3 $validator_app << parameters.migration_id >>
                    cncluster wait sv-4 $validator_app << parameters.migration_id >>
                  fi
                  if [[ << parameters.wait_for_sv >> == true ]] && ( env-bool APPROVE_SV_RUNBOOK || env-bool IS_DEVNET ); then
                    cncluster wait sv $validator_app << parameters.migration_id >>
                  fi
                  echo "Done waiting. All pods in the cluster are:"
                  kubectl get pods -A
                cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_HOSTNAME}; then echo "false"; else echo "true"; fi)
                cmd_retry_count: 2
                cmd_before_retry: |-
                  echo "VPN connection seems to have died, restarting VPN and retrying..."
                  /tmp/vpn-scripts/restart-vpn.sh
            - when:
                condition:
                  equal: [ true, << parameters.wait_for_disabled_autoscaler >> ]
                steps:
                  - run_bash_command_in_nix:
                      cmd_name: Disable autoscaler
                      cluster: << parameters.cluster >>
                      gce_authenticate: true
                      cmd: |
                        until [ $(gcloud container node-pools describe cn-apps-pool --cluster cn-${GCP_CLUSTER_BASENAME}net --format json | jq .autoscaling.enabled) != "true" ]; do
                          echo "waiting for auto-scaler to be disabled..."
                          sleep 1
                        done
                        echo "Done, auto-scaler is disabled"
            - get_cluster:
                cluster: << parameters.cluster >>
            - execute_sbt_command:
                pre_sbt_cmd: |
                  set -eou pipefail
                  . cluster/deployment/${TARGET_CLUSTER}/.envrc.vars
                cmd: "\"$RUN_SPLITTED_TESTS_CMD\""
                additional_nix_args: "--keep AUTH0_CN_MANAGEMENT_API_CLIENT_ID --keep AUTH0_CN_MANAGEMENT_API_CLIENT_SECRET --keep SV_DEV_NET_WEB_UI_PASSWORD --keep SV_WEB_UI_PASSWORD --keep VALIDATOR_WEB_UI_PASSWORD --keep GCP_DATA_DUMP_BUCKET_SERVICE_ACCOUNT_CREDENTIALS --keep VPN_HOST_NAME --keep VPN_USER --keep VPN_PASSWORD --keep VPN_HOST_IP"
                extra_env_vars: POSTGRES_DB=postgres NETWORK_APPS_ADDRESS=${GCP_CLUSTER_HOSTNAME} NETWORK_APPS_ADDRESS_PROTOCOL=https VALIDATOR_USER_NAME="auto_preflight" MIGRATION_ID=<< parameters.migration_id >> << parameters.extra_env_vars >>
                timeout: "15m"
                cmd_retry_count: 3
                # retry if VPN got disconnected (approximated by trying to fetch docs from the cluster.
                # Note that this is expected to succeed even if the cluster deployment is down, because it fetches only the http->https redirect anyway)
                cmd_retry_condition: $(if curl --connect-timeout 5 -s ${GCP_CLUSTER_HOSTNAME}; then echo "false"; else echo "true"; fi)
                cluster: << parameters.cluster >>
                cmd_before_retry: |
                  echo "Test failed, but VPN connection seems to have died, restarting VPN and retrying..."
                  ./stop-frontends.sh
                  /tmp/vpn-scripts/restart-vpn.sh

            - print_gcloud_logs_commands:
                cluster: <<parameters.cluster>>
            - cleanup_sbt_test_job
            - notify-cluster-fail:
                cluster: << parameters.cluster >>
                channel_notify: << parameters.channel_notify >>
            - store_artifacts:
                name: Upload vpn log
                path: /var/log/vpn.log

