main-branch-only: &main-branch-only
  filters:
    branches:
      only:
         - main

main-branch-never: &main-branch-never
  filters:
    branches:
      ignore:
         - main

workflows:
  version: 2

  publish_public_artifacts:
    when:
      equal: [ publish-public-artifacts, << pipeline.parameters.run-job >> ]
    jobs:
      - docker_images_push:
          <<: *notify-fail
          context:
            - artifactory
            - datadog
            - slack-context
      - publish_public_release:
          context:
            - artifactory
            - datadog
          requires:
            - docker_images_push

  build:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
    - cancel_previous_pipelines:
        <<: *notify-fail
        context:
          - slack-context
        workflow_names: "build"
        branch_filter: "$CIRCLE_BRANCH"
        # cannot use a simple CCI branch filter for the job since this job is a dependency for all the other jobs in this workflow
        # and cannot be skipped
        branch_ignores: "^(main|deployment/.*)$"
        max_pipeline_age_secs: 0  # no pipeline age limit
    # Linting and formatting
    - static_tests:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    # Daml
    - daml_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    # Scala
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test wall clock time"
        test_names_file: "test-full-class-names.log"
        start_canton_options: "-w -f -m"
        resource_class: "xlarge"
        parallelism: 8
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test sim time"
        test_names_file: "test-full-class-names-sim-time.log"
        start_canton_options: "-s"
        resource_class: "xlarge"
        parallelism: 5
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test frontend wall clock time"
        test_names_file: "test-full-class-names-frontend.log"
        start_canton_options: "-w"
        pre_sbt_cmd: "./start-frontends.sh -d -s"
        post_sbt_cmd: "./stop-frontends.sh"
        resource_class: "2xlarge"
        parallelism: 4
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test frontend sim time"
        test_names_file: "test-full-class-names-frontend-sim-time.log"
        start_canton_options: "-s"
        pre_sbt_cmd: "./start-frontends.sh -d -s"
        post_sbt_cmd: "./stop-frontends.sh"
        resource_class: "xlarge"
        parallelism: 1
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test frontend app manager"
        test_names_file: "test-full-class-names-frontend-app-manager.log"
        start_canton_options: "-w"
        pre_sbt_cmd: "./start-frontends.sh -d -s -m"
        post_sbt_cmd: "./stop-frontends.sh"
        resource_class: "xlarge"
        parallelism: 1
        requires:
          - cancel_previous_pipelines
    - scala_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
          - canton-network-vpn
        name: "scala_test global upgrade sim time"
        test_names_file: "test-full-class-names-global-upgrade-sim-time.log"
        start_canton_options: "-s -g"
        resource_class: "xlarge"
        parallelism: 1
        requires:
          - cancel_previous_pipelines
    - ui_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    - bundle:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    # Ops
    - update_pipeline_schedule:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - slack-context
        requires:
          - cancel_previous_pipelines
    - deployment_test:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines
    - docker_images_build:
        <<: *notify-fail
        context:
          - artifactory
          - datadog
          - slack-context
        requires:
          - cancel_previous_pipelines

  deploy_cimain:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
    - docker_images_push:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
    - wait_for_previous_pipeline:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - slack-context
        workflow_names: "deploy_cimain"
    - deploy_cluster:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cimain"
        send_deployment_notification: false
        update_deployment_branch: false  # No need to create a deployment branch for cimain
        requires:
           - docker_images_push
           - wait_for_previous_pipeline
    - deploy_sv_runbook:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cimain"
        send_deployment_notification: false
        requires:
          - deploy_cluster
    - deploy_validator_runbook:
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cimain"
        requires:
          - deploy_cluster
    - preflight_check:
        cluster: "cimain"
        <<: *main-branch-only
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        requires:
          - wait_for_previous_pipeline
    - preflight_sv_check:
        <<: *main-branch-only
        cluster: "cimain"
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        requires:
          - wait_for_previous_pipeline
    - preflight_validator_check:
        <<: *main-branch-only
        cluster: "cimain"
        context:
          - artifactory
          - canton-network-vpn
          - datadog
          - slack-context
        requires:
          - wait_for_previous_pipeline

  deploy_cidaily_and_cidaily_testnet:
    when:
      equal: [ deploy-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
    - docker_images_push:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
    - wait_for_previous_pipeline:
        <<: *notify-fail
        <<: *main-branch-only
        context:
          - artifactory
          - slack-context
        workflow_names: "deploy_cidaily_and_cidaily_testnet cidaily_health_check cidaily_testnet_health_check redeploy_sv_runbook_cidaily"
    - deploy_cluster:
        name: deploy_cluster_cidaily
        <<: *main-branch-only
        context:
          - artifactory
          - datadog
          - slack-context
        cluster: "cidaily"
