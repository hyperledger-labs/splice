  cancel_if_not_opt_in:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - skip_if_flag_set:
          flag: force
      - run:
          name: Cancel the entire workflow if the current commit does not opt in for CI
          command: |
            last_commit_msg=$(git log -1 --pretty=%B)
            if [[ "${last_commit_msg}" != *"[ci]"* ]] && [[ "${last_commit_msg}" != *"[static]"* ]]; then
              echo "Cancelling the entire workflow because the current commit does not opt in for CI."
              curl -fsSL -X POST -H "Circle-Token: ${CIRCLECI_TOKEN}" "https://circleci.com/api/v2/workflow/${CIRCLE_WORKFLOW_ID}/cancel"
            else
              echo "Current commit opts in, letting it run."
            fi

  cancel_if_current_commit_is_base_version:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - run:
          name: Cancel the entire workflow if the current commit is a base version
          command: |
            source .envrc.vars
            latest_base_version=$(build-tools/find_latest_base_version.sh)
            if [[ "${CIRCLE_SHA1}" == "${latest_base_version}" ]]; then
              echo "Cancelling the entire workflow because the current commit is a base version."
              curl -fsSL -X POST -H "Circle-Token: ${CIRCLECI_TOKEN}" "https://circleci.com/api/v2/workflow/${CIRCLE_WORKFLOW_ID}/cancel"
            else
              echo "Current commit is ${CIRCLE_SHA1}, latest base version is ${latest_base_version}."
            fi
      - notify-cluster-fail:
          cluster: "ciupgrade"

  launch_ciupgrade_workflow:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - run:
          name: Launches the deploy_ciupgrade workflow, disabling partial upgrade if there are Helm/Pulumi changes
          command: |
            source .envrc.vars

            # defaults for base-version, run-daml-upgrade and run-partial-upgrade are good for main-like branches
            .circleci/launch-upgrade.sh --cluster ciupgrade --branch-filter-wait "^main|deployment/.*$|release-line.*"
      - notify-cluster-fail:
          cluster: "ciupgrade"

  wait_for_daml_upgrade:
    executor: self_hosted
    environment:
