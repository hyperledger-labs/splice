            - wait_for_previous_pipeline
            - artifacts_push
      - deploy_sv_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          cluster: "ciperiodic"
          force_non_devnet: true
          requires:
            - deploy_cluster
      - preflight_sv_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          force_non_devnet: true
          requires:
             - deploy_cluster
      - deploy_validator_runbook:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "ciperiodic"
          force_non_devnet: true
          requires:
            - deploy_cluster
      - preflight_validator_check:
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "ciperiodic"
          force_non_devnet: true
          requires:
            - deploy_cluster
      - reset_cluster:
          <<: *main-branch-only
          cluster: "ciperiodic"
          is_shared_cluster: false
          context:
            - canton-network-vpn
          requires:
            - preflight_sv_check
