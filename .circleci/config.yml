            export GLOBAL_DOMAIN_SV_CANTON_EXTRA_MIGRATIONS_RESET='0,1'

            cncluster ci_pdown_sv
          cmd_retry_count: 4
          cmd_retry_wait: 150
      - run_bash_command_in_nix:
          cmd_name: Push new branch with migration config changes
          cluster: << parameters.cluster >>
          gce_authenticate: true
          additional_nix_args: "--keep GH_USER --keep GH_TOKEN --keep CIRCLE_BRANCH --keep CIRCLE_WORKFLOW_ID"
          cmd: |
            cncluster activate
            git config user.email "splice-maintainers@digitalasset.com"
            git config user.name "DA Automation"
            git remote set-url origin https://${GH_USER}:${GH_TOKEN}@github.com/DACH-NY/canton-network-node.git

            UPGRADE_VERSION_BRANCH="<< parameters.cluster >>-migration-upgrade"
            git checkout $UPGRADE_VERSION_BRANCH
