workflows:
  version: 2

  publish_public_artifacts:
    when:
      equal: [ publish-public-artifacts, << pipeline.parameters.run-job >> ]
    jobs:
      - docker_images_push:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
      - publish_public_release:
          context:
            - artifactory
            - slack-context
          requires:
            - docker_images_push

  build:
    when:
      equal: [ build, << pipeline.parameters.run-job >> ]
    jobs:
      - cancel_previous_pipelines:
          <<: *notify-fail
          context:
            - slack-context
          workflow_names: "build"
          branch_filter: "$CIRCLE_BRANCH"
          branch_ignores: "^(main|deployment/.*)$"
          max_pipeline_age_secs: 7776000  # 90 days which is the max that the CCI API allows for pipeline cancellation
      - static_tests:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - cancel_previous_pipelines
      - daml_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - cancel_previous_pipelines
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test wall clock time"
          test_names_file: "test-full-class-names.log"
          start_canton_options: "-w -f -m"
          resource_class: "xlarge"
          parallelism: 8
          requires:
            - cancel_previous_pipelines
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test sim time"
          test_names_file: "test-full-class-names-sim-time.log"
          start_canton_options: "-s"
          resource_class: "xlarge"
          parallelism: 5
          requires:
            - cancel_previous_pipelines
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test frontend wall clock time"
          test_names_file: "test-full-class-names-frontend.log"
          start_canton_options: "-w"
          pre_sbt_cmd: "./start-frontends.sh -d -s"
          post_sbt_cmd: "./stop-frontends.sh"
          resource_class: "2xlarge"
          parallelism: 4
          requires:
            - cancel_previous_pipelines
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test frontend sim time"
          test_names_file: "test-full-class-names-frontend-sim-time.log"
          start_canton_options: "-s"
          pre_sbt_cmd: "./start-frontends.sh -d -s"
          post_sbt_cmd: "./stop-frontends.sh"
          resource_class: "xlarge"
          parallelism: 1
          requires:
            - cancel_previous_pipelines
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test frontend app manager"
          test_names_file: "test-full-class-names-frontend-app-manager.log"
          start_canton_options: "-w"
          pre_sbt_cmd: "./start-frontends.sh -d -s -m"
          post_sbt_cmd: "./stop-frontends.sh"
          resource_class: "xlarge"
          parallelism: 1
          requires:
            - cancel_previous_pipelines
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test global upgrade sim time"
          test_names_file: "test-full-class-names-global-soft-migration-sim-time.log"
          start_canton_options: "-s -g"
          resource_class: "xlarge"
          parallelism: 1
          requires:
            - cancel_previous_pipelines
      - scala_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
            - canton-network-vpn
          name: "scala_test disaster recovery"
          test_names_file: "test-full-class-names-disaster-recovery.log"
          start_canton_options: "-w"
          resource_class: "xlarge"
          parallelism: 1
          requires:
            - cancel_previous_pipelines
      - ui_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - cancel_previous_pipelines
      - bundle:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - cancel_previous_pipelines
      - update_pipeline_schedule:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          requires:
            - cancel_previous_pipelines
      - deployment_test:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - cancel_previous_pipelines
      - docker_images_build:
          <<: *notify-fail
          context:
            - artifactory
            - slack-context
          requires:
            - cancel_previous_pipelines

  deploy_cidaily_and_cidaily_testnet:
    when:
      equal: [ deploy-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - docker_images_push:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
      - wait_for_previous_pipeline:
          <<: *notify-fail
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily_and_cidaily_testnet cidaily_health_check cidaily_testnet_health_check redeploy_sv_runbook_cidaily backup_cidaily restore_sv_cidaily backup_cidaily_testnet restore_validator_cidaily_testnet"
      - deploy_cluster:
          name: deploy_cluster_cidaily
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily"
          requires:
            - docker_images_push
            - wait_for_previous_pipeline
      - deploy_cluster:
          name: deploy_cluster_cidaily_testnet
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily-testnet"
          restore_cluster: true
          requires:
            - docker_images_push
            - wait_for_previous_pipeline
      - preflight_check:
          name: preflight_check_devnet
          cluster: "cidaily"
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          wait_for_sv: false
          requires:
            - docker_images_push
            - deploy_cluster_cidaily
      - preflight_check:
          name: preflight_check_testnet
          cluster: "cidaily-testnet"
          <<: *non_devnet_preflight_params
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - docker_images_push
            - deploy_cluster_cidaily_testnet
      - publish_public_release:
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          requires:
            - preflight_check_devnet
            - preflight_check_testnet
      - deploy_sv_runbook:
          name: deploy_sv_runbook_devnet
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily"
          use_published_artifacts: true
          requires:
            - deploy_cluster_cidaily
            - publish_public_release
      - deploy_sv_runbook:
          name: deploy_sv_runbook_testnet
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily-testnet"
          restore_cluster: true
          requires:
            - deploy_cluster_cidaily_testnet
      - deploy_validator_runbook:
          name: deploy_validator_runbook_devnet
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily"
          use_published_artifacts: true
          requires:
            - deploy_cluster_cidaily
            - publish_public_release
      - deploy_validator_runbook:
          name: deploy_validator_runbook_testnet
          <<: *main-branch-only
          context:
            - artifactory
            - slack-context
          cluster: "cidaily-testnet"
          use_published_artifacts: true
          requires:
            - deploy_cluster_cidaily_testnet
            - publish_public_release
      - preflight_sv_check:
          name: preflight_sv_check_devnet
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cidaily"
          requires:
            - deploy_sv_runbook_devnet
      - preflight_sv_check:
          name: preflight_sv_check_testnet
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cidaily-testnet"
          requires:
            - deploy_sv_runbook_testnet
      - preflight_validator_check:
          name: preflight_validator_check_devnet
          <<: *main-branch-only
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          cluster: "cidaily"
          requires:
            - deploy_validator_runbook_devnet
      - backup_cluster:
          name: backup_cidaily
          <<: *main-branch-only
          cluster: "cidaily"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster_cidaily
      - backup_cluster:
          name: backup_cidaily_testnet
          <<: *main-branch-only
          cluster: "cidaily-testnet"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - deploy_cluster_cidaily_testnet

  cidaily_health_check:
    when:
      equal: [ healthcheck-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "redeploy_sv_runbook_cidaily"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily_and_cidaily_testnet"
      - cancel_if_previous_pipeline:
          name: skip_during_catchup
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          max_pipeline_age_secs: 2700
          workflow_names: "restore_sv_cidaily"
          only_if_running: false
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cidaily
          cluster: "cidaily"
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline
            - cancel_if_previous_pipeline
            - skip_during_catchup

  cidaily_testnet_health_check:
    when:
      equal: [ healthcheck-cidaily-testnet, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily-testnet
          context:
            - artifactory
            - slack-context
          workflow_names: "restore_validator_cidaily_testnet"
      - cancel_if_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily-testnet
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily_and_cidaily_testnet"
      - preflight_check:
          filters:
            branches:
              only:
                - deployment/cidaily-testnet
          cluster: "cidaily-testnet"
          <<: *non_devnet_preflight_params
          context:
            - artifactory
            - canton-network-vpn
            - slack-context
          requires:
            - wait_for_previous_pipeline
            - cancel_if_previous_pipeline

  redeploy_sv_runbook_cidaily:
    when:
      equal: [ redeploy-sv-runbook-cidaily, << pipeline.parameters.run-job >> ]
    jobs:
      - wait_for_previous_pipeline:
          <<: *notify-fail
          filters:
            branches:
              only:
                - deployment/cidaily
          context:
            - artifactory
            - slack-context
          workflow_names: "deploy_cidaily_and_cidaily_testnet redeploy_sv_runbook_cidaily cidaily_health_check"
      - docker_images_push:
