#            - slack-context
#          requires:
#            - preflight_sv_check_migrated
#            - preflight_validator_check_migrated
#            - preflight_check_migrated
      - reset_cluster:
          <<: *main-branch-never
          cluster: "user-selected-scratchnet"
          context:
            - canton-network-vpn
          requires:
            # TODO (#12393): readd: - restore_node_after_migration
            - preflight_sv_check_migrated
            - preflight_validator_check_migrated
            - preflight_check_migrated
            - migrate_sv_runbook
            - migrate_validator_runbook
      - enable_autoscaler:
          <<: *main-branch-never
          cluster: "user-selected-scratchnet"
          requires:
