            cncluster update_config_to_remove_migrating_from

            git add **/.envrc.vars
            git add **/config.yaml || true
            git commit -m "Add migration config to remove migratingFrom" || true
            git push origin $DEPLOYMENT_UPGRADE_BRANCH
          cmd_retry_count: 3

      - wait_for_pulumi_stacks_updated:
          cluster: << parameters.cluster >>
          pulumi_stack_names: "canton-network,infra,validator1,splitwell,sv-runbook,validator-runbook,sv-canton.sv-1-migration-1,sv-canton.sv-2-migration-1,sv-canton.sv-3-migration-1,sv-canton.sv-4-migration-1,sv-canton.sv-migration-1"
          expected_branch: << parameters.cluster >>-migration-upgrade
      - print_gcloud_logs_commands:
          cluster: <<parameters.cluster>>
      - when:
          condition: << parameters.send_notifications >>
          steps:
            - notify-cluster-fail:
                channel_notify: << parameters.channel_notify >>
                cluster: << parameters.cluster >>


  bump_configs:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix_self_hosted
      - run_bash_command_in_nix:
          cmd_name: Bump configs
          additional_nix_args: "--keep GH_TOKEN"
          cmd: |
            .circleci/cn-scripts/bump-configs.sh

  update_pipeline_schedule:
    docker:
      - image: cimg/base:2024.01
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - setup_nix
      - run_bash_command_in_nix:
          cmd_name: Update CircleCI pipeline configuration (incl. schedule triggers)
          additional_nix_args: --keep CIRCLECI_TOKEN
          cmd: |
            set -euo pipefail

            . .envrc.vars
            .circleci/triggers/setup-pipeline.sh

  build_tests_self_hosted:
    executor: self_hosted
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - skip_if_flag_set:
          flag: force
      - setup_nix_self_hosted
      - setup_sbt_test_job:
          runner_type: "selfhosted"
      - execute_sbt_command:
          cmd: "Test/compile"
      - save_sbt_job_result:
          runner_type: "selfhosted"
          upload_caches: true

  build_tests_circleci:
    docker:
      - image: cimg/base:2024.01
    resource_class: xlarge
    environment:
      <<: *env
    steps:
      - checkout_with_retry
      - skip_if_flag_set:
          flag: force
      - setup_nix_self_hosted
      - setup_sbt_test_job:
          runner_type: "circleci"
      - execute_sbt_command:
          cmd: "Test/compile"
      - save_sbt_job_result:
          runner_type: "circleci"
          upload_caches: true

  artifacts_push:
    machine:
      image: ubuntu-2204:2024.01.1
    environment:
      <<: *env
    parameters:
      is_public:
        type: boolean
        default: false
      checkout-branch:
        type: string
        default: "" # Default set to $CIRCLE_SHA1
    steps:
      - checkout_with_retry:
          checkout-branch: << parameters.checkout-branch >>
      - restore_frontend_builds
      - setup_nix
      - setup_sbt_test_job:
          runner_type: "circleci"
      - docker_login_artifactory
      - run_bash_command_in_nix:
          cmd_name: Check if release tag is on anything but a release-line branch
          additional_nix_args: --keep CIRCLE_BRANCH --keep SPLICE_ROOT
          cmd: ./scripts/halt-on-bad-release-commit-msg.sh .halt-build-step
      - run_bash_command_in_nix:
          cmd_name: Check if images already exist
          cmd: |
            if make docker-image-reference-exists IMG_REF_EXISTS_ARG=--err-missing; then
              echo "Docker images already exist"
              # Running a circleci-agent command from within run_bash_command_in_nix does not work, so we create a file
              # that represents the need to halt, and call `circleci-agent step halt` in a separate `run` step
              touch .halt-build-step
            fi
      - run:
          name: Halt build step if images already exist
          command: |
            if [ -f ".halt-build-step" ]; then
              echo "skipping rebuilding and pushing"
              circleci-agent step halt
            fi
      - run_bash_command_in_nix:
          cmd_name: Build app
          cmd: make build -j
          cmd_retry_count: 5 # Retry in case of dependency download errors
          additional_nix_args: "--keep ARTIFACTORY_USER \
           --keep ARTIFACTORY_PASSWORD"
      - docker_prep_build
      - docker_build
      - run_bash_command_in_nix:
          cmd_name: Push Docker images
          additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY \
           --keep DOCKER_CERT_PATH \
           --keep DOCKER_HOST \
           --keep DOCKER_MACHINE_NAME \
           --keep DOCKER_TLS_VERIFY \
           --keep NO_PROXY \
           --keep CIRCLE_BRANCH \
           --keep CIRCLE_REPOSITORY_URL \
           --keep CIRCLE_SHA1 \
           --keep GH_USER \
           --keep GH_TOKEN"
          cmd: |
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_USER" --password-stdin
            make docker-push -j
          cmd_retry_count: 5
      - run_bash_command_in_nix:
          additional_nix_args: "--keep ARTIFACTORY_USER \
            --keep ARTIFACTORY_PASSWORD \
            --keep CIRCLE_BRANCH \
            --keep OCI_DEV_HELM_REGISTRY \
            --keep GH_USER \
            --keep GH_TOKEN"
          cmd_name: Push Helm Artifacts
          cmd: |
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_USER" --password-stdin
            make cluster/helm/clean # otherwise the digests seem to be ignored as the charts are built in "Build app"
            make cluster/helm/write-digests
            make cluster/helm/build -j
            make cluster/helm/push -j
          cmd_retry_count: 5
      - run:
          name: Copy bundle
          command: |
            set -eou pipefail
            mkdir -p /tmp/artifacts
            cp apps/app/target/release/*.tar.gz /tmp/artifacts
      - run_bash_command_in_nix:
          cmd_name: Copy OpenAPI specs
          cmd: |
            set -eou pipefail
            scripts/copy-openapi.sh /tmp/artifacts/openapi.tar.gz
      - run_bash_command_in_nix:
          cmd_name: Rename release bundles
          cmd: |
            # we're renaming in a separate step because the `mv` command is not idempotent
            VERSION=$(get-snapshot-version)
            (cd /tmp/artifacts ; for filename in *.tar.gz; do mv "$filename" "${VERSION}_${filename}"; done)
      - run_bash_command_in_nix:
          cmd_name: Publish release bundles
          additional_nix_args: "--keep GCP_DA_CN_SHARED_KEY"
          cmd: |
            echo $GCP_DA_CN_SHARED_KEY | gcloud auth activate-service-account --key-file=-
            export GOOGLE_CLOUD_PROJECT=da-cn-shared
            # we cp with -n so that it doesn't try to overwrite an already uploaded bundle with this version,
            # which would lead to an error due to a missing `delete` permission
            gsutil cp -n /tmp/artifacts/*.tar.gz gs://cn-release-bundles
          # We suspect that in case of concurrent uploads, one of the `gsutil cp` calls will fail with a 412 error,
          # which is not automatically retried by `gsutil`. Therefore, we retry the command here.
          cmd_retry_count: 2
      - when:
          condition:
            equal: [ << parameters.is_public >>, true ]
          steps:
            - run_bash_command_in_nix:
                cmd_name: Copy artifacts to Github Container Registry
                additional_nix_args: "--keep GH_TOKEN \
                  --keep GH_USER \
                  --keep DEV_HELM_REGISTRY \
                  --keep DEV_DOCKER_REGISTRY \
                  --keep RELEASE_HELM_REGISTRY \
                  --keep RELEASE_DOCKER_REGISTRY \
                  --keep ARTIFACTORY_USER \
                  --keep ARTIFACTORY_PASSWORD"
                cmd: |
                  make cluster/helm/copy_release_to_ghcr
                  make cluster/docker/copy_release_to_ghcr
            - run_bash_command_in_nix:
                cmd_name: tag git
                additional_nix_args: "--keep GH_TOKEN --keep GH_USER"
                cmd: |
                  git remote set-url origin https://${GH_USER}:${GH_TOKEN}@github.com/DACH-NY/canton-network-node.git
                  RELEASE_TAG=$(get-snapshot-version)

                  if [ $(git tag -l "${RELEASE_TAG}") ]; then
                    echo "tag ${RELEASE_TAG} already exists."
                    exit 1
                  else
                    git tag "${RELEASE_TAG}"
                    git push origin "${RELEASE_TAG}"
                  fi

      - save_frontend_builds
      - save_sbt_job_result:
          runner_type: "circleci"

  wait_for_previous_pipeline:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to wait for.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$|release-line.*"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
      wait_type:
        type: string
        default: "wait"
    steps:
      - checkout_with_retry
      - run:
          name: "Wait for previous pipeline"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh \
              --current_pipeline_number << pipeline.number >> \
              --workflow_names "<< parameters.workflow_names >>" \
              --branch_filter "<< parameters.branch_filter >>" \
              --branch_filter_is_regex "<< parameters.branch_filter_is_regex >>" \
              --branch_ignores "<< parameters.branch_ignores >>" \
              --max_age_seconds << parameters.max_pipeline_age_secs >> \
              --waiting_job_name "wait_for_previous_pipeline" \
              << parameters.wait_type >>

  cancel_if_previous_pipeline:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to check if they exist and cancel current workflow if so.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$|release-line.*"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
        default: 28800  # limit search to pipelines that are 8 hours old
      extra_seconds_after_finish:
        type: integer
        default: 0
    steps:
      - checkout_with_retry
      - run:
          name: "Cancel if previous pipeline"
          command: |
            .circleci/wait_for_or_cancel_pipelines.sh \
              --current_pipeline_number << pipeline.number >> \
              --workflow_names "<< parameters.workflow_names >>" \
              --branch_filter "<< parameters.branch_filter >>" \
              --branch_filter_is_regex "<< parameters.branch_filter_is_regex >>" \
              --branch_ignores "<< parameters.branch_ignores >>" \
              --max_age_seconds << parameters.max_pipeline_age_secs >> \
              --extra_seconds_after_finish << parameters.extra_seconds_after_finish >> \
              cancel_self

  cancel_if_other_pipeline_failed:
    executor: self_hosted
    environment:
      <<: *env
    parameters:
      # space separated strings of workflow names to check if they exist and cancel current workflow if so.
      workflow_names:
        type: string
      branch_filter:
        type: string
        default: "^main|deployment/.*$|release-line.*"
      branch_filter_is_regex:
        type: boolean
        default: true
      branch_ignores:
        type: string
        default: "^$"
      max_pipeline_age_secs:
        type: integer
