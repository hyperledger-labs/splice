                steps:
                  - run:
                      name: sleep for << parameters.delay_mins >>
                      command: |
                        echo "Waiting for << parameters.delay_mins >> minutes."
                        sleep 60
                        # This loop is needed because CCI kills any task that sleeps for too long with no output
                        for (( i = 1; i < << parameters.delay_mins >>; i += 1 )); do
                          echo "Still waiting ($i min(s) elapsed)"
                          sleep 60
                        done
