            - preview_pulumi:
                cluster: << parameters.cluster >>
                project: "validator-runbook"
                when_env: "SPLICE_DEPLOY_VALIDATOR_RUNBOOK"
            - preview_pulumi:
                cluster: << parameters.cluster >>
