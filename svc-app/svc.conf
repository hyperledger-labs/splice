_svc_participant_remote {
  admin-api = {
    address = "canton-participant.default.svc.cluster.local"
    port = 5002
  }

  ledger-api = {
    address = "canton-participant.default.svc.cluster.local"
    port = 5001
  }
}

canton {
  svc-app {
    storage.type = memory
    admin-api = {
      address = "0.0.0.0"
      port = 5005
    }
    remote-participant = ${_svc_participant_remote}
    daml-user = "svc"
  }

  scan-app {
    storage.type = memory
    admin-api = {
      address = "0.0.0.0"
      port = 5012
    }
    remote-participant = ${_svc_participant_remote}
    svc-user = "svc"
  }
}
canton.features.enable-testing-commands = yes
