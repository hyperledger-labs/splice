# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: local
    hooks:
      - id: jsonnetfmt
        name: jsonnetfmt
        language: system
        entry: "jsonnetfmt --string-style d --in-place --"
        types: [jsonnet]
      - id: scalafmt
        name: scalafmt
        language: system
        require_serial: true
        entry: "bash -c 'sbt --client \"scalafmtOnly $@\"' bash"
        types: [scala]
        exclude: '/bootstrap.scala$'
