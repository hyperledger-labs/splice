# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: local
    hooks:
      - id: jsonnetfmt
        name: jsonnetfmt
        language: system
        entry: "jsonnetfmt --string-style d --in-place --"
        types: [jsonnet]
      - id: scalafmt
        name: scalafmt
        language: system
        require_serial: true
        entry: "bash -c 'sbt --client \"scalafmtOnly $@\"' bash"
        types: [scala]
      - id: dars_lock
        name: dars_lock
        language: system
        pass_filenames: false
        require_serial: true
        entry: "bash -c 'sbt --client \"damlDarsLockFileUpdate $@\"' bash"
        files: '(daml\.yaml|.*\.daml)'
      - id: shellcheck
        name: shellcheck
        language: system
        entry: "shellcheck"
        # ignore external sources
        args: [-e, SC1091]
        types: [shell]
        exclude: '^canton/'
      - id: typescriptfmt
        name: typescriptfmt
        language: system
        entry: "scripts/fix-ts.py"
        types_or: [javascript, jsx, ts, tsx]
        exclude: "/[.]prettierrc[.]cjs$"
      - id: pulumi_infra
        name: check pulumi infrastructure config
        language: system
        entry: "make cluster/pulumi/infrastructure/diff-config"
        files: '^cluster/pulumi/infrastructure/src/.*[.]ts$'
        pass_filenames: false
      - id: pulumi_cn
        name: check pulumi canton-network config
        language: system
        entry: "make cluster/pulumi/canton-network/diff-config"
        files: '^cluster/pulumi/canton-network/src/.*[.]ts$'
        pass_filenames: false
      - id: pulumi_sv
        name: check pulumi sv-runbook config
        language: system
        entry: "make cluster/pulumi/sv-runbook/diff-config"
        files: '^cluster/pulumi/sv-runbook/src/.*[.]ts$'
        pass_filenames: false
