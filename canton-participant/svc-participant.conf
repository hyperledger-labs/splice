canton {
  features {
    enable-testing-commands = yes
  }
  parameters {
    manual-start = no
  }

  monitoring {
    metrics.reporters = [{
      type = jmx
    }]
  }

  participants {
    svc_participant {
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 6864
      }

      ledger-api {
        address = "0.0.0.0"
        port = 6865
        max-deduplication-duration = 30s
      }
    }
  }
}
