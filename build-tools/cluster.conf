# This config file contains all nodes of our deployed Canton Network cluster
# Use it to interact with a deployed cluster through a locally running coin binary, e.g., using
# CLUSTER_ADDR=scratch.network.canton.global coin -v -c ./build-tools/cluster.conf

canton {
  remote-participants {

    # Validator1 node: canton participant
    validator1_participant {
      admin-api {
        port = 5102
        address = ${CLUSTER_ADDR}
      }
      ledger-api {
        port = 5101
        address = ${CLUSTER_ADDR}
      }
    }

    # Splitwell provider node: canton participant
    splitwell_participant {
      admin-api {
        port = 5202
        address = ${CLUSTER_ADDR}
      }
      ledger-api {
        port = 5201
        address = ${CLUSTER_ADDR}
      }
    }
  }

  # SVC node: scan app backend
  scan-app-clients {
    svc_scan {
      admin-api.url = "http://"${CLUSTER_ADDR}":5012"
    }
  }

  # Validator1 node: validator app backend
  validator-app-clients {
    validator1_validator {
      admin-api.url = ${CLUSTER_ADDR}":5103"
    }

    splitwell_validator {
      admin-api.url = ${CLUSTER_ADDR}":5203"
    }
  }

  # Validator1 node: wallet app backend
  # Note: user is hardcoded in the app config, this will be replaced by auth in the future
  wallet-app-clients {
    validator1_wallet_as_alice {
      admin-api.url = "http://"${CLUSTER_ADDR}":5104"
      ledger-api-user = "alice"
    }
    validator1_wallet_as_bob {
      admin-api.url = "http://"${CLUSTER_ADDR}":5104"
      ledger-api-user = "bob"
    }
    validator1_wallet_as_charlie {
      admin-api.url = "http://"${CLUSTER_ADDR}":5104"
      ledger-api-user = "charlie"
    }
  }

  splitwell-app-clients {
    aliceSplitwell {
        admin-api.port = 5213
        admin-api.address = ${CLUSTER_ADDR}
        ledger-api = ${canton.remote-participants.validator1_participant.ledger-api}
        scan-client.admin-api = ${canton.scan-app-clients.svc_scan.admin-api}
        ledger-api-user = "alice"
    }
  }

  features.enable-testing-commands = yes
}
