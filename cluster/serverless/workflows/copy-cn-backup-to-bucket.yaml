main:
    params: [args]
    steps:
    - init:
        assign:
        - projectId: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
        - location: ${sys.get_env("GOOGLE_CLOUD_LOCATION")}
        # TODO(#17852): for now, the instance ID is hardcoded to the participant from before the migration to ZRH
        - sourceInstance: sv-1-participant-0-pg-fc951b4
        - sourceProject: da-cn-mainnet
        - bucketName: cn-mainnet-backups
        # TODO(#17852): for now, this is the pre-zrh migration cluster
        - sourceCluster: cn-mainnet
        - beforeDate: ${args.beforeDate}
    - findBackupBeforeDate:
        call: http.get
        args:
          url: https://find-backup-before-125482597181.us-central1.run.app
          query:
              before: ${beforeDate}
              instance: ${sourceInstance}
          auth:
              type: OIDC
        result: sourceBackup
    - getRunIdFromBackup:
        assign:
        - cnBackupRunId: ${sourceBackup.body.description}
    - findAllBackups:
        call: http.get
        args:
          url: https://find-cloudsql-backups-125482597181.us-central1.run.app
          query:
            cluster: ${sourceCluster}
            namespace: sv-1
            backup_run_id: ${cnBackupRunId}
            project: ${sourceProject}
          auth:
            type: OIDC
        result: cloudSqlBackups
    - assertExactlyFourBackups:
        switch:
          - condition: ${len(cloudSqlBackups.body) != 4}
            raise: "There should be 4 backups, but found ${len(cloudSqlBackups.body)}"
    - copyBackups:
        parallel:
          branches:
            - cometBft:
                steps:
                  - copyCometBFTBackup:
                      call: copyCometBFTBackup
                      args:
                        cluster: ${sourceCluster}
                        clusterId: ${"cn-" + sourceCluster + "net"}
                        clusterProject: ${sourceProject}
                        clusterLocation: ${location}
                        namespace: sv-1
                        cnBackupRunId: ${cnBackupRunId}
                        bucketName: ${bucketName}
            - cloudSql:
                steps:
                  - copyCloudSqlBackups:
                      parallel:
                        for:
                          value: backup
                          in: ${cloudSqlBackups.body}
                          steps:
                            - copyCloudSqlBackup:
                                call: copyCloudSqlBackup
                                args:
                                  sourceCluster: ${sourceCluster}
                                  restoreInstanceProject: ${projectId}
                                  location: ${location}
                                  sourceInstance: ${backup.instance}
                                  backupName: ${backup.backup}
                                  cnBackupRunId: ${cnBackupRunId}
                                  bucketName: ${bucketName}


copyCometBFTBackup:
  params: [cluster, clusterId, clusterProject, clusterLocation, namespace, cnBackupRunId, bucketName]
  steps:
    - log:
        call: sys.log
        args:
            text: "Copying CometBFT backup"
            severity: INFO
    - deriveConstants:
        assign:
          - pvcName: ${"pvc-backup-" + cnBackupRunId}
          - jobName: ${"backup-" + cnBackupRunId}
          # TODO(#17852): For now, hardcoding migration ID 0 here, which is good enough for the first few months of backups
          - volumeSnapshot: ${"global-domain-0-cometbft-cometbft-data-" + cnBackupRunId}
          - gcpCredsSecretName: ${"gcp-credentials-" + cnBackupRunId}
          - targetDir: '${"gs://" + bucketName + "/" + cluster + "/" + cnBackupRunId}'
    - copyCometBFTBackup:
        try:
          call: tryCopyCometBFTBackup
          args:
            cluster: ${cluster}
            clusterId: ${clusterId}
            clusterProject: ${clusterProject}
            clusterLocation: ${clusterLocation}
            namespace: ${namespace}
            cnBackupRunId: ${cnBackupRunId}
            bucketName: ${bucketName}
            pvcName: ${pvcName}
            jobName: ${jobName}
            volumeSnapshot: ${volumeSnapshot}
            gcpCredsSecretName: ${gcpCredsSecretName}
            targetDir: ${targetDir}
        except:
          as: e
          steps:
            - cleanup:
                call: cleanCometBFTBackup
                args:
                  clusterId: ${clusterId}
                  clusterProject: ${clusterProject}
                  clusterLocation: ${clusterLocation}
                  namespace: ${namespace}
                  pvcName: ${pvcName}
                  jobName: ${jobName}
                  gcpCredsSecretName: ${gcpCredsSecretName}
            - failed:
                raise: ${e}

tryCopyCometBFTBackup:
  params: [cluster, clusterId, clusterProject, clusterLocation, namespace, cnBackupRunId, bucketName, pvcName, jobName, volumeSnapshot, gcpCredsSecretName, targetDir]
  steps:
    - getSnapshot:
        call: gke.request
        args:
          project: ${clusterProject}
          cluster_id: ${clusterId}
          path: '${"/apis/snapshot.storage.k8s.io/v1/namespaces/" + namespace + "/volumesnapshots/" + volumeSnapshot}'
          method: GET
        result: volumesnapshots
    - getRestoreSize:
        assign:
          - restoreSize: ${volumesnapshots.body.status.restoreSize}
    - getUploadSecret:
        call: googleapis.secretmanager.v1.projects.secrets.versions.access
        args:
          name: ${"projects/da-cn-shared/secrets/offline-backups-key/versions/latest"}
        result: uploadSecret
    - createK8sSecret:
        call: gke.request
        args:
          project: ${clusterProject}
          cluster_id: ${clusterId}
          path: '${"/api/v1/namespaces/" + namespace + "/secrets"}'
          method: POST
          body:
            apiVersion: v1
            kind: Secret
            metadata:
              name: ${gcpCredsSecretName}
            type: Opaque
            data:
              gcp-credentials.json: ${uploadSecret.payload.data}
    - createPvc:
        call: gke.request
        args:
            project: ${clusterProject}
            cluster_id: ${clusterId}
            path: '${"/api/v1/namespaces/" + namespace + "/persistentvolumeclaims"}'
            method: POST
            body:
              apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                name: ${pvcName}
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: ${restoreSize}
                storageClassName: standard-rwo
                volumeMode: Filesystem
                dataSource:
                  name: ${volumeSnapshot}
                  kind: VolumeSnapshot
                  apiGroup: snapshot.storage.k8s.io
    - createGkeJob:
        call: gke.create_job
        args:
          project: ${clusterProject}
          cluster_id: ${clusterId}
          location: ${clusterLocation}
          namespace: ${namespace}
          job:
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: ${jobName}
            spec:
              template:
                metadata:
                  labels:
                    sidecar.istio.io/inject: "false"
                spec:
                  volumes:
                    - name: restore-data
                      persistentVolumeClaim:
                        claimName: ${pvcName}
                    - name: gcp-credentials
                      secret:
                        secretName: ${gcpCredsSecretName}
                    - name: work
                      ephemeral:
                        volumeClaimTemplate:
                          spec:
                            accessModes: [ "ReadWriteOnce" ]
                            storageClassName: standard-rwo
                            resources:
                              requests:
                                storage: ${restoreSize}
                  containers:
                  - name: backup
                    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:489.0.0-stable
                    volumeMounts:
                      - mountPath: "/data"
                        name: restore-data
                      - mountPath: "/root/gcloud"
                        name: gcp-credentials
                        readOnly: true
                      - mountPath: "/work"
                        name: work
                    command: ["/bin/sh"]
                    args:
                      - "-c"
                      - '${"gcloud auth activate-service-account --key-file /root/gcloud/gcp-credentials.json 2>&1 && tar -C /data -czvf /work/backup.tar.gz . 2>&1 && gsutil cp /work/backup.tar.gz " + targetDir + "/cometbft/cometbft.tar.gz 2>&1"}'
                    env:
                      - name: GOOGLE_APPLICATION_CREDENTIALS
                        value: "/root/gcloud/gcp-credentials.json"
                  tolerations:
                  - key: "cn_apps"
                    operator: "Exists"
                    effect: "NoSchedule"
                  restartPolicy: OnFailure
    - wait_for_job:
        call: gke.await_job
        args:
          cluster_id: ${clusterId}
          job_name: ${jobName}
          location: ${clusterLocation}
          project: ${clusterProject}
          namespace: ${namespace}
          timeout: 360  # 1 hour
        result: completedJob
    - cleanup:
        call: cleanCometBFTBackup
        args:
          clusterId: ${clusterId}
          clusterProject: ${clusterProject}
          clusterLocation: ${clusterLocation}
          namespace: ${namespace}
          pvcName: ${pvcName}
          jobName: ${jobName}
          gcpCredsSecretName: ${gcpCredsSecretName}


cleanCometBFTBackup:
  params: [clusterId, clusterProject, clusterLocation, namespace, pvcName, jobName, gcpCredsSecretName]
  steps:
    - cleanup_job:
        try:
          call: gke.delete_job
          args:
            cluster_id: ${clusterId}
            job_name: ${jobName}
            location: ${clusterLocation}
            project: ${clusterProject}
            namespace: ${namespace}
            query:
              propagationPolicy: "Foreground"  # delete child Pods
        except:
          as: e
          call: sys.log
          args:
            text: ${e}
            severity: WARNING
    - delete_pvc:
        try:
          call: gke.request
          args:
            project: ${clusterProject}
            cluster_id: ${clusterId}
            path: '${"/api/v1/namespaces/" + namespace + "/persistentvolumeclaims/" + pvcName}'
            method: DELETE
        except:
          as: e
          call: sys.log
          args:
            text: ${e}
            severity: WARNING
    - delete_secret:
        try:
          call: gke.request
          args:
            project: ${clusterProject}
            cluster_id: ${clusterId}
            path: '${"/api/v1/namespaces/" + namespace + "/secrets/" + gcpCredsSecretName}'
            method: DELETE
        except:
          as: e
          call: sys.log
          args:
            text: ${e}
            severity: WARNING


copyCloudSqlBackup:
  params: [sourceCluster, restoreInstanceProject, location, sourceInstance, backupName, cnBackupRunId, bucketName]
  steps:
    - log:
        call: sys.log
        args:
            text: ${"Copying CloudSQL backup " + sourceInstance + "/" + backupName}
            severity: INFO
    - deriveConstants:
        assign:
        - targetDir: '${"gs://" + bucketName + "/" + sourceCluster + "/" + cnBackupRunId}'
        - restoreInstanceName: '${"backup-" + sourceInstance + "-" + cnBackupRunId}'
    - copyCloudSqlBackup:
        try:
          call: tryCopyCloudSqlBackup
          args:
            sourceCluster: ${sourceCluster}
            restoreInstanceProject: ${restoreInstanceProject}
            location: ${location}
            sourceInstance: ${sourceInstance}
            backupName: ${backupName}
            cnBackupRunId: ${cnBackupRunId}
            bucketName: ${bucketName}
            targetDir: ${targetDir}
            restoreInstanceName: ${restoreInstanceName}
        except:
          as: e
          steps:
            - cleanup:
                call: cleanCloudSqlBackup
                args:
                  restoreInstanceProject: ${restoreInstanceProject}
                  restoreInstanceName: ${restoreInstanceName}
                  bucketName: ${bucketName}
            - failed:
                raise: ${e}

tryCopyCloudSqlBackup:
  params: [sourceCluster, restoreInstanceProject, location, sourceInstance, backupName, cnBackupRunId, bucketName, targetDir, restoreInstanceName]
  steps:
    - createRestoreInstance:
        call: googleapis.sqladmin.v1.instances.insert
        args:
            project: ${restoreInstanceProject}
            body:
                databaseVersion: POSTGRES_14
                settings:
                    tier: db-custom-2-7680
                region: ${location}
                name: ${restoreInstanceName}
    - getRestoreInstance:
        call: googleapis.sqladmin.v1.instances.get
        args:
            project: ${restoreInstanceProject}
            instance: ${restoreInstanceName}
        result: restoreInstance
    - logRestoreInstance:
        call: sys.log
        args:
            text: ${restoreInstance}
            severity: INFO
    - addStoragePermissions:
        try:
          call: http.get
          args:
            url: https://sa-bucket-permissions-125482597181.us-central1.run.app
            query:
              bucket: ${bucketName}
              serviceAccount: ${restoreInstance.serviceAccountEmailAddress}
              operation: add
            auth:
              type: OIDC
        # Retrying because this will fail if invoked in parallel
        retry:
          predicate: ${http.default_retry_predicate}
          max_retries: 30
          backoff:
            initial_delay: 1
            max_delay: 10
            multiplier: 1.25
    - restore:
        call: googleapis.sqladmin.v1.instances.restoreBackup
        args:
            project: ${restoreInstanceProject}
            instance: ${restoreInstanceName}
            body:
                backup: ${backupName}
    - getDatabases:
        call: googleapis.sqladmin.v1.databases.list
        args:
            project: ${restoreInstanceProject}
            instance: ${restoreInstanceName}
        result: databases
    - exportDatabases:
        # Not sure why I couldn't get the parallel exports to work.
        # They did in gscloud CLI, so it's possible. I expected offload:false
        # to do the trick, based on the conflict table here: https://cloud.google.com/sql/docs/postgres/import-export/
        # This matters mostly fo the cn-apps instance. In the rest, there's only
        # one large DB. It is debatable whether we even need to run this
        # for the cn-apps instance.
        # parallel:
            for:
                value: database
                in: ${databases.items}
                steps:
                - getFilename:
                    assign:
                    - filename: ${targetDir + "/" + restoreInstanceName + "/" + database.name + ".sql.gz"}
                - exportDatabase:
                    call: googleapis.sqladmin.v1.instances.export
                    args:
                        project: ${restoreInstanceProject}
                        instance: ${restoreInstanceName}
                        body:
                            exportContext:
                                uri: ${filename}
                                databases:
                                - ${database.name}
                                fileType: SQL
                                offload: false  # offloaded exports cannot run in parallel, and do not make sense from the (not-in-use) restore instance
    - cleanup:
        call: cleanCloudSqlBackup
        args:
          restoreInstanceProject: ${restoreInstanceProject}
          restoreInstanceName: ${restoreInstanceName}
          bucketName: ${bucketName}

cleanCloudSqlBackup:
  params: [restoreInstanceProject, restoreInstanceName, bucketName]
  steps:
    - cleanup:
        try:
          steps:
          - getRestoreInstance:
              call: googleapis.sqladmin.v1.instances.get
              args:
                  project: ${restoreInstanceProject}
                  instance: ${restoreInstanceName}
              result: restoreInstance
          - deleteInstance:
              call: googleapis.sqladmin.v1.instances.delete
              args:
                  project: ${restoreInstanceProject}
                  instance: ${restoreInstanceName}
          - revokeStoragePermissions:
              try:
                call: http.get
                args:
                  url: https://sa-bucket-permissions-125482597181.us-central1.run.app
                  query:
                    bucket: ${bucketName}
                    serviceAccount: ${restoreInstance.serviceAccountEmailAddress}
                    operation: remove
                  auth:
                    type: OIDC
                result: bindings
              # Retrying because this will fail if invoked in parallel
              retry:
                predicate: ${http.default_retry_predicate}
                max_retries: 30
                backoff:
                  initial_delay: 1
                  max_delay: 10
                  multiplier: 1.25
        except:
          as: e
          call: sys.log
          args:
            text: ${e}
            severity: WARNING
