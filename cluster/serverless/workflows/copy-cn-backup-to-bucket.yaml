# Example arguments:
# Last backup that finished before 2024/10/13: {"beforeDate": "2024-10-13", "migrationId": 0}
# Specific backup run ID: {"cnBackupRunId": "1729083735", "migrationId": 0}

main:
    params: [args]
    steps:
    - init:
        assign:
        - projectId: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
        - projectNumber: ${sys.get_env("GOOGLE_CLOUD_PROJECT_NUMBER")}
        - location: ${sys.get_env("GOOGLE_CLOUD_LOCATION")}
        # We find the latest backup from the cn-apps DB, which is migration-agnostic,
        # so that we have one less thing to update in HDMs.
        - sourceInstanceForFindingLatestBackup: sv-1-cn-apps-pg-8f8c7e7
        - sourceProject: da-cn-mainnet
        - sourceClusterLocation: europe-west6-a
        - bucketName: da-cn-mainnet-backups
        - sourceCluster: mainzrh
        - migrationId: ${args.migrationId}
    # If a backup run ID is provided, use it.
    - getCnBackupRunId:
        switch:
          - condition: ${"cnBackupRunId" in args}
            assign:
              - cnBackupRunId: ${args.cnBackupRunId}
          - condition: true #else
            steps:
              # A backup run ID was not explicitly provided, find the latest backup before the provided date.
              - initBeforeDate:
                  assign:
                  - beforeDate: ${args.beforeDate}
              - findBackupBeforeDate:
                  call: http.get
                  args:
                    url: ${"https://find-backup-before-" + projectNumber + ".us-central1.run.app"}
                    query:
                        before: ${beforeDate}
                        instance: ${sourceInstanceForFindingLatestBackup}
                        project: ${sourceProject}
                    auth:
                        type: OIDC
                  result: sourceBackup
              - getRunIdFromBackup:
                  assign:
                  - cnBackupRunId: ${sourceBackup.body.description}
    - findAllBackups:
        call: http.get
        args:
          url: ${"https://find-cloudsql-backups-" + projectNumber + ".us-central1.run.app"}
          query:
            cluster: ${sourceCluster}
            namespace: sv-1
            backup_run_id: ${cnBackupRunId}
            project: ${sourceProject}
          auth:
            type: OIDC
        result: cloudSqlBackups
    - assertExactlyFourBackups:
        switch:
          - condition: ${len(cloudSqlBackups.body) != 4}
            raise: ${"There should be 4 backups, but found " + len(cloudSqlBackups.body)}
    - copyBackups:
        parallel:
          branches:
            - cometBft:
                steps:
                  - copyCometBFTBackup:
                      call: copyCometBFTBackup
                      args:
                        cluster: ${sourceCluster}
                        clusterId: ${"cn-" + sourceCluster + "net"}
                        clusterProject: ${sourceProject}
                        clusterLocation: ${sourceClusterLocation}
                        namespace: sv-1
                        cnBackupRunId: ${cnBackupRunId}
                        bucketName: ${bucketName}
                        migrationId: ${migrationId}
            - cloudSql:
                steps:
                  - copyCloudSqlBackups:
                      parallel:
                        for:
                          value: backup
                          in: ${cloudSqlBackups.body}
                          steps:
                            - copyCloudSqlBackup:
                                call: copyCloudSqlBackup
                                args:
                                  sourceCluster: ${sourceCluster}
                                  restoreInstanceProject: ${projectId}
                                  location: ${location}
                                  sourceInstance: ${backup.instance}
                                  backupName: ${backup.backup}
                                  cnBackupRunId: ${cnBackupRunId}
                                  bucketName: ${bucketName}
                                  migrationId: ${migrationId}


copyCometBFTBackup:
  params: [cluster, clusterId, clusterProject, clusterLocation, namespace, cnBackupRunId, bucketName, migrationId]
  steps:
    - log:
        call: sys.log
        args:
            text: "Copying CometBFT backup"
            severity: INFO
    - deriveConstants:
        assign:
          - pvcName: ${"pvc-backup-" + cnBackupRunId}
          - jobName: ${"backup-" + cnBackupRunId}
          - volumeSnapshot: ${"global-domain-" + migrationId + "-cometbft-cometbft-data-" + cnBackupRunId}
          - gcpCredsSecretName: ${"gcp-credentials-" + cnBackupRunId}
          - targetDir: '${"gs://" + bucketName + "/" + cluster + "/migration-" + migrationId + "-" + cnBackupRunId}'
    - copyCometBFTBackup:
        try:
          call: tryCopyCometBFTBackup
          args:
            cluster: ${cluster}
            clusterId: ${clusterId}
            clusterProject: ${clusterProject}
            clusterLocation: ${clusterLocation}
            namespace: ${namespace}
            cnBackupRunId: ${cnBackupRunId}
            bucketName: ${bucketName}
            pvcName: ${pvcName}
            jobName: ${jobName}
            volumeSnapshot: ${volumeSnapshot}
            gcpCredsSecretName: ${gcpCredsSecretName}
            targetDir: ${targetDir}
        except:
          as: e
          steps:
            - cleanup:
                call: cleanCometBFTBackup
                args:
                  clusterId: ${clusterId}
                  clusterProject: ${clusterProject}
                  clusterLocation: ${clusterLocation}
                  namespace: ${namespace}
                  pvcName: ${pvcName}
                  jobName: ${jobName}
                  gcpCredsSecretName: ${gcpCredsSecretName}
            - failed:
                raise: ${e}

tryCopyCometBFTBackup:
  params: [cluster, clusterId, clusterProject, clusterLocation, namespace, cnBackupRunId, bucketName, pvcName, jobName, volumeSnapshot, gcpCredsSecretName, targetDir]
  steps:
    - getSnapshot:
        call: gke.request
        args:
          project: ${clusterProject}
          cluster_id: ${clusterId}
          location: ${clusterLocation}
          path: '${"/apis/snapshot.storage.k8s.io/v1/namespaces/" + namespace + "/volumesnapshots/" + volumeSnapshot}'
          method: GET
        result: volumesnapshots
    - getRestoreSize:
        assign:
          - restoreSize: ${volumesnapshots.body.status.restoreSize}
    - getUploadSecret:
        call: googleapis.secretmanager.v1.projects.secrets.versions.access
        args:
          name: ${"projects/da-cn-shared/secrets/offline-backups-key/versions/latest"}
        result: uploadSecret
    - createK8sSecret:
        call: gke.request
        args:
          project: ${clusterProject}
          cluster_id: ${clusterId}
          location: ${clusterLocation}
          path: '${"/api/v1/namespaces/" + namespace + "/secrets"}'
          method: POST
          body:
            apiVersion: v1
            kind: Secret
            metadata:
              name: ${gcpCredsSecretName}
            type: Opaque
            data:
              gcp-credentials.json: ${uploadSecret.payload.data}
    - createPvc:
        call: gke.request
        args:
            project: ${clusterProject}
            cluster_id: ${clusterId}
            location: ${clusterLocation}
            path: '${"/api/v1/namespaces/" + namespace + "/persistentvolumeclaims"}'
            method: POST
            body:
              apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                name: ${pvcName}
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: ${restoreSize}
                storageClassName: standard-rwo
                volumeMode: Filesystem
                dataSource:
                  name: ${volumeSnapshot}
                  kind: VolumeSnapshot
                  apiGroup: snapshot.storage.k8s.io
    - createGkeJob:
        call: gke.create_job
        args:
          project: ${clusterProject}
          cluster_id: ${clusterId}
          location: ${clusterLocation}
          namespace: ${namespace}
          job:
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: ${jobName}
            spec:
              template:
                metadata:
                  labels:
                    sidecar.istio.io/inject: "false"
                spec:
                  volumes:
                    - name: restore-data
                      persistentVolumeClaim:
                        claimName: ${pvcName}
                    - name: gcp-credentials
                      secret:
                        secretName: ${gcpCredsSecretName}
                    - name: work
                      ephemeral:
                        volumeClaimTemplate:
                          spec:
                            accessModes: [ "ReadWriteOnce" ]
                            storageClassName: standard-rwo
                            resources:
                              requests:
                                storage: ${restoreSize}
                  containers:
                  - name: backup
                    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:489.0.0-stable
                    volumeMounts:
                      - mountPath: "/data"
                        name: restore-data
                      - mountPath: "/root/gcloud"
                        name: gcp-credentials
                        readOnly: true
                      - mountPath: "/work"
                        name: work
                    command: ["/bin/sh"]
                    args:
                      - "-c"
                      - '${"gcloud auth activate-service-account --key-file /root/gcloud/gcp-credentials.json 2>&1 && tar -C /data -czvf /work/backup.tar.gz . 2>&1 && gsutil cp /work/backup.tar.gz " + targetDir + "/cometbft/cometbft.tar.gz 2>&1"}'
                    env:
                      - name: GOOGLE_APPLICATION_CREDENTIALS
                        value: "/root/gcloud/gcp-credentials.json"
                  tolerations:
                  - key: "cn_apps"
                    operator: "Exists"
                    effect: "NoSchedule"
                  restartPolicy: OnFailure
    - wait_for_job:
        call: gke.await_job
        args:
          cluster_id: ${clusterId}
          job_name: ${jobName}
          location: ${clusterLocation}
          project: ${clusterProject}
          namespace: ${namespace}
          timeout: 10800  # 3 hours
        result: completedJob
    - cleanup:
        call: cleanCometBFTBackup
        args:
          clusterId: ${clusterId}
          clusterProject: ${clusterProject}
          clusterLocation: ${clusterLocation}
          namespace: ${namespace}
          pvcName: ${pvcName}
          jobName: ${jobName}
          gcpCredsSecretName: ${gcpCredsSecretName}


cleanCometBFTBackup:
  params: [clusterId, clusterProject, clusterLocation, namespace, pvcName, jobName, gcpCredsSecretName]
  steps:
    - cleanup_job:
        try:
          call: gke.delete_job
          args:
            cluster_id: ${clusterId}
            job_name: ${jobName}
            location: ${clusterLocation}
            project: ${clusterProject}
            namespace: ${namespace}
            query:
              propagationPolicy: "Foreground"  # delete child Pods
        except:
          as: e
          call: sys.log
          args:
            text: ${e}
            severity: WARNING
    - delete_pvc:
        try:
          call: gke.request
          args:
            project: ${clusterProject}
            cluster_id: ${clusterId}
            location: ${clusterLocation}
            path: '${"/api/v1/namespaces/" + namespace + "/persistentvolumeclaims/" + pvcName}'
            method: DELETE
        except:
          as: e
          call: sys.log
          args:
            text: ${e}
            severity: WARNING
    - delete_secret:
        try:
          call: gke.request
          args:
            project: ${clusterProject}
            cluster_id: ${clusterId}
            location: ${clusterLocation}
            path: '${"/api/v1/namespaces/" + namespace + "/secrets/" + gcpCredsSecretName}'
            method: DELETE
        except:
          as: e
          call: sys.log
          args:
            text: ${e}
            severity: WARNING


copyCloudSqlBackup:
  params: [sourceCluster, restoreInstanceProject, location, sourceInstance, backupName, cnBackupRunId, bucketName, migrationId]
  steps:
    - log:
        call: sys.log
        args:
            text: ${"Copying CloudSQL backup " + sourceInstance + "/" + backupName}
            severity: INFO
    - deriveConstants:
        assign:
        - targetDir: '${"gs://" + bucketName + "/" + sourceCluster + "/migration-" + migrationId + "-" + cnBackupRunId}'
        - restoreInstanceName: '${"backup-" + sourceInstance + "-" + cnBackupRunId}'
    - copyCloudSqlBackup:
        try:
          call: tryCopyCloudSqlBackup
          args:
            sourceCluster: ${sourceCluster}
            restoreInstanceProject: ${restoreInstanceProject}
            location: ${location}
            sourceInstance: ${sourceInstance}
            backupName: ${backupName}
            cnBackupRunId: ${cnBackupRunId}
            bucketName: ${bucketName}
            targetDir: ${targetDir}
            restoreInstanceName: ${restoreInstanceName}
            migrationId: ${migrationId}
        except:
          as: e
          steps:
            - cleanup:
                call: cleanCloudSqlBackup
                args:
                  restoreInstanceProject: ${restoreInstanceProject}
                  restoreInstanceName: ${restoreInstanceName}
                  bucketName: ${bucketName}
            - failed:
                raise: ${e}

tryCopyCloudSqlBackup:
  params: [sourceCluster, restoreInstanceProject, location, sourceInstance, backupName, cnBackupRunId, bucketName, targetDir, restoreInstanceName, migrationId]
  steps:
    - createRestoreInstance:
        call: googleapis.sqladmin.v1.instances.insert
        args:
            project: ${restoreInstanceProject}
            body:
                databaseVersion: POSTGRES_14
                settings:
                    tier: db-custom-2-7680
                region: ${location}
                name: ${restoreInstanceName}
    - getRestoreInstance:
        call: googleapis.sqladmin.v1.instances.get
        args:
            project: ${restoreInstanceProject}
            instance: ${restoreInstanceName}
        result: restoreInstance
    - logRestoreInstance:
        call: sys.log
        args:
            text: ${restoreInstance}
            severity: INFO
    - addStoragePermissions:
        try:
          call: http.get
          args:
            url: ${"https://sa-bucket-permissions-" + sys.get_env("GOOGLE_CLOUD_PROJECT_NUMBER") + ".us-central1.run.app"}
            query:
              bucket: ${bucketName}
              serviceAccount: ${restoreInstance.serviceAccountEmailAddress}
              operation: add
            auth:
              type: OIDC
        # Retrying because this will fail if invoked in parallel
        retry:
          predicate: ${http.default_retry_predicate}
          max_retries: 30
          backoff:
            initial_delay: 1
            max_delay: 10
            multiplier: 1.25
    - restore:
        call: googleapis.sqladmin.v1.instances.restoreBackup
        args:
            project: ${restoreInstanceProject}
            instance: ${restoreInstanceName}
            body:
                backup: ${backupName}
    - getDatabases:
        call: googleapis.sqladmin.v1.databases.list
        args:
            project: ${restoreInstanceProject}
            instance: ${restoreInstanceName}
        result: databases
    - exportDatabases:
        # Not sure why I couldn't get the parallel exports to work.
        # They did in gscloud CLI, so it's possible. I expected offload:false
        # to do the trick, based on the conflict table here: https://cloud.google.com/sql/docs/postgres/import-export/
        # This matters mostly fo the cn-apps instance. In the rest, there's only
        # one large DB. It is debatable whether we even need to run this
        # for the cn-apps instance.
        # parallel:
            for:
                value: database
                in: ${databases.items}
                steps:

                - testCopyConditions:
                    switch:
                      - condition: ${text.match_regex(sourceInstance, ".*mediator.*")}
                        switch:
                          - condition: ${text.match_regex(database.name, ".*mediator.*")}
                            assign:
                              - dbMigrationId: ${text.replace_all_regex(database.name, "global_domain_|_mediator", "")}
                              - copy: ${dbMigrationId == string(migrationId)}
                          - condition: true # else, i.e. not the main mediator database, we always copy those
                            assign:
                              - copy: true
                      - condition: ${text.match_regex(sourceInstance, ".*sequencer.*")}
                        switch:
                          - condition: ${text.match_regex(database.name, ".*sequencer.*")}
                            assign:
                              - dbMigrationId: ${text.replace_all_regex(database.name, "global_domain_|_sequencer", "")}
                              - copy: ${dbMigrationId == string(migrationId)}
                          - condition: true # else, i.e. not the main sequencer database, we always copy those
                            assign:
                              - copy: true
                      - condition:  ${text.match_regex(sourceInstance, ".*participant.*")}
                        switch:
                          - condition: ${text.match_regex(database.name, ".*participant.*")}
                            assign:
                              - dbMigrationId: ${text.replace_all(database.name, "participant_", "")}
                              - copy: ${dbMigrationId == string(migrationId)}
                          - condition: true # else, i.e. not the main participant database, we always copy those
                            assign:
                              - copy: true
                      - condition: true # else, i.e. not a mediator, sequencer, or participant instance, so the apps instance. We copy all its DBs
                        assign:
                          - copy: true
                - copyIfNeeded:
                    switch:
                      - condition: ${copy}
                        steps:
                          - getFilename:
                              assign:
                              - filename: ${targetDir + "/" + restoreInstanceName + "/" + database.name + ".sql.gz"}
                          - exportDatabase:
                              call: googleapis.sqladmin.v1.instances.export
                              args:
                                  project: ${restoreInstanceProject}
                                  instance: ${restoreInstanceName}
                                  body:
                                      exportContext:
                                          uri: ${filename}
                                          databases:
                                          - ${database.name}
                                          fileType: SQL
                                          offload: false  # offloaded exports cannot run in parallel, and do not make sense from the (not-in-use) restore instance
                                  connector_params:
                                    timeout: 86400 # 24 hours
    - cleanup:
        call: cleanCloudSqlBackup
        args:
          restoreInstanceProject: ${restoreInstanceProject}
          restoreInstanceName: ${restoreInstanceName}
          bucketName: ${bucketName}

cleanCloudSqlBackup:
  params: [restoreInstanceProject, restoreInstanceName, bucketName]
  steps:
    - cleanup:
        try:
          steps:
          - getRestoreInstance:
              call: googleapis.sqladmin.v1.instances.get
              args:
                  project: ${restoreInstanceProject}
                  instance: ${restoreInstanceName}
              result: restoreInstance
          - revokeStoragePermissions:
              try:
                call: http.get
                args:
                  url: ${"https://sa-bucket-permissions-" + sys.get_env("GOOGLE_CLOUD_PROJECT_NUMBER") + ".us-central1.run.app"}
                  query:
                    bucket: ${bucketName}
                    serviceAccount: ${restoreInstance.serviceAccountEmailAddress}
                    operation: remove
                  auth:
                    type: OIDC
                result: bindings
              # Retrying because this will fail if invoked in parallel
              retry:
                predicate: ${http.default_retry_predicate}
                max_retries: 30
                backoff:
                  initial_delay: 1
                  max_delay: 10
                  multiplier: 1.25
          - deleteInstance:
              call: googleapis.sqladmin.v1.instances.delete
              args:
                  project: ${restoreInstanceProject}
                  instance: ${restoreInstanceName}
        except:
          as: e
          call: sys.log
          args:
            text: ${e}
            severity: WARNING
