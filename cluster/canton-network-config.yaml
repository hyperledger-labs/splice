apiVersion: apps/v1
kind: Deployment
metadata:
  name: cn-docs-deployment
  labels:
    app: cn-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cn-docs
  template:
    metadata:
      labels:
        app: cn-docs
    spec:
      containers:
      - name: cn-docs
        image:  us-central1-docker.pkg.dev/cn-devnet-353712/cn-devnet-images/docs:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cn-docs-service
spec:
  selector:
    app: cn-docs
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cn-site-ingress
  annotations:
      kubernetes.io/ingress.global-static-ip-name: cn-devnet-ip
spec:
  defaultBackend:
    service:
      name: cn-docs-service
      port:
        number: 80