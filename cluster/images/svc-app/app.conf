_client_credentials_auth_config {
  type = "client-credentials"
  well-known-config-url = ${?CN_APP_SVC_LEDGER_API_AUTH_URL}
  client-id = ${?CN_APP_SVC_LEDGER_API_AUTH_CLIENT_ID}
  client-secret = ${?CN_APP_SVC_LEDGER_API_AUTH_CLIENT_SECRET}
  # TODO(#1837) use actual audience of the target participant
  audience = "https://canton.network.global"
}

_svc_participant_client {
  admin-api = {
    address = "participant"
    address = ${?CN_APP_SVC_PARTICIPANT_ADDRESS}
    port = 5002
  }

  ledger-api.client-config = {
    address = "participant"
    address = ${?CN_APP_SVC_PARTICIPANT_ADDRESS}
    port = 5001
  }
  ledger-api.auth-config = ${_client_credentials_auth_config}
}

canton {
  svc-app {
    storage.type = memory
    admin-api = {
      address = "0.0.0.0"
      port = 5005
    }
    participant-client = ${_svc_participant_client}
    sv-user = ${?CN_APP_SVC_LEDGER_API_AUTH_USER_NAME}
    domains {
      global {
        alias = "global"
      }
    }
  }
}
canton.features.enable-testing-commands = yes
