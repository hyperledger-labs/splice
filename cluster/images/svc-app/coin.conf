_svc_participant_remote {
  admin-api = {
    address = "canton-participant"
    port = 5002
  }

  ledger-api.client-config = {
    address = "canton-participant"
    port = 5001
  }
  ledger-api.auth-config = {
    type = "none"
  }
}

canton {
  svc-app {
    storage.type = memory
    admin-api = {
      address = "0.0.0.0"
      port = 5005
    }
    remote-participant = ${_svc_participant_remote}
    daml-user = "svc"
  }
}
canton.features.enable-testing-commands = yes
