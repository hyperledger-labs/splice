### SV Web UI @ SV 2

server {
    listen       80;
    listen  [::]:80;

    server_name  sv.sv-2.svc.*;

    location ~ ^/(api/v0/sv/)(.*) {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_http_version 1.1;
       proxy_pass http://sv-app.sv-2.svc.cluster.local:5014/$2$is_args$args;
    }

    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_pass http://sv-web-ui.sv-2.svc.cluster.local;
    }
}
