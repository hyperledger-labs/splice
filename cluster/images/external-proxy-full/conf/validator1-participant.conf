### Canton Participant @ Validator1

server {
    listen       5102 http2;
    server_name  localhost;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       grpc_pass grpc://participant.validator1.svc.cluster.local:5002;
    }
}

server {
    listen       5101 http2;
    server_name  localhost;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       grpc_pass grpc://participant.validator1.svc.cluster.local:5001;
    }
}

server {
    listen       10113;
    server_name  localhost;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_http_version 1.1;
       proxy_pass http://participant.validator1.svc.cluster.local:10013;
    }
}


server {
    listen       6101;
    server_name  localhost;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://participant.validator1.svc.cluster.local:6001;
       proxy_http_version 1.1;
    }
}
