server {
    listen       80;
    listen  [::]:80;

    server_name  localhost;

    root /config;

    location / {
        try_files  $uri @docs;
    }

    location @docs {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_pass http://docs.docs.svc.cluster.local;
    }

    location /release-bundles {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_pass http://gcs-proxy.docs.svc.cluster.local:8080;
    }
}
