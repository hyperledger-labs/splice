### Scan App

server {
    listen       80;
    listen  [::]:80;

    server_name  scan.sv-1.svc.*;

    location ~ ^/(api/v0/scan/)(.*) {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_pass http://scan-app.sv-1.svc.cluster.local:5012/$2$is_args$args;
    }

    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_http_version 1.1;
        proxy_pass http://scan-web-ui.sv-1.svc.cluster.local/;
    }
}
