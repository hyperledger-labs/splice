### Directory Web UI @ Validator1

server {
    listen       80;
    listen  [::]:80;

    server_name  cns.validator1.*;

    location ~ ^/(api/validator/.*) {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://validator-app.validator1.svc.cluster.local:5003/$1$is_args$args;
       proxy_http_version 1.1;
    }

    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://cns-web-ui.validator1.svc.cluster.local;
        proxy_http_version 1.1;
    }
}
