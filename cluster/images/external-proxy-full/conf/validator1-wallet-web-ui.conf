### Wallet Web UI @ Validator1

server {
    listen       80;
    listen  [::]:80;

    server_name  wallet.validator1.*;

    location ~ ^/(api/v0/validator/)(.*) {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://validator-app.validator1.svc.cluster.local:5003/$2$is_args$args;
    }

    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://wallet-web-ui.validator1.svc.cluster.local;
    }
}
