### Splitwell Web UI @ Validator1

server {
    listen       80;
    listen  [::]:80;

    server_name  splitwell.validator1.*;

    location ~ ^/(api/json-api/)(.*) {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://participant.validator1.svc.cluster.local:7575/$2$is_args$args;
       proxy_http_version 1.1;
    }

    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://splitwell-web-ui.validator1.svc.cluster.local/;
        proxy_http_version 1.1;
    }
}
