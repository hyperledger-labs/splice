### Splitwell App @ Splitwell-validator

server {
    listen       80;
    listen  [::]:80;

    server_name  splitwell.*;

    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://splitwell-app.splitwell.svc.cluster.local:5213;
        proxy_http_version 1.1;
   }
}
