### Splitwell App @ Splitwell-validator

server {
    listen       5213 http2;
    server_name  localhost;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       grpc_pass grpc://splitwell-app.splitwell.svc.cluster.local:5213;
    }
}

server {
    listen       6213;
    server_name  localhost;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://splitwell-app.splitwell.svc.cluster.local:6213;
       proxy_http_version 1.1;
    }
}

server {
    listen       80;
    listen  [::]:80;

    server_name  splitwell.*;

    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://splitwell-app.splitwell.svc.cluster.local:6213;
        proxy_http_version 1.1;
   }
}
