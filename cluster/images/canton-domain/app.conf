canton {
  parameters {
    manual-start = no
  }

  domains {
    domain {
      storage {
        type = postgres
        config {
           dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
           properties = {
             serverName = ${CANTON_DOMAIN_POSTGRES_SERVER}
             portNumber = "5432"
             databaseName = "cantonnet"
             currentSchema = "domain"
             user = "cnadmin"
             password = "cnadmin"
           }
         }
       }

      public-api {
        address = "0.0.0.0"
        port = 5008
      }

      admin-api {
        address = "0.0.0.0"
        port = 5009
      }
      init.domain-parameters {
        unique-contract-keys = false
        will-corrupt-your-system-dev-version-support = yes
        protocol-version = dev
      }
    }
  }

  monitoring.metrics.reporters = [{
    type = prometheus
    address = "0.0.0.0"
    port = 10013
  }]
}
