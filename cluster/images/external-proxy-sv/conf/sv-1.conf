#### SV 1

server {
    listen       5014 ssl;
    server_name  localhost ssl;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://sv-app.${INGRESS_CONFIG_SV_NAMESPACE}.svc.cluster.local:5014;
    }
}
