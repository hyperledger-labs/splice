server {
    listen       80;
    listen  [::]:80;

    server_name  localhost;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;

    server_name  localhost;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    root /config;

    location / {
        try_files  $uri @docs;
    }

    location @docs {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://docs.docs.svc.cluster.local;
    }

    location /release-bundles {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://gcs-proxy.docs.svc.cluster.local:8080;
    }
}
