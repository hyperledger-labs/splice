### Splitwell App @ Splitwell-validator

server {
    listen       5213 http2;
    server_name  localhost;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       grpc_pass grpc://splitwell-app.splitwell.svc.cluster.local:5213;
    }
}

server {
    listen       6213 ssl;
    server_name  localhost ssl;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://splitwell-app.splitwell.svc.cluster.local:6213;
       proxy_http_version 1.1;
    }
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;

    server_name  splitwell.*;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://splitwell-app.splitwell.svc.cluster.local:6213;
        proxy_http_version 1.1;
   }
}
