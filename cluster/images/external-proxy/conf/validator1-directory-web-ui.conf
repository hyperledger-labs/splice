### Directory Web UI @ Validator1

server {
    listen       80;
    listen  [::]:80;

    server_name  directory.validator1.*;
    return 301 https://$host$request_uri;
}

server {
    listen      443 ssl;
    listen [::]:443 ssl;

    server_name  directory.validator1.*;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location ~ ^/(api/v0/ledger-api/)(.*) {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://participant.validator1.svc.cluster.local:6001/$2$is_args$args;
       proxy_http_version 1.1;
    }

    location ~ ^/(api/json-api/)(.*) {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://participant.validator1.svc.cluster.local:7575/$2$is_args$args;
       proxy_http_version 1.1;
    }


    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://directory-web-ui.validator1.svc.cluster.local;
    }
}
