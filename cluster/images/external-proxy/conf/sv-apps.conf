### SV Apps

#### SV 1

server {
    listen       5014 http2;
    server_name  localhost;

    location / {
       grpc_pass grpc://sv-app-1.sv-app-1:5014;
    }
}
server {
    listen       6014 ssl;
    server_name  localhost ssl;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
       proxy_pass http://sv-app-1.sv-app-1:6014;
    }
}

