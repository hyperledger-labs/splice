### Wallet Web UI @ Validator1

server {
    listen       80;
    listen  [::]:80;

    server_name  wallet.validator1.*;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;

    server_name  wallet.validator1.*;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location ~ ^/(api/v0/wallet/)(.*) {
       proxy_pass http://validator1-wallet-app:6104/$2;
       proxy_http_version 1.1;
    }

    location ~ ^/(api/v0/validator/)(.*) {
       proxy_pass http://validator1-validator-app:6103/$2;
       proxy_http_version 1.1;
    }

    location ~ ^/(api/v0/directory/)(.*) {
       proxy_pass http://directory-app:6010/$2$is_args$args;
       proxy_http_version 1.1;
    }

    location ~ ^/(api/v0/scan/)(.*) {
       proxy_pass http://scan-app:6012/$2;
       proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://validator1-wallet-web-ui;
    }
}
