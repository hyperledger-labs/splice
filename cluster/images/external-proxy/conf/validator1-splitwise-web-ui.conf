### Splitwise Web UI @ Validator1

server {
    listen       80;
    listen  [::]:80;

    server_name  splitwise.validator1.*;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;

    server_name  splitwise.validator1.*;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location ~ ^/(api/v0/splitwise/)(.*) {
       proxy_pass http://splitwise-app:6213/$2;
       proxy_http_version 1.1;
    }

    location ~ ^/(api/v0/ledger-api/)(.*) {
       proxy_pass http://validator1-participant:6101/$2;
       proxy_http_version 1.1;
    }

    location ~ ^/(api/v0/directory/)(.*) {
       proxy_pass http://directory-app:6010/$2;
       proxy_http_version 1.1;
    }

    location ~ ^/(api/v0/scan/)(.*) {
       proxy_pass http://scan-app:6012/$2;
       proxy_http_version 1.1;
    }

    location ~ ^/(api/v0/wallet/)(.*) {
       proxy_pass http://validator1-wallet-app:6104/$2;
       proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://validator1-splitwise-web-ui/;
    }
}
