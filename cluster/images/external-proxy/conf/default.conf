### Runbook Docs Container

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root /config;

    location / {
        try_files  $uri @docs;
    }

    location @docs {
        proxy_pass http://docs;
    }

    location /release-bundles {
        proxy_pass http://gcs-proxy:8080;
    }
}
