### Wallet Web UI @ Splitwell

server {
    listen       80;
    listen  [::]:80;

    server_name  wallet.splitwell.*;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;

    server_name  wallet.splitwell.*;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location ~ ^/(api/v0/wallet/)(.*) {
       proxy_pass http://splitwell-wallet-app:7004/$2;
       proxy_http_version 1.1;
    }

    location ~ ^/(api/v0/validator/)(.*) {
       proxy_pass http://splitwell-validator-app:6203/$2$is_args$args;
       proxy_http_version 1.1;
    }

    location / {
        proxy_pass http://splitwell-wallet-web-ui;
    }
}
