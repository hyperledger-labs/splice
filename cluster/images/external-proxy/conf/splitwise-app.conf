### Splitwise App @ Splitwise-validator

server {
    listen       5213 http2;
    server_name  localhost;

    location / {
       grpc_pass grpc://splitwise-app:5213;
    }
}

server {
    listen       6213;
    server_name  localhost;

    location / {
       proxy_pass http://splitwise-app:6213;
       proxy_http_version 1.1;
    }
}
