### Scan App

server {
    listen       5012 http2;
    server_name  localhost;

    location / {
       grpc_pass grpc://scan-app.svc:5012;
    }
}

server {
    listen       6012 ssl;
    server_name  localhost ssl;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
       proxy_pass http://scan-app.svc:6012;
    }
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;

    server_name  scan.*;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
        proxy_pass http://scan-app.svc:6012;
        proxy_http_version 1.1;
    }
}
