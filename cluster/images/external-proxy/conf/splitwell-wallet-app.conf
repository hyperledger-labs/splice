### Wallet App @ Splitwell

server {
    listen       5204 http2;
    server_name  localhost;

    location / {
       grpc_pass grpc://splitwell-wallet-app:5004;
    }
}

server {
    listen       6004;
    server_name  localhost;

    location / {
       proxy_pass http://splitwell-wallet-app:6004;
       proxy_http_version 1.1;
    }
}
