### Canton Domain

server {
    listen       5008 http2;
    server_name  localhost;

    location / {
       grpc_pass grpc://global-domain:5008;
    }
}

server {
    listen       5009 http2;
    server_name  localhost;

    location / {
       grpc_pass grpc://global-domain:5009;
    }
}

server {
    listen       10313;
    server_name  localhost;

    location / {
       proxy_pass http://global-domain:10013;
    }
}
