### Directory App

server {
    listen       5010 http2;
    server_name  localhost;

    location / {
       grpc_pass grpc://directory-app:5010;
    }
}

server {
    listen       6010;
    server_name  localhost;

    location / {
       proxy_pass http://directory-app:6010;
       proxy_http_version 1.1;
    }
}
