### Directory App

server {
    listen       5010 http2;
    server_name  localhost;

    location / {
       grpc_pass grpc://directory-app.svc:5010;
    }
}

server {
    listen       6010 ssl;
    server_name  localhost ssl;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
       proxy_pass http://directory-app.svc:6010;
       proxy_http_version 1.1;
    }
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;

    server_name  directory.*;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
        proxy_pass http://directory-app.svc:6010;
        proxy_http_version 1.1;
    }
}
