### Directory App

server {
    listen       5010 http2;
    server_name  localhost;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       grpc_pass grpc://directory-app.svc.svc.cluster.local:5010;
    }
}

server {
    listen       6010 ssl;
    server_name  localhost ssl;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
       resolver kube-dns.kube-system.svc.cluster.local;
       proxy_pass http://directory-app.svc.svc.cluster.local:6010;
    }
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;

    server_name  directory.*;

    ssl_certificate     /tmp/tls.crt;
    ssl_certificate_key /tmp/tls.key;

    location / {
        resolver kube-dns.kube-system.svc.cluster.local;
        proxy_pass http://directory-app.svc.svc.cluster.local:6010;
    }
}
