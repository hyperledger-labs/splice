_participant_remote {
  admin-api = {
    address = "canton-participant"
    port = 5002
  }

  ledger-api = {
    address = "canton-participant"
    port = 5001
  }
}

canton {
  directory-apps {
    directoryBackend {
      storage.type = memory
      admin-api = {
        address = "0.0.0.0"
        port = 5010
      }
      remote-participant = ${_participant_remote}
      remote-scan.admin-api = {
        address = "canton-participant"
        port = 5012
      }
      # TODO(#766) Consider separating users & participants from the SVC
      daml-user = "svc"
    }
  }
}
canton.features.enable-testing-commands = yes
