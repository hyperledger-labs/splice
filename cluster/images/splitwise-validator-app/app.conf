_client_credentials_auth_config {
  type = "client-credentials"
  well-known-config-url = ${?CN_APP_SPLITWISE_VALIDATOR_LEDGER_API_AUTH_URL}
  client-id = ${?CN_APP_SPLITWISE_VALIDATOR_LEDGER_API_AUTH_CLIENT_ID}
  client-secret = ${?CN_APP_SPLITWISE_VALIDATOR_LEDGER_API_AUTH_CLIENT_SECRET}
  # TODO(#1837) use actual audience of the target participant
  audience = "https://canton.network.global"
}

_participant_remote {
  admin-api = {
    address = "splitwise-participant"
    port = 5002
  }

  ledger-api = {
    client-config = {
      address = "splitwise-participant"
      port = 5001
    }
    auth-config = ${_client_credentials_auth_config}
  }
}

_scan_remote {
  admin-api.port = 5012
  admin-api.address = "scan-app"
}

canton {
  validator-apps {
    splitwise_validator_backend {
      storage.type = memory
      admin-api = {
        address = "0.0.0.0"
        port = 5203
      }
      remote-participant = ${_participant_remote}
      remote-scan = ${_scan_remote}
      daml-user = ${?CN_APP_SPLITWISE_VALIDATOR_LEDGER_API_AUTH_USER_NAME}
      # We don’t actually start a wallet for splitwise, so this string is irrelevant.
      wallet-service-user = "splitwise_wallet_service_user"
      auth {
        algorithm = "hs-256-unsafe"
        audience = "https://canton.network.global"
        secret = "test"
      }
      app-instances {
        splitwise {
          service-user = ${?CN_APP_SPLITWISE_LEDGER_API_AUTH_USER_NAME}
          dars = ["splitwise-0.1.0.dar"]
        }
      }
      domains {
        global = "global"
      }
    }
  }
  features.enable-testing-commands = yes
}
