_participant_remote {
  admin-api = {
    address = "validator1-participant"
    port = 5102
  }

  ledger-api = {
    client-config = {
      address = "validator1-participant"
      port = 5101
    }
    auth-config.type = "none"
  }
}

_validator_remote {
  admin-api.port = 5103
  admin-api.address = "validator1-validator-app"
}

_scan_remote {
  admin-api.port = 5012
  admin-api.address = "scan-app"
}

canton {
  wallet-app-backends {
    validator1_wallet_backend {
      storage.type = memory
      admin-api = {
        address = "0.0.0.0"
        port = 5104
      }
      remote-participant = ${_participant_remote}
      remote-scan = ${_scan_remote}
      validator = ${_validator_remote}
      service-user = "validator1_wallet_service_user"
      auth {
        algorithm = "rs-256"
        jwks-url = "https://canton-network-dev.us.auth0.com/.well-known/jwks.json"
      }
    }
  }
  features.enable-testing-commands = yes
}
