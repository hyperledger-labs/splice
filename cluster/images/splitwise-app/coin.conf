_client_credentials_auth_config {
  type = "client-credentials"
  well-known-config-url = ${?CN_APP_SPLITWISE_LEDGER_API_AUTH_URL}
  client-id = ${?CN_APP_SPLITWISE_LEDGER_API_AUTH_CLIENT_ID}
  client-secret = ${?CN_APP_SPLITWISE_LEDGER_API_AUTH_CLIENT_SECRET}
  # TODO(#1837) use actual audience of the target participant
  audience = "https://canton.network.global"
}

_participant_remote {
  admin-api = {
    address = "splitwise-participant"
    port = 5202
  }

  ledger-api = {
    client-config = {
      address = "splitwise-participant"
      port = 5201
    }
    auth-config = ${_client_credentials_auth_config}
  }
}

_validator_remote {
  admin-api.port = 5203
  admin-api.address = "splitwise-validator-app"
}

_scan_remote {
  admin-api.port = 5012
  admin-api.address = "scan-app"
}

canton {
  splitwise-apps {
    splitwise_backend {
      storage.type = memory
      admin-api = {
        address = "0.0.0.0"
        port = 5213
      }
      remote-participant = ${_participant_remote}
      remote-scan = ${_scan_remote}
      provider-user = ${?CN_APP_SPLITWISE_LEDGER_API_AUTH_USER_NAME}
    }
  }
  features.enable-testing-commands = yes
}
