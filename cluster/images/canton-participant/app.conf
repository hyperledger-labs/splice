canton {
  features {
    enable-testing-commands = yes
  }
  parameters {
    manual-start = no
  }

  monitoring.metrics.reporters = [{
    type = prometheus
    address = "0.0.0.0"
    port = 10013
  }]

  participants {
    svc_participant {
      storage {
        type = postgres
        config {
           dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
           properties = {
             serverName = "postgres"
             portNumber = "5432"
             databaseName = "cantonnet"
             currentSchema = "cn_participant"
             user = "cnadmin"
             password = "cnadmin"
           }
         }
       }

      admin-api {
        address = "0.0.0.0"
        port = 5002
      }

      ledger-api {
        address = "0.0.0.0"
        port = 5001
        max-deduplication-duration = 30s
        auth-services = [{
          type = jwt-rs-256-jwks
          url = "https://canton-network-dev.us.auth0.com/.well-known/jwks.json"
        }]
        # TODO(M3-55) Consider lowering this once we switched to postgres
        rate-limit.max-api-services-queue-size = 40000
      }
      parameters {
        unsafe-enable-daml-lf-dev-version = yes
        will-corrupt-your-system-dev-version-support = yes
        unique-contract-keys = false
      }
    }
  }
}
