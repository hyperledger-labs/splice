canton {
  features {
    enable-testing-commands = yes
  }
  parameters {
    manual-start = no
  }

  monitoring {
    metrics.reporters = [{
      type = jmx
    }]
  }

  participants {
    svc_participant {
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 5002
      }

      ledger-api {
        address = "0.0.0.0"
        port = 5001
        max-deduplication-duration = 30s
        auth-services = [{
          type = jwt-rs-256-jwks
          url = "https://canton-network-dev.us.auth0.com/.well-known/jwks.json"
        }]
      }
    }
  }
}

canton.participants.svc_participant.parameters {
  unsafe-enable-daml-lf-dev-version = yes
  will-corrupt-your-system-dev-version-support = yes
}

canton.participants.svc_participant.init.parameters.unique-contract-keys = false
