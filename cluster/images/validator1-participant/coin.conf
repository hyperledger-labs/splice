canton {
  features {
    enable-testing-commands = yes
  }
  parameters {
    manual-start = no
  }

  monitoring {
    metrics.reporters = [{
      type = jmx
    }]
  }

  participants {
    validator1_participant {
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 5102
      }

      ledger-api {
        address = "0.0.0.0"
        port = 5101
        max-deduplication-duration = 30s
        auth-services = [
          # self-signed tokens, used by apps that do not support real auth yet
          {
            type = unsafe-jwt-hmac-256
            secret = "test"
          },
          # real tokens from our auth0 test tenant
          {
            type = jwt-rs-256-jwks
            url = "https://canton-network-dev.us.auth0.com/.well-known/jwks.json"
          },
        ]
      }
    }
  }
}

canton.participants.validator1_participant.parameters {
  unsafe-enable-daml-lf-dev-version = yes
  will-corrupt-your-system-dev-version-support = yes
}

canton.participants.validator1_participant.init.parameters.unique-contract-keys = false
