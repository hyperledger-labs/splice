canton {
  features {
    enable-testing-commands = yes
  }
  parameters {
    manual-start = no
  }

  monitoring {
    metrics.reporters = [{
      type = jmx
    }]
  }

  participants {
    validator1_participant {
      storage.type = memory

      admin-api {
        address = "0.0.0.0"
        port = 5102
      }

      ledger-api {
        address = "0.0.0.0"
        port = 5101
        max-deduplication-duration = 30s
      }
    }
  }
}

canton.participants.validator1_participant.parameters {
  unsafe-enable-daml-lf-dev-version = yes
  will-corrupt-your-system-dev-version-support = yes
}

canton.participants.validator1_participant.init.parameters.unique-contract-keys = false
