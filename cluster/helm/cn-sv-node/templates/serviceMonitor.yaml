{{- if .Values.metrics.enable }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    release: {{ .Values.metrics.release }}
  name: sv
  namespace: {{ .Release.Namespace }}
spec:
  endpoints:

  - port: metrics
    interval: {{ .Values.metrics.interval }}

  selector:
    matchLabels:
      app: sv-app

  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}

{{- end }}
