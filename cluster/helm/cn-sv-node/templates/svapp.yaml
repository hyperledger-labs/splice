---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sv-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: sv-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sv-app
  strategy:
    type: "Recreate"
  template:
    metadata:
      labels:
        app: sv-app
    spec:
      containers:
        - name: sv-app
          image: "{{ .Values.imageRepo }}/sv-app:{{ .Values.cluster.imageTag }}"
          imagePullPolicy: "Always"
          env:
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.defaultJvmOptions }}
            {{- include "cn-util-lib.auth0-env-vars" (dict "appName" "sv" "fixedTokens" .Values.cluster.fixedTokens) | indent 12}}
            - name: CN_APP_SV_ADMIN_API_PORT
              value: "5014"
            - name: CN_APP_SV_IS_DEV_NET
              value: "true"
            - name: CN_APP_SV_PARTICIPANT_ADDRESS
              {{ if .Values.participantAddress }}
              value: {{ .Values.participantAddress | quote }}
              {{ else }}
              value: participant
              {{ end }}
            {{- if .Values.onboardingType }}
            - name: CN_APP_SV_ONBOARDING_TYPE
              value: {{ .Values.onboardingType }}
            {{- end }}
            {{ if ((.Values.auth).audience) }}
            - name: CN_APP_SV_AUTH_AUDIENCE
              value: {{ .Values.auth.audience | quote }}
            {{ end }}
            {{ if ((.Values.auth).jwksUrl) }}
            - name: CN_APP_SV_AUTH_JWKS_URL
              value: {{ .Values.auth.jwksUrl | quote }}
            {{ end }}
            {{- with .Values.joinWithKeyOnboarding }}
            - name: ADDITIONAL_CONFIG_SV_ONBOARDING
              value: |
                _svc_client {
                  admin-api.port = 5005
                  admin-api.address = "{{ .svcApiAddress }}"
                }
                _onboarding {
                  type = "join-with-key"
                  sv-client.admin-api.url = "{{ .sponsorApiUrl }}"":""{{ .sponsorApiPort }}"
                  name = "{{ .keyName }}"
                  public-key = "{{ .publicKey }}"
                  private-key = "{{ .privateKey }}"
                }
            {{- end }}
          ports:
            - name: sv-api
              containerPort: 5014
              protocol: TCP
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: sv-app
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: sv-app
  ports:
  - name: sv-api
    port: 5014
    protocol: TCP
