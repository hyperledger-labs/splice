{{- if eq .Values.onboardingType "found-collective" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: directory-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: directory-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directory-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: directory-app
    spec:
      containers:
      - name: directory-app
        image: "{{ .Values.imageRepo }}/directory-app:{{ (.Values.cluster).imageTag }}"
        imagePullPolicy: Always
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        - name: CN_APP_DIRECTORY_PARTICIPANT_ADDRESS
          value: {{ .Values.participantAddress }}
        {{- include "cn-util-lib.auth0-env-vars" (dict "appName" "directory" "keyName" "sv" "fixedTokens" (.Values.cluster).fixedTokens) | indent 8}}
        ports:
        - containerPort: 5010
          name: dir-api
          protocol: TCP
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: directory-app
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: directory-app
  ports:
  - name: dir-api
    port: 5010
    protocol: TCP
{{- end}}
