cluster:
  imageTag: IMAGE_TAG

imageRepo: "digitalasset-canton-network-docker.jfrog.io/digitalasset"

fixedTokens: false

defaultJvmOptions: -Xms3072M -Xmx3072M -Dscala.concurrent.context.minThreads=8
resources:
  limits:
    memory: 4096Mi
  requests:
    cpu: 1
    memory: 4096Mi

metrics:
  enable: false
  release: prometheus-grafana-monitoring
  interval: 30s

persistence:
  databaseName: cantonnet_sv
  schema: sv
  host: postgres
  port: 5432
  user: cnadmin
  secretName: "postgres-secrets"

migration:
  id: 0
  migrating: false
  attachPvc: true
# pvc used for migrations
pvc:
  volumeStorageClass: standard-rwo

# k8s affinity for all deployed pods (optional)
# affinity:

# k8s nodeSelector for all deployed pods (optional)
# nodeSelector:
