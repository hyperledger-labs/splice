apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Release.Name }}-sequencer
  name: {{ .Release.Name }}-sequencer
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-sequencer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-sequencer
    spec:
      containers:
        - name: sequencer
        {{- if eq .Values.sequencer.driver.type "cometbft"}}
          image: "{{ .Values.imageRepo }}/canton-cometbft-sequencer:{{ .Values.cluster.imageTag }}"
        {{- else}}
          image: "{{ .Values.imageRepo }}/canton-sequencer:{{ .Values.cluster.imageTag }}"
        {{- end}}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.defaultJvmOptions }} {{ .Values.additionalJvmOptions }}
            - name: CANTON_DOMAIN_POSTGRES_SERVER
              value: {{ .Values.sequencer.persistence.host }}
            - name: CANTON_DOMAIN_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sequencer.persistence.secretName }}
                  key: postgresPassword
        {{- if .Values.sequencer.persistence.databaseName }}
            - name: CANTON_SEQUENCER_POSTGRES_DB
              value: {{ .Values.sequencer.persistence.databaseName }}
        {{- end }}
        {{- if eq .Values.sequencer.driver.type "postgres"}}
            - name: SEQUENCER_DRIVER_DATABASE_ADDRESS
              value: {{ .Values.sequencer.driver.address }}
            - name: SEQUENCER_DRIVER_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sequencer.persistence.secretName }}
                  key: postgresPassword
        {{- else if eq .Values.sequencer.driver.type "cometbft"}}
            - name: SEQUENCER_DRIVER_COMETBFT_HOST
              value: {{ .Values.sequencer.driver.host }}
            - name: SEQUENCER_DRIVER_COMETBFT_PORT
              value: "{{ .Values.sequencer.driver.port }}"
        {{- end}}
        {{- if .Values.disableAutoInit }}
            - name: CANTON_SEQUENCER_AUTO_INIT
              value: "false"
        {{- end }}
          imagePullPolicy: Always
          ports:
            - containerPort: 5008
              name: cs-pub-api
              protocol: TCP
            - containerPort: 5009
              name: cs-adm-api
              protocol: TCP
        {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- if .Values.enableHealthProbes }}
          livenessProbe:
            grpc:
              port: 5061
              service: liveness
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            grpc:
              port: 5061
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 10
        {{- end }}
      restartPolicy: Always
      initContainers:
        - name: pg-init
          image: postgres:14
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: postgresPassword
                  name: {{ .Values.sequencer.persistence.secretName }}
          command:
            - 'bash'
            - '-c'
            - |
              until errmsg=$(psql -h {{ .Values.sequencer.persistence.host }} --username=cnadmin --dbname=cantonnet -c 'create database {{ .Values.sequencer.persistence.databaseName }}' 2>&1); do
                if [[ $errmsg == *"already exists"* ]]; then
                  echo "Database {{ .Values.sequencer.persistence.databaseName }} already exists. Done."
                  break
                fi

                echo "trying to create postgres database {{ .Values.sequencer.persistence.databaseName }}, last error: $errmsg";
                sleep 2;
              done
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-sequencer
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-sequencer
spec:
  selector:
    app: {{ .Release.Name }}-sequencer
  ports:
    - name: grpc-cs-pub-api
      port: 5008
      protocol: TCP
    - name: grpc-cs-adm-api
      port: 5009
      protocol: TCP
    - name: cs-metrics
      port: 10013
      protocol: TCP
