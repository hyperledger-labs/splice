cluster:
  imageTag: IMAGE_TAG
imageRepo: "digitalasset-canton-network-docker.jfrog.io/digitalasset"

enableHealthProbes: true

defaultJvmOptions: -Xms2560M -Xmx2560M -Dscala.concurrent.context.minThreads=4
resources:
  limits:
    memory: 4Gi
  requests:
    cpu: "1"
    memory: 4Gi

sequencer:
  persistence:
    host: postgres.sv-1.svc.cluster.local
    secretName: "postgres-secrets"
mediator:
  persistence:
    host: postgres.sv-1.svc.cluster.local
    secretName: "postgres-secrets"

metrics:
  enable: false
  release: prometheus-grafana-monitoring
  interval: 30s

disableAutoInit: false
