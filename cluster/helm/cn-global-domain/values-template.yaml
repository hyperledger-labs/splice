cluster:
  imageTag: IMAGE_TAG
imageRepo: "digitalasset-canton-network-docker.jfrog.io/digitalasset"

defaultJvmOptions: -Xms2560M -Xmx2560M -Dscala.concurrent.context.minThreads=4
resources:
  limits:
    memory: 4Gi
  requests:
    cpu: "1"
    memory: 4Gi

postgres: postgres.sv-1.svc.cluster.local
postgresSecretName: "postgres-secrets"

metrics:
  enable: false
  release: prometheus-grafana-monitoring
  interval: 30s
