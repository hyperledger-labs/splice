apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: wallet-sv-{{ (.Values.cluster).svNamespace }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
  - "wallet.{{ (.Values.cluster).svNamespace }}.svc.{{ (.Values.cluster).hostname }}"
  gateways:
  - cluster-ingress/cn-http-gateway
  http:
  - match:
    - port: 443
      uri:
        prefix: "/api/v0/validator/"
    rewrite:
      uri: "/"
    route:
    - destination:
        port:
          number: 5003
        host: validator-app.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
  - match:
    - port: 443
    route:
    - destination:
        port:
          number: 80
        host: wallet-web-ui.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: sv-sv-{{ (.Values.cluster).svNamespace }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
  - "sv.{{ (.Values.cluster).svNamespace }}.svc.{{ (.Values.cluster).hostname }}"
  gateways:
  - cluster-ingress/cn-http-gateway
  http:
  - match:
    - port: 443
      uri:
        prefix: "/api/v0/sv/"
    rewrite:
      uri: "/"
    route:
    - destination:
        port:
          number: 5014
        host: sv-app.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
  - match:
    - port: 443
    route:
    - destination:
        port:
          number: 80
        host: sv-web-ui.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
---
{{- if .Values.withScan }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: scan-sv-{{ (.Values.cluster).svNamespace }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
  - "scan.{{ (.Values.cluster).svNamespace }}.svc.{{ (.Values.cluster).hostname }}"
  gateways:
  - cluster-ingress/cn-http-gateway
  http:
  - match:
    - port: 443
      uri:
        prefix: "/api/v0/scan/"
    rewrite:
      uri: "/"
    route:
    - destination:
        port:
          number: 5012
        host: scan-app.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
  - match:
    - port: 443
    route:
    - destination:
        port:
          number: 80
        host: scan-web-ui.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
{{- end }}
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: directory-sv-{{ (.Values.cluster).svNamespace }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "directory.{{ (.Values.cluster).svNamespace }}.svc.{{ (.Values.cluster).hostname }}"
  gateways:
    - cluster-ingress/cn-http-gateway
  http:
    - match:
        - port: 443
          uri:
            prefix: "/api/json-api/"
      rewrite:
        uri: "/"
      route:
        - destination:
            port:
              number: 7575
            host: participant.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
{{- if .Values.withDirectoryBackend }}
    - match:
        - port: 443
          uri:
            prefix: "/api/v0/directory/"
      rewrite:
        uri: "/"
      route:
        - destination:
            port:
              number: 5010
            host: directory-app.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
{{- end }}
    - match:
        - port: 443
      route:
        - destination:
            port:
              number: 80
            host: directory-web-ui.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
---
