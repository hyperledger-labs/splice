apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: http-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: istio-ingress
    istio: ingress
  servers:
  - hosts:
    - "{{ (.Values.cluster).hostname }}"
    - "*.{{ (.Values.cluster).hostname }}"
    port:
      name: http
      number: 80
      protocol: HTTP
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).hostname }}"
    - "*.{{ (.Values.cluster).hostname }}"
---
