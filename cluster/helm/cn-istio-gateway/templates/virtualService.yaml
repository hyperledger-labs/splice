---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: cluster-version
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
  - "{{ (.Values.cluster).basename }}.network.canton.global"
  gateways:
  - cn-http-gateway
  http:
  - match:
      - port: 443
        uri:
          exact: /version
    directResponse:
      status: 200
      body:
        string: "{{ (.Values.cluster).imageTag }}"
  - match:
      - port: 443
        uri:
          prefix: "/cn-release-bundles"
    route:
      - destination:
          port:
            number: 8080
          host: gcs-proxy.docs.svc.cluster.local
  - match:
      - port: 443
    route:
      - destination:
          port:
            number: 80
          host: docs.docs.svc.cluster.local
