          number: 5109
  - match:
    - port: 10413
    route:
    - destination:
        host: external-proxy-full.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: 10413
  - match:
    - port: 5202
    route:
    - destination:
        host: external-proxy-full.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: 5202
  - match:
    - port: 5201
