        host: external-proxy-full.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: 5102
  - match:
    - port: 5101
    route:
    - destination:
        host: external-proxy-full.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: 5101
  - match:
    - port: 10113
    route:
    - destination:
        host: external-proxy-full.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: 10113
  - match:
    - port: 6101
    route:
    - destination:
        host: external-proxy-full.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: 6101
  - match:
