apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: forward-all-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: istio-ingress
    istio: ingress
  servers:
  - hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
    port:
      name: http
      number: 80
      protocol: HTTP
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5008
      name: grpc-cd-pub-api
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5009
      name: grpc-cd-adm-api
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 10313
      name: cd-metrics
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5002
      name: grpc-svcp-adm
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5001
      name: grpc-svcp-lg
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 10013
      name: svcp-metrics
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5010
      name: dir-api
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5005
      name: grpc-svc-adm
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5012
      name: scan-api
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5102
      name: grpc-val1-adm
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5101
      name: grpc-val1-lg
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 10113
      name: val1-metrics
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 6101
      name: val1-lg-gw
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5108
      name: grpc-swd-pub
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5109
      name: grpc-swd-adm
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 10413
      name: swd-metrics
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5202
      name: grpc-sw-adm
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5201
      name: grpc-sw-lg
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 10213
      name: sw-metrics
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 6201
      name: sw-lg-gw
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 5213
      name: grpc-sw-api
      protocol: GRPC
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  - port:
      number: 6213
      name: sw-api-gw
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: cn-{{ (.Values.cluster).basename }}net-tls
    hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
