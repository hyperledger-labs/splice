        host: external-proxy-full.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: 5201
  - match:
    - port: 10213
    route:
    - destination:
        host: external-proxy-full.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: 10213
  - match:
    - port: 6201
    route:
    - destination:
        host: external-proxy-full.{{ .Release.Namespace }}.svc.cluster.local
        port:
          number: 6201
