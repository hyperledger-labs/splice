apiVersion: apps/v1
kind: Deployment
metadata:
  name: validator-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: validator-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: validator-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: validator-app
    spec:
      containers:
      - name: validator-app
        image: "{{ .Values.imageRepo }}/validator-app:{{ .Values.cluster.imageTag }}"
        imagePullPolicy: Always
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        - name: CN_APP_VALIDATOR_PARTICIPANT_ADDRESS
          value: participant
        {{ if .Values.appDars -}}
        - name: CN_APP_DARS
          value: {{ .Values.appDars | toJson | quote }}
        {{ end }}
        {{- include "cn-util-lib.auth0-env-vars" "validator" | indent 8}}
        {{- range $ii, $user := .Values.additionalUsers }}
        - name: {{ $user.name }}
          {{ if $user.value }}
          value: {{ $user.value }}
          {{ end }}
          {{ if $user.valueFrom }}
          valueFrom: {{ $user.valueFrom | toYaml | nindent 12 }}
          {{ end }}
        {{- end }}
        {{ if .Values.additionalConfig -}}
        - name: ADDITIONAL_CONFIG
          value: {{- .Values.additionalConfig | toYaml | indent 12 }}
        {{ end }}
        ports:
        - containerPort: 6003
          name: val-http
          protocol: TCP
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: validator-app
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: validator-app
  ports:
  - name: val-http
    port: 6003
    protocol: TCP
    targetPort: 6003
