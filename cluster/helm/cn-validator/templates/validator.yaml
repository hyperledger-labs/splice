apiVersion: apps/v1
kind: Deployment
metadata:
  name: validator-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: validator-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: validator-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: validator-app
    spec:
      containers:
      - name: validator-app
        image: "{{ .Values.imageRepo }}/validator-app:{{ (.Values.cluster).imageTag }}"
        imagePullPolicy: Always
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        - name: CN_APP_VALIDATOR_PARTICIPANT_ADDRESS
          value: {{ .Values.participantAddress | default "participant" | quote }}
        {{ if .Values.appDars -}}
        - name: CN_APP_DARS
          value: {{ .Values.appDars | toJson | quote }}
        {{ end }}
        {{- include "cn-util-lib.auth0-env-vars" (dict "appName" "validator" "keyName" "validator" "fixedTokens" (.Values.cluster).fixedTokens) | indent 8}}
        {{- range $ii, $user := .Values.additionalUsers }}
        - name: {{ $user.name }}
          {{ if $user.value }}
          value: {{ $user.value }}
          {{ end }}
          {{ if $user.valueFrom }}
          valueFrom: {{ $user.valueFrom | toYaml | nindent 12 }}
          {{ end }}
        {{- end }}
        {{ if .Values.additionalConfig -}}
        - name: ADDITIONAL_CONFIG_OTHER
          value: {{- .Values.additionalConfig | toYaml | indent 12 }}
        {{ end }}
        {{ if .Values.svSponsorAddress -}}
        - name: CN_APP_VALIDATOR_SV_SPONSOR_ADDRESS
          value: {{ .Values.svSponsorAddress | quote }}
        {{ if .Values.onboardingSecretFrom -}}
        - name: CN_APP_VALIDATOR_ONBOARDING_SECRET
          valueFrom: {{ .Values.onboardingSecretFrom | toYaml | nindent 12 }}
        {{ else -}}
        # Onboarding without specifying a secret only works in devnet
        - name: CN_APP_DEVNET
          value: 1
        {{ end -}}
        {{ else -}}
        # Validator has either already been onboarded or
        # is a supervalidator’s validator that does not need this.
        - name: ADDITIONAL_CONFIG_NO_ONBOARDING
          value: |
            canton.validator-apps.validator_backend.onboarding = null
        {{ end -}}
        {{ if .Values.scanAddress -}}
        - name: CN_APP_VALIDATOR_SCAN_ADDRESS
          value: {{ .Values.scanAddress | quote }}
        {{ end }}
        {{ if .Values.validatorWalletUser }}
        - name: CN_APP_VALIDATOR_WALLET_USER_NAME
          value: {{ .Values.validatorWalletUser }}
        {{ end }}
        {{ if .Values.validatorPartyHint }}
        - name: CN_APP_VALIDATOR_PARTY_HINT
          value: {{ .Values.validatorPartyHint }}
        {{ end }}
        {{ if (.Values.auth).audience }}
        - name: CN_APP_VALIDATOR_AUTH_AUDIENCE
          value: {{ .Values.auth.audience | quote }}
        {{ end }}
        {{ if (.Values.auth).jwksUrl }}
        - name: CN_APP_VALIDATOR_AUTH_JWKS_URL
          value: {{ .Values.auth.jwksUrl | quote }}
        {{ end }}
        - name: CN_APP_VALIDATOR_GLOBAL_DOMAIN_URL
          value: {{ .Values.globalDomainUrl | quote }}
        - name: ADDITIONAL_CONFIG_FOUNDING_SV
          value: canton.validator-apps.validator_backend.founding-sv-client.admin-api.url = "{{ .Values.foundingSvApiUrl }}"
        ports:
        - containerPort: 5003
          name: val-http
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /livez
            port: 5003
          initialDelaySeconds: 60
          periodSeconds: 60
          failureThreshold: 5
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5003
          initialDelaySeconds: 20
          periodSeconds: 20
          failureThreshold: 5
          timeoutSeconds: 10
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: validator-app
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: validator-app
  ports:
  - name: val-http
    port: 5003
    protocol: TCP
