{{- $cnsWebUiLabel := include "appLabel" (list .Values "cns-web-ui") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ $cnsWebUiLabel }}
  name: {{ $cnsWebUiLabel }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $cnsWebUiLabel }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ $cnsWebUiLabel }}
    spec:
      containers:
      - name: cns-web-ui
        image: "{{ .Values.imageRepo }}/cns-web-ui:{{ (.Values.cluster).imageTag }}"
        imagePullPolicy: Always
        env:
        - name: CN_APP_CNS_UI_AUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: client-id
              name: cn-app-cns-ui-auth
              optional: false
        - name: CN_APP_CNS_UI_AUTH_URL
          valueFrom:
            secretKeyRef:
              key: url
              name: cn-app-cns-ui-auth
              optional: false
        - name: CN_APP_CNS_UI_AUTH_AUDIENCE
          value: {{ (.Values.auth).audience | default "https://canton.network.global" | quote }}
        - name: CN_APP_CNS_UI_CLUSTER
          value: {{ .Values.clusterUrl | quote }}
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          limits:
            cpu: 1
            memory: 1536Mi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $cnsWebUiLabel }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ $cnsWebUiLabel }}
  ports:
  - name: http
    port: 80
    protocol: TCP
