cluster:
  imageTag: IMAGE_TAG
imageRepo: "digitalasset-canton-network-docker.jfrog.io/digitalasset"

fixedTokens: false

defaultJvmOptions: -Xms5g -Xmx5g -Dscala.concurrent.context.minThreads=4
resources:
  limits:
    memory: 8Gi
  requests:
    cpu: 1
    memory: 8Gi

metrics:
  enable: false
  release: prometheus-grafana-monitoring
  interval: 30s

persistence:
  databaseName: cantonnet
  schema: validator
  host: postgres
  port: 5432
  user: cnadmin

postgresSecretName: "postgres-secrets"
