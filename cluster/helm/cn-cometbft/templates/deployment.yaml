---
{{- $fullName := "cometbft" }}
{{- with .Values.node }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $fullName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $fullName }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ $fullName }}
    spec:
      containers:
        # Temporarily added container to allow configuring CometBFT state sync dynamically
        # TODO(#7779): Move this logic into a pre-bootstrap script in the main container once the drivers team
        #   publishes a new CometBFT image with the required tooling.
        - name: "{{ $fullName }}-init"
          image: "{{ $.Values.imageRepo }}/cometbft-init:{{ $.Values.cluster.imageTag }}"
          imagePullPolicy: Always
          volumeMounts:
            - mountPath: /initial-config
              name: initial-config
            - mountPath: /config
              name: config
          command:
            - /bin/sh
            - -c
            - -x
            - |
              # Copy over root CA certs to make them available to the CometBFT container
              # This is needed to enable state sync over HTTPS
              cp -a /etc/ssl/certs /config/
              # Configure state sync and signal when done
              cp -a /initial-config/. /config/
              /configure-state-sync.sh /config/config.toml \
                && touch /config/config_done \
                && sleep infinity
          env:
            - name: STATE_SYNC_ENABLE
              value: "{{ $.Values.stateSync.enable }}"
            - name: STATE_SYNC_RPC_SERVERS
              value: "{{ $.Values.stateSync.rpcServers }}"
            - name: STATE_SYNC_MIN_TRUST_HEIGHT_AGE
              value: "{{ $.Values.stateSync.minTrustHeightAge }}"
            - name: STATE_SYNC_TRUST_PERIOD
              value: "{{ $.Values.stateSync.trustPeriod }}"
        - name: {{ $fullName }}
          image: "{{ $.Values.imageRepo }}/{{ $.Values.imageName }}:{{ $.Values.cluster.imageTag }}"
          imagePullPolicy: Always
          ports:
            - name: p2p
              containerPort: {{ .p2pPort }}
              protocol: TCP
            - name: rpc
              containerPort: {{ .rpcPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: rpc
          readinessProbe:
            httpGet:
              path: /health
              port: rpc
          volumeMounts:
            - mountPath: /cometbft/config
              name: config
              readOnly: true
            - mountPath: /cometbft/initial-data
              name: initial-data
            - mountPath: /cometbft/data
              name: data
            - mountPath: /tmp
              name: state-sync
          env:
            - name: HOME
              value: /cometbft
            - name: SSL_CERT_DIR
              value: /cometbft/config/certs
          command:
            - /bin/sh
            - -c
            - -x
            - |
              cp -n "${HOME}"/initial-data/* "${HOME}"/data
              # Wait for configuration to be done
              [ -f "$HOME"/config/config_done ] && \
              cometbft-canton-network start \
              {{ include "cliArgs" (list $ .) | indent 14 | trim }}
          {{- with $.Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: initial-config
          projected:
            sources:
              - configMap:
                  name: {{ include "prefix" (list $.Values "config-cometbft") }}
              - secret:
                  {{ if not $.Values.node.keysSecret }}
                  name: "cometbft-keys"
                  {{- else }}
                  name: {{ $.Values.node.keysSecret }}
                  {{- end }}
        - name: config
          emptyDir: {}
        - name: initial-data
          configMap:
            name: {{ include "prefix" (list $.Values "initial-data") }}
        - name: state-sync
          emptyDir:
            sizeLimit: {{ $.Values.db.volumeSize }}
        - name: data
          # It is fine to use a persistent volume claim with a deployment instead of a stateful set,
          # since we are not going to scale this deployment.
          persistentVolumeClaim:
            claimName: "cometbft-data"
{{- end }}
