---
{{ if not .Values.node.keysSecret  }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: "cometbft-keys"
data:
  node_key.json: {{ include "nodeKeyJson" .Values.node.privateKey | trim |  b64enc }}
  priv_validator_key.json: {{ include "privValidatorKeyJson" . | trim | b64enc }}
{{ end }}
