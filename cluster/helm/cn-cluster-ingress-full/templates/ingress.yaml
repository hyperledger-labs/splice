apiVersion: v1
kind: Service
metadata:
  name: external-proxy-full
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: external-proxy
  ports:
  - name: http
    port: 80
    protocol: TCP
  - name: https
    port: 443
    protocol: TCP
  - name: grpc-cd-pub-api
    port: 5008
    protocol: TCP
  - name: grpc-cd-adm-api
    port: 5009
    protocol: TCP
  - name: cd-metrics
    port: 10313
    protocol: TCP
  - name: grpc-svcp-adm
    port: 5002
    protocol: TCP
  - name: grpc-svcp-lg
    port: 5001
    protocol: TCP
  - name: svcp-metrics
    port: 10013
    protocol: TCP
  - name: grpc-val1-adm
    port: 5102
    protocol: TCP
  - name: grpc-val1-lg
    port: 5101
    protocol: TCP
  - name: val1-metrics
    port: 10113
    protocol: TCP
  - name: json-api
    port: 7575
    protocol: TCP
  - name: val1-lg-api-gw
    port: 6101
    protocol: TCP
  - name: grpc-swd-pub
    port: 5108
    protocol: TCP
  - name: grpc-swd-adm
    port: 5109
    protocol: TCP
  - name: swd-metrics
    port: 10413
    protocol: TCP
  - name: grpc-sw-adm
    port: 5202
    protocol: TCP
  - name: grpc-sw-lg
    port: 5201
    protocol: TCP
  - name: sw-metrics
    port: 10213
    protocol: TCP
  - name: sw-lg-api-gw
    port: 6201
    protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-version-info
data:
  version: "{{ (.Values.cluster).imageTag }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-proxy
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-proxy
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: external-proxy
    spec:
      containers:
      - name: external-proxy
        image: "{{ .Values.imageRepo }}/external-proxy-full:{{ (.Values.cluster).imageTag }}"
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }} {{ .Values.additionalJvmOptions }}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        - containerPort: 443
          name: https
          protocol: TCP
        - containerPort: 5008
          name: grpc-cd-pub-api
          protocol: TCP
        - containerPort: 5009
          name: grpc-cd-adm-api
          protocol: TCP
        - containerPort: 10313
          name: cd-metrics
          protocol: TCP
        - containerPort: 5002
          name: grpc-svcp-adm
          protocol: TCP
        - containerPort: 5001
          name: grpc-svcp-lg
          protocol: TCP
        - containerPort: 10013
          name: svcp-metrics
          protocol: TCP
        - containerPort: 5102
          name: grpc-val1-adm
          protocol: TCP
        - containerPort: 5101
          name: grpc-val1-lg
          protocol: TCP
        - containerPort: 10113
          name: val1-metrics
          protocol: TCP
        - containerPort: 6101
          name: val1-lg-api-gw
          protocol: TCP
        - containerPort: 5108
          name: grpc-swd-pub
          protocol: TCP
        - containerPort: 5109
          name: grpc-swd-adm
          protocol: TCP
        - containerPort: 10413
          name: swd-metrics
          protocol: TCP
        - containerPort: 5202
          name: sw-adm-api
          protocol: TCP
        - containerPort: 5201
          name: sw-lg-api
          protocol: TCP
        - containerPort: 10213
          name: sw-metrics
          protocol: TCP
        - containerPort: 6201
          name: sw-lg-api-gw
          protocol: TCP
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: "1"
            memory: 512Mi
        volumeMounts:
        - mountPath: /config
          name: external-proxy-cluster-version-vol
        - mountPath: /tmp
          name: external-proxy-tls-cert-vol
      volumes:
      - name: external-proxy-cluster-version-vol
        configMap:
          defaultMode: 420
          name: cluster-version-info
      - name: external-proxy-tls-cert-vol
        secret:
          defaultMode: 420
          optional: false
          secretName: "cn-{{ (.Values.cluster).basename }}net-tls"
