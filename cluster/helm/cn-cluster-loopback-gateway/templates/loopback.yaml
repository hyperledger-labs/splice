apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: loopback
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
  - "{{ (.Values.cluster).basename }}.network.canton.global"
  - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  exportTo:
  - "."
  ports:
  - number: 80
    name: http-port
    protocol: HTTP
  - number: 443
    name: tls
    protocol: TLS
  - number: 5008
    name: grpc-domain
    protocol: GRPC
  {{- $domains := untilStep 0 (int .Values.cometbftPorts.domains) 1 -}}
  {{- $domainNodes := untilStep 0 (int .Values.cometbftPorts.nodes) 1 -}}
  {{- range $index, $domain := $domains }}
  {{- range $index, $domainNode := $domainNodes }}
  - number: 26{{ $domain }}{{ $domainNode }}6
    name: cometbft-{{ $domain }}-{{ $domainNode }}-p2p
    protocol: TCP
  {{- end }}
  {{- end }}
  resolution: DNS
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: direct-loopback-through-ingress-gateway
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  gateways:
  - mesh
  http:
  - match:
    - gateways:
      - mesh
    route:
    - destination:
        host: "{{ (.Values.cluster).ingress }}.svc.cluster.local"
  tls:
  - match:
    - gateways:
      - mesh
      sniHosts:
      - "{{ (.Values.cluster).basename }}.network.canton.global"
      - "*.{{ (.Values.cluster).basename }}.network.canton.global"
    route:
    - destination:
        host: "{{ (.Values.cluster).ingress }}.svc.cluster.local"
  tcp:
  - match:
      - gateways:
          - mesh
    route:
      - destination:
          host: "{{ (.Values.cluster).ingress }}.svc.cluster.local"
