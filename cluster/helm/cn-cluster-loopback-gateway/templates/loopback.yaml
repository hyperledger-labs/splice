apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: loopback
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
  - "{{ (.Values.cluster).basename }}.network.canton.global"
  - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  exportTo:
  - "."
  ports:
  - number: 80
    name: http-port
    protocol: HTTP
  - number: 443
    name: tls
    protocol: TLS
  - number: 5008
    name: grpc-domain
    protocol: GRPC
  {{- range $index, $value := .Values.cometbftPorts }}
  - number: {{ $value }}
    name: cometbft{{ add $index 1 }}-p2p
    protocol: TCP
  {{- end }}
  resolution: DNS
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: direct-loopback-through-ingress-gateway
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "{{ (.Values.cluster).basename }}.network.canton.global"
    - "*.{{ (.Values.cluster).basename }}.network.canton.global"
  gateways:
  - mesh
  http:
  - match:
    - gateways:
      - mesh
    route:
    - destination:
        host: "{{ (.Values.cluster).ingress }}.svc.cluster.local"
  tls:
  - match:
    - gateways:
      - mesh
      sniHosts:
      - "{{ (.Values.cluster).basename }}.network.canton.global"
      - "*.{{ (.Values.cluster).basename }}.network.canton.global"
    route:
    - destination:
        host: "{{ (.Values.cluster).ingress }}.svc.cluster.local"
  tcp:
  - match:
      - gateways:
          - mesh
    route:
      - destination:
          host: "{{ (.Values.cluster).ingress }}.svc.cluster.local"
