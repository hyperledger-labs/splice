apiVersion: apps/v1
kind: Deployment
metadata:
  name: splitwell-web-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: splitwell-web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splitwell-web-ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: splitwell-web-ui
    spec:
      containers:
      - name: splitwell-web-ui
        image: "{{ .Values.imageRepo }}/splitwell-web-ui:{{ (.Values.cluster).imageTag }}"
        imagePullPolicy: Always
        env:
        - name: CN_APP_SPLITWELL_UI_AUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: client-id
              name: cn-app-splitwell-ui-auth
              optional: false
        - name: CN_APP_SPLITWELL_UI_AUTH_URL
          valueFrom:
            secretKeyRef:
              key: url
              name: cn-app-splitwell-ui-auth
              optional: false
        ports:
        - containerPort: 80
          name: val1-sw-ui
          protocol: TCP
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: splitwell-web-ui
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: splitwell-web-ui
  ports:
  - name: val1-sw-ui
    port: 80
    protocol: TCP
