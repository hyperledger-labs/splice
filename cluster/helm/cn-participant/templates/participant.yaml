apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Release.Name }}
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: "{{ .Values.imageRepo }}/canton-participant:{{ .Values.cluster.imageTag }}"
        imagePullPolicy: Always
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        - name: CANTON_PARTICIPANT_POSTGRES_SERVER
          value: {{ .Values.postgres }}
        - name: CANTON_PARTICIPANT_POSTGRES_SCHEMA
          value: {{ .Values.postgresSchema }}
        - name: CANTON_PARTICIPANT_ADMIN_USER_NAME
          valueFrom: {{ .Values.participantAdminUserNameFrom | toYaml | nindent 12 }}
        - name: AUTH_JWKS_URL
          value: {{ .Values.auth.jwksUrl }}
        - name: AUTH_TARGET_AUDIENCE
          value: {{ .Values.auth.targetAudience }}
        - name: CANTON_PARTICIPANT_POSTGRES_PASSWORD
          valueFrom:
           secretKeyRef:
              name: "{{ .Release.Name }}-secrets"
              key: cantonParticipantPostgresPassword
        {{- with .Values.globalDomain }}
        {{- if .alias }}
        - name: GLOBAL_DOMAIN_ALIAS
          value: "{{ .alias }}"
        {{- end }}
        {{- if .url }}
        - name: GLOBAL_DOMAIN_URL
          value: "{{ .url }}"
        {{- end }}
        {{- end }}
        ports:
        - containerPort: 5002
          name: lg-adm-api
          protocol: TCP
        - containerPort: 5001
          name: lg-api
          protocol: TCP
        - containerPort: 10013
          name: metrics-api
          protocol: TCP
        {{- if .Values.enableHealthProbes }}
        livenessProbe:
          grpc:
            port: 5061
            service: liveness
          initialDelaySeconds: 60
          periodSeconds: 60
          failureThreshold: 5
          timeoutSeconds: 10
        readinessProbe:
          grpc:
            port: 5061
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 10
        {{- end }}
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
      - name: envoy-proxy-lg-api
        image: "{{ .Values.imageRepo }}/envoy-proxy:{{ .Values.cluster.imageTag }}"
        imagePullPolicy: Always
        env:
        - name: GRPC_ADDRESS
          value: 127.0.0.1
        - name: GRPC_PORT
          value: "5001"
        - name: GRPC_WEB_PORT
          value: "6001"
        ports:
        - containerPort: 6001
          name: lg-api-gw
          protocol: TCP
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 256Mi
      - name: json-api
        image: "{{ .Values.imageRepo }}/json-api:{{ .Values.cluster.imageTag }}"
        imagePullPolicy: Always
        ports:
        - containerPort: 7575
          name: json-api
          protocol: TCP
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
  - name: lg-adm-api
    port: 5002
    protocol: TCP
  - name: lg-api
    port: 5001
    protocol: TCP
  - name: metrics
    port: 10013
    protocol: TCP
  - name: lg-api-gw
    port: 6001
    protocol: TCP
  - name: json-api
    port: 7575
    protocol: TCP
