cluster:
  imageTag: IMAGE_TAG
imageRepo: "digitalasset-canton-network-docker.jfrog.io/digitalasset"

enableHealthProbes: true

defaultJvmOptions: -Xms24576M -Xmx24576M -Dscala.concurrent.context.minThreads=4
resources:
  limits:
    memory: 32Gi
  requests:
    cpu: "1"
    memory: 32Gi

auth:
  jwksUrl: "https://canton-network-dev.us.auth0.com/.well-known/jwks.json"
  targetAudience: "https://canton.network.global"

extraDomains: '[]'
extraEnvVars:
- name: CN_APP_SV1_LEDGER_API_AUTH_USER_NAME
  valueFrom:
    secretKeyRef:
      key: ledger-api-user
      name: cn-app-sv1-ledger-api-auth
      optional: false

participantUsers: '[{"actAs":[],"admin":true,"name":{"env":"CN_APP_SV1_LEDGER_API_AUTH_USER_NAME"},"readAs":[]}]'
