apiVersion: apps/v1
kind: Deployment
metadata:
  name: directory-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: directory-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directory-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: directory-app
    spec:
      containers:
      - name: directory-app
        image: "{{ .Values.imageRepo }}/directory-app:{{ (.Values.cluster).imageTag }}"
        imagePullPolicy: Always
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        - name: CN_APP_DIRECTORY_PARTICIPANT_ADDRESS
          value: {{ .Values.participantAddress | default "participant" | quote }}
        {{- with .Values.persistence }}
        - name: ADDITIONAL_CONFIG_PERSISTENCE
          value: |
            canton.directory-app.storage {
              type = postgres
              config {
                dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
                properties = {
                  databaseName = "cantonnet"
                  currentSchema = "{{ .schema }}"
                  serverName = "{{ .host }}"
                  portNumber = {{ .port }}
                  user = "{{ .user }}"
                  password = "{{ .password }}"
                }
              }
            }
        {{- end }}
        {{- include "cn-util-lib.auth0-env-vars" (dict "appName" "directory" "keyName" "sv" "fixedTokens" (.Values.cluster).fixedTokens) | indent 8}}
        ports:
        - containerPort: 5010
          name: directory-api
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /livez
            port: 5010
          initialDelaySeconds: 60
          periodSeconds: 60
          failureThreshold: 5
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5010
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 5
          timeoutSeconds: 3
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: directory-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: directory-app
spec:
  selector:
    app: directory-app
  ports:
  - name: directory-api
    port: 5010
    protocol: TCP
  - name: metrics
    port: 10013
    protocol: TCP
