apiVersion: v1
kind: Service
metadata:
  name: external
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: external-proxy
  type: LoadBalancer
  loadBalancerIP: "{{ (.Values.cluster).ipAddress }}"
  loadBalancerSourceRanges: {{ ((.Values.cluster).networkSettings).externalIPRanges | toJson }}
  ports:
  - name: http
    port: 80
    protocol: TCP
  - name: https
    port: 443
    protocol: TCP
  - name: cd-pub-api
    port: 5008
    protocol: TCP
  - name: cd-adm-api
    port: 5009
    protocol: TCP
  - name: cd-metrics
    port: 10313
    protocol: TCP
  - name: svcp-adm-api
    port: 5002
    protocol: TCP
  - name: svcp-lg-api
    port: 5001
    protocol: TCP
  - name: svcp-metrics
    port: 10013
    protocol: TCP
  - name: dir-api
    port: 5010
    protocol: TCP
  - name: svc-app-adm-api
    port: 5005
    protocol: TCP
  - name: sv1-api
    port: 5014
    protocol: TCP
  - name: sv2-api
    port: 5114
    protocol: TCP
  - name: sv3-api
    port: 5214
    protocol: TCP
  - name: sv4-api
    port: 5314
    protocol: TCP
  - name: scan-api
    port: 5012
    protocol: TCP
  - name: val1-adm-api
    port: 5102
    protocol: TCP
  - name: val1-lg-api
    port: 5101
    protocol: TCP
  - name: val1-metrics
    port: 10113
    protocol: TCP
  - name: json-api
    port: 7575
    protocol: TCP
  - name: val1-lg-api-gw
    port: 6101
    protocol: TCP
  - name: swd-pub-api
    port: 5108
    protocol: TCP
  - name: swd-adm-api
    port: 5109
    protocol: TCP
  - name: swd-metrics
    port: 10413
    protocol: TCP
  - name: sw-adm-api
    port: 5202
    protocol: TCP
  - name: sw-lg-api
    port: 5201
    protocol: TCP
  - name: sw-metrics
    port: 10213
    protocol: TCP
  - name: sw-lg-api-gw
    port: 6201
    protocol: TCP
  - name: sw-api
    port: 5213
    protocol: TCP
  - name: sw-api-gw
    port: 6213
    protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-version-info
data:
  version: "{{ (.Values.cluster).imageTag }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-proxy
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-proxy
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: external-proxy
    spec:
      containers:
      - name: external-proxy
        image: "{{ .Values.imageRepo }}/external-proxy:{{ (.Values.cluster).imageTag }}"
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        {{- if .Values.enableIngressModes }}
        - name: ENABLE_INGRESS_MODES
          value: "{{ .Values.enableIngressModes }}"
        {{- end }}
        {{- if .Values.svNamespace }}
        - name: INGRESS_CONFIG_SV_NAMESPACE
          value: "{{ .Values.svNamespace }}"
        {{- end }}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        - containerPort: 443
          name: https
          protocol: TCP
        - containerPort: 5008
          name: cd-pub-api
          protocol: TCP
        - containerPort: 5009
          name: cd-adm-api
          protocol: TCP
        - containerPort: 10313
          name: cd-metrics
          protocol: TCP
        - containerPort: 5002
          name: svcp-adm-api
          protocol: TCP
        - containerPort: 5001
          name: svcp-lg-api
          protocol: TCP
        - containerPort: 10013
          name: svcp-metrics
          protocol: TCP
        - containerPort: 5010
          name: dir-api
          protocol: TCP
        - containerPort: 5005
          name: svc-app-adm-api
          protocol: TCP
        - containerPort: 5014
          name: sv1-api
          protocol: TCP
        - containerPort: 5114
          name: sv2-api
          protocol: TCP
        - containerPort: 5214
          name: sv3-api
          protocol: TCP
        - containerPort: 5314
          name: sv4-api
          protocol: TCP
        - containerPort: 5012
          name: scan-api
          protocol: TCP
        - containerPort: 5102
          name: val1-adm-api
          protocol: TCP
        - containerPort: 5101
          name: val1-lg-api
          protocol: TCP
        - containerPort: 10113
          name: val1-metrics
          protocol: TCP
        - containerPort: 6101
          name: val1-lg-api-gw
          protocol: TCP
        - containerPort: 5108
          name: swd-pub-api
          protocol: TCP
        - containerPort: 5109
          name: swd-adm-api
          protocol: TCP
        - containerPort: 10413
          name: swd-metrics
          protocol: TCP
        - containerPort: 5202
          name: sw-adm-api
          protocol: TCP
        - containerPort: 5201
          name: sw-lg-api
          protocol: TCP
        - containerPort: 10213
          name: sw-metrics
          protocol: TCP
        - containerPort: 6201
          name: sw-lg-api-gw
          protocol: TCP
        - containerPort: 5213
          name: sw-api
          protocol: TCP
        - containerPort: 6213
          name: sw-api-gw
          protocol: TCP
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: "1"
            memory: 512Mi
        volumeMounts:
        - mountPath: /config
          name: external-proxy-cluster-version-vol
        - mountPath: /tmp
          name: external-proxy-tls-cert-vol
      volumes:
      - name: external-proxy-cluster-version-vol
        configMap:
          defaultMode: 420
          name: cluster-version-info
      - name: external-proxy-tls-cert-vol
        secret:
          defaultMode: 420
          optional: false
          secretName: "cn-{{ (.Values.cluster).basename }}net-tls"
