apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      volumes:
        - name: postgres-password
          secret:
            secretName: {{ .Values.persistence.secretName }}
            items:
              - key: postgresPassword
                path: postgresPassword
      containers:
      - name: {{ .Release.Name }}
        image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
        env:
          - name: DATA_SOURCE_PASS_FILE
            value: /tmp/pwd
          - name: DATA_SOURCE_USER
            value: cnadmin
          - name: DATA_SOURCE_URI
            value: {{ .Values.persistence.host }}:{{ .Values.persistence.port }}/{{ .Values.persistence.databaseName }}?sslmode=disable
        volumeMounts:
          - name: postgres-password
            mountPath: "/tmp/pwd"
            subPath: postgresPassword
            readOnly: true
      initContainers:
      # If postgres is not yet ready, postgres-exporter fails when initializing the collector
      # but never retries nor indicates non-readiness, so we unfortunately need to wait for it
      # to be ready before spinning up postgres-exporter.
      - name: {{ .Release.Name }}-init
        image: postgres:14
        env:
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                key: postgresPassword
                name: {{ .Values.persistence.secretName }}
        command:
          - 'bash'
          - '-c'
          - |
            until errmsg=$(psql -h {{ .Values.persistence.host }} --username=cnadmin --dbname={{ .Values.persistence.databaseName }} -p {{ .Values.persistence.port }} -c 'select 1' 2>&1); do
                echo "Waiting for database {{ .Values.persistence.databaseName }}, at hostname {{ .Values.persistence.host }}, port {{ .Values.persistence.port }} to be accessible. Last error: $errmsg"
                sleep 2;
            done
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    server: {{ .Values.persistence.host }}
spec:
  ports:
  - name: postgres-metrics
    port: 9187
    protocol: TCP
  selector:
    app: {{ .Release.Name }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    release: prometheus-grafana-monitoring
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  endpoints:

  - port: postgres-metrics
    interval: 30s

  selector:
    matchLabels:
      app: {{ .Release.Name }}

  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}

  targetLabels:
      - server
