apiVersion: apps/v1
kind: Deployment
metadata:
  name: scan-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: scan-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scan-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: scan-app
    spec:
      containers:
      - name: scan-app
        image: "{{ .Values.imageRepo }}/scan-app:{{ (.Values.cluster).imageTag }}"
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        {{- include "cn-util-lib.auth0-env-vars" (dict "appName" "scan" "keyName" "sv" "fixedTokens" (.Values.cluster).fixedTokens) | indent 8}}
        imagePullPolicy: Always
        ports:
        - containerPort: 5012
          name: scan-api
          protocol: TCP
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: scan-app
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: scan-app
  ports:
  - name: scan-api
    port: 5012
    protocol: TCP
