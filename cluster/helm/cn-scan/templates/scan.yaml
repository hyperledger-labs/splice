apiVersion: apps/v1
kind: Deployment
metadata:
  name: scan-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: scan-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scan-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: scan-app
    spec:
      containers:
      - name: scan-app
        image: "{{ .Values.imageRepo }}/scan-app:{{ (.Values.cluster).imageTag }}"
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        {{- include "cn-util-lib.auth0-env-vars" (dict "appName" "scan" "keyName" "sv" "fixedTokens" (.Values.cluster).fixedTokens) | indent 8}}
        - name: CN_APP_SCAN_PARTICIPANT_ADDRESS
          value: {{ .Values.participantAddress | default "participant" | quote }}
        imagePullPolicy: Always
        ports:
        - containerPort: 5012
          name: scan-api
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /livez
            port: 5012
          initialDelaySeconds: 60
          periodSeconds: 60
          failureThreshold: 5
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5012
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 5
          timeoutSeconds: 3
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: scan-app
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: scan-app
  ports:
  - name: scan-api
    port: 5012
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scan-web-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: scan-web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scan-web-ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: scan-web-ui
    spec:
      containers:
      - env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        image: "{{ .Values.imageRepo }}/scan-web-ui:{{ (.Values.cluster).imageTag }}"
        imagePullPolicy: Always
        name: scan-web-ui
        ports:
        - containerPort: 80
          name: scan-ui
          protocol: TCP
        resources:
          limits:
            memory: 1536Mi
          requests:
            cpu: 500m
            memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: scan-web-ui
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: scan-web-ui
  ports:
  - name: scan-ui
    port: 80
    protocol: TCP
