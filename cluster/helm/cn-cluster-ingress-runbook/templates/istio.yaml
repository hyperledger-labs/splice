{{- if and .Values.withSvIngress ((.Values.ingress).sequencer).globalDomain }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: sequencer-global-{{ .Values.ingress.sequencer.globalDomain }}-{{ (.Values.cluster).svNamespace }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "sequencer-{{ .Values.ingress.sequencer.globalDomain }}.{{ (.Values.cluster).svNamespace }}.{{ (.Values.cluster).hostPrefix }}{{ (.Values.cluster).hostname }}"
  gateways:
    - cluster-ingress/cn-http-gateway
  http:
  - match:
      - port: 443
    route:
    - destination:
        port:
          number: 5008
        host: global-domain-{{ .Values.ingress.sequencer.globalDomain }}-sequencer.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
---
{{- end }}
{{- if and .Values.withSvIngress ((.Values.ingress).sequencer).activeGlobalDomain }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: sequencer-sv-{{ (.Values.cluster).svNamespace }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "sequencer.{{ (.Values.cluster).svNamespace }}.{{ (.Values.cluster).hostPrefix }}{{ (.Values.cluster).hostname }}"
  gateways:
    - cluster-ingress/cn-http-gateway
  http:
    - match:
        - port: 443
      route:
        - destination:
            port:
              number: 5008
            host: global-domain-{{ .Values.ingress.sequencer.activeGlobalDomain }}-sequencer.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
---
{{- end }}
