{{- if and .Values.withSvIngress ((.Values.ingress).globalDomain).globalDomainId }}
  {{- if .Values.ingress.sequencer }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: sequencer-{{ (.Values.cluster).svNamespace }}-domain-{{ .Values.ingress.globalDomain.globalDomainId }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "sequencer-{{ .Values.ingress.globalDomain.globalDomainId }}.{{ (.Values.cluster).svNamespace }}.{{ (.Values.cluster).hostPrefix }}{{ (.Values.cluster).hostname }}"
  gateways:
    - cluster-ingress/cn-http-gateway
  http:
    - match:
        - port: 443
      route:
        - destination:
            port:
              number: 5008
            host: global-domain-{{ .Values.ingress.globalDomain.globalDomainId }}-sequencer.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
---
  {{- end }}
  {{- if .Values.ingress.sv }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: sv-sv-{{ (.Values.cluster).svNamespace }}-domain-{{ .Values.ingress.globalDomain.globalDomainId }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "sv-{{ .Values.ingress.globalDomain.globalDomainId }}.{{ (.Values.cluster).svNamespace }}.{{ (.Values.cluster).hostPrefix }}{{ (.Values.cluster).hostname }}"
  gateways:
    - cluster-ingress/cn-http-gateway
  http:
    - match:
        - port: 443
          uri:
            prefix: "/api/sv/"
      route:
        - destination:
            port:
              number: 5014
            host: sv-app-{{ .Values.ingress.globalDomain.globalDomainId }}.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
    - match:
        - port: 443
      route:
        - destination:
            port:
              number: 80
            host: sv-web-ui-{{ .Values.ingress.globalDomain.globalDomainId }}.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
---
  {{- end }}
{{- end }}
{{- if ((.Values.ingress).globalDomain).activeGlobalDomainId }}
  {{- if .Values.ingress.sequencer }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: sequencer-sv-{{ (.Values.cluster).svNamespace }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "sequencer.{{ (.Values.cluster).svNamespace }}.{{ (.Values.cluster).hostPrefix }}{{ (.Values.cluster).hostname }}"
  gateways:
    - cluster-ingress/cn-http-gateway
  http:
    - match:
        - port: 443
      route:
        - destination:
            port:
              number: 5008
            host: global-domain-{{ .Values.ingress.globalDomain.activeGlobalDomainId }}-sequencer.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
---
  {{- end }}
  {{- if .Values.ingress.sv }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: sv-sv-{{ (.Values.cluster).svNamespace }}
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "sv.{{ (.Values.cluster).svNamespace }}.{{ (.Values.cluster).hostPrefix }}{{ (.Values.cluster).hostname }}"
  gateways:
    - cluster-ingress/cn-http-gateway
  http:
    - match:
        - port: 443
          uri:
            prefix: "/api/sv/"
      route:
        - destination:
            port:
              number: 5014
            host: sv-app-{{ .Values.ingress.globalDomain.activeGlobalDomainId }}.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
    - match:
        - port: 443
      route:
        - destination:
            port:
              number: 80
            host: sv-web-ui-{{ .Values.ingress.globalDomain.activeGlobalDomainId }}.{{ (.Values.cluster).svNamespace }}.svc.cluster.local
---
  {{- end }}
{{- end }}
