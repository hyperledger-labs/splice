apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Release.Name }}
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: "{{ .Values.imageRepo }}/canton-domain:{{ .Values.cluster.imageTag }}"
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }} {{ .Values.additionalJvmOptions }}
        - name: CANTON_DOMAIN_POSTGRES_SERVER
          value: {{ .Values.postgres }}
        - name: CANTON_DOMAIN_POSTGRES_PASSWORD
          valueFrom:
           secretKeyRef:
              name: "postgres-secrets"
              key: postgresPassword
        {{- if .Values.postgresSequencerDb }}
        - name: CANTON_SEQUENCER_POSTGRES_DB
          value: {{ .Values.postgresSequencerDb }}
        {{- end }}
        {{- if .Values.postgresMediatorDb }}
        - name: CANTON_MEDIATOR_POSTGRES_DB
          value: {{ .Values.postgresMediatorDb }}
        {{- end }}
        imagePullPolicy: Always
        ports:
        - containerPort: 5008
          name: cd-pub-api
          protocol: TCP
        - containerPort: 5009
          name: cd-adm-api
          protocol: TCP
        - containerPort: 10013
          name: cd-metrics
          protocol: TCP
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: cd-pub-api
          timeoutSeconds: 1
        livenessProbe:
          failureThreshold: 5
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: cd-pub-api
          timeoutSeconds: 1
        startupProbe:
          failureThreshold: 20
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: cd-pub-api
          timeoutSeconds: 1
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
  - name: cd-pub-api
    port: 5008
    protocol: TCP
  - name: cd-adm-api
    port: 5009
    protocol: TCP
  - name: cm-adm-api
    port: 5007
    protocol: TCP
  - name: cd-metrics
    port: 10013
    protocol: TCP
