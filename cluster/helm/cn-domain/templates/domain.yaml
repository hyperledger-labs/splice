apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: {{ .Release.Name }}
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: "{{ .Values.imageRepo }}/canton-domain:{{ .Values.cluster.imageTag }}"
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }} {{ .Values.additionalJvmOptions }}
        - name: CANTON_DOMAIN_POSTGRES_SERVER
          value: {{ .Values.postgres }}
        - name: CANTON_DOMAIN_POSTGRES_PASSWORD
          valueFrom:
           secretKeyRef:
              name: {{ .Values.postgresSecretName }}
              key: postgresPassword
        {{- if .Values.postgresSequencerDb }}
        - name: CANTON_SEQUENCER_POSTGRES_DB
          value: {{ .Values.postgresSequencerDb }}
        {{- end }}
        {{- if .Values.postgresMediatorDb }}
        - name: CANTON_MEDIATOR_POSTGRES_DB
          value: {{ .Values.postgresMediatorDb }}
        {{- end }}
        imagePullPolicy: Always
        ports:
        - containerPort: 5008
          name: cd-pub-api
          protocol: TCP
        - containerPort: 5009
          name: cd-adm-api
          protocol: TCP
        - containerPort: 10013
          name: cd-metrics
          protocol: TCP
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 5
          successThreshold: 1
          tcpSocket:
            port: cd-pub-api
          timeoutSeconds: 1
        livenessProbe:
          failureThreshold: 5
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: cd-pub-api
          timeoutSeconds: 1
        startupProbe:
          failureThreshold: 20
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: cd-pub-api
          timeoutSeconds: 1
      restartPolicy: Always
      {{- if .Values.init }}
      initContainers:
        - name: {{ .Release.Name }}-init-sequencer
          image: postgres:14
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: postgresPassword
                  name: {{ .Values.postgresSecretName }}
          command:
            - 'bash'
            - '-c'
            - |
              until errmsg=$(psql -h {{ .Values.postgres }} --username=cnadmin --dbname={{ .Values.init.initDb }} -c 'create database {{ .Values.postgresSequencerDb }}' 2>&1); do
                if [[ $errmsg == *"already exists"* ]]; then
                  echo "Database {{ .Values.postgresSequencerDb }} already exists. Done."
                  break
                fi

                echo "trying to create postgres database {{ .Values.postgresSequencerDb }}, last error: $errmsg";
                sleep 2;
              done
        - name: {{ .Release.Name }}-init-mediator
          image: postgres:14
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: postgresPassword
                  name: {{ .Values.postgresSecretName }}
          command:
            - 'sh'
            - '-c'
            - |
              until errmsg=$(psql -h {{ .Values.postgres }} --username=cnadmin --dbname={{ .Values.init.initDb }} -c 'create database {{ .Values.postgresMediatorDb }}' 2>&1); do
                if [[ $errmsg == *"already exists"* ]]; then
                  echo "Database {{ .Values.postgresMediatorDb }} already exists. Done."
                  break
                fi

                echo "trying to create postgres database {{ .Values.postgresMediatorDb }}, last error: $errmsg";
                sleep 2;
              done
      {{- end}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
  - name: cd-pub-api
    port: 5008
    protocol: TCP
  - name: cd-adm-api
    port: 5009
    protocol: TCP
  - name: cm-adm-api
    port: 5007
    protocol: TCP
  - name: cd-metrics
    port: 10013
    protocol: TCP
