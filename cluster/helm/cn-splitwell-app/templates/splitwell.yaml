apiVersion: apps/v1
kind: Deployment
metadata:
  name: splitwell-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: splitwell-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splitwell-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: splitwell-app
    spec:
      containers:
      - name: splitwell-app
        image: "{{ .Values.imageRepo }}/splitwell-app:{{ (.Values.cluster).imageTag }}"
        imagePullPolicy: Always
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.defaultJvmOptions }}
        {{- include "cn-util-lib.auth0-env-vars" (dict "appName" "splitwell" "keyName" "splitwell" "fixedTokens" (.Values.cluster).fixedTokens) | indent 8}}
        ports:
        - containerPort: 5213
          name: sw-api
          protocol: TCP
        {{- with .Values.resources }}
        resources: {{- toYaml . | nindent 10 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: splitwell-app
  namespace: {{ .Release.Namespace }}
  labels:
    app: splitwell-app
spec:
  selector:
    app: splitwell-app
  ports:
  - name: sw-api
    port: 5213
    protocol: TCP
  - name: metrics
    port: 10013
    protocol: TCP
