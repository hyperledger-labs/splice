cluster:
  imageTag: IMAGE_TAG
imageRepo: "digitalasset-canton-network-docker.jfrog.io/digitalasset"
resources:
  limits:
    cpu: "2"
    memory: 8Gi
  requests:
    cpu: "0.5"
    memory: 1Gi

db:
  volumeSize: 480Gi
  volumeStorageClass: standard-rwo
  pvcTemplateName: pg-data
  # k8s nodeAffinity for the persistent volume (optional)
  # volumeNodeAffinity:

persistence:
  secretName: "postgres-secrets"

# k8s affinity for all deployed pods (optional)
# affinity:

# k8s nodeSelector for all deployed pods (optional)
# nodeSelector:
