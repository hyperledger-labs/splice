apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: participant
  name: participant
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: participant
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: participant
    spec:
      containers:
      - name: participant
        image: "{{ .Values.imageRepo }}/canton-participant:{{ .Values.cluster.imageTag }}"
        env:
        - name: JAVA_TOOL_OPTIONS
          value: -Xms24576M -Xmx24576M -Dscala.concurrent.context.minThreads=4
        - name: CN_APP_SVC_LEDGER_API_AUTH_USER_NAME
          valueFrom:
            secretKeyRef:
              key: ledger-api-user
              name: cn-app-svc-ledger-api-auth
              optional: false
        - name: CN_APP_SV1_LEDGER_API_AUTH_USER_NAME
          valueFrom:
            secretKeyRef:
              key: ledger-api-user
              name: cn-app-sv1-ledger-api-auth
              optional: false
        - name: CN_APP_SV2_LEDGER_API_AUTH_USER_NAME
          valueFrom:
            secretKeyRef:
              key: ledger-api-user
              name: cn-app-sv2-ledger-api-auth
              optional: false
        - name: CN_APP_SV3_LEDGER_API_AUTH_USER_NAME
          valueFrom:
            secretKeyRef:
              key: ledger-api-user
              name: cn-app-sv3-ledger-api-auth
              optional: false
        - name: CN_APP_SV4_LEDGER_API_AUTH_USER_NAME
          valueFrom:
            secretKeyRef:
              key: ledger-api-user
              name: cn-app-sv4-ledger-api-auth
              optional: false
        - name: CN_APP_SCAN_LEDGER_API_AUTH_USER_NAME
          valueFrom:
            secretKeyRef:
              key: ledger-api-user
              name: cn-app-scan-ledger-api-auth
              optional: false
        - name: CN_APP_DIRECTORY_LEDGER_API_AUTH_USER_NAME
          valueFrom:
            secretKeyRef:
              key: ledger-api-user
              name: cn-app-directory-ledger-api-auth
              optional: false
        - name: CANTON_PARTICIPANT_POSTGRES_SERVER
          value: postgres
        - name: CANTON_PARTICIPANT_POSTGRES_SCHEMA
          value: cn_participant
        - name: CANTON_PARTICIPANT_USERS
          value: '[{"actAs": [{"fromUser": "self"}], "admin": true, "name": {"env":
            "CN_APP_SVC_LEDGER_API_AUTH_USER_NAME"}, "primaryParty": {"allocate":
            "svc_party"}, "readAs": [ ]}, {"actAs": [ ], "admin": false, "name": {"env":
            "CN_APP_SCAN_LEDGER_API_AUTH_USER_NAME"}, "primaryParty": {"fromUser":
            {"env": "CN_APP_SVC_LEDGER_API_AUTH_USER_NAME"}}, "readAs": [{"fromUser":
            {"env": "CN_APP_SVC_LEDGER_API_AUTH_USER_NAME"}}]}, {"actAs": [{"fromUser":
            {"env": "CN_APP_SVC_LEDGER_API_AUTH_USER_NAME"}}], "admin": true, "name":
            {"env": "CN_APP_DIRECTORY_LEDGER_API_AUTH_USER_NAME"}, "primaryParty":
            {"fromUser": {"env": "CN_APP_SVC_LEDGER_API_AUTH_USER_NAME"}}, "readAs":
            [ ]}, {"actAs": [{"fromUser": "self"}, {"fromUser": {"env": "CN_APP_SVC_LEDGER_API_AUTH_USER_NAME"}}],
            "admin": true, "name": {"env": "CN_APP_SV1_LEDGER_API_AUTH_USER_NAME"},
            "primaryParty": {"allocate": "sv1"}, "readAs": [ ]}, {"actAs": [{"fromUser":
            "self"}, {"fromUser": {"env": "CN_APP_SVC_LEDGER_API_AUTH_USER_NAME"}}],
            "admin": true, "name": {"env": "CN_APP_SV2_LEDGER_API_AUTH_USER_NAME"},
            "primaryParty": {"allocate": "sv2"}, "readAs": [ ]}, {"actAs": [{"fromUser":
            "self"}, {"fromUser": {"env": "CN_APP_SVC_LEDGER_API_AUTH_USER_NAME"}}],
            "admin": true, "name": {"env": "CN_APP_SV3_LEDGER_API_AUTH_USER_NAME"},
            "primaryParty": {"allocate": "sv3"}, "readAs": [ ]}, {"actAs": [{"fromUser":
            "self"}, {"fromUser": {"env": "CN_APP_SVC_LEDGER_API_AUTH_USER_NAME"}}],
            "admin": true, "name": {"env": "CN_APP_SV4_LEDGER_API_AUTH_USER_NAME"},
            "primaryParty": {"allocate": "sv4"}, "readAs": [ ]}]'
        imagePullPolicy: Always
        ports:
        - containerPort: 5002
          name: svcp-adm-api
          protocol: TCP
        - containerPort: 5001
          name: svcp-lg-api
          protocol: TCP
        - containerPort: 10013
          name: svcp-metrics
          protocol: TCP
        resources:
          limits:
            memory: 32Gi
          requests:
            cpu: "1"
            memory: 32Gi
---
apiVersion: v1
kind: Service
metadata:
  name: participant
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: participant
  ports:
  - name: svcp-adm-api
    port: 5002
    protocol: TCP
    targetPort: 5002
  - name: svcp-lg-api
    port: 5001
    protocol: TCP
    targetPort: 5001
  - name: svcp-metrics
    port: 10013
    protocol: TCP
    targetPort: 10013
