apiVersion: 1
groups:
  - orgId: 1
    name: Store Read Performance
    folder: database
    interval: 1h
    rules:
      - uid: update-history-read-total-time
        title: Update History Read Total Time Too High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: prometheus
            model:
              expr: splice_perf_read_total_time_ns{test="UpdateHistoryReadPerformanceTest"} / 1e9
              refId: A
          - refId: B
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [1]
              refId: C
        for: 5m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: Update history read total time exceeded 1s
        labels:
          severity: warning
