apiVersion: 1
groups:
  - orgId: 1
    name: cometbft
    folder: canton-network
    interval: 1m
    rules:
      - uid: fa4b8a18-e4be-4d19-a5af-90c7326fd935
        title: Cometbft Consensus
        condition: threshold
        data:
          - refId: invalid_voting_power
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: cometbft_consensus_missing_validators_power + cometbft_consensus_byzantine_validators_power
              hide: false
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: invalid_voting_power
          - refId: total_voting_power
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: builder
              expr: cometbft_consensus_validators_power
              hide: false
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: total_voting_power
          - refId: current_invalid_voting_power
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: invalid_voting_power
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: current_invalid_voting_power
              settings:
                mode: ""
              type: reduce
          - refId: acceptable_invalid_voting_power
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: floor(${current_total_voting_power} / 3)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: acceptable_invalid_voting_power
              type: math
          - refId: current_total_voting_power
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: total_voting_power
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: current_total_voting_power
              settings:
                mode: ""
              type: reduce
          - refId: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: ${current_invalid_voting_power} >= ${acceptable_invalid_voting_power} && ${current_invalid_voting_power} > 0
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: math
        dashboardUid: UJyurCTWz
        panelId: 48
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          __dashboardUid__: UJyurCTWz
          __panelId__: "48"
          description: We're missing {{ index $values "current_invalid_voting_power" }} voting power from a total of {{ index $values "current_total_voting_power" }}. We can tolerate f = {{ index $values "acceptable_invalid_voting_power" }}.
          severity: |-
            {{- if (gt (index $values "current_invalid_voting_power").Value (index $values "acceptable_invalid_voting_power").Value) -}}
            critical
            {{- else -}}
            medium
            {{- end -}}
          summary: |-
            {{- if (gt (index $values "current_invalid_voting_power").Value (index $values "acceptable_invalid_voting_power").Value) -}}
            CometBFT network voting power is byzantine
            {{- else -}}
            CometBFT network voting power close to byzantine status
            {{- end -}}
        isPaused: false
      - uid: a3b47fca-0982-491b-80bb-0c70f04dcd8b
        title: Cometbft Height Not Advancing
        condition: C
        data:
          - refId: height_advances
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              disableTextWrap: false
              editorMode: builder
              expr: changes(cometbft_consensus_height[5m])
              fullMetaSearch: false
              includeNullMetadata: true
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: height_advances
              useBackend: false
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              disableTextWrap: false
              editorMode: builder
              expr: cometbft_consensus_height
              fullMetaSearch: false
              includeNullMetadata: true
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
              useBackend: false
          - refId: latest_height
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: latest_height
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                      - 0
                    type: lt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: height_advances
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: UJyurCTWz
        panelId: 66
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          __dashboardUid__: UJyurCTWz
          __panelId__: "66"
          description: Current height {{ index $values "latest_height" }} on node {{ $labels.service }}
          severity: critical
          summary: Blockchain height not advancing
        isPaused: false
      - uid: a3f23df0-40d5-41d1-8b4b-03aa8c62c030
        title: Cometbft Not Voting
        condition: C
        data:
          - refId: blocks_not_signed
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              disableTextWrap: false
              editorMode: code
              exemplar: false
              expr: sum(cometbft_consensus_latest_block_height - on(pod) cometbft_consensus_validator_last_signed_height)
              fullMetaSearch: false
              includeNullMetadata: true
              instant: false
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: true
              refId: blocks_not_signed
              useBackend: false
          - refId: block_height
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              disableTextWrap: false
              editorMode: code
              expr: cometbft_consensus_latest_block_height
              fullMetaSearch: false
              includeNullMetadata: true
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: block_height
              useBackend: false
          - refId: signed_height
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              disableTextWrap: false
              editorMode: builder
              expr: cometbft_consensus_validator_last_signed_height
              fullMetaSearch: false
              includeNullMetadata: true
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: signed_height
              useBackend: false
          - refId: current_blocks_not_signed
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: blocks_not_signed
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: current_blocks_not_signed
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 50
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: current_blocks_not_signed
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
          - refId: latest_signed_height
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: signed_height
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: latest_signed_height
              type: reduce
          - refId: latest_block_height
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: block_height
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: latest_block_height
              type: reduce
        dashboardUid: UJyurCTWz
        panelId: 66
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          __dashboardUid__: UJyurCTWz
          __panelId__: "66"
          description: |-
            Blocks not signed: {{ index $values "current_blocks_not_signed" }}
            Latest signed block: {{ index $values "latest_signed_block" }}
            Latest block: {{ index $values "latest_block_height" }}
          summary: Node didn't sign {{ index $values "current_blocks_not_signed" }} in the last 5 minutes
        isPaused: false
