apiVersion: 1
groups:
  - orgId: 1
    name: automation
    folder: canton-network
    interval: 5m
    rules:
      - uid: fe73c0e7-dcb3-4975-a7d1-04ed8da087be
        title: Automation Failures
        condition: failures
        data:
          - refId: failures
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              disableTextWrap: false
              editorMode: code
              exemplar: false
              expr: ((sum by(namespace, node_type, trigger_name, migration) (increase(cn_trigger_completed_total{trigger_name=~".+", outcome="failure"}[10m])) / sum by(namespace, node_type, trigger_name, migration) (increase(cn_trigger_completed_total{trigger_name=~".+", outcome=~".+"}[10m]))) > 0) * 100
              fullMetaSearch: false
              includeNullMetadata: true
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: failures
              useBackend: false
        dashboardUid: a3e1385f-6f03-46d9-908c-34aca0f507a6
        panelId: 8
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          __dashboardUid__: a3e1385f-6f03-46d9-908c-34aca0f507a6
          __panelId__: "8"
          description: The {{ index $labels "trigger_name" }} for the {{ index $labels "node_type" }} app in the {{ index $labels "namespace" }} namespace on migration id {{ index $labels "migration" }} experienced {{ index $values "failures" }}% failures in the last 10 minutes.
          runbook_url: ""
          severity: |-
            {{- if (gt $values.failures.Value 50.0) -}}
            critical
            {{- else -}}
            warning
            {{- end -}}
          summary: '{{ index $values "failures" }}% fatal errors occurred in {{ index $labels "namespace" }} - {{ index $labels "trigger_name" }} automation trigger'
        labels:
          gcloud_filter: 'resource.labels.namespace_name=%22{{ index $labels "namespace" }}%22%0A%22{{ index $labels "trigger_name" }}%22'
        isPaused: false
