infra:
  prometheus:
    retentionDuration: "10y"
synchronizerMigration:
  archived:
    - id: 1
      provider: internal
      version: 0.2.8
  active:
    id: 2
    provider: external
    version: 0.3.17
    releaseReference: "refs/heads/release-line-0.3.17"
pulumiProjectConfig:
  default:
    isExternalCluster: true
    cloudSql:
      enabled: true
monitoring:
  alerting:
    enableNoDataAlerts: true
    alerts:
      cloudSql:
        maintenance: true
operatorDeployment:
  reference: refs/heads/main
