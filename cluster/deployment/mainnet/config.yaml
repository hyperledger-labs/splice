infra:
  prometheus:
    retentionDuration: "10y"
synchronizerMigration:
  active:
    id: 2
    provider: external
    version: 0.3.19
    releaseReference:
      gitReference: "refs/heads/release-line-0.3.19"
      repoUrl: https://github.com/DACH-NY/canton-network-node
      pulumiStacksDir: "cluster/stacks/prod"
      pulumiBaseDir: "cluster/pulumi"
      deploymentDir: "cluster/deployment"
      spliceRoot: "."
pulumiProjectConfig:
  default:
    interAppsDependencies: false
    isExternalCluster: true
    cloudSql:
      enabled: true
  canton-network:
    cloudSql:
      tier: 'db-perf-optimized-N-4'
      enterprisePlus: true
monitoring:
  alerting:
    enableNoDataAlerts: true
    alerts:
      cloudSql:
        maintenance: true
operatorDeployment:
  reference:
    gitReference: refs/heads/main
    repoUrl: https://github.com/DACH-NY/canton-network-node
    pulumiStacksDir: "cluster/stacks/prod"
    pulumiBaseDir: "cluster/pulumi"
    deploymentDir: "cluster/deployment"
    spliceRoot: "."
