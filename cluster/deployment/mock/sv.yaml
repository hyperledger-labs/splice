!include(../../configs/shared/base-sv.yaml)
appsPg:
  cloudSql:
    enabled: true
    tier: "apps-pg-override-tier"
pruning:
  cometbft:
    retainBlocks: 5040000
  sequencer:
    enabled: true
    pruningInterval: "1 hour"
    retentionPeriod: "30 days"
  mediator:
    enabled: true
    cron: "0 0 * * *"
    maxDuration: "30m"
    retentionPeriod: "7d"
cometbft:
  mempool:
    size: 4000
scanApp:
  additionalEnvVars:
    - name: CUSTOM_MOCK_ENV_VAR_NAME
      value: CUSTOM_MOCK_ENV_VAR_VALUE
  additionalJvmOptions: "-DcustomScanAppJvmFlag"
  resources:
    requests:
      cpu: "0.5"
      memory: '1536Mi'
    limits:
      memory: '2048Mi'
svApp:
  additionalPackagesToUnvet:
    splice-wallet-payments: [ "0.1.15", "0.1.16" ]
    splice-amulet: [ "0.1.15" ]
  permissionedSynchronizer: false  # will be removed once the permissioned synchronizer is the default
  additionalEnvVars:
    - name: CUSTOM_MOCK_ENV_VAR_NAME
      value: CUSTOM_MOCK_ENV_VAR_VALUE
  additionalJvmOptions: "-DcustomSvAppJvmFlag"
  resources:
    requests:
      cpu: "1"
      memory: '1Gi'
    limits:
      memory: '2Gi'
participant:
  additionalEnvVars: !append
    - name: CUSTOM_MOCK_ENV_VAR_NAME
      value: CUSTOM_MOCK_ENV_VAR_VALUE
  additionalJvmOptions: "-DcustomParticipantJvmFlag"
sequencer:
  additionalEnvVars:
    - name: CUSTOM_MOCK_ENV_VAR_NAME
      value: CUSTOM_MOCK_ENV_VAR_VALUE
  additionalJvmOptions: "-DcustomSequencerJvmFlag"
  cloudSql:
    tier: "sequencer-override-tier"
  resources:
    requests:
      cpu: "1"
      memory: '1Gi'
    limits:
      memory: '2Gi'
mediator:
  additionalEnvVars:
    - name: CUSTOM_MOCK_ENV_VAR_NAME
      value: CUSTOM_MOCK_ENV_VAR_VALUE
  additionalJvmOptions: "-DcustomMediatorJvmFlag"
  resources:
    requests:
      cpu: "1"
      memory: '1Gi'
    limits:
      memory: '2Gi'
logging:
  appsLogLevel: WARN
  cantonLogLevel: INFO
  cantonStdoutLogLevel: DEBUG
  apiRequestLogLevel: DEBUG
