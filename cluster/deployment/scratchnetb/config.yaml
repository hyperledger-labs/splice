infra:
  prometheus:
    retentionDuration: "30d"
    retentionSize: "200GB"
    storageSize: "600Gi"
pulumiProjectConfig:
  default:
    cloudSql:
      protected: false
      enabled: true
validator1:
  participantPruningSchedule:
    cron: "0 /10 * * * ?" # Run every 10min
    maxDuration: "5m"
    retention: "1h" # Keep 1h
  deduplicationDuration: 30m
automation:
  delegatelessAutomation: true
  expectedTaskDuration: 5000 # millis
synchronizerMigration:
  active:
    id: 0
    provider: external
    version: "0.4.0-snapshot.20250505.9188.0.vfe646ee0"
    releaseReference:
      gitReference: refs/heads/julien/17951-add-random-delays
      repoUrl: https://github.com/DACH-NY/canton-network-node
      pulumiStacksDir: "cluster/stacks/scratchnets"
      pulumiBaseDir: "cluster/pulumi"
      deploymentDir: "cluster/deployment"
      spliceRoot: "."
operatorDeployment:
  reference:
    gitReference: refs/heads/julien/17951-add-random-delays
    repoUrl: https://github.com/DACH-NY/canton-network-node
    pulumiStacksDir: "cluster/stacks/scratchnets"
