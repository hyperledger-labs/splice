!include($SPLICE_ROOT/cluster/configs/shared/scratchnet.yaml)
multiValidator:
  postgresPvcSize: '500Gi'
  requiresOnboardingSecret: false
loadTester:
  enable: true
  iterationsPerMinute: 1200
svs:
  default:
    sequencer:
      cloudSql:
        tier: 'db-perf-optimized-N-4'
        enterprisePlus: true
        flags:
          max_wal_size: '20480' # 20GB, but GCP doesn't allow to write it that way and must be a number indicating MB
          maintenance_work_mem: '2000000' # 2Gi, but GCP doesn't allow to write it that way and must be a number indicating KB
chaosMesh:
  dabftLatency: 50ms
synchronizerMigration:
  lsuEnabled: true
  frozenMigrationId: 0
  active:
    id: 0
    version: 0.6.0-snapshot.20260415.2501.0.veebc16a5
    sequencer:
      enableBftSequencer: true
    releaseReference:
      gitReference: "refs/heads/tom-da/basicScratch"
      repoUrl: https://github.com/DACH-NY/canton-network-internal
      pulumiStacksDir: "cluster/stacks/scratchnets"
      pulumiBaseDir: "splice/cluster/pulumi"
      deploymentDir: "splice/cluster/deployment"
      spliceRoot: "splice"
      privateConfigsDir: "cluster/configs/configs-private"
      publicConfigsDir: "cluster/configs/configs"
