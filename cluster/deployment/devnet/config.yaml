infra:
  ipWhitelisting:
    extraWhitelistedIngress:
      - "35.225.102.103/32" # CI GKE cluster for CCI (for preflights)
validator1:
  kms:
    type: gcp
    locationId: us-central1
    projectId: da-cn-devnet
    keyRingId: validator1_dev
synchronizerMigration:
  archived:
    - id: 1
      provider: internal
      version: 0.2.4
    - id: 2
      provider: external
      version: 0.2.6
      releaseReference: "refs/heads/release-line-0.2.6"
    - id: 3
      provider: external
      version: 0.2.8
      releaseReference: "refs/heads/release-line-0.2.8"
  legacy:
    id: 4
    provider: external
    version: 0.3.12
    releaseReference: "refs/heads/release-line-0.3.12"
  active:
    id: 5
    provider: external
    version: 0.3.12
    releaseReference: "refs/heads/release-line-0.3.12"
    migratingFrom: 4
pulumiProjectConfig:
  default:
    isExternalCluster: true
monitoring:
  alerting:
    enableNoDataAlerts: true
    alerts:
      cometbft:
        expectedMaxBlocksPerSecond: 5
      loadTester:
        # DevNet fluctuates a bit more than our internal clusters so we alert only when it drops below 0.9
        minRate: 0.9
