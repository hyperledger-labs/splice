!include(base.yaml;scratch-default-operator.yaml;scratch-default-synchronizer-migration.yaml)
infra:
  prometheus:
    retentionDuration: "30d"
    retentionSize: "200GB"
    storageSize: "600Gi"
pulumiProjectConfig:
  default:
    cloudSql:
      protected: false
validator1:
  participantPruningSchedule:
    cron: "0 /10 * * * ?" # Run every 10min
    maxDuration: "5m"
    retention: "1h" # Keep 1h
  deduplicationDuration: 30m
svs:
  default:
    pruning:
      cometbft:
        retainBlocks: 2000 # corresponds to a retention period of ~2 hours
    svApp:
      resources:
        limits:
          cpu: "3"
          memory: 4Gi
        requests:
          cpu: "1"
          memory: 2Gi
    scanApp:
      resources:
        limits:
          memory: 4Gi
        requests:
          cpu: "2"
          memory: 2Gi
    participant:
      resources:
        requests:
          cpu: "1"
    sequencer:
      # formerly the effect of `SEQUENCER_LOW_RESOURCES=true`
      resources:
        limits:
          memory: 8Gi
        requests:
          cpu: "4"
          memory: 4Gi
      additionalEnvVars:
        - name: ADDITIONAL_CONFIG_DABFT_SCALE_SETTINGS
          value: |
            canton.sequencers.sequencer.sequencer.config {
              epoch-length = 64
              consensus-empty-block-creation-timeout = 500.milliseconds
              min-requests-in-batch = 16
            }
        - name: ADDITIONAL_CONFIG_HIGH_THROUGHPUT_SETTINGS
          value: |
            canton.sequencers.sequencer.sequencer.block.throughput-cap {
              enabled = true
              messages = {
                confirmation-request = {
                  global-tps-cap = 50
                  per-client-tps-cap = 25
                  global-kbps-cap = 20000
                  per-client-kbps-cap = 10000
                }
                topology = {
                  global-tps-cap = 200
                  per-client-tps-cap = 10
                  global-kbps-cap = 2000
                  per-client-kbps-cap = 500
                }
              }
              strict = false
            }
    mediator:
      resources:
        limits:
          memory: 4Gi
        requests:
          cpu: "1"
          memory: 2Gi
    cometbft:
      resources:
        limits:
          memory: 4Gi
        requests:
          memory: 2Gi
  sv-da-1:
    publicName: Digital-Asset-1
    subdomain: sv-1
    cometbft:
      nodeId: d825622358065aea3cb3b3479cf64d172675037e
      validatorKeyAddress: 2D21D8AB2306770E9F93E8BD0E0F07B3E86817D7
    svApp:
      auth0:
        clientId: bxjt0vzLyRG2rk2fapXfOzH5lzK4mrl7
    validatorApp:
      walletUser: auth0|68c2c41e6470184569e4521e
      auth0:
        clientId: fBFpzZSRuufk9ueV2pSEkOXNYXuQtVmY
loadTester:
  enable: true
  iterationsPerMinute: 720
  minRate: 0.95
